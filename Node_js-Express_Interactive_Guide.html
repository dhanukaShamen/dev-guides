<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node.js + Express — Interactive Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: #07090f;
      --surf: #0c1018;
      --surf2: #111620;
      --surf3: #17202e;
      --border: rgba(34,160,80,0.20);
      --border2: rgba(34,160,80,0.10);
      --text: #d4ffe3;
      --text2: #7ab896;
      --text3: #375c47;
      --accent: #22c55e;
      --accent-dim: rgba(34,197,94,0.12);
      --nd: #4ade80;
      --nd-bg: rgba(74,222,128,0.08);
      --nd-border: rgba(74,222,128,0.28);
      --ex: #fb923c;
      --ex-bg: rgba(251,146,60,0.08);
      --ex-border: rgba(251,146,60,0.28);
      --npm: #f59e0b;
      --npm-bg: rgba(245,158,11,0.08);
      --npm-border: rgba(245,158,11,0.28);
      --warn: #f59e0b;
      --warn-bg: rgba(245,158,11,0.08);
      --warn-border: rgba(245,158,11,0.25);
      --ok: #34d399;
      --ok-bg: rgba(52,211,153,0.08);
      --ok-border: rgba(52,211,153,0.25);
      --red: #f87171;
      --sidebar-w: 278px;
      --hdr: 58px;
      --radius: 10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow:hidden;height:100vh;}

    /* ── HEADER ── */
    .hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:rgba(7,9,15,0.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:200;}
    .hdr-left{display:flex;align-items:center;gap:10px;}
    .logo{font-size:15px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
    .logo span{color:var(--accent);}
    .pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
    .pill-nd{background:var(--nd-bg);color:var(--nd);border:1px solid var(--nd-border);}
    .pill-ex{background:var(--ex-bg);color:var(--ex);border:1px solid var(--ex-border);}
    .pill-npm{background:var(--npm-bg);color:var(--npm);border:1px solid var(--npm-border);}
    .hdr-search{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:260px;}
    .hdr-search svg{flex-shrink:0;color:var(--text3);}
    .hdr-search input{background:none;border:none;color:var(--text);font-family:'Geist',sans-serif;font-size:13px;width:100%;outline:none;}
    .hdr-search input::placeholder{color:var(--text3);}
    .hdr-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);}
    .home-link-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;color:#7a9ac8;font-size:12px;font-weight:600;text-decoration:none;transition:all .15s;white-space:nowrap;flex-shrink:0;}
    .home-link-btn:hover{background:rgba(255,255,255,0.08);color:#dce8ff;}
    .prog-bar{width:100px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--ex));border-radius:2px;transition:width .4s ease;}
    .hdr-search-row{display:none;width:100%;padding:0 14px 10px;box-sizing:border-box;}

    /* ── LAYOUT ── */
    .layout{display:flex;margin-top:var(--hdr);height:calc(100vh - var(--hdr));}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;overflow-y:auto;background:var(--surf);border-right:1px solid var(--border);padding:12px 0 80px;}
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px;}
    .sg-label{padding:14px 18px 5px;font-size:9.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);}
    .si{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 36px;cursor:pointer;font-size:12.5px;color:var(--text2);border-left:2px solid transparent;transition:all .12s ease;user-select:none;}
    .si:hover{background:var(--surf2);color:var(--text);}
    .si.active{background:rgba(34,197,94,0.07);color:var(--accent);border-left-color:var(--accent);}
    .si .sn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);}
    .si svg{flex-shrink:0;opacity:.7;}
    .si.active svg{opacity:1;}

    /* ── SIDEBAR 3-LEVEL STRUCTURE ── */
    .sb-phase{border-bottom:1px solid var(--border2);}
    .sb-phase:last-child{border-bottom:none;}

    /* Phase header */
    .sb-phase-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .12s;}
    .sb-phase-hdr:hover{background:var(--surf2);}
    .sb-phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .p1-dot{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5);}
    .p2-dot{background:#fb923c;box-shadow:0 0 6px rgba(251,146,60,0.5);}
    .p3-dot{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,0.5);}
    .sb-phase-title{font-size:12px;font-weight:700;flex:1;color:var(--text);letter-spacing:-0.2px;}
    .sb-phase-badge{font-size:9px;font-weight:600;padding:1px 7px;border-radius:10px;letter-spacing:0.3px;flex-shrink:0;}
    .p1-badge{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25);}
    .p2-badge{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.25);}
    .p3-badge{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
    .sb-chevron{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:2px;}
    .sb-chevron.open{transform:rotate(90deg);}
    .sb-phase-body{display:none;}
    .sb-phase-body.open{display:block;}

    /* Topic header */
    .sb-topic{border-top:1px solid var(--border2);}
    .sb-topic-hdr{display:flex;align-items:center;gap:7px;padding:7px 14px 7px 20px;cursor:pointer;user-select:none;transition:background .12s;}
    .sb-topic-hdr:hover{background:var(--surf2);}
    .sb-topic-icon{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
    .sb-topic-icon.open{transform:rotate(90deg);}
    .sb-topic-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);flex:1;}
    .sb-topic-count{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text3);background:var(--surf3);padding:1px 5px;border-radius:3px;}
    .sb-topic-body{display:none;}
    .sb-topic-body.open{display:block;}

    /* ── TOPIC OVERVIEW SIDEBAR ITEM ── */
    .si-ov{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 30px;cursor:pointer;font-size:12px;color:var(--text3);border-left:2px solid transparent;transition:all .12s ease;background:rgba(34,197,94,0.03);border-bottom:1px solid var(--border2);}
    .si-ov:hover{background:rgba(34,197,94,0.07);color:var(--accent);}
    .si-ov.active{background:rgba(34,197,94,0.09);color:var(--accent);border-left-color:var(--accent);}
    .si-ov-dot{width:14px;height:14px;border-radius:3px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .si-ov span{font-weight:600;letter-spacing:0.2px;}

    /* ── TOPIC INTRO PAGE ── */
    .ti-tagline{font-size:16px;color:var(--text2);line-height:1.7;max-width:620px;font-style:italic;border-left:3px solid var(--accent);padding-left:16px;margin-top:12px;margin-bottom:24px;}
    .ti-meta-row{display:flex;gap:10px;margin:0 0 22px;}
    .ti-meta-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:0;}
    .ti-meta-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:5px;}
    .ti-meta-val{font-size:20px;font-weight:800;color:var(--text);}
    .ti-why{background:var(--surf2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:20px 24px;margin:0 0 22px;}
    .ti-why-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
    .ti-why p{font-size:14px;color:var(--text2);line-height:1.85;margin:0;}
    .ti-learns-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:12px;}
    .ti-learn-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surf);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
    .ti-learn-item:hover{background:var(--surf2);border-color:var(--accent);transform:translateX(3px);}
    .ti-learn-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(34,197,94,0.25);border-radius:4px;padding:3px 8px;flex-shrink:0;min-width:30px;text-align:center;}
    .ti-learn-content{flex:1;min-width:0;}
    .ti-learn-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px;}
    .ti-learn-desc{font-size:12px;color:var(--text2);line-height:1.5;}
    .ti-learn-arrow{font-size:14px;color:var(--text3);transition:all .15s;flex-shrink:0;}
    .ti-learn-item:hover .ti-learn-arrow{color:var(--accent);transform:translateX(3px);}
    .ti-prereq{display:flex;gap:12px;align-items:flex-start;background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:0 0 4px;}
    .ti-prereq-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
    .ti-prereq-txt{font-size:13px;color:var(--text2);line-height:1.65;}

    /* ── CONTENT ── */
    .content{flex:1;overflow-y:auto;padding:44px 56px 80px;min-width:0;overflow-x:hidden;}
    .content::-webkit-scrollbar{width:5px;}
    .content::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px;}

    /* ── SECTION ── */
    .sec{display:none;animation:fadeUp .28s ease;}
    .sec.vis{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .sec-crumb{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
    .sec-crumb span{color:var(--text2);}
    .sec-title{font-size:30px;font-weight:800;letter-spacing:-0.8px;line-height:1.15;margin-bottom:14px;background:linear-gradient(130deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sec-sub{font-size:15px;color:var(--text2);line-height:1.7;max-width:660px;margin-bottom:28px;}
    .divider{border:none;border-top:1px solid var(--border2);margin:28px 0;}

    /* ── PROSE ── */
    .prose{font-size:14px;color:var(--text2);line-height:1.8;}
    .prose p{margin-bottom:14px;}
    .prose p:last-child{margin-bottom:0;}
    .prose strong{color:var(--text);font-weight:600;}
    .prose code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--surf3);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:var(--accent);}
    .prose ul{padding-left:0;list-style:none;}
    .prose ul li{padding:4px 0 4px 18px;position:relative;font-size:14px;color:var(--text2);line-height:1.8;}
    .prose ul li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700;}
    .prose a{color:var(--nd);text-decoration:underline;text-underline-offset:3px;}

    /* ── CODE BLOCK ── */
    .cb{background:#080e18;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:20px 0;}
    .cb-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--border);}
    .cb-fname{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:7px;}
    .cb-lang{font-size:10px;color:var(--text3);background:var(--surf3);padding:2px 7px;border-radius:4px;}
    .cb-copy{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);padding:2px 9px;border-radius:4px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s;}
    .cb-copy:hover{color:var(--text);border-color:var(--text3);}
    .cb pre[class*="language-"]{margin:0;padding:18px 20px;background:transparent !important;font-family:'JetBrains Mono',monospace !important;font-size:13px !important;line-height:1.72;overflow-x:auto;}

    /* ── INFO BOXES ── */
    .box{border-radius:var(--radius);padding:18px 22px;margin:18px 0;border-left:3px solid;}
    .box-hdr{display:flex;align-items:center;gap:9px;font-weight:700;font-size:12px;margin-bottom:10px;letter-spacing:0.3px;}
    .box-hdr svg{flex-shrink:0;}
    .box-body{font-size:13.5px;line-height:1.72;color:var(--text2);}
    .box-body code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px;}
    .box-body p{margin-bottom:7px;}.box-body p:last-child{margin-bottom:0;}
    .box-body ul{list-style:none;padding:0;}.box-body ul li{padding:3px 0 3px 15px;position:relative;line-height:1.8;}
    .box-body ul li::before{content:'›';position:absolute;left:0;font-weight:700;}
    .box-body strong{color:var(--text);}
    .box-nd{background:var(--nd-bg);border-color:var(--nd);}.box-nd .box-hdr{color:var(--nd);}.box-nd .box-body ul li::before{color:var(--nd);}
    .box-ex{background:var(--ex-bg);border-color:var(--ex);}.box-ex .box-hdr{color:var(--ex);}.box-ex .box-body ul li::before{color:var(--ex);}
    .box-npm{background:var(--npm-bg);border-color:var(--npm);}.box-npm .box-hdr{color:var(--npm);}.box-npm .box-body ul li::before{color:var(--npm);}
    .box-warn{background:var(--warn-bg);border-color:var(--warn);}.box-warn .box-hdr{color:var(--warn);}.box-warn .box-body ul li::before{color:var(--warn);}
    .box-ok{background:var(--ok-bg);border-color:var(--ok);}.box-ok .box-hdr{color:var(--ok);}.box-ok .box-body ul li::before{color:var(--ok);}

    /* ── GRID ── */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
    .g2 > *,.g3 > *{min-width:0;}
    .card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .card-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .card-b{font-size:12.5px;color:var(--text2);line-height:1.6;}
    .card-b code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf3);padding:1px 5px;border-radius:3px;color:var(--accent);}

    /* ── NAV BTNS ── */
    .nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:44px;padding-top:28px;border-top:1px solid var(--border2);}
    .nav-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Geist',sans-serif;transition:all .18s;max-width:48%;overflow:hidden;}
    .nav-btn .nav-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .nav-btn:hover{background:var(--surf2);color:var(--text);border-color:var(--accent);}
    .nav-btn.next{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;margin-left:auto;}
    .nav-btn.next:hover{background:#4ade80;}

    /* ── COMPARE (bad/good) ── */
    .cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
    .cmp > *{min-width:0;}
    .cmp-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border-radius:6px 6px 0 0;}
    .lbl-bad{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);border-bottom:none;}
    .lbl-good{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border);border-bottom:none;}
    .cmp .cb{margin:0;border-radius:0 0 8px 8px;overflow:hidden;}
    .cmp .cb pre[class*="language-"]{font-size:11.5px !important;overflow-x:auto;word-break:break-all;}

    /* ── FILE TREE ── */
    .filetree{background:#080e18;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:2;margin:18px 0;white-space:pre;overflow-x:auto;display:block;}
    .ft-dir{color:var(--text2);}.ft-js{color:var(--nd);}.ft-json{color:var(--npm);}.ft-ts{color:#5b8dee;}.ft-other{color:var(--text3);}
    .ft-comment{color:var(--text3);font-style:italic;}

    /* ── SEARCH OVERLAY ── */
    .srch-drop{position:absolute;top:54px;left:50%;transform:translateX(-50%);width:320px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:300;display:none;overflow:hidden;}
    .srch-drop.vis{display:block;}
    .srch-item{padding:9px 15px;cursor:pointer;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border2);transition:background .12s;}
    .srch-item:last-child{border-bottom:none;}
    .srch-item:hover,.srch-item.sel{background:var(--surf2);color:var(--text);}
    .srch-empty{padding:14px 15px;font-size:12.5px;color:var(--text3);text-align:center;}
    .srch-item .sg{font-size:9.5px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px;}

    /* ── CHAPTER STRUCTURE ── */
    .ch-part{margin:32px 0 0;}
    .ch-label{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .ch-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;padding-right:10px;margin-right:2px;border-right:2px solid var(--border);line-height:1;}
    .ch-head{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2);}
    .analogy{background:linear-gradient(135deg,rgba(34,197,94,0.05) 0%,rgba(251,146,60,0.04) 100%);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:18px 22px;margin:0;}
    .analogy-text{font-size:14px;color:var(--text2);line-height:1.8;font-style:italic;}
    .analogy-text strong{color:var(--text);font-style:normal;}
    .steps{counter-reset:step;list-style:none;padding:0;margin:0;}
    .steps li{counter-increment:step;display:block;position:relative;padding:11px 0 11px 48px;border-bottom:1px solid var(--border2);font-size:14px;color:var(--text2);line-height:1.8;}
    .steps li:last-child{border-bottom:none;}
    .steps li::before{content:counter(step,decimal-leading-zero);font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(34,197,94,0.25);border-radius:4px;padding:2px 7px;letter-spacing:0.3px;position:absolute;left:0;top:13px;}
    .steps li strong{color:var(--text);}
    .steps li code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surf3);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--accent);white-space:nowrap;}
    .mistake{margin:18px 0;}
    .mistake-name{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--red);margin-bottom:10px;}
    .mistake-why{font-size:13px;color:var(--text2);line-height:1.65;margin-top:8px;padding:10px 14px;background:rgba(248,113,113,0.05);border-radius:6px;border-left:2px solid rgba(248,113,113,0.3);}
    .mistake-why strong{color:var(--text);}
    .recap-list{list-style:none;padding:0;margin:0;}
    .recap-list li{display:block;position:relative;padding:6px 0 6px 22px;font-size:14px;color:var(--text2);line-height:1.8;}
    .recap-list li::before{content:'›';color:var(--accent);font-weight:800;font-size:15px;line-height:1.5;position:absolute;left:0;top:5px;}
    .recap-list li code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px;white-space:nowrap;}
    .wnext{font-size:14px;color:var(--text2);line-height:1.8;padding:16px 20px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);margin:24px 0;}
    .wnext strong{color:var(--accent);}
    .wnext-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}

    /* ── WELCOME ── */
    .welcome{max-width:700px;padding:30px 0;}
    .wl-title{font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:16px;}
    .wl-title .a{color:var(--text);}.wl-title .b{background:linear-gradient(130deg,var(--accent),var(--ex));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .wl-sub{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:28px;max-width:580px;}
    .wl-pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
    .wl-pill{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;}

    /* ── MOBILE ── */


    /* ── HAMBURGER (hidden by default, shown on mobile) ── */
    .menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:var(--surf);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text2);transition:background .15s,color .15s;flex-shrink:0;}
    .menu-btn:hover{background:var(--surf2);color:var(--text);}
    .menu-btn svg{pointer-events:none;}

    /* ── SIDEBAR OVERLAY ── */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:149;}
    .sidebar-overlay.vis{display:block;}

    @media(max-width:1100px){
      .content{padding:36px 32px 80px;}
      .cmp{grid-template-columns:1fr;}
      .g2{grid-template-columns:1fr 1fr;}
    }
    @media(max-width:900px){
      :root{--hdr:100px;}
      .hdr{flex-wrap:wrap;height:auto;min-height:58px;padding:0 14px 0;}
      .menu-btn{display:flex;}
      .hdr-left{flex:1;min-width:0;flex-shrink:1;padding:10px 0;}
      .hdr-right{padding:10px 0;gap:8px;flex-shrink:0;}
      .hdr-search-wrap{display:none;}
      .hdr-search{display:none;}
      .hdr-search-row .hdr-search{display:flex;}
      .hdr-search-row{display:flex;}
      .pill-nd,.pill-ex,.pill-npm{display:none;}
      .sidebar{
        position:fixed;top:var(--hdr);left:0;bottom:0;
        height:calc(100vh - var(--hdr));
        z-index:160;transform:translateX(-100%);
        transition:transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow:4px 0 24px rgba(0,0,0,.5);
        overflow-y:auto;
        padding-bottom:80px;
      }
      .sidebar.open{transform:translateX(0);}
      .content{padding:28px 18px 80px;}
      .cmp{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr;}
      .nav-row{flex-direction:column;gap:8px;}
      .nav-btn{max-width:100%;width:100%;justify-content:center;font-size:12px;padding:10px 14px;}
      .nav-btn.next{margin-left:0;}
    }
    /* ── FLOATING NAV ─────────────────────────────────────────────────── */
    .fab-wrap{position:fixed;bottom:88px;right:16px;z-index:9999;touch-action:none;user-select:none;}
    .fab-btn{width:46px;height:46px;border-radius:50%;background:#1a2236;border:1.5px solid rgba(255,255,255,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06);transition:background .2s,transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;outline:none;padding:0;animation:fab-pulse 3.5s ease-in-out infinite;}
    @keyframes fab-pulse{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5);}50%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0 6px rgba(255,255,255,.04);}}
    .fab-btn:hover{background:#243050;transform:scale(1.1);animation:none;}
    .fab-btn.open{background:#243050;transform:rotate(45deg) scale(1.08);animation:none;box-shadow:0 6px 28px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.06);}
    .fab-menu{position:absolute;bottom:54px;right:0;display:flex;flex-direction:column;gap:9px;align-items:flex-end;pointer-events:none;}
    .fab-item{display:flex;align-items:center;gap:9px;text-decoration:none;opacity:0;transform:translateY(16px) scale(0.78);transition:opacity .2s ease,transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;will-change:transform,opacity;}
    .fab-item.vis{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .fab-item-lbl{background:rgba(8,12,20,.9);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 12px;font-size:11.5px;font-weight:600;color:#c8d8f0;white-space:nowrap;letter-spacing:-.1px;transition:opacity .15s;}

    .fab-item:hover .fab-item-ico{transform:scale(1.14);}

    .fab-item.fab-current .fab-item-ico{opacity:.45;}
    .fab-wrap.fab-left .fab-menu{right:auto;left:0;align-items:flex-start;}

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>Node.js is a JavaScript "runtime" — a program that runs JavaScript code outside of a browser. It's built on V8, the same JavaScript engine that powers Google Chrome, but it strips away the browser-specific APIs (like <code>document</code> and <code>window</code>) and replaces them with server-specific ones like file system access, network sockets, and process control.</p>
  <p>When you run <code>node server.js</code>, V8 compiles and executes your JavaScript the same way Chrome would — but the environment it runs in is your operating system, not a webpage.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Before Node (released in 2009), you had to use a different language — PHP, Ruby, Python, Java — to write server-side code. Node meant you could use JavaScript everywhere. One language, one mental model, frontend and backend. That's a real productivity gain, not marketing fluff.</p>
  <p>It also means your existing JavaScript knowledge transfers directly. Closures, callbacks, promises, array methods — they all work exactly the same in Node.</p></div>
</div>
<div class="ch-part">

  <div class="analogy"><p class="analogy-text">Think of V8 as a car engine. <strong>Chrome is a sedan</strong> — the engine is installed in a car with seats, windows, a radio, and a GPS. <strong>Node is a speedboat</strong> — the same engine bolted into a completely different frame, for a different purpose, with different controls. Same engine, completely different vehicle.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>

    <li>You write a <code>.js</code> file. It's just a text file with JavaScript in it.</li>

    <li>V8 compiles the JavaScript to machine code and executes it line by line.</li>
    <li>When your code calls a Node-specific API like <code>fs.readFile()</code>, Node handles it using C++ bindings to your operating system.</li>
    <li>Your program runs until it has nothing left to do — no pending callbacks, no open connections — then exits.</li>
  </ol>
</div>`,

      sub:'How Node handles thousands of simultaneous requests on a single thread — the call stack, libuv, the callback queue, and the loop itself.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>The event loop is the mechanism that lets Node.js handle many concurrent operations on a single thread. Most languages handle concurrency by spawning a new thread for each request. Node uses one thread plus the event loop — a continuous cycle that checks: "is there anything ready to run?" and executes it.</p>
  <p>Understanding the event loop explains why <code>console.log</code> after a <code>setTimeout(..., 0)</code> runs before the callback, why your server never freezes waiting for a database, and why blocking the main thread is the cardinal sin of Node development.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">The four pieces</span></div>
  <div class="prose">
    <p><strong>1. The Call Stack</strong> — where your synchronous code runs. JavaScript is single-threaded: only one function executes at a time. When you call a function, it gets pushed onto the stack. When it returns, it gets popped off. If the stack is busy, nothing else can run.</p>
    <p><strong>2. Node APIs / libuv</strong> — the C++ layer underneath Node. When your code calls <code>fs.readFile()</code>, <code>setTimeout()</code>, or makes an HTTP request, Node hands that work to libuv (a C++ library). libuv uses the operating system's async I/O capabilities and a thread pool to do the actual work — completely outside the JS thread. Your JS thread is immediately free to do other things.</p>
    <p><strong>3. The Callback Queue (Task Queue)</strong> — when libuv finishes a job (the file is read, the timer expired, the network response arrived), it puts the associated callback function into the callback queue. It sits here waiting.</p>
    <p><strong>4. The Event Loop</strong> — a loop that runs constantly. Its one job: check if the call stack is empty. If it is, take the first callback from the queue and push it onto the stack to run. Repeat forever.</p>
  </div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">Step-by-step trace</span></div>
  <ol class="steps">
    <li>Your script starts: <code>console.log('start')</code> → pushed onto call stack → runs → popped off. Prints "start".</li>
    <li><code>setTimeout(callback, 1000)</code> → pushed → Node hands the timer to libuv → function returns → popped off. The JS thread moves on immediately.</li>
    <li><code>console.log('end')</code> → pushed → runs → popped. Prints "end". Call stack is now empty.</li>
    <li>1000ms passes. libuv puts the <code>setTimeout</code> callback into the callback queue.</li>
    <li>Event loop sees: stack is empty, queue has an item. Moves the callback onto the stack.</li>
    <li>Callback runs: <code>console.log('timer fired')</code> → prints "timer fired". Popped off. Stack is empty again.</li>
    <li>Result: "start", "end", then (1 second later) "timer fired" — even if the delay is 0ms.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">Microtasks vs macrotasks</span></div>
  <div class="prose"><p>Not all callbacks are equal. The queue has two tiers:</p>
  <p><strong>Microtask queue</strong> — for <code>Promise</code> callbacks (<code>.then()</code>, <code>.catch()</code>, <code>async/await</code> continuations) and <code>queueMicrotask()</code>. Microtasks run <em>before</em> the event loop moves on. After every task completes, the entire microtask queue is drained first.</p>
  <p><strong>Macrotask queue (callback queue)</strong> — for <code>setTimeout</code>, <code>setInterval</code>, I/O callbacks (file reads, network requests). One macrotask runs per event loop iteration.</p>
  <p>This is why <code>Promise.resolve().then(fn)</code> always runs before <code>setTimeout(fn, 0)</code> — promises are microtasks, timers are macrotasks.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Imagine a chef (the JS thread) with a to-do board. When a task takes a long time — "simmer for 30 minutes" (a database query) — the chef <strong>doesn't stand at the stove watching</strong>. They hand it to a sous-chef (libuv), go back to the board, and pick up the next item. When the sous-chef yells "soup's ready!" (callback queued), the chef finishes the current task first, then handles the soup. <strong>The chef is never idle waiting</strong> — that's the event loop. The kitchen handles dozens of simultaneous timers and I/O tasks because the chef never blocks.</p></div>
</div>`,

const fs   = require('fs');
const http = require('http');

const server = http.createServer((req, res) => {

  if (req.url === '/sync') {
    // ── BLOCKING — never do this in a real server ─────────────
    // readFileSync holds the call stack hostage until the entire file is read.
    // Every other incoming request is frozen while this runs.
    // On a 10MB file this could be 50ms — at 100 req/s that's catastrophic.
    const data = fs.readFileSync('./big-file.txt', 'utf8');   // BLOCKS
    res.end(data.slice(0, 100));
  }

    // ── NON-BLOCKING — the correct approach ──────────────────
    // readFile hands the work to libuv and returns immediately.
    // Node is free to handle other requests while the file loads.
    // When the file is ready, libuv queues the callback — the event loop runs it.
    fs.readFile('./big-file.txt', 'utf8', (err, data) => {   // NON-BLOCKING
      if (err) { res.writeHead(500); res.end('Error'); return; }
      res.end(data.slice(0, 100));
    });
    // Code continues immediately here — event loop is free
  }

});

server.listen(3000, () => console.log('Server on http://localhost:3000'));

// Test with: curl http://localhost:3000/async

<div class="ch-part">

    {
      id:'async-js', group:'Getting Started', icon:'clock', title:'Async JavaScript',
      sub:'Callbacks, promises, and async/await — the three stages of handling work that takes time.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>"Asynchronous" code means starting a task and moving on without waiting for it to finish. When the task completes, you handle the result. This is the opposite of "synchronous" code, where each line waits for the previous one before running.</p>
  <p>JavaScript has evolved three ways to write async code: <strong>callbacks</strong> (original, still used), <strong>promises</strong> (cleaner, chainable), and <strong>async/await</strong> (cleanest, reads like synchronous code). You'll see all three in real codebases.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Every meaningful thing your server does takes time: reading from a database, calling an external API, writing a file. If your server waited synchronously for each operation, it would be frozen and unable to handle any other requests while waiting. That's unusable for production.</p>
  <p>Node's async model is how a single server thread can serve hundreds of simultaneous users. This is not optional knowledge — async is the foundation everything else in Node is built on.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Imagine ordering food at a restaurant. <strong>Synchronous:</strong> you order, then stand at the kitchen window staring until your food is ready. Nobody else can order until yours is done. <strong>Asynchronous:</strong> you order, take a seat, the waiter goes to other tables, and when your food is ready, they bring it to you. Everyone gets served in parallel. Your callback is the waiter bringing your food.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li><strong>Callbacks:</strong> you pass a function to another function. When the async work is done, your function gets called with the result. The standard Node pattern is <code>callback(error, result)</code>.</li>
    <li><strong>Callback hell:</strong> when callbacks nest inside callbacks inside callbacks, the code becomes a rightward-drifting pyramid that's impossible to read.</li>
    <li><strong>Promises:</strong> an object representing a future value. It's either pending, fulfilled (has a value), or rejected (has an error). You chain <code>.then()</code> for success and <code>.catch()</code> for errors.</li>
    <li><strong>async/await:</strong> syntax sugar on top of promises. Mark a function <code>async</code>, then use <code>await</code> in front of any promise. The code reads top-to-bottom like synchronous code, but it's still async underneath.</li>
    <li>Use <code>try/catch</code> with async/await to handle errors — it replaces <code>.catch()</code> from the promise chain.</li>
  </ol>
</div>`,
      boxes:[
        {type:'nd',title:'The event loop in one paragraph',body:`<p>Node.js runs on a single thread. When you start an async operation (like a database query), Node hands it off to the operating system and moves on. When the OS finishes, it pushes a callback onto the "callback queue." The event loop checks: is the call stack empty? If yes, it picks the next callback and runs it. This is why async code never blocks the server — the main thread is always free to handle new requests.</p>`},
        {type:'warn',title:'Forgetting await is a silent bug',body:`<p>If you call an async function without <code>await</code>, you get back a <code>Promise</code> object — not the value you wanted. There's no error, the code just silently uses the wrong thing. Always put <code>await</code> in front of any function that returns a promise.</p><ul><li>Wrong: <code>const user = getUser(id)</code> — user is a Promise</li><li>Right: <code>const user = await getUser(id)</code> — user is the actual data</li></ul>`},

      code:`// async-evolution.js — three ways to write the same thing
// Run with: node async-evolution.js

const fs = require('fs');                   // built-in file system module

// ── APPROACH 1: CALLBACKS (oldest pattern) ──────────────────
// fs.readFile takes a path, encoding, and a callback function
fs.readFile('package.json', 'utf8', function(err, data) {
  if (err) {                                // error-first: always check err first
    console.error('Callback error:', err.message);
    return;                                 // bail out if something went wrong
  }
  console.log('Callback result:', JSON.parse(data).name);
});

// ── APPROACH 2: PROMISES ────────────────────────────────────
// fs.promises gives us the same functions as promises instead of callbacks
fs.promises.readFile('package.json', 'utf8')
  .then(data => {                           // .then() runs when the operation succeeds
    console.log('Promise result:', JSON.parse(data).name);
  })
  .catch(err => {                           // .catch() runs if something goes wrong
    console.error('Promise error:', err.message);
  });

// ── APPROACH 3: ASYNC/AWAIT (modern — use this) ─────────────
// async functions always return a promise, even if you return a plain value
async function readPackageName() {
  try {                                     // try/catch replaces .catch()
    const data = await fs.promises.readFile('package.json', 'utf8'); // wait for result
    const parsed = JSON.parse(data);        // now 'data' is the file contents, not a Promise
    console.log('Async/await result:', parsed.name);
    return parsed.name;                     // the caller can await this return value too
  } catch (err) {
    console.error('Async/await error:', err.message);
    throw err;                              // re-throw so the caller knows it failed
  }
}

readPackageName();                          // call the async function to kick it off`,

      extraCodes:[{code:`// real-world-async.js — async/await with multiple operations in sequence
// This simulates what a real API handler looks like
const fs = require('fs').promises;         // use the promises version of fs throughout
const path = require('path');              // for building safe file paths

// A function that finds the size of every .js file in a directory
async function getJsFileSizes(dirPath) {
  // Step 1: read the directory — get an array of filenames
  const entries = await fs.readdir(dirPath);

  // Step 2: filter to only .js files
  const jsFiles = entries.filter(name => name.endsWith('.js'));

  // Step 3: for each file, get its stats (size, modified date, etc.)
  // Promise.all runs all the stat() calls in parallel — much faster than sequential
  const statsPromises = jsFiles.map(name => {
    const fullPath = path.join(dirPath, name); // build the full path safely
    return fs.stat(fullPath).then(stats => ({  // get stats, then shape the result
      file: name,                              // filename
      sizeKb: (stats.size / 1024).toFixed(1), // convert bytes to kilobytes
    }));
  });

  const results = await Promise.all(statsPromises); // wait for all parallel ops to finish
  return results;                                    // return the array of results
}

// Self-invoking async function: call it and handle the result
(async () => {
  try {
    const sizes = await getJsFileSizes('.');   // look in the current directory
    console.log('JS file sizes:');
    sizes.forEach(f => console.log(\` \${f.file}: \${f.sizeKb} KB\`));
  } catch (err) {
    console.error('Failed to read directory:', err.message);
  }
})();`, file:'real-world-async.js', lang:'javascript'}],

<div class="ch-part">

    <div class="box-body"><ul class="recap-list">
      <li>Async code starts a task and moves on — the result is handled later via callback, promise, or await.</li>
      <li>The three patterns are callbacks (error-first), promises (.then/.catch), and async/await (try/catch). Use async/await by default.</li>

    {
      id:'modules', group:'Getting Started', icon:'package', title:'Modules: require() vs import',
      sub:'How Node splits code across files, and the difference between CommonJS and ES Modules.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>A "module" is just a file. Node's module system lets you export things from one file and import them in another. This is how you split a large codebase into small, focused files instead of writing everything in one place.</p>
  <p>There are two module systems in Node: <strong>CommonJS</strong> (CJS) uses <code>require()</code> and <code>module.exports</code>, and is the default in Node. <strong>ES Modules</strong> (ESM) uses <code>import</code> and <code>export</code>, and is the newer standard that browsers also use. You'll encounter both.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without modules, every variable and function would be in one enormous file. As a project grows, this becomes unmanageable — you can't find anything, name conflicts appear, and sharing code becomes impossible.</p>
  <p>Modules also give you <strong>encapsulation</strong>: anything you don't export stays private to that file. Other files can't accidentally depend on or overwrite your internal variables.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text"><strong>CommonJS <code>require()</code></strong> is like ordering tools from a warehouse as you need them — the request happens at runtime, exactly when that line of code runs. <strong>ES Module <code>import</code></strong> is like pre-ordering all your tools the night before — everything is loaded at the very start, before any code runs. Both get you the same tools; the timing is different.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>In a CJS file, use <code>module.exports = value</code> to export a single thing, or <code>exports.name = value</code> to export multiple named things.</li>
    <li>Use <code>const thing = require('./path/to/file')</code> to import it. The path must start with <code>./</code> or <code>../</code> for local files.</li>
    <li>Built-in modules (like <code>fs</code>, <code>path</code>) and installed packages (like <code>express</code>) don't need a <code>./</code> — just use the name.</li>
    <li>For ESM, add <code>"type": "module"</code> to package.json, then use <code>export</code> and <code>import</code> syntax. Or name your files <code>.mjs</code>.</li>
    <li>CJS is synchronous. ESM is asynchronous (modules are loaded in parallel). This is why you can't <code>require()</code> an ESM file directly.</li>
  </ol>
</div>`,
      boxes:[
        {type:'nd',title:'CommonJS cheat sheet',body:`<ul><li>Export one thing: <code>module.exports = myFunction</code></li><li>Export multiple things: <code>module.exports = { add, subtract }</code></li><li>Or: <code>exports.add = add; exports.subtract = subtract</code></li><li>Import: <code>const { add } = require('./math')</code></li><li>Import everything: <code>const math = require('./math')</code> then <code>math.add()</code></li></ul>`},
        {type:'warn',title:'The most common module mistake',body:`<p>Mixing <code>module.exports</code> and <code>exports.name</code> on the same file. They start pointing to the same object, but as soon as you do <code>module.exports = something</code>, you replace the whole object. Any <code>exports.foo</code> you added earlier is now lost. Pick one style per file.</p>`},
      ],
      code:`// math.js — exporting functions with CommonJS
// Other files can require() this to use these functions

// Named exports: attach each function to the exports object
exports.add = function(a, b) {
  return a + b;              // add two numbers and return the result
};

exports.subtract = function(a, b) {
  return a - b;              // subtract b from a and return the result
};

exports.multiply = function(a, b) {
  return a * b;              // multiply two numbers and return the result
};

// Private helper — NOT exported, so other files can't access it
function validate(n) {
  if (typeof n !== 'number') throw new TypeError('Expected a number'); // guard
  return n;
}

// You can also export as an object using module.exports (both approaches work)
// module.exports = { add, subtract, multiply };   // equivalent to the exports.X pattern above`,

      extraCodes:[{code:`// app.js — importing and using the math module

console.log(math.multiply(3, 7));       // prints: 21

console.log(add(2, 2));                  // prints: 4

console.log('CPU cores:', os.cpus().length);       // number of CPU cores
console.log('Temp dir:', os.tmpdir());             // where temp files go

// Requiring an installed package — also just use the name (no ./)
// (run 'npm install lodash' first)
// const _ = require('lodash');          // from node_modules`, file:'app.js', lang:'javascript'}],
      afterCode:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">08</span><span class="ch-head">Common mistakes beginners make</span></div>
  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Missing the ./ prefix for local files</div>
    <div class="cmp">
      <div><div class="cmp-lbl lbl-bad">Module not found</div><div class="cb"><pre class="language-javascript"><code>// Node looks for a package named 'math' in node_modules — fails
const math = require('math');</code></pre></div></div>
      <div><div class="cmp-lbl lbl-good">Fixed</div><div class="cb"><pre class="language-javascript"><code>// ./ tells Node it's a local file relative to this script
const math = require('./math');</code></pre></div></div>
    </div>
    <p class="mistake-why">Without <code>./</code>, Node treats the name as a package and searches <code>node_modules</code>. Always start local file paths with <code>./</code> or <code>../</code>.</p>
  </div>
  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Forgetting to export what you want to share</div>
    <div class="cmp">
      <div><div class="cmp-lbl lbl-bad">Nothing is exported</div><div class="cb"><pre class="language-javascript"><code>// helpers.js
function formatDate(date) {
  return date.toISOString().split('T')[0];
}
// No module.exports — this function is stuck inside this file</code></pre></div></div>
      <div><div class="cmp-lbl lbl-good">Fixed</div><div class="cb"><pre class="language-javascript"><code>// helpers.js
function formatDate(date) {
  return date.toISOString().split('T')[0];
}
module.exports = { formatDate }; // now other files can require() and use it</code></pre></div></div>
    </div>
    <p class="mistake-why">In CommonJS, nothing leaves a file unless you explicitly attach it to <code>module.exports</code>. The file won't error — the require just returns an empty object.</p>
  </div>
  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Mixing CJS and ESM in the same project</div>
    <div class="cmp">
      <div><div class="cmp-lbl lbl-bad">Throws ERR_REQUIRE_ESM</div><div class="cb"><pre class="language-javascript"><code>// package.json has "type": "module"
// But you're using require() — they conflict
const express = require('express'); // SyntaxError or ERR_REQUIRE_ESM</code></pre></div></div>
      <div><div class="cmp-lbl lbl-good">Fixed — pick one</div><div class="cb"><pre class="language-javascript"><code>// CJS (default, no package.json change needed)
const express = require('express');

// OR ESM (add "type":"module" to package.json, use .js or .mjs extension)
import express from 'express';</code></pre></div></div>
    </div>
    <p class="mistake-why">Node can't mix CJS and ESM in the same file. Pick one system for your project and be consistent. For Express projects, CJS with <code>require()</code> is the safest default.</p>
  </div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">09</span><span class="ch-head">Quick recap</span></div>
  <div class="box box-ok">
    <div class="box-body"><ul class="recap-list">
      <li>CommonJS (<code>require</code>/<code>module.exports</code>) is Node's default and what most Express projects use.</li>
      <li>Local files need a <code>./</code> prefix; built-in modules and npm packages do not.</li>
      <li>Use <code>module.exports = { fn1, fn2 }</code> to export multiple things; destructure them on import.</li>
      <li>Anything not attached to <code>module.exports</code> stays private to that file.</li>
      <li>ES Modules (<code>import</code>/<code>export</code>) require <code>"type":"module"</code> in package.json — don't mix the two systems.</li>
    </ul></div>
  </div>
</div>
<div class="wnext"><div class="wnext-lbl">What's next</div>Modules are how your <em>code</em> is organized. <strong>npm</strong> is how your <em>project</em> is organized — installing dependencies, defining scripts, and setting up the foundation every Node project needs before writing a single line of business logic.</div>`,
    },

    {
      id:'npm-setup', group:'Getting Started', icon:'npm', title:'npm & Project Setup',
      sub:'Initialising a project, understanding package.json, installing packages, and the scripts field.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>npm (Node Package Manager) is two things: a command-line tool that comes bundled with Node, and a public registry of over two million JavaScript packages. It lets you install, update, and remove third-party code that you can <code>require()</code> in your project.</p>
  <p>Every Node project has a <code>package.json</code> file at its root. This file describes the project — its name, version, which packages it depends on, and what commands to run for common tasks.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Nobody writes everything from scratch. bcrypt for password hashing, express for routing, zod for validation — these are packages that save you weeks of work. npm is how you get them into your project in seconds.</p>
  <p>package.json is also how you share your project. Anyone who clones your repo can run <code>npm install</code> to download all the same packages at the exact same versions. Without it, distributing a project would be a manual nightmare.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text"><strong>npm is a grocery store</strong> for code. <strong>package.json is your shopping list</strong> — it records exactly what you need. <strong>node_modules is the pantry</strong> — where the actual items are stored. <strong>npm install is your shopping trip</strong>. When someone else needs to cook the same meal, you give them the shopping list and they buy their own groceries. You never share the pantry (that's why node_modules is in .gitignore).</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Run <code>npm init -y</code> in your project folder. The <code>-y</code> accepts all defaults. This creates <code>package.json</code>.</li>
    <li>Run <code>npm install express</code> to install a package. npm downloads it into <code>node_modules/</code> and records it under <code>dependencies</code> in package.json.</li>
    <li>Run <code>npm install --save-dev nodemon</code> for dev-only tools. They go under <code>devDependencies</code> and aren't installed in production.</li>
    <li>npm also creates <code>package-lock.json</code> — this records exact version numbers. Commit this file to git so teammates get identical installs.</li>
    <li>Add scripts to package.json under the <code>scripts</code> field. Run them with <code>npm run scriptname</code>. The special script <code>start</code> can be run with just <code>npm start</code>.</li>
    <li>Add <code>node_modules/</code> to your <code>.gitignore</code> file. This folder can be hundreds of megabytes — you never commit it.</li>
  </ol>
</div>`,

    <p class="mistake-why">Dev tools installed as regular dependencies bloat your production bundle. Use <code>--save-dev</code> for anything that's only needed to develop, not to run the app.</p>

  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Deleting package-lock.json</div>

    </div>
    <p class="mistake-why"><code>package-lock.json</code> locks every dependency to its exact version. Without it, installs can vary between machines, causing subtle bugs.</p>

<div class="ch-part">

    {

      sub:'The anatomy of package.json, the scripts field, semantic versioning, and how npm knows what your project needs.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><code>package.json</code> is a JSON file at the root of every Node.js project. It is the single source of truth for your project's metadata — name, version, entry point — and its entire dependency tree. Every package your project needs to run, and every tool needed to build or test it, is recorded here.</p>
  <p>The <strong>scripts</strong> field turns <code>package.json</code> into a task runner. Instead of remembering long commands, you define them once under <code>"scripts"</code> and run them with <code>npm run &lt;name&gt;</code>. The <code>start</code> and <code>test</code> scripts are special — they run with just <code>npm start</code> and <code>npm test</code>.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>package.json is how you communicate your project to the world. Anyone who clones your repository runs <code>npm install</code> and npm reads package.json to know exactly what to download. Without it, sharing a project means manually documenting every dependency and its version.</p>
  <p>The scripts field standardises how your project is run. A new team member opens the repo, reads the scripts, and immediately knows: <code>npm run dev</code> to start the dev server, <code>npm test</code> to run tests, <code>npm run build</code> to compile. No documentation hunting required.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">package.json is like the <strong>label on a medicine bottle</strong>. It tells you what's in it (dependencies), who made it (author), what dosage to take (scripts), what it's compatible with (engines), and the version number. Without the label you have an unlabelled bottle — you have no idea what's inside or how to use it safely. The scripts field is specifically like the <strong>dosage instructions</strong>: "take 10ml twice daily" → "npm run dev to start; npm test before committing".</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">The key fields</span></div>
  <ol class="steps">
    <li><strong>name</strong> — the project name. Lowercase, no spaces. Used if you publish to npm.</li>
    <li><strong>version</strong> — semantic version string (<code>"1.4.2"</code>). Follows major.minor.patch. Increment on every release.</li>
    <li><strong>main</strong> — the entry point file when someone requires your package. Typically <code>"server.js"</code> or <code>"src/index.js"</code>.</li>
    <li><strong>type</strong> — <code>"module"</code> to use ES Module <code>import/export</code> syntax everywhere, or <code>"commonjs"</code> (default) for <code>require()</code>. Omit for CommonJS.</li>
    <li><strong>scripts</strong> — key/value pairs of command aliases. Values are shell commands. The keys become available as <code>npm run &lt;key&gt;</code>.</li>
    <li><strong>engines</strong> — declare the minimum Node version your code requires: <code>"node": ">=22.0.0"</code>. Hosting platforms read this.</li>
    <li><strong>dependencies</strong> and <strong>devDependencies</strong> — packages your project uses (covered in the next section).</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">The scripts field in depth</span></div>
  <div class="prose"><p>Scripts run in a shell with <code>node_modules/.bin</code> added to the PATH automatically. This means you can use locally installed binaries (like <code>nodemon</code>, <code>tsc</code>, <code>vitest</code>) without installing them globally or using <code>npx</code>.</p>
  <p>Scripts can chain with <code>&&</code> (run second only if first succeeds) or <code>&amp;</code> (run in parallel). You can also call other scripts with <code>npm run other-script</code>. Lifecycle scripts like <code>prebuild</code> and <code>postbuild</code> run automatically before and after <code>build</code>.</p></div>
  <ol class="steps">
    <li><code>start</code> — run in production. No hot-reload. <code>node server.js</code>.</li>
    <li><code>dev</code> — run in development with nodemon for auto-restart.</li>
    <li><code>build</code> — compile TypeScript to JS (<code>tsc</code>), or bundle frontend assets.</li>
    <li><code>test</code> — run the test suite. CI systems call this automatically.</li>
    <li><code>lint</code> — run ESLint or Biome to check code style.</li>
    <li><code>db:migrate</code> — run database migrations. Custom names work — no limit to what you define.</li>
  </ol>
</div>`,

        {type:'npm',title:'Semantic versioning prefix rules',body:`<p>Package versions in package.json use a prefix that controls what updates <code>npm update</code> will install:</p><ul><li><code>^1.4.2</code> — caret: allows minor and patch updates (<code>1.x.x</code>, not <code>2.x.x</code>). npm's default.</li><li><code>~1.4.2</code> — tilde: allows only patch updates (<code>1.4.x</code>).</li><li><code>1.4.2</code> — exact: no automatic updates at all.</li><li><code>*</code> — any version. Never use this in production.</li></ul><p>package-lock.json records the exact installed version regardless of the prefix. <code>npm ci</code> uses only the lockfile — it ignores the prefixes entirely.</p>`},

    {
      id:'deps-devdeps', group:'Getting Started', icon:'package', title:'dependencies vs devDependencies',
      sub:'What goes in each bucket, how node_modules works, and why you never commit it to git.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>npm distinguishes between two types of packages. <strong>dependencies</strong> are packages your application needs to run in production — they must be installed on the server. <strong>devDependencies</strong> are packages you only need during development — testing frameworks, TypeScript, build tools, linters. Production servers skip them with <code>npm install --omit=dev</code>.</p>
  <p><code>node_modules/</code> is the folder where all installed packages live. It can contain hundreds of thousands of files and reach hundreds of megabytes. <code>package-lock.json</code> records the exact version of every installed package (including transitive dependencies) so all teammates and deployment environments get identical installs.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Production servers should be as lean as possible. Installing TypeScript, Vitest, and ESLint on a production server wastes disk space, memory, and deploy time. Separating dev and prod dependencies keeps production clean.</p>
  <p><code>package-lock.json</code> solves the "works on my machine" problem. Without it, two developers running <code>npm install</code> a week apart might get different patch versions of a dependency, causing subtle differences in behaviour. The lockfile pins every package to its exact resolved version.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Think of opening a restaurant. <strong>dependencies</strong> are the ingredients you need every service — flour, eggs, oil. They must always be in the kitchen. <strong>devDependencies</strong> are the test kitchen equipment and culinary school books — you needed them to develop the recipes, but you don't take the test oven with you when you open the restaurant. <strong>node_modules</strong> is the walk-in fridge — huge and fully stocked for cooking, but you'd never move it between locations. When you open a new branch, you just hand over the ingredient list (package.json) and they stock their own fridge.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li><code>npm install express</code> → installs Express into node_modules, records it in <code>dependencies</code>.</li>
    <li><code>npm install --save-dev nodemon</code> → installs nodemon, records it in <code>devDependencies</code>.</li>
    <li>On a production server: <code>npm install --omit=dev</code> → installs only <code>dependencies</code>, skips dev tools entirely.</li>
    <li>In CI and Dockerfiles: use <code>npm ci</code> instead of <code>npm install</code>. It reads only <code>package-lock.json</code>, is faster, and fails if the lockfile is out of sync with package.json.</li>
    <li>Create a <code>.gitignore</code> at the project root. Add <code>node_modules/</code> — teammates run <code>npm install</code> to recreate it.</li>
    <li>Always commit <code>package-lock.json</code>. It ensures everyone's install is byte-for-byte identical.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">What goes where — the decision rule</span></div>
  <div class="prose"><p>Ask: "Is this package required for the application to run?" If yes → <code>dependencies</code>. If it's only needed to build, test, type-check, or lint → <code>devDependencies</code>.</p></div>
  <div class="g2" style="margin:18px 0">
    <div class="card"><div class="card-t">dependencies (runtime)</div><div class="card-b">express, mongoose, prisma client, bcrypt, jsonwebtoken, dotenv, cors, helmet, zod, socket.io, ioredis, winston, morgan</div></div>
    <div class="card"><div class="card-t">devDependencies (build/test only)</div><div class="card-b">typescript, ts-node-dev, @types/*, nodemon, vitest, jest, supertest, eslint, prettier, prisma CLI, @prisma/client (sometimes)</div></div>
  </div>
</div>`,

<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>HTTP (HyperText Transfer Protocol) is the agreed-upon format for communication between clients (browsers, mobile apps, other servers) and web servers. Every time your frontend calls your API, it sends an HTTP request. Your server sends back an HTTP response.</p>
  <p>HTTP is "stateless" — each request is independent. The server doesn't remember previous requests unless you build that memory in yourself (using cookies, sessions, or tokens).</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>You can't build a backend without understanding HTTP. Every Express concept — routes, status codes, middleware, headers — is a layer on top of raw HTTP. If you don't know what a 401 means vs a 403, you'll make your API confusing for anyone who uses it.</p>
  <p>Understanding HTTP also helps you debug. When something goes wrong, you look at the request and response — the method, URL, headers, body, and status code — and the bug usually reveals itself.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">HTTP is like sending a formal letter. The <strong>method</strong> (GET, POST) is the type of request — "Please send me", "Please create". The <strong>URL</strong> is the address. The <strong>headers</strong> are the envelope's metadata — who sent it, what format the content is in. The <strong>body</strong> is what's inside the envelope. The <strong>status code</strong> on the reply tells you what happened: 200 = success, 404 = address not found, 500 = the post office had an internal problem.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Client opens a TCP connection to the server's IP address and port.</li>
    <li>Client sends an HTTP request with a <strong>method</strong> (GET/POST/PUT/PATCH/DELETE), a <strong>path</strong> (/users/42), <strong>headers</strong> (Content-Type, Authorization), and optionally a <strong>body</strong>.</li>
    <li>Server receives the request, finds the matching route handler, runs the logic.</li>
    <li>Server sends back an HTTP response with a <strong>status code</strong> (200, 404, 500), <strong>headers</strong> (Content-Type: application/json), and optionally a <strong>body</strong> (the JSON data).</li>
    <li>The connection closes (or stays open for Keep-Alive). The client reads the response and acts on it.</li>
  </ol>
</div>`,

  console.log(\`\${req.method} \${req.url}\`); // log every request to the terminal

    res.end(JSON.stringify({ message: 'Hello!' }));              // body — must be a string
    return;

    res.writeHead(200, { 'Content-Type': 'application/json' }); // status + headers
    res.end(JSON.stringify({ status: 'ok', uptime: process.uptime() })); // body
    return;
  }

  // Default: 404 for anything not matched above
  res.writeHead(404, { 'Content-Type': 'application/json' }); // 404 = not found
  res.end(JSON.stringify({ error: 'Not found' }));            // explain why in the body
});

server.listen(3000, () => {              // start listening on port 3000

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What are they?</span></div>
  <div class="prose"><p>An HTTP status code is a 3-digit number in every response that tells the client what happened. It's the first thing any HTTP client checks — before reading the response body. Codes are grouped by their first digit: 1xx informational, 2xx success, 3xx redirection, 4xx client error, 5xx server error.</p>
  <p>Choosing the right code matters. A frontend developer relying on your API checks status codes to decide whether to show a success message, a login prompt, a "not found" page, or a generic error. Using 200 for everything forces clients to parse the body to detect failures — a contract violation.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Status codes are the HTTP contract between your server and every client that consumes it. Tools like retry libraries, caches, CDNs, monitoring platforms, and load balancers all make decisions based on status codes — not body content. A 503 tells a load balancer to stop sending traffic to this server. A 429 tells a client to slow down. A 301 tells a browser to cache the redirect permanently. None of these work correctly if you return 200 for everything.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The complete reference for API development</span></div>
  <div class="prose"><p><strong>2xx — Success</strong></p></div>
  <ol class="steps">
    <li><strong>200 OK</strong> — The request succeeded. The response body contains the requested data. Use for GET, PUT, PATCH requests that complete successfully.</li>
    <li><strong>201 Created</strong> — A new resource was created. Use for successful POST requests. The response body usually contains the created resource (including its new ID).</li>
    <li><strong>204 No Content</strong> — Success, but nothing to return. Use for DELETE and PATCH requests where you don't need to return the updated resource. No response body.</li>
    <li><strong>3xx — Redirection. </strong><strong>301 Moved Permanently</strong> — The resource has permanently moved. Browsers and crawlers cache this forever.</li>
    <li><strong>302 Found</strong> — Temporary redirect. Use for OAuth flows, post-login redirects. Not cached.</li>
    <li><strong>304 Not Modified</strong> — The resource hasn't changed since the client last fetched it (checked via ETag or Last-Modified). Client uses its cached copy. Saves bandwidth.</li>
  </ol>
  <div class="prose" style="margin-top:12px"><p><strong>4xx — Client Errors (the client did something wrong)</strong></p></div>
  <ol class="steps">
    <li><strong>400 Bad Request</strong> — The request is malformed or missing required fields. Use for generic input errors when no more specific code applies.</li>
    <li><strong>401 Unauthorized</strong> — Not authenticated. The client needs to log in (or their token is expired/missing). Despite the name, this means "not authenticated", not "not authorized".</li>
    <li><strong>403 Forbidden</strong> — Authenticated, but not allowed. The client is logged in but doesn't have permission for this resource. "You're who you say you are, but you can't do this."</li>
    <li><strong>404 Not Found</strong> — The requested resource doesn't exist. Also use this when you want to hide the existence of a resource from unauthorized users (instead of 403).</li>
    <li><strong>405 Method Not Allowed</strong> — The route exists but the HTTP method isn't supported. GET /users exists, but DELETE /users doesn't.</li>
    <li><strong>409 Conflict</strong> — The request conflicts with the current state. Use for duplicate email registration, concurrent edit conflicts.</li>
    <li><strong>422 Unprocessable Entity</strong> — The request body is syntactically valid JSON but semantically invalid (validation failure). More specific than 400.</li>
    <li><strong>429 Too Many Requests</strong> — Rate limit exceeded. Include a <code>Retry-After</code> header telling the client when to try again.</li>
  </ol>
  <div class="prose" style="margin-top:12px"><p><strong>5xx — Server Errors (the server did something wrong)</strong></p></div>
  <ol class="steps">
    <li><strong>500 Internal Server Error</strong> — Something crashed on the server. The generic catch-all for unexpected errors. Never send this intentionally — it should only appear when something unhandled goes wrong.</li>
    <li><strong>502 Bad Gateway</strong> — Your server is a proxy and the upstream service returned an invalid response.</li>
    <li><strong>503 Service Unavailable</strong> — The server is temporarily unavailable (maintenance, overloaded). Include a <code>Retry-After</code> header.</li>
    <li><strong>504 Gateway Timeout</strong> — Your server is a proxy and the upstream service took too long to respond.</li>
  </ol>
</div>`,

      code:`// status-codes.js — correct status code usage in Express routes
const express = require('express');
const router = express.Router();

const users = [{ id: 1, name: 'Alice', email: 'alice@example.com' }];

// 200 — successful read
router.get('/', (req, res) => {
  res.status(200).json(users);          // or just res.json() — 200 is the default
});

// 201 — resource was created
router.post('/', (req, res) => {
  const { name, email } = req.body;

  if (!name || !email) {
    // 400 — request is missing required fields (client's fault)
    return res.status(400).json({ error: 'name and email are required' });
  }

  const existing = users.find(u => u.email === email);
  if (existing) {
    // 409 — the resource already exists (conflict with current state)
    return res.status(409).json({ error: 'A user with this email already exists' });
  }

  const user = { id: users.length + 1, name, email };
  users.push(user);
  res.status(201).json(user);            // 201 = Created, not 200
});

// 200 or 404 — single resource
router.get('/:id', (req, res) => {
  const user = users.find(u => u.id === parseInt(req.params.id));

  if (!user) {
    return res.status(404).json({ error: 'User not found' });  // 404 = doesn't exist
  }

  res.json(user);                        // 200 OK (default)
});

// 204 — deleted, nothing to return
router.delete('/:id', (req, res) => {
  const index = users.findIndex(u => u.id === parseInt(req.params.id));

  if (index === -1) {
    return res.status(404).json({ error: 'User not found' });
  }

  users.splice(index, 1);
  res.sendStatus(204);                   // 204 No Content — no body needed after delete
});

// 401 vs 403 — authentication vs authorisation
router.get('/admin/stats', (req, res) => {
  if (!req.headers.authorization) {
    return res.status(401).json({ error: 'Authentication required' }); // not logged in
  }

  const user = verifyToken(req.headers.authorization);
  if (!user) {
    return res.status(401).json({ error: 'Invalid or expired token' }); // bad token
  }

  if (user.role !== 'admin') {
    return res.status(403).json({ error: 'Admin access required' });   // wrong role
  }

  res.json({ totalUsers: users.length });
});

module.exports = router;`,

      <li>Never return 200 with an error body — tools, clients, and monitoring all rely on status codes.</li>
    </ul></div>
  </div>
</div>
<div class="wnext"><div class="wnext-lbl">What\'s next</div>Status codes are half the HTTP story. The other half is <strong>HTTP headers</strong> — the metadata envelope that wraps every request and response. Understanding headers explains how authentication tokens travel, how CORS works, and how caches decide what to store.</div>`,
