      extraCodes:[{code:`// cache/redis.js — Redis caching for Express routes
// Install: npm install ioredis
// Requires Redis running locally (brew install redis / docker run redis) or use Redis Cloud

const Redis = require('ioredis');          // ioredis is the recommended Redis client for Node

// Connect to Redis — default is localhost:6379
const redis = new Redis(process.env.REDIS_URL || 'redis://localhost:6379');

redis.on('error', (err) => console.error('Redis error:', err));
redis.on('connect', () => console.log('Redis connected'));

// ── CACHE MIDDLEWARE FACTORY ──────────────────────────────────
// cache(ttl) returns a middleware that caches the response for 'ttl' seconds
function cache(ttlSeconds = 60) {
  return async (req, res, next) => {
    const key = \`cache:\${req.originalUrl}\`;  // use the URL as the cache key

    try {
      const cached = await redis.get(key);  // look for a cached response

      if (cached) {
        // Cache hit — send the stored response, skip the route handler
        return res.json(JSON.parse(cached));
      }
    } catch (err) {
      // If Redis is down, don't crash — just skip caching and continue
      console.error('Redis get error:', err.message);
    }

    // Cache miss — intercept res.json() to store the response before sending
    const originalJson = res.json.bind(res); // save the original method
    res.json = async (data) => {
      try {
        await redis.set(key, JSON.stringify(data), 'EX', ttlSeconds); // store with TTL
      } catch (err) {
        console.error('Redis set error:', err.message); // don't crash on cache write failure
      }
      return originalJson(data);            // send the response normally
    };

    next();                                 // continue to the route handler
  };
}

module.exports = { redis, cache };

// Install: npm install winston morgan

const winston = require('winston');

const { combine, timestamp, json, colorize, printf, errors } = winston.format;

// ── Development format: readable colorised output ─────────────
const devFormat = combine(
  colorize({ all: true }),
  timestamp({ format: 'HH:mm:ss' }),
  errors({ stack: true }),                    // include stack trace for Error objects
  printf(({ level, message, timestamp, ...meta }) => {
    const metaStr = Object.keys(meta).length ? ' ' + JSON.stringify(meta) : '';
    return \`\${timestamp} [\${level}]: \${message}\${metaStr}\`;
  })
);

// ── Production format: structured JSON for log aggregators ────
const prodFormat = combine(
  timestamp(),
  errors({ stack: true }),
  json()                                      // each line = valid JSON object
);

const logger = winston.createLogger({
  level: process.env.LOG_LEVEL || (process.env.NODE_ENV === 'production' ? 'info' : 'debug'),
  format: process.env.NODE_ENV === 'production' ? prodFormat : devFormat,
  transports: [
    new winston.transports.Console(),
    // In production, also write errors to a file:
    ...(process.env.NODE_ENV === 'production'
      ? [new winston.transports.File({ filename: 'logs/error.log', level: 'error' })]
      : []),
  ],
});

module.exports = logger;


// ─────────────────────────────────────────────────────────────

const logger  = require('./logger');

// 'combined' gives: method, url, status, response-time, user-agent
const httpLogger = morgan('combined', {
  stream: {
    write: (message) => logger.http(message.trim()),  // trim trailing newline

});

const logger     = require('./utils/logger');
const httpLogger = require('./utils/morganStream');

app.use(httpLogger);                          // log every request via Morgan → Winston

<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>Unit tests</strong> test a single function in isolation. <strong>Integration tests</strong> test multiple layers together — in an API context, this means sending real HTTP requests to your running server and checking the responses. <strong>Vitest</strong> is the test runner (fast, compatible with Jest's API). <strong>Supertest</strong> lets you send HTTP requests to your Express app in tests without starting a real server.</p>
  <p><strong>Docker</strong> packages your app and all its dependencies into a "container" — a consistent environment that runs the same way on any machine. <strong>GitHub Actions</strong> runs your tests automatically on every push and deploys if they pass.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Tests catch regressions — changes that accidentally break something that used to work. Without them, every deploy is a bet. Docker eliminates "works on my machine" — if it runs in the container locally, it runs identically in production. CI/CD makes releasing fast and safe: every push to main is automatically tested and deployed.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text"><strong>Tests are quality control on a factory line</strong> — before a product ships, it's checked against a spec. If the spec says "handle must be 10cm", a failed test tells you before the customer gets a broken mug. <strong>Docker is a shipping container</strong> — the same contents, sealed, move identically from the factory to the ship to the store. <strong>CI/CD is the automated conveyor belt</strong> — every item is checked and packaged without manual intervention.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install: <code>npm install -D vitest supertest</code>. Add <code>"test": "vitest"</code> to your package.json scripts.</li>
    <li>Export your Express app without calling <code>app.listen()</code> — Supertest starts its own server. Call <code>app.listen()</code> only in a separate entry file (e.g. <code>server.js</code> imports <code>app.js</code> and calls listen).</li>
    <li>In test files, import <code>request</code> from Supertest and your app. Use <code>request(app).get('/path').expect(200)</code>.</li>
    <li>Create a <code>Dockerfile</code>: start from <code>node:22-alpine</code>, copy package files, run <code>npm ci</code>, copy source, expose port, set the start command.</li>
    <li>Create <code>.github/workflows/ci.yml</code>: on push to main, checkout code, install Node, run <code>npm ci</code>, run <code>npm test</code>, and on success, deploy.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Unit tests vs integration tests — the clear distinction</span></div>
  <div class="prose">
    <p><strong>Integration tests</strong> (what the main code example shows) test the full stack: a real HTTP request hits your Express app, routes to a controller, calls a database, and you assert on the response. They're realistic but slow — each test needs a DB connection and can take hundreds of milliseconds.</p>
    <p><strong>Unit tests</strong> test a single function in complete isolation. No HTTP server, no database, no filesystem. You pass inputs in and assert on outputs. They run in milliseconds and pinpoint exactly which function is broken.</p>
    <p>The key enabler of unit testing controllers is <strong>Dependency Injection</strong> — when a controller receives its dependencies (the User model, an email service) as parameters instead of hardcoding them via <code>require()</code>, you can pass mock objects in tests and real objects in production. The Dependency Injection chapter covers this in full detail with working test examples.</p>
    <p>A healthy test suite has more unit tests than integration tests: unit tests cover all the edge cases cheaply, integration tests verify the main flows end-to-end.</p>
  </div>
  <ol class="steps">
    <li>Unit test a <em>pure function</em> (no side effects) by simply calling it and asserting the return value.</li>
    <li>Unit test a <em>controller</em> by using a factory function (DI pattern) — pass a mock model in, call the handler with a fake <code>req</code> and <code>res</code>, assert on what <code>res.status()</code> and <code>res.json()</code> were called with.</li>
    <li>Mock the minimum: only mock the direct dependencies of the function under test. Don't mock the thing you're testing.</li>
    <li>Integration test the routes — one test per route, covering: happy path (201/200), validation failure (400), not found (404), and auth failure (401).</li>
    <li>Keep unit and integration tests in separate files/folders. Run unit tests in CI first (fast feedback), integration tests after (slower but thorough).</li>
  </ol>
</div>`,

// Install: npm install -D vitest

import { describe, it, expect, vi, beforeEach } from 'vitest';
import makeUserController from '../../src/controllers/userController';

// ── Build a mock User model ───────────────────────────────────
// This is a plain object with the same interface as the real Mongoose model.
// No MongoDB connection. No network. Tests run in ~5ms.
const mockUser = {
  findById:          vi.fn(),
  find:              vi.fn(),
  create:            vi.fn(),
  findByIdAndDelete: vi.fn(),
};

// ── Build a mock req/res/next ─────────────────────────────────
function makeRes() {
  const res = {
    status: vi.fn().mockReturnThis(),  // res.status(404) returns res so .json() chains
    json:   vi.fn().mockReturnThis(),
    sendStatus: vi.fn(),
  };
  return res;
}

// Reset all mocks before every test so they don't bleed into each other
beforeEach(() => vi.clearAllMocks());

// Inject the mock — the controller never touches a real database
const { getUser, createUser, deleteUser } = makeUserController({ User: mockUser });

// ─────────────────────────────────────────────────────────────
describe('getUser', () => {
  it('returns the user with 200 when found', async () => {
    const fakeUser = { _id: 'abc123', name: 'Alice', email: 'alice@test.com' };
    mockUser.findById.mockResolvedValue(fakeUser);     // tell the mock what to return

    const req  = { params: { id: 'abc123' } };
    const res  = makeRes();
    const next = vi.fn();

    await getUser(req, res, next);

    expect(mockUser.findById).toHaveBeenCalledWith('abc123'); // right ID was used
    expect(res.json).toHaveBeenCalledWith(fakeUser);          // user was returned
    expect(next).not.toHaveBeenCalled();                      // no error forwarded
  });

  it('returns 404 when user is not found', async () => {
    mockUser.findById.mockResolvedValue(null);         // simulate not found

    const req  = { params: { id: 'does-not-exist' } };
    const res  = makeRes();
    const next = vi.fn();

    await getUser(req, res, next);

    expect(res.status).toHaveBeenCalledWith(404);
    expect(res.json).toHaveBeenCalledWith({ error: 'Not found' });
  });

  it('calls next(err) when the database throws', async () => {
    const dbError = new Error('DB connection lost');
    mockUser.findById.mockRejectedValue(dbError);     // simulate a crash

    const req  = { params: { id: 'abc123' } };
    const res  = makeRes();
    const next = vi.fn();

    await getUser(req, res, next);

    expect(next).toHaveBeenCalledWith(dbError);       // error forwarded to middleware
    expect(res.json).not.toHaveBeenCalled();          // response was NOT sent
  });
});

# Build: docker build -t my-api .
# Run:   docker run -p 3000:3000 --env-file .env my-api

# Start from the official Node.js image (Alpine = smaller image size)
FROM node:22-alpine

# Set the working directory inside the container
WORKDIR /app

# Copy package files first — this layer is cached unless package.json changes
# This avoids reinstalling all packages every time you change source code
COPY package*.json ./

# Install only production dependencies — skip devDependencies
RUN npm ci --omit=dev

# Copy the rest of the source code
COPY . .

# Expose the port your app listens on (documentation only — doesn't actually open a port)
EXPOSE 3000

# The command to run when the container starts
CMD ["node", "server.js"]

---
# .github/workflows/ci.yml — GitHub Actions CI/CD pipeline
# Runs tests on every push to main; deploys if tests pass

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7               # spin up a real MongoDB for tests
        ports: ['27017:27017']

    steps:
      - uses: actions/checkout@v4    # clone the repo

      - uses: actions/setup-node@v4  # install Node.js
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci                  # install exact versions from lockfile

      - run: npm test                # run all tests
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-for-ci-only

  deploy:
    needs: test                      # only run if 'test' job succeeds
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # only deploy from main branch

    steps:
      - uses: actions/checkout@v4

  // Build & render a topic intro section
  function renderTopicIntro(key) {
    const d = TOPIC_INTROS[key]
    if (!d) return ''
    const sectionMap = {}
    SECTIONS.forEach(s => { sectionMap[s.title] = s.id })

    const learnItems = d.learns.map((l, i) => {
      const targetId = sectionMap[l.title] || d.firstId
      return `<div class="ti-learn-item" onclick="navigate('${targetId}')">
      <span class="ti-learn-num">${String(i + 1).padStart(2,'0')}</span>
      <div class="ti-learn-content">
        <div class="ti-learn-title">${l.title}</div>
        <div class="ti-learn-desc">${l.desc}</div>
      </div>
      <span class="ti-learn-arrow">${ICONS.next}</span>
    </div>`
    }).join('')

    return `<div id="sec-${d.id}" class="sec">
    <div class="sec-crumb">${d.title} <span>/ Overview</span></div>
    <div class="sec-title">${d.title}</div>
    <p class="ti-tagline">${d.tagline}</p>
    <div class="ti-meta-row">
      <div class="ti-meta-card">

  // Build sidebar with 3-level hierarchy
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar')
    const sectionMap = {}
    let globalNum = 0
    SECTIONS.forEach(s => { sectionMap[s.id] = s })

    let html = ''
    STRUCTURE.forEach((ph, pi) => {
      const isFirstPhase = pi === 0
      html += `<div class="sb-phase">
      <div class="sb-phase-hdr" onclick="togglePhase(this)">
        <div class="sb-phase-dot ${ph.dotClass}"></div>
        <span class="sb-phase-title">${ph.phase}</span>
        <span class="sb-phase-badge ${ph.badgeClass}">${ph.badge}</span>
        <span class="sb-chevron${isFirstPhase ? ' open' : ''}">▶</span>
      </div>
      <div class="sb-phase-body${isFirstPhase ? ' open' : ''}">`

      ph.topics.forEach((topic, ti) => {
        const isFirstTopic = isFirstPhase && ti === 0
        const intro = TOPIC_INTROS[topic.label]
        html += `<div class="sb-topic">
        <div class="sb-topic-hdr" onclick="toggleTopic(this)">
          <span class="sb-topic-icon${isFirstTopic ? ' open' : ''}">▶</span>
          <span class="sb-topic-label">${topic.label}</span>
          <span class="sb-topic-count">${topic.ids.length}</span>
        </div>
        <div class="sb-topic-body${isFirstTopic ? ' open' : ''}">`

        // Overview item — first entry in every topic
        if (intro) {
          html += `<div class="si-ov" id="si-${intro.id}" onclick="navigate('${intro.id}')">
          <div class="si-ov-dot"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
          <span>Overview</span>
        </div>`
        }

        topic.ids.forEach(id => {
          const s = sectionMap[id]
          if (!s) return
          globalNum++
          const isFirst = id === SECTIONS[0].id
          html += `<div class="si${isFirst ? ' active' : ''}" id="si-${s.id}" onclick="navigate('${s.id}')">
          ${ICONS[s.icon] || ICONS.server}
          <span>${s.title}</span>
          <span class="sn">${String(globalNum).padStart(2,'0')}</span>
        </div>`
        })

        html += `</div></div>` // close sb-topic-body + sb-topic
      })

      html += `</div></div>` // close sb-phase-body + sb-phase
    })

    sidebar.innerHTML = html
  }

  function togglePhase(hdr) {
    const chevron = hdr.querySelector('.sb-chevron')
    const body = hdr.nextElementSibling
    const open = body.classList.toggle('open')
    chevron.classList.toggle('open', open)
  }

  function toggleTopic(hdr) {
    const icon = hdr.querySelector('.sb-topic-icon')
    const body = hdr.nextElementSibling
    const open = body.classList.toggle('open')
    icon.classList.toggle('open', open)
  }

  // Auto-expand the phase+topic containing the active section
  function expandToSection(id) {
    STRUCTURE.forEach(ph => {
      ph.topics.forEach((topic, ti) => {
        const intro = TOPIC_INTROS[topic.label]
        const allIds = intro ? [intro.id, ...topic.ids] : topic.ids
        if (!allIds.includes(id)) return
        // find phase header
        const allPhaseHdrs = document.querySelectorAll('.sb-phase-hdr')
        const phIdx = STRUCTURE.indexOf(ph)
        const phHdr = allPhaseHdrs[phIdx]
        if (phHdr) {
          const phBody = phHdr.nextElementSibling
          const phChev = phHdr.querySelector('.sb-chevron')
          if (phBody && !phBody.classList.contains('open')) {
            phBody.classList.add('open')
            phChev?.classList.add('open')
          }
        }
        // find topic header inside the phase
        const phaseEl = document.querySelectorAll('.sb-phase')[phIdx]
        if (phaseEl) {
          const topicHdrs = phaseEl.querySelectorAll('.sb-topic-hdr')
          const topicHdr = topicHdrs[ti]
          if (topicHdr) {
            const topicBody = topicHdr.nextElementSibling
            const topicIcon = topicHdr.querySelector('.sb-topic-icon')
            if (topicBody && !topicBody.classList.contains('open')) {
              topicBody.classList.add('open')
              topicIcon?.classList.add('open')
            }
          }
        }
      })
    })
  }

  // Build content
  function buildContent() {
    const content = document.getElementById('content')
    // Render regular sections
    let html = SECTIONS.map((s, i) => renderSection(s, i, SECTIONS.length)).join('')
    // Render all topic intro sections
    Object.keys(TOPIC_INTROS).forEach(key => {
      html += renderTopicIntro(key)
    })
    content.innerHTML = html
  }

  // Navigate
  let current = SECTIONS[0].id
  function navigate(id) {
    document.getElementById('sec-' + current)?.classList.remove('vis')
    document.getElementById('si-' + current)?.classList.remove('active')
    current = id
    const sec = document.getElementById('sec-' + id)
    const si = document.getElementById('si-' + id)
    if (sec) {
      sec.classList.add('vis')
      document.querySelector('.content').scrollTop = 0
    }
    if (si) {
      expandToSection(id)
      si.classList.add('active')
      si.scrollIntoView({ block: 'nearest' })
    }
    updateProgress()
    Prism.highlightAllUnder(sec)
    closeSidebar()
  }

  // Progress
  const visited = new Set([SECTIONS[0].id])
  function updateProgress() {
    visited.add(current)
    const pct = Math.round((visited.size / SECTIONS.length) * 100)
    document.getElementById('progFill').style.width = pct + '%'
    document.getElementById('progTxt').textContent = `${visited.size} / ${SECTIONS.length}`
  }

  // Copy code
  function copyCode(btn) {
    const pre = btn.closest('.cb').querySelector('code')
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = 'Copied!'
      setTimeout(() => { btn.textContent = 'Copy' }, 1800)
    })
  }

  // Search index
  function buildSearchIndex() {
    const results = SECTIONS.map(s => ({
      id: s.id,
      title: s.title,
      group: s.group,
      text: (s.sub + ' ' + (s.content || '') + ' ' + (s.afterCode || '')).replace(/<[^>]+>/g, '').toLowerCase()
    }))
    // Add topic intros to search
    Object.keys(TOPIC_INTROS).forEach(key => {
      const d = TOPIC_INTROS[key]
      results.push({
        id: d.id,
        title: d.title + ' — Overview',
        group: d.title,
        text: (d.tagline + ' ' + d.why + ' ' + d.prereq).toLowerCase()
      })
    })
    return results
  }

  const searchIndex = buildSearchIndex()
  let selIdx = -1

  document.getElementById('searchInputMobile')?.addEventListener('input', function() {
    const mainInput = document.getElementById('searchInput')
    mainInput.value = this.value
    mainInput.dispatchEvent(new Event('input'))
    const drop = document.getElementById('searchResults')
    if (drop) {
      drop.style.position = 'fixed'
      drop.style.left = '14px'
      drop.style.right = '14px'
      drop.style.width = 'auto'
      drop.style.transform = 'none'
      drop.style.top = 'var(--hdr)'
    }
  })
  document.getElementById('searchInputMobile')?.addEventListener('keydown', function(e) {
    document.getElementById('searchInput').dispatchEvent(new KeyboardEvent('keydown', e))
  })

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase()
    const drop = document.getElementById('searchResults')
    selIdx = -1
    if (!q) { drop.classList.remove('vis'); return }
    const hits = searchIndex.filter(s => s.title.toLowerCase().includes(q) || s.text.includes(q)).slice(0, 8)
    if (!hits.length) {
      drop.innerHTML = `<div class="srch-empty">No results for "<strong>${q}</strong>"</div>`
      drop.classList.add('vis')
      return
    }
    drop.innerHTML = hits.map(h => `
    <div class="srch-item" data-id="${h.id}" onclick="pickSearch('${h.id}')">
      <div class="sg">${h.group}</div>
      ${h.title}
    </div>`).join('')
    drop.classList.add('vis')
  })

  function pickSearch(id) {
    navigate(id)
    document.getElementById('searchInput').value = ''
    const mobileInput = document.getElementById('searchInputMobile')
    if (mobileInput) mobileInput.value = ''
    document.getElementById('searchResults').classList.remove('vis')
    selIdx = -1
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.hdr-search') && !e.target.closest('.srch-drop')) {
      document.getElementById('searchResults').classList.remove('vis')
      selIdx = -1
    }
  })

  document.addEventListener('keydown', e => {
    const drop = document.getElementById('searchResults')
    const isDropOpen = drop.classList.contains('vis')
    const inInput = document.activeElement === document.getElementById('searchInput')

    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault()
      document.getElementById('searchInput').focus()
      return
    }
    if (e.key === 'Escape') {
      drop.classList.remove('vis')
      document.getElementById('searchInput').blur()
      selIdx = -1
      return
    }
    if (isDropOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
      e.preventDefault()
      const items = drop.querySelectorAll('.srch-item')
      if (!items.length) return
      items[selIdx]?.classList.remove('sel')
      selIdx = e.key === 'ArrowDown'
              ? Math.min(selIdx + 1, items.length - 1)
              : Math.max(selIdx - 1, 0)
      items[selIdx]?.classList.add('sel')
      items[selIdx]?.scrollIntoView({ block: 'nearest' })
      return
    }
    if (isDropOpen && e.key === 'Enter') {
      const items = drop.querySelectorAll('.srch-item')
      if (selIdx >= 0 && items[selIdx]) { pickSearch(items[selIdx].dataset.id) }
      return
    }
    if (!inInput) {
      if (e.key === 'ArrowRight') {
        const idx = SECTIONS.findIndex(s => s.id === current)
        if (idx < SECTIONS.length - 1) navigate(SECTIONS[idx + 1].id)
      }
      if (e.key === 'ArrowLeft') {
        const idx = SECTIONS.findIndex(s => s.id === current)
        if (idx > 0) navigate(SECTIONS[idx - 1].id)
      }
    }
  })

  // Mobile sidebar
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open')
    document.getElementById('sidebarOverlay').classList.add('vis')
    document.body.style.overflow = 'hidden'
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('vis')
    document.body.style.overflow = ''
  }
  document.getElementById('menuBtn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar()
  })
  document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar)

  // Wrap navigate to close sidebar on mobile
  const _navigate = navigate
  navigate = function(id) { _navigate(id); closeSidebar() }

  // Init
  buildSidebar()

<script>
  (function(){
    var wrap=document.getElementById('fabWrap'),btn=document.getElementById('fabBtn'),menu=document.getElementById('fabMenu'),items=menu.querySelectorAll('.fab-item');
    var open=false,dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0;
    function startDrag(cx,cy){dragging=true;moved=false;var r=wrap.getBoundingClientRect();sx=r.left;sy=r.top;ox=cx;oy=cy;wrap.style.transition='none';}
    function moveDrag(cx,cy){if(!dragging)return;var dx=cx-ox,dy=cy-oy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;var W=window.innerWidth,H=window.innerHeight,w=wrap.offsetWidth,h=wrap.offsetHeight;wrap.style.right='auto';wrap.style.bottom='auto';wrap.style.left=Math.max(8,Math.min(W-w-8,sx+dx))+'px';wrap.style.top=Math.max(8,Math.min(H-h-8,sy+dy))+'px';}
    function endDrag(){if(!dragging)return;dragging=false;wrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';var W=window.innerWidth,w=wrap.offsetWidth,r=wrap.getBoundingClientRect(),onLeft=(r.left+w/2)<W/2;wrap.style.left=(onLeft?16:W-w-16)+'px';wrap.classList.toggle('fab-left',onLeft);}
    function closeMenu(){open=false;btn.classList.remove('open');btn.setAttribute('aria-expanded','false');items.forEach(function(it){it.classList.remove('vis');});setTimeout(function(){menu.style.pointerEvents='none';},220);}
    function openMenu(){open=true;btn.classList.add('open');btn.setAttribute('aria-expanded','true');menu.style.pointerEvents='auto';items.forEach(function(it,i){setTimeout(function(){it.classList.add('vis');},i*65);});}
    wrap.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);e.preventDefault();});
    document.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
    document.addEventListener('mouseup',function(){endDrag();});
    wrap.addEventListener('touchstart',function(e){startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    document.addEventListener('touchmove',function(e){if(dragging){moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    document.addEventListener('touchend',function(){endDrag();});
    btn.addEventListener('click',function(){if(moved)return;open?closeMenu():openMenu();});
    document.addEventListener('click',function(e){if(open&&!wrap.contains(e.target))closeMenu();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&open)closeMenu();});
  })();
</script>
