      sub:'The metadata envelope on every request and response — what headers are, which ones matter, and how to use them.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What are they?</span></div>
  <div class="prose"><p>HTTP headers are key-value pairs attached to every request and response. They carry metadata about the communication — what format the body is in, who sent the request, how long to cache the response, whether the client is authenticated, and much more. Headers are separate from the body: the body is the payload, headers are the envelope.</p>
  <p>Header names are case-insensitive (<code>Content-Type</code> and <code>content-type</code> are the same). Values are strings. Express gives you <code>req.get('Header-Name')</code> to read request headers and <code>res.set('Header-Name', 'value')</code> to set response headers.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why do they matter?</span></div>
  <div class="prose"><p>Headers are the foundation of nearly every advanced HTTP feature. Authentication tokens live in headers. CORS decisions are made entirely based on headers. Caching behaviour is controlled by headers. Content negotiation (what format the client wants) is declared in headers. Rate limiting feedback is delivered via headers. Understanding headers makes these features comprehensible instead of magical.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Headers are like the <strong>outer packaging on a courier parcel</strong>. The label tells the courier (and recipient) everything they need to know about the parcel before opening it: who sent it, what's inside (fragile? liquid?), what to do if it can't be delivered, the reference number for tracking. The body is the parcel itself. The courier (browser, load balancer, CDN) makes decisions entirely based on the label — they don't open the parcel to decide how to handle it. Your API works the same way.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">Key request headers</span></div>
  <ol class="steps">
    <li><strong>Content-Type</strong> — describes the format of the request body. <code>application/json</code> for JSON, <code>application/x-www-form-urlencoded</code> for HTML forms, <code>multipart/form-data</code> for file uploads. Express's body parsers check this header to know how to parse the body.</li>
    <li><strong>Authorization</strong> — carries credentials. For JWTs: <code>Bearer eyJhbGci...</code>. Your auth middleware reads this header. Access with <code>req.get('Authorization')</code>.</li>
    <li><strong>Accept</strong> — tells the server what content format the client can handle. <code>application/json</code> means "respond with JSON". Your server can use this for content negotiation.</li>
    <li><strong>Cookie</strong> — sends stored cookies to the server. Used for session-based auth as an alternative to Authorization headers.</li>
    <li><strong>User-Agent</strong> — identifies the client software. <code>Mozilla/5.0 ...</code> for browsers, custom strings for mobile apps and API clients. Useful for analytics and debugging.</li>
    <li><strong>X-Forwarded-For</strong> — when your server is behind a load balancer or proxy, this header contains the original client IP. Use <code>req.ip</code> in Express (if <code>app.set('trust proxy', 1)</code> is configured).</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Key response headers</span></div>
  <ol class="steps">
    <li><strong>Content-Type</strong> — format of the response body. Express's <code>res.json()</code> sets this to <code>application/json; charset=utf-8</code> automatically.</li>
    <li><strong>Cache-Control</strong> — tells clients and CDNs how long to cache the response. <code>no-store</code> = never cache (for sensitive data). <code>max-age=3600</code> = cache for 1 hour.</li>
    <li><strong>Location</strong> — used with 201 (Created) to point to the new resource URL, or with 3xx redirects.</li>
    <li><strong>Set-Cookie</strong> — instructs the browser to store a cookie. Use <code>HttpOnly</code> (prevents JS access) and <code>Secure</code> (HTTPS only) flags for auth cookies.</li>
    <li><strong>X-Request-Id</strong> — a custom correlation ID. Attach a unique UUID to every request in middleware. Log it. When a user reports an error, you can search logs by request ID to find exactly what happened.</li>
    <li><strong>Retry-After</strong> — used with 429 (rate limited) and 503 (unavailable) to tell clients when to retry.</li>
  </ol>
</div>`,

      code:`// headers-demo.js — reading request headers and setting response headers
const express = require('express');
const { randomUUID } = require('crypto');  // built-in: generates unique IDs
const app = express();
app.use(express.json());

// ── REQUEST ID MIDDLEWARE ─────────────────────────────────────
// Attach a unique ID to every request for log correlation
app.use((req, res, next) => {
  const requestId = req.get('X-Request-Id') || randomUUID(); // use provided or generate new
  req.requestId = requestId;                // attach to req for use in route handlers
  res.set('X-Request-Id', requestId);       // echo it back in the response header
  next();
});

// ── CONTENT NEGOTIATION ───────────────────────────────────────
app.get('/data', (req, res) => {
  const acceptHeader = req.get('Accept') || 'application/json';

  if (acceptHeader.includes('text/html')) {
    res.set('Content-Type', 'text/html');
    return res.send('<h1>Hello from HTML</h1>');
  }

  // Default to JSON
  res.json({
    message: 'Hello from JSON',
    requestId: req.requestId,               // include the correlation ID in the body too
  });
});

// ── CACHING HEADERS ───────────────────────────────────────────
app.get('/public-data', (req, res) => {
  // Public data — cache aggressively for 1 hour in CDNs
  res.set('Cache-Control', 'public, max-age=3600');
  res.json({ data: 'cacheable public content' });
});

app.get('/private-data', (req, res) => {
  // Sensitive data — never cache, require fresh request every time
  res.set('Cache-Control', 'no-store');
  res.set('Pragma', 'no-cache');            // legacy support for HTTP/1.0 proxies
  res.json({ balance: 1234.56, userId: req.user?.id });
});

// ── READING COMMON REQUEST HEADERS ───────────────────────────
app.post('/upload', (req, res) => {
  const contentType  = req.get('Content-Type');      // e.g. "application/json"
  const authHeader   = req.get('Authorization');     // e.g. "Bearer eyJhbGci..."
  const userAgent    = req.get('User-Agent');         // e.g. "Mozilla/5.0 ..."
  const clientIp     = req.ip;                       // real IP (with trust proxy set)

  console.log({ contentType, authHeader: !!authHeader, userAgent, clientIp });
  res.json({ received: true });
});

app.listen(3000);`,

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>Express is a minimal, unopinionated web framework for Node.js. It wraps Node's built-in <code>http</code> module with a much cleaner API for defining routes, handling requests, and sending responses. "Unopinionated" means it doesn't force you to structure your code in any particular way — you decide.</p>
  <p>Express 5 (released 2024) is the current major version. The biggest change from Express 4 is that async route errors are now caught automatically. If you're starting a new project, use Express 5.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Writing a real API with Node's raw <code>http</code> module is tedious. You manually parse routes, parse request bodies, set headers on every response, and manage errors yourself. Express handles all of that plumbing so you can focus on the actual logic of your application.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Node's <code>http</code> module is like driving a car with no dashboard — you have to manually watch engine temperature, calculate fuel efficiency yourself, and measure speed with a handheld radar gun. <strong>Express is the dashboard</strong>: the same engine underneath, but now you have clear gauges, automatic warnings, and everything laid out where you'd expect it.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li><code>require('express')</code> imports the Express function from node_modules.</li>
    <li>Calling <code>express()</code> creates an "app" — the central object your entire server is built around.</li>
    <li>You register routes on the app: <code>app.get('/path', handlerFunction)</code>. The handler receives a <code>req</code> and <code>res</code> object.</li>
    <li>Inside a handler, you use <code>res.json()</code> or <code>res.send()</code> to send a response and finish the request.</li>
    <li><code>app.listen(port, callback)</code> starts the HTTP server on the given port. The callback runs once the server is ready.</li>
    <li>During development, use nodemon (<code>npx nodemon server.js</code>) so the server restarts every time you save a file.</li>
  </ol>
</div>`,

// Define a route: GET requests to "/" run this handler function

const express = require('express');
const app = express();

app.use(express.json());                        // parse incoming JSON request bodies

// In-memory data store — fine for learning, replace with a real DB later
const products = [
  { id: 1, name: 'Laptop', price: 999 },
  { id: 2, name: 'Mouse', price: 29 },
];

// GET /products — return all products
app.get('/products', (req, res) => {
  res.json(products);                           // Express serialises the array to JSON
});

// GET /products/:id — return a single product by ID
// :id is a route parameter — it matches any value and puts it in req.params.id
app.get('/products/:id', (req, res) => {
  const id = parseInt(req.params.id, 10);       // params are strings — convert to number
  const product = products.find(p => p.id === id); // look for a matching product

  if (!product) {                               // if nothing found, send 404
    return res.status(404).json({ error: 'Product not found' });
  }

  res.json(product);                            // send the product back with 200 (default)
});

// POST /products — create a new product
app.post('/products', (req, res) => {
  const { name, price } = req.body;             // read data from the request body

  if (!name || price === undefined) {           // basic validation — check required fields
    return res.status(400).json({ error: 'name and price are required' });
  }

  const newProduct = {
    id: products.length + 1,                    // simple auto-increment ID
    name,                                       // shorthand for name: name
    price,
  };

  products.push(newProduct);                    // add to our in-memory store
  res.status(201).json(newProduct);             // 201 = Created, return the new resource
});

const PORT = process.env.PORT || 3000;
app.listen(PORT, () => console.log(\`Running on http://localhost:\${PORT}\`));`, file:'server.js', lang:'javascript'}],

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>nodemon</strong> is a development utility that watches your project files and automatically restarts the Node.js process whenever a file is saved. Without it, every code change requires manually stopping (<code>Ctrl+C</code>) and restarting (<code>node server.js</code>) — about 3–4 seconds per change. Over a 4-hour session of active development you might save 200+ times. nodemon eliminates that friction entirely.</p>
  <p>For TypeScript projects, <strong>ts-node-dev</strong> does the same but also transpiles TypeScript on the fly — no separate <code>tsc</code> compile step needed in development.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>The development feedback loop is everything. When testing an API change, the flow should be: edit → save → test. Without nodemon the flow is: edit → save → Ctrl+C → up-arrow → Enter → wait → test. nodemon eliminates three steps in the middle. In backend development you run this loop hundreds of times a day — tightening it makes a measurable difference in how fast you can build and debug.</p></div>
</div>
<div class="ch-part">

  <div class="analogy"><p class="analogy-text">Working without nodemon is like a sculptor who has to demolish and rebuild the entire studio every time they make a chip in the marble. nodemon is a <strong>self-resetting studio</strong> — make your change, the environment resets automatically, you see the result in seconds. The sculptor's energy goes into sculpting, not setup.</p></div>

<div class="ch-part">

</div>`,

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>A "route" is a combination of an HTTP method and a URL path. When your server receives a request, Express compares the method and path against all registered routes and runs the first match. If no route matches, Express sends a 404 by default.</p>
  <p><code>express.Router()</code> is a mini-app you can attach routes to, then mount on your main app with a prefix. This lets you group related routes into separate files.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Routes are the public API surface of your server. Every capability your API has is expressed as a route. Keeping them organised matters — a flat list of 50 routes in one file is unworkable. Router() lets you split them into logical groups (user routes, product routes, order routes) in separate files.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Think of routes as departments in a store. <strong>GET /products</strong> is the product display floor. <strong>POST /products</strong> is receiving new stock at the loading dock. <strong>GET /products/42</strong> is fetching a specific item from the shelf. <strong>DELETE /products/42</strong> is the returns desk. Each combination of method + path has a specific meaning and action.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Register a route: <code>app.get('/path', handler)</code>. The handler receives <code>(req, res)</code>.</li>
    <li>Route parameters use a colon: <code>/users/:id</code> matches <code>/users/42</code> and puts <code>"42"</code> in <code>req.params.id</code>.</li>
    <li>Create a Router: <code>const router = express.Router()</code>. Register routes on it instead of <code>app</code>.</li>
    <li>Export the router and mount it: <code>app.use('/users', userRouter)</code>. A route registered as <code>/</code> on the router becomes <code>/users/</code> on the app.</li>
    <li>Express matches routes in the order they're registered. More specific routes should come before catch-all routes.</li>
  </ol>
</div>`,
      boxes:[
        {type:'ex',title:'Route parameters vs query strings',body:`<p><strong>Route parameters</strong> (<code>:id</code>) are part of the path — used for the identity of a resource. They go in <code>req.params</code>.</p><p>Example: <code>GET /users/42</code> → <code>req.params.id === '42'</code></p><p><strong>Query strings</strong> come after <code>?</code> — used for optional filtering, pagination, sorting. They go in <code>req.query</code>.</p><p>Example: <code>GET /users?page=2&limit=10</code> → <code>req.query.page === '2'</code>, <code>req.query.limit === '10'</code></p>`},

      code:`// routes/products.js — a product resource router
// This file handles all routes under /products (mounted in server.js)

const express = require('express');
const router = express.Router();           // create a mini-app for product routes

// In-memory store for demonstration (replace with a database later)
let products = [
  { id: 1, name: 'Keyboard', price: 79 },
  { id: 2, name: 'Monitor', price: 349 },
];
let nextId = 3;                            // simple ID counter

// GET /products — list all products with optional filtering
router.get('/', (req, res) => {
  let results = products;                  // start with all products

  // req.query holds URL query string values: /products?minPrice=100
  if (req.query.minPrice) {
    const min = parseFloat(req.query.minPrice); // query values are always strings — convert
    results = results.filter(p => p.price >= min); // filter by minimum price
  }

  res.json(results);                       // send the (possibly filtered) list
});

// GET /products/:id — get a single product by its ID
router.get('/:id', (req, res) => {
  const id = parseInt(req.params.id, 10); // :id comes in as a string — always parse to int
  const product = products.find(p => p.id === id);

  if (!product) {
    return res.status(404).json({ error: \`Product \${id} not found\` });
  }

  res.json(product);
});

// POST /products — create a new product
router.post('/', (req, res) => {
  const { name, price } = req.body;        // destructure expected fields from body

  if (!name || typeof price !== 'number') {
    return res.status(400).json({ error: 'name (string) and price (number) are required' });
  }

  const product = { id: nextId++, name, price }; // build the new record
  products.push(product);                  // add it to our store
  res.status(201).json(product);           // 201 Created, return the new record
});

// PUT /products/:id — replace a product entirely
router.put('/:id', (req, res) => {
  const id = parseInt(req.params.id, 10);
  const index = products.findIndex(p => p.id === id); // find its position in the array

  if (index === -1) {
    return res.status(404).json({ error: 'Product not found' });
  }

  const { name, price } = req.body;
  products[index] = { id, name, price };   // replace the entire record
  res.json(products[index]);               // return the updated record
});

// DELETE /products/:id — remove a product
router.delete('/:id', (req, res) => {
  const id = parseInt(req.params.id, 10);
  const index = products.findIndex(p => p.id === id);

  if (index === -1) {
    return res.status(404).json({ error: 'Product not found' });
  }

  products.splice(index, 1);              // remove 1 element at 'index'
  res.status(204).send();                 // 204 No Content — success, nothing to return
});

module.exports = router;                  // export so server.js can use it`,

      id:'req-res', group:'Phase 1 — Essentials', icon:'globe', title:'Request & Response Objects',
      sub:'Every property Express gives you for reading incoming data (req) and every method for sending back the right response (res).',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What are they?</span></div>
  <div class="prose"><p>Every route handler receives two objects: <code>req</code> (the request) and <code>res</code> (the response). These are Express-enhanced versions of Node's built-in HTTP objects — same underlying engine, much cleaner API on top.</p>
  <p><code>req</code> contains everything the client sent: the URL, headers, body, query string, cookies, and more. <code>res</code> is your toolkit for constructing and sending the response back.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Most beginner bugs come from not knowing where to find incoming data. Is the user's ID in <code>req.params</code> or <code>req.query</code>? Is the JSON payload in <code>req.body</code>? Is the auth token in <code>req.headers</code>? Knowing the exact shape of these objects removes all that guesswork.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The req object — where incoming data lives</span></div>
  <ol class="steps">
    <li><strong>req.params</strong> — dynamic path segments. In route <code>/users/:id</code>, a request to <code>/users/42</code> sets <code>req.params.id === '42'</code>. Always a string.</li>
    <li><strong>req.query</strong> — URL query string values. <code>/search?term=node&amp;page=2</code> gives <code>req.query.term === 'node'</code> and <code>req.query.page === '2'</code>. Always strings — parse numbers explicitly.</li>
    <li><strong>req.body</strong> — the parsed request body. Only populated after you add body-parser middleware (<code>express.json()</code> for JSON, <code>express.urlencoded()</code> for form data).</li>
    <li><strong>req.headers</strong> — all HTTP headers as lowercase keys. Access with <code>req.headers['authorization']</code> or the convenience method <code>req.get('Authorization')</code>.</li>
    <li><strong>req.method</strong> — the HTTP verb as a string: <code>'GET'</code>, <code>'POST'</code>, <code>'PUT'</code>, <code>'DELETE'</code>, etc.</li>
    <li><strong>req.path</strong> / <strong>req.url</strong> — the request path. <code>req.path</code> is just the path without the query string.</li>
    <li><strong>req.ip</strong> — the client's IP address. Useful for rate-limiting and audit logging.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">The res object — sending back a response</span></div>
  <ol class="steps">
    <li><strong>res.json(data)</strong> — serialises an object to JSON and sends it. Automatically sets <code>Content-Type: application/json</code>. The standard method for REST API responses.</li>
    <li><strong>res.status(code)</strong> — sets the HTTP status code. Chainable: <code>res.status(404).json({ error: 'Not found' })</code>. Default is 200 if you never call it.</li>
    <li><strong>res.send(body)</strong> — more flexible than <code>res.json()</code>. Sends a string (text/html), Buffer, or object. Use <code>res.json()</code> for APIs; <code>res.send()</code> for HTML or plain text.</li>
    <li><strong>res.set(header, value)</strong> — sets a response header. E.g., <code>res.set('Cache-Control', 'no-store')</code>.</li>
    <li><strong>res.redirect(url)</strong> — sends a 302 redirect. Use <code>res.redirect(301, url)</code> for a permanent redirect.</li>
    <li><strong>res.sendStatus(code)</strong> — sends only a status code with its standard message body. <code>res.sendStatus(204)</code> sends "204 No Content" with no JSON body — ideal after a DELETE.</li>
  </ol>
</div>`,

// Route: GET /api/:category/items?page=2&limit=5
// Headers: Authorization: Bearer mytoken123
// (No body — GET requests don't have a body)

const express = require('express');
const router = express.Router();

router.get('/:category/items', (req, res) => {

  // ── req.params — dynamic path segments (always strings) ──────
  const category = req.params.category;           // "electronics"

  // ── req.query — URL query string (always strings) ────────────
  const page  = parseInt(req.query.page  || '1',  10); // "2" → 2
  const limit = parseInt(req.query.limit || '10', 10); // "5" → 5

  // ── req.headers — HTTP headers ────────────────────────────────
  // req.get() is shorthand for req.headers['...'] — case-insensitive
  const authHeader = req.get('Authorization');    // "Bearer mytoken123"
  const token = authHeader?.split(' ')[1];        // "mytoken123"

    {

      sub:'The recommended way to organise a Node.js + Express project so it scales cleanly from one file to a full codebase.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>A "project structure" is the agreed-upon folder layout for your codebase — where routes live, where database models go, where configuration is stored. It's not enforced by Node or Express; it's a convention you adopt to keep things findable.</p>
  <p>The most common pattern for Express is a <strong>feature-adjacent MVC layout</strong>: separate folders for routes, controllers, models, middleware, and configuration. You'll see variations of this in almost every professional Node project.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>A single-file server works fine for 50 lines. At 300 lines it becomes a maze. At 1000 lines it's unmanageable. A clear structure means any developer (including future you) can open the project and instantly know: "user authentication logic is in controllers/auth.js, the User schema is in models/User.js, middleware that protects routes is in middleware/auth.js".</p>
  <p>Structure also makes testing easier — when business logic is in controllers (not tangled into routes), you can unit test it without spinning up the whole server.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">A single <code>server.js</code> with everything in it is like a kitchen where all the ingredients, utensils, recipes, and finished meals are stacked in one pile on the counter. The recommended structure is like a <strong>professional kitchen</strong> — ingredients in the walk-in, tools on their hooks, recipes in a binder, orders on the rail. Same food, radically different ability to work quickly and find things.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">The recommended layout</span></div>
  <div class="filetree">
<span class="ft-dir">my-api/</span>
├── <span class="ft-js">server.js</span>            <span class="ft-comment">  — entry point, starts the server</span>
├── <span class="ft-js">app.js</span>               <span class="ft-comment">  — Express app setup (routes, middleware) — no listen()</span>
├── <span class="ft-json">.env</span>                 <span class="ft-comment">  — environment variables (never commit)</span>
├── <span class="ft-json">.env.example</span>         <span class="ft-comment">  — example with fake values (safe to commit)</span>
├── <span class="ft-json">package.json</span>
├── <span class="ft-json">.gitignore</span>
│
├── <span class="ft-dir">config/</span>
│   └── <span class="ft-js">db.js</span>            <span class="ft-comment">  — database connection logic</span>
│
├── <span class="ft-dir">routes/</span>              <span class="ft-comment">  — one file per resource</span>
│   ├── <span class="ft-js">users.js</span>
│   └── <span class="ft-js">products.js</span>
│
├── <span class="ft-dir">controllers/</span>         <span class="ft-comment">  — business logic, called by routes</span>
│   ├── <span class="ft-js">userController.js</span>
│   └── <span class="ft-js">productController.js</span>
│
├── <span class="ft-dir">models/</span>              <span class="ft-comment">  — database schemas / Prisma models</span>
│   └── <span class="ft-js">User.js</span>
│
├── <span class="ft-dir">middleware/</span>          <span class="ft-comment">  — reusable middleware functions</span>
│   ├── <span class="ft-js">auth.js</span>          <span class="ft-comment">  — JWT verification</span>
│   └── <span class="ft-js">errorHandler.js</span>  <span class="ft-comment">  — global error handler</span>
│
└── <span class="ft-dir">utils/</span>               <span class="ft-comment">  — pure helper functions (no Express)</span>
    └── <span class="ft-js">formatDate.js</span>
  </div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">The key rules</span></div>
  <ol class="steps">
    <li><strong>Split server.js and app.js.</strong> <code>app.js</code> creates and configures the Express app (middleware, routes) but does NOT call <code>app.listen()</code>. <code>server.js</code> imports the app and starts the server. This lets you import <code>app.js</code> in tests without actually binding to a port.</li>
    <li><strong>One route file per resource.</strong> All user routes in <code>routes/users.js</code>, all product routes in <code>routes/products.js</code>. Each exports an <code>express.Router()</code>.</li>
    <li><strong>Routes are thin, controllers have the logic.</strong> Route files just map HTTP methods to controller functions. The actual business logic (querying the DB, checking permissions, building the response) lives in the controller.</li>
    <li><strong>Models know nothing about Express.</strong> A Mongoose model or Prisma schema should never reference <code>req</code>, <code>res</code>, or <code>next</code>. Pure data layer only.</li>
    <li><strong>Middleware in its own folder.</strong> Auth, rate limiting, logging — all reusable middleware lives in <code>middleware/</code> and is imported wherever needed.</li>
  </ol>
</div>`,

    {
      id:'middleware', group:'Phase 1 — Essentials', icon:'layers', title:'Middleware',
      sub:'The "onion model" — functions that run between a request arriving and a response being sent.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>Middleware is a function that runs during the request-response cycle — after the request arrives, before the response is sent. It has access to the request object (<code>req</code>), the response object (<code>res</code>), and a function called <code>next()</code> that passes control to the next middleware or route handler in line.</p>
  <p>Every middleware function has this signature: <code>(req, res, next) => { ... }</code>. It must either send a response or call <code>next()</code>. If it does neither, the request hangs forever.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Middleware is how you add functionality to many routes at once without repeating yourself. Logging every request, parsing JSON bodies, checking authentication, adding CORS headers — these are all middleware. You write the logic once and it applies everywhere, or everywhere it's mounted.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Think of middleware as the security and check-in process at an airport. <strong>Every passenger (request) goes through the same steps</strong>: check-in desk (JSON parsing), security scanner (authentication), gate check (authorisation), then they board their specific flight (route handler). You don't redo the security scanner for each gate — it's centralised and every passenger goes through it. The order matters: you can't board before you pass security.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Express processes middleware in the order they're registered with <code>app.use()</code>. Order is critical.</li>
    <li>Each middleware gets <code>req</code>, <code>res</code>, and <code>next</code>. Call <code>next()</code> to pass to the next one, or send a response to stop the chain.</li>
    <li>Global middleware (registered with <code>app.use(fn)</code> at the top) runs for every request.</li>
    <li>Route-level middleware (passed to <code>app.get('/path', middleware, handler)</code>) runs only for that route.</li>
    <li>Error-handling middleware has <strong>four parameters</strong>: <code>(err, req, res, next)</code>. Express detects this and only calls it when an error is passed to <code>next(err)</code>.</li>
    <li>Mount error-handling middleware at the very end — after all routes — so it catches errors from anywhere.</li>
  </ol>
</div>`,

const express = require('express');
const app = express();

// ── GLOBAL MIDDLEWARE ──────────────────────────────────────────

// 1. JSON body parser — always add this near the top
app.use(express.json());

// 2. Custom logger — runs before every route handler
app.use((req, res, next) => {
  const start = Date.now();                // record when the request arrived

  // Listen for the 'finish' event — fires when the response is sent
  res.on('finish', () => {
    const duration = Date.now() - start;   // calculate how long it took
    console.log(\`\${req.method} \${req.url} \${res.statusCode} — \${duration}ms\`);
  });

  next();                                  // pass to the next middleware/route
});

// ── ROUTE-LEVEL MIDDLEWARE ────────────────────────────────────

// A simple auth check — only allows requests with a specific token
function requireAuth(req, res, next) {
  const token = req.headers['authorization']; // read the Authorization header

  if (!token || token !== 'Bearer secret-token-123') {
    return res.status(401).json({ error: 'Unauthorized — missing or invalid token' });
    // returning here stops the chain — route handler won't run
  }

  req.user = { id: 1, name: 'Alice' };    // attach user info to the request object
  next();                                  // auth passed — continue to the route handler
}

// Public route — no auth required
app.get('/public', (req, res) => {
  res.json({ message: 'Anyone can see this' });
});

// Private route — requireAuth runs first, then the handler
app.get('/private', requireAuth, (req, res) => {
  // req.user was set by the auth middleware
  res.json({ message: \`Hello, \${req.user.name}! This is protected.\` });
});

// ── ERROR HANDLING MIDDLEWARE ─────────────────────────────────

// Error handler MUST have 4 parameters — Express uses this signature to detect it
app.use((err, req, res, next) => {
  console.error('Unhandled error:', err.message); // log the error on the server
  res.status(err.status || 500).json({            // send a clean error response
    error: err.message || 'Something went wrong',
  });
});

app.listen(3000, () => console.log('Running on port 3000'));`,

const express = require('express');
const router = express.Router();

// This middleware runs for ALL routes in this file (before any route handler)
// It's mounted only on this router — doesn't affect other routers
router.use((req, res, next) => {
  console.log('User router hit:', req.method, req.path); // log every user route request
  next();                                                  // continue to the route
});

// A reusable validation middleware for creating users
function validateUserBody(req, res, next) {
  const { name, email } = req.body;

  if (!name || typeof name !== 'string' || name.trim() === '') {
    return res.status(400).json({ error: 'name is required and must be a non-empty string' });
  }

  if (!email || !email.includes('@')) {
    return res.status(400).json({ error: 'a valid email address is required' });
  }

  req.body.name = name.trim();            // sanitise: remove leading/trailing whitespace
  next();                                 // validation passed — continue
}

const users = [{ id: 1, name: 'Alice', email: 'alice@example.com' }];

router.get('/', (req, res) => {
  res.json(users);
});

// validateUserBody runs first, then the create handler
router.post('/', validateUserBody, (req, res) => {
  const user = { id: users.length + 1, ...req.body }; // spread validated body
  users.push(user);
  res.status(201).json(user);
});

module.exports = router;`, file:'routes/users.js', lang:'javascript'}],

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>Express ships with three built-in middleware functions that handle the most common tasks in any web server: parsing JSON request bodies, parsing HTML form submissions, and serving static files. These replaced the separate <code>body-parser</code> package in Express 4.16+ and are available directly on the <code>express</code> object.</p>
  <p>They are called as functions that return middleware: <code>express.json()</code> returns a configured middleware function — you pass the result to <code>app.use()</code>.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without body-parsing middleware, <code>req.body</code> is always <code>undefined</code>. This is the number-one beginner mistake in Express. You write a POST route, send data, check <code>req.body.name</code>, and get <code>undefined</code> — not because your route is wrong, but because you never registered the body parser. These three lines of middleware are the foundation of nearly every Express API.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The three built-in middleware explained</span></div>
  <ol class="steps">
    <li><strong>express.json(options)</strong> — parses requests with <code>Content-Type: application/json</code>. Populates <code>req.body</code> with a JavaScript object. Use this for every REST API. Key option: <code>limit</code> (max body size, default 100kb — increase for file-heavy APIs: <code>{ limit: '10mb' }</code>).</li>
    <li><strong>express.urlencoded({ extended: true })</strong> — parses HTML form data (<code>Content-Type: application/x-www-form-urlencoded</code>). Also populates <code>req.body</code>. <code>extended: true</code> uses the <code>qs</code> library and supports nested objects. <code>extended: false</code> is faster but flat key-value only. Register both <code>json()</code> and <code>urlencoded()</code> if you accept both content types.</li>
    <li><strong>express.static(root, options)</strong> — serves files from a directory. A <code>GET /logo.png</code> request serves <code>public/logo.png</code>. Handles ETags, <code>Cache-Control</code> headers, <code>304 Not Modified</code>, and <code>HEAD</code> requests automatically. Use to serve a React/Vue build folder alongside your API.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">Order matters — always register before routes</span></div>
  <div class="prose"><p>Express processes middleware in registration order. Body parsers must be registered <em>before</em> any route that reads <code>req.body</code>. If a route runs before the body parser, <code>req.body</code> will be <code>undefined</code> for that route. The golden rule: all <code>app.use()</code> middleware goes at the top, before all <code>app.get()</code> / <code>app.post()</code> routes.</p></div>
</div>`,

      code:`// app.js — registering all three built-in middleware
const express = require('express');
const path    = require('path');
const app = express();

// 1. Parse JSON bodies (Content-Type: application/json)
// Must come before any route that reads req.body
app.use(express.json({ limit: '1mb' }));

// 2. Parse URL-encoded bodies (HTML form submissions)
// extended: true supports nested objects like user[name]=Alice
app.use(express.urlencoded({ extended: true }));

// 3. Serve static files from the 'public' directory
// GET /logo.png         → serves public/logo.png
// GET /css/styles.css   → serves public/css/styles.css
app.use(express.static(path.join(__dirname, 'public'), {
  maxAge: process.env.NODE_ENV === 'production' ? '7d' : 0,
}));

// Routes come AFTER all middleware
app.post('/api/users', (req, res) => {
  console.log(req.body); // { name: 'Alice', email: 'alice@example.com' }
  res.status(201).json(req.body);
});

// Catch-all for a React SPA: serve index.html for any non-API route
// React Router handles client-side routing
app.get('*', (req, res) => {
  if (!req.path.startsWith('/api')) {
    res.sendFile(path.join(__dirname, 'public', 'index.html'));
  } else {
    res.status(404).json({ error: 'API endpoint not found' });
  }
});

app.listen(3000);`,

    {
      id:'mongodb', group:'Phase 2 — Building Real APIs', icon:'db', title:'MongoDB with Mongoose',
      sub:'The flexible NoSQL database paired with Mongoose — schemas, models, and CRUD that actually persists.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>MongoDB</strong> is a NoSQL database that stores data as JSON-like documents — no tables, no rows, no rigid columns. Each record is a self-contained object that can have nested arrays and objects. <strong>Mongoose</strong> is the ODM (Object Document Mapper) library that lets you define the shape of those documents in JavaScript and query them with a clean, promise-based API.</p>
  <p>Together they let you define a <strong>Schema</strong> (the blueprint), compile it into a <strong>Model</strong> (the query interface), and talk to your database without ever writing raw MongoDB query syntax.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Every real application needs data that survives server restarts. An in-memory array disappears the moment your process exits. MongoDB persists data to disk, scales to millions of documents, and its flexible schema means you can add new fields to documents without running a migration — ideal for prototyping and data that evolves over time.</p>
  <p>MongoDB is the default choice for many Node.js projects precisely because its document model mirrors JavaScript objects directly: no impedance mismatch, no object-relational translation layer.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Your Node app is a chef. <strong>MongoDB is the walk-in fridge</strong> — ingredients persist between shifts, even when the kitchen is closed. <strong>Mongoose is the inventory system</strong> — it lets the chef query "do we have salmon?" in a structured, predictable way instead of manually rummaging through every shelf. Without Mongoose you'd have to speak MongoDB's raw query syntax every time. With it, you speak JavaScript.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works — step by step</span></div>
  <ol class="steps">
    <li>Install Mongoose: <code>npm install mongoose</code>. Get a free MongoDB cluster from <strong>MongoDB Atlas</strong> (cloud) or run MongoDB locally. Your connection string goes in <code>.env</code> as <code>MONGO_URI</code>.</li>
    <li>Connect once at startup: <code>await mongoose.connect(process.env.MONGO_URI)</code>. Mongoose manages a connection pool internally — one connect call services every query your app ever makes.</li>
    <li>Define a <strong>Schema</strong> — a JavaScript object that describes the shape, types, validations, and defaults of your documents. This is where you enforce structure on your otherwise flexible NoSQL data.</li>
    <li>Compile the schema into a <strong>Model</strong>: <code>const User = mongoose.model('User', userSchema)</code>. Mongoose pluralises the model name and maps it to a MongoDB collection (<code>users</code>). The model is your query interface.</li>
    <li>Use async/await with model methods: <code>User.find()</code>, <code>User.findById(id)</code>, <code>new User({...}).save()</code>, <code>User.findByIdAndUpdate()</code>, <code>User.findByIdAndDelete()</code>.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Pagination and filtering</span></div>
  <div class="prose"><p>Returning all documents from a collection works at 20 records. At 100,000 it is slow, expensive, and your clients will struggle to render the data. Pagination splits results into pages. Filtering narrows which records are returned at all.</p></div>
  <ol class="steps">
    <li>Accept <code>page</code> and <code>limit</code> as query string params: <code>GET /users?page=2&amp;limit=10</code>. Both arrive as strings — parse to integers and clamp to sane defaults.</li>
    <li>Calculate the skip offset: <code>const skip = (page - 1) * limit</code>. Page 1 skips 0, page 2 skips 10, page 3 skips 20.</li>
    <li>Chain <code>.skip(skip).limit(limit)</code> onto any Mongoose query: <code>User.find(filter).skip(skip).limit(limit)</code>.</li>
    <li>For filtering, build a <code>filter</code> object conditionally — only add a key if the query param was provided. Pass it to <code>User.find(filter)</code>.</li>
    <li>Always return <strong>pagination metadata</strong> alongside the data: total count, current page, total pages. Clients need this to render page controls.</li>
  </ol>
</div>`,

      code:`// db/mongoose.js — connection setup and User model
// Install: npm install mongoose
// Add MONGO_URI=mongodb+srv://... to your .env file

const mongoose = require('mongoose');

// ── CONNECT ───────────────────────────────────────────────────
// Call this once when your server starts — never inside a route
async function connectDB() {
  try {
    await mongoose.connect(process.env.MONGO_URI);
    console.log('MongoDB connected');
  } catch (err) {
    console.error('MongoDB connection failed:', err.message);
    process.exit(1);                         // crash immediately — unusable without DB
  }
}

// ── SCHEMA ────────────────────────────────────────────────────
// Describes the shape and rules of every document in the collection
const userSchema = new mongoose.Schema(
  {
    name: {
      type:     String,
      required: [true, 'Name is required'],  // custom validation message
      trim:     true,                        // strip whitespace automatically
    },
    email: {
      type:      String,
      required:  [true, 'Email is required'],
      unique:    true,                       // MongoDB will enforce uniqueness
      lowercase: true,                       // stored always in lowercase
    },
    role: {
      type:    String,
      enum:    ['user', 'admin'],            // only these values are accepted
      default: 'user',
    },
    passwordHash: {
      type:   String,
      select: false,                         // never returned in queries by default
    },
  },
  {
    timestamps: true,                        // auto-manages createdAt + updatedAt
  }
);

// ── MODEL ─────────────────────────────────────────────────────
// Model name 'User' → collection name 'users' (Mongoose pluralises it)
const User = mongoose.model('User', userSchema);

module.exports = { connectDB, User };`,

      extraCodes:[{code:`// routes/users.js — full CRUD with pagination and filtering
const express = require('express');
const router  = express.Router();
const { User } = require('../db/mongoose');

// GET /users?page=1&limit=10&role=admin&search=alice
router.get('/', async (req, res, next) => {
  try {
    const page  = Math.max(1,   parseInt(req.query.page  || '1',  10));
    const limit = Math.min(100, parseInt(req.query.limit || '10', 10));
    const skip  = (page - 1) * limit;

    // Build filter only from provided params
    const filter = {};
    if (req.query.role)   filter.role = req.query.role;
    if (req.query.search) filter.name = { $regex: req.query.search, $options: 'i' };

    // Run count + data queries in parallel — faster than sequential
    const [users, total] = await Promise.all([
      User.find(filter)
          .select('-passwordHash -__v')  // exclude sensitive + internal fields
          .skip(skip)
          .limit(limit)
          .sort({ createdAt: -1 }),
      User.countDocuments(filter),
    ]);

    res.json({
      data: users,
      pagination: {
        total,
        page,
        limit,
        totalPages: Math.ceil(total / limit),
        hasNext:    page < Math.ceil(total / limit),
      },
    });
  } catch (err) { next(err); }
});

// GET /users/:id
router.get('/:id', async (req, res, next) => {
  try {
    const user = await User.findById(req.params.id);
    if (!user) return res.status(404).json({ error: 'User not found' });
    res.json(user);
  } catch (err) {
    if (err.name === 'CastError') return res.status(400).json({ error: 'Invalid ID format' });
    next(err);
  }
});

// POST /users
router.post('/', async (req, res, next) => {
  try {
    const user = new User(req.body);
    await user.save();                       // schema validation runs here
    res.status(201).json(user);

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>PostgreSQL</strong> is a relational (SQL) database — data lives in tables with rows and columns, and relationships between tables are expressed with foreign keys. <strong>Prisma</strong> is a modern ORM (Object Relational Mapper) for Node.js that lets you define your entire database schema in a single <code>schema.prisma</code> file and then generates a fully-typed <code>PrismaClient</code> you use in your code.</p>
  <p>Unlike traditional ORMs, Prisma is <strong>schema-first</strong>: you write the schema, run a migration command, and Prisma creates both the SQL tables and the TypeScript types automatically. No manual type definitions, no raw SQL, and no guessing what a query returns.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Prisma solves three problems at once: <strong>type safety</strong> (your query results are fully typed — <code>prisma.user.findUnique()</code> returns a <code>User | null</code>, not <code>any</code>), <strong>migrations</strong> (schema changes are tracked in versioned SQL files, not applied ad-hoc), and <strong>relations</strong> (you can include related data in a single query with zero extra work).</p>
  <p>If you are using TypeScript — and you should be for any serious project — Prisma is the most productive database tool available for Node.js. The generated types catch mistakes at compile time that would otherwise surface as runtime bugs in production.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Think of your database schema as an <strong>architect's blueprint</strong>. With a traditional ORM you draw the blueprint after the building exists — error-prone and often out of sync. <strong>Prisma flips it</strong>: you write the blueprint first, then Prisma constructs the building (runs the SQL migration) and hands you a typed remote control (PrismaClient) that only lets you press buttons that actually exist on the building. You literally cannot query a column that isn't in the schema.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works — step by step</span></div>
  <ol class="steps">
    <li>Install and initialise: <code>npm install prisma @prisma/client</code> then <code>npx prisma init</code>. This creates a <code>prisma/</code> folder with <code>schema.prisma</code> and adds <code>DATABASE_URL</code> to your <code>.env</code>.</li>
    <li>Edit <code>prisma/schema.prisma</code> — define your <code>datasource</code> (PostgreSQL), <code>generator</code> (prisma-client-js), and your <code>model</code>s. This is the single source of truth for your entire database structure.</li>
    <li>Run <code>npx prisma migrate dev --name init</code>. Prisma diffs your schema against the current database, generates a SQL migration file, and applies it. Your tables are created.</li>
    <li>Run <code>npx prisma generate</code> (happens automatically after migrate dev). This reads the schema and generates the fully-typed <code>PrismaClient</code> into <code>node_modules/@prisma/client</code>.</li>
    <li>Create a single shared <code>PrismaClient</code> instance and import it wherever you need to query. Use <code>prisma.user.findMany()</code>, <code>prisma.user.findUnique()</code>, <code>prisma.user.create()</code>, <code>prisma.user.update()</code>, <code>prisma.user.delete()</code>.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Relations and nested queries</span></div>
  <div class="prose"><p>One of Prisma's biggest advantages over raw SQL or other ORMs is how clean relational queries are. Defining a relation in the schema is one line — querying it with all related records included is just an <code>include</code> option. No JOIN syntax, no mapping result rows manually.</p></div>
  <ol class="steps">
    <li>Define the relation in <code>schema.prisma</code>: add a <code>Post[]</code> field on <code>User</code> and an <code>author User</code> field on <code>Post</code> with the <code>@relation</code> decorator pointing at the foreign key.</li>
    <li>Fetch a user with all their posts: <code>prisma.user.findUnique({ where: { id }, include: { posts: true } })</code>. Prisma issues an efficient JOIN under the hood.</li>
    <li>Create a post and connect it to a user in one query: <code>prisma.post.create({ data: { title, authorId: userId } })</code>.</li>
    <li>Use <code>select</code> to return only specific fields and avoid leaking sensitive data: <code>select: { id: true, name: true, email: true }</code>.</li>
    <li>Use nested <code>create</code> to create a user and their first post in one atomic operation: <code>prisma.user.create({ data: { name, email, posts: { create: { title } } } })</code>.</li>
  </ol>
</div>`,

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>"Authentication" is confirming who someone is — login. "Authorization" is deciding what they're allowed to do — permissions. The standard approach in modern APIs is: users log in with a password, you verify it, then issue a "JWT" (JSON Web Token) — a self-contained signed string the client sends with future requests to prove their identity.</p>
  <p><strong>bcrypt</strong> is the library for hashing passwords. <strong>jsonwebtoken</strong> is the library for creating and verifying JWTs. <strong>dotenv</strong> loads your secrets from a <code>.env</code> file into <code>process.env</code>.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without authentication, every route is public. Anyone can create, read, update, or delete any data. Without password hashing, a database breach exposes every user's actual password. Without environment variables, your secrets end up in your git history — accessible to anyone who ever clones the repo.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Think of a concert. <strong>Registration (signup)</strong>: you buy a ticket — your name is in the system. <strong>Login</strong>: you show ID at the door, they confirm you're on the list, and hand you a wristband (JWT). <strong>Protected routes</strong>: security at each area checks your wristband — not your original ID again, just the band. The wristband has an expiry. When it expires, you go back to the entrance to get a new one.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li><strong>Signup:</strong> receive the password, hash it with <code>bcrypt.hash(password, 12)</code> (the 12 is "salt rounds" — higher = slower = safer), store the hash in the database. Never store the plain text password.</li>
    <li><strong>Login:</strong> find the user by email, then use <code>bcrypt.compare(inputPassword, storedHash)</code> to verify. If it matches, proceed.</li>
    <li><strong>Issue a JWT:</strong> call <code>jwt.sign(payload, secret, { expiresIn: '7d' })</code>. The payload contains the user's ID. The secret is a long random string stored in <code>.env</code>.</li>
    <li><strong>Client stores the JWT</strong> (typically in memory or localStorage) and sends it in every subsequent request as: <code>Authorization: Bearer &lt;token&gt;</code>.</li>
    <li><strong>Protected route middleware:</strong> read the token from <code>req.headers.authorization</code>, verify it with <code>jwt.verify(token, secret)</code>, attach the decoded payload to <code>req.user</code>, call <code>next()</code>.</li>
    <li>If the token is missing, expired, or tampered with, <code>jwt.verify()</code> throws — catch it and return 401.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">What this chapter covers</span></div>
  <div class="prose"><p>Authentication is built from several independent pieces. This section gives you the complete working picture — the five sections that follow go deep on each piece individually. Read them in order: each one builds on the last.</p></div>
  <div class="g2" style="margin-top:14px">
    <div class="card"><div class="card-t">1 · Environment Variables</div><div class="card-b">Store <code>JWT_SECRET</code> and database credentials safely in <code>.env</code>. This comes first — you need secrets before you can hash passwords or sign tokens.</div></div>
    <div class="card"><div class="card-t">2 · Password Hashing — bcrypt</div><div class="card-b">Hash passwords before storing them. Verify them on login. The original password never touches your database.</div></div>
    <div class="card"><div class="card-t">3 · JWT Tokens</div><div class="card-b">Issue a signed token on successful login. Verify it in middleware on every protected route. No server-side session storage needed.</div></div>
    <div class="card"><div class="card-t">4 · CORS</div><div class="card-b">Tell browsers which frontend origins are allowed to reach your API. Without this, your React app cannot talk to your Express server.</div></div>
    <div class="card"><div class="card-t">5 · Security Headers — Helmet</div><div class="card-b">One middleware call that sets a dozen response headers — blocking XSS, clickjacking, and MIME-sniffing attacks automatically.</div></div>
    <div class="card"><div class="card-t">The code below</div><div class="card-b">Shows all pieces wired together as one complete auth module. Use it as a reference while reading the individual sections.</div></div>

</div>`,

      code:`// auth/auth.js — signup, login, and the protect middleware
// Install: npm install bcrypt jsonwebtoken dotenv
// require('dotenv').config() must be called in server.js before this runs

const bcrypt = require('bcrypt');          // for hashing and comparing passwords
const jwt = require('jsonwebtoken');       // for creating and verifying tokens

const SALT_ROUNDS = 12;                    // higher = more secure, but slower to hash
const JWT_SECRET = process.env.JWT_SECRET; // must be a long random string in .env
const JWT_EXPIRES = '7d';                  // token expires after 7 days

// ── HASH A PASSWORD ───────────────────────────────────────────
// Call this during signup — store the returned hash, never the plain password
async function hashPassword(plaintext) {
  return bcrypt.hash(plaintext, SALT_ROUNDS); // bcrypt adds a salt automatically
}

// ── VERIFY A PASSWORD ─────────────────────────────────────────
// Call this during login — compare what the user typed against the stored hash
async function verifyPassword(plaintext, hash) {
  return bcrypt.compare(plaintext, hash);    // returns true if they match, false otherwise
}

// ── ISSUE A JWT ───────────────────────────────────────────────
// Call this after a successful login — give the client something to identify themselves
function signToken(userId) {
  return jwt.sign(
    { sub: userId },                         // payload: 'sub' is the standard field for user ID
    JWT_SECRET,                              // secret used to sign — keep this private
    { expiresIn: JWT_EXPIRES }               // token becomes invalid after this time
  );
}

// ── PROTECT MIDDLEWARE ────────────────────────────────────────
// Add this to any route that requires authentication
function protect(req, res, next) {
  const authHeader = req.headers['authorization']; // e.g. "Bearer eyJhbGci..."

  if (!authHeader || !authHeader.startsWith('Bearer ')) {
    return res.status(401).json({ error: 'No token provided' });
  }

  const token = authHeader.split(' ')[1];   // extract the token after "Bearer "

  try {
    const decoded = jwt.verify(token, JWT_SECRET); // throws if invalid or expired
    req.user = { id: decoded.sub };               // attach user ID to the request
    next();                                        // token is valid — continue
  } catch (err) {
    return res.status(401).json({ error: 'Invalid or expired token' });
  }
}

module.exports = { hashPassword, verifyPassword, signToken, protect };`,

      extraCodes:[{code:`// routes/auth.js — signup and login routes
const express = require('express');
const router = express.Router();
const { User } = require('../db/mongoose');
const { hashPassword, verifyPassword, signToken } = require('../auth/auth');

// POST /auth/signup — create a new account
router.post('/signup', async (req, res, next) => {
  try {
    const { name, email, password } = req.body;

    if (!name || !email || !password) {
      return res.status(400).json({ error: 'name, email, and password are required' });
    }

    if (password.length < 8) {
      return res.status(400).json({ error: 'Password must be at least 8 characters' });
    }

    // Hash the password — never store it in plain text
    const passwordHash = await hashPassword(password);

    // Create the user with the hash, not the original password
    const user = await User.create({ name, email, passwordHash });

    // Issue a token immediately so they don't have to log in again
    const token = signToken(user._id);

    // Return user info (without the password hash!) and the token
    res.status(201).json({
      user: { id: user._id, name: user.name, email: user.email },
      token,
    });
  } catch (err) {
    if (err.code === 11000) return res.status(409).json({ error: 'Email already in use' });
    next(err);
  }
});

// POST /auth/login — exchange credentials for a token
router.post('/login', async (req, res, next) => {
  try {
    const { email, password } = req.body;

    if (!email || !password) {
      return res.status(400).json({ error: 'email and password are required' });
    }

    // Find user by email — select passwordHash explicitly (it's excluded by default)
    const user = await User.findOne({ email }).select('+passwordHash');

    // Use the same generic message whether email or password is wrong — prevents enumeration
    if (!user) {
      return res.status(401).json({ error: 'Invalid email or password' });
    }

    const passwordMatch = await verifyPassword(password, user.passwordHash);

    if (!passwordMatch) {
      return res.status(401).json({ error: 'Invalid email or password' });
    }

    const token = signToken(user._id);    // password checked out — issue a JWT

    res.json({
      user: { id: user._id, name: user.name, email: user.email },
      token,                               // client should store this and send it with future requests
    });
  } catch (err) {
    next(err);
  }
});

module.exports = router;`, file:'routes/auth.js', lang:'javascript'},
        {code:`// app.js — wiring up Helmet and CORS correctly
// Install: npm install helmet cors

const express = require('express');
const helmet  = require('helmet');
const cors    = require('cors');
const authRoutes = require('./routes/auth');

const app = express();

// ── Security headers first — before any other middleware ─────
app.use(helmet());                              // sets ~14 security response headers

// ── CORS — configure per environment ─────────────────────────
const corsOptions = {
  origin: process.env.NODE_ENV === 'production'
    ? process.env.ALLOWED_ORIGIN                // e.g. 'https://myapp.vercel.app'

  allowedHeaders: ['Content-Type', 'Authorization'],
  credentials: true,                            // allow cookies and auth headers
};
app.use(cors(corsOptions));

app.use(express.json());

// ── Routes ────────────────────────────────────────────────────

    {
      id:'dotenv', group:'Phase 2 — Building Real APIs', icon:'lock', title:'Environment Variables & dotenv',
      sub:'Keeping secrets out of code, loading .env files, validating required config at startup.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What are environment variables?</span></div>
  <div class="prose"><p>Environment variables are key-value pairs set outside your code — in the operating system, a <code>.env</code> file, or a hosting platform's dashboard. Your application reads them at runtime via <code>process.env.VARIABLE_NAME</code>. This separates configuration (what changes between environments) from code (what stays the same).</p>
  <p><strong>dotenv</strong> is a zero-dependency package that reads a <code>.env</code> file from your project root and loads its values into <code>process.env</code>. You use it in development; in production the hosting platform provides the variables directly.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Hardcoding values in source code means they're committed to git — accessible to everyone with repo access, permanently in git history, and identical in every environment. Environment variables give you: secrets that never appear in git, different values per environment (dev/staging/prod), and the ability to change config without touching code.</p>
  <p>GitHub has found billions of committed secrets. The fix is simple and non-negotiable: put every secret in <code>.env</code>, gitignore it, and reference it via <code>process.env</code>.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Environment variables are like a <strong>recipe card with blanks to fill in</strong>. The recipe (code) says "add [SECRET_INGREDIENT]" — the recipe is shareable and public. Each kitchen (environment) fills in its own ingredient: test kitchen uses "vanilla extract", restaurant uses the secret blend. The recipe is the same; the ingredient changes per context without rewriting the recipe.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install: <code>npm install dotenv</code> (runtime dep — needed wherever <code>dotenv.config()</code> is called).</li>
    <li>Create <code>.env</code> in the project root. One variable per line: <code>PORT=3000</code>, <code>JWT_SECRET=abc123</code>. No quotes needed for most values.</li>
    <li>Call <code>require('dotenv').config()</code> as the <strong>very first line</strong> of <code>server.js</code>, before any other code. Any module that reads <code>process.env</code> on load will find empty values if dotenv runs later.</li>
    <li>Access values anywhere: <code>process.env.PORT</code>, <code>process.env.JWT_SECRET</code>. Provide defaults for optional vars: <code>process.env.PORT || 3000</code>.</li>
    <li>Add <code>.env</code> to <code>.gitignore</code>. Create <code>.env.example</code> with the same keys but fake/empty values — commit this so teammates know what variables to set.</li>
    <li>In production, set variables through the hosting platform (Heroku config vars, Railway variables, AWS Parameter Store). The <code>.env</code> file is never deployed.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Validate required vars at startup</span></div>
  <div class="prose"><p>A common problem: a typo in a variable name (<code>MONGO_URI</code> vs <code>MONGODB_URI</code>) causes a cryptic runtime error deep in the app — possibly hours into a production run. Better to crash immediately at startup with a clear message listing every missing variable.</p>
  <p>Use Zod to validate all required environment variables before the server binds to a port. If anything is missing or invalid, the process exits with a useful error message rather than silently running with undefined config.</p></div>
</div>`,

    {
      id:'bcrypt', group:'Phase 2 — Building Real APIs', icon:'lock', title:'Password Hashing with bcrypt',
      sub:'Why you never store plain-text passwords, how bcrypt works, salt rounds, and the exact async API.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>bcrypt</strong> is a password hashing function. It takes a plain-text password and produces a one-way scrambled string (a hash) that cannot be reversed. On login you don't decrypt the hash — you hash the new input with the same salt and compare. If the outputs match, the password is correct.</p>
  <p>bcrypt is <em>intentionally slow</em>. That's its key security property. A hash taking 200ms to compute means an attacker trying a billion passwords must wait 200 million seconds — effectively impossible at scale.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Databases get breached — even at major companies. If you stored passwords in plain text, every user's account on every site where they reused that password is immediately compromised. With bcrypt, a breach exposes hashes that take years per password to crack. Users have time to respond before real damage occurs.</p>
  <p>This isn't theoretical. High-profile breaches have exposed hundreds of millions of plain-text or weakly hashed passwords. bcrypt is the industry minimum for password storage.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Storing a plain-text password is like writing the combination to your safe on a sticky note and keeping it in the safe. bcrypt is like storing a <strong>fingerprint scan result</strong> instead: you can verify a new fingerprint produces the same result, but you cannot work backwards from the scan to the original fingerprint. Even if someone steals your scan file, they cannot use it as a key.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li><strong>Salt</strong>: bcrypt automatically generates a random salt per password. Two identical passwords produce different hashes. This defeats precomputed rainbow table attacks.</li>
    <li><strong>Salt rounds (work factor)</strong>: controls how many times the algorithm loops. Each additional round doubles the computation time. Use 10–12 for most apps. Check on your hardware — a hash should take 100–300ms.</li>
    <li><strong>Hashing on signup</strong>: <code>const hash = await bcrypt.hash(password, saltRounds)</code>. Store <code>hash</code> in the database. Never store the original password.</li>
    <li><strong>Comparing on login</strong>: <code>const match = await bcrypt.compare(inputPassword, storedHash)</code>. Returns <code>true</code> if the password produced the same hash, <code>false</code> otherwise.</li>
    <li>The bcrypt hash string is self-contained — it encodes the algorithm version, salt rounds, salt, and hash. You don't need to store the salt separately.</li>
    <li>Never use <code>bcrypt.hashSync()</code> or <code>bcrypt.compareSync()</code> in a server — they block the event loop during the deliberately slow computation.</li>
  </ol>
</div>`,
      boxes:[
        {type:'warn',title:'Salt rounds — how to pick the right value',body:`<p>Each +1 to salt rounds doubles the time:</p><ul><li><code>10</code> rounds → ~100ms. Safe default for most apps.</li><li><code>12</code> rounds → ~400ms. Higher security for sensitive applications.</li><li><code>14</code> rounds → ~1.5 seconds. Only if requirements demand it.</li></ul><p>Test on your production hardware: <code>console.time('hash'); await bcrypt.hash('test', N); console.timeEnd('hash')</code>. Target 100–300ms. Higher hurts login throughput under load; lower is too easy to brute-force.</p>`},

      code:`// auth/password.js — hashing and verifying passwords
// Install: npm install bcrypt
const bcrypt = require('bcrypt');

const SALT_ROUNDS = 12; // ~400ms on a modern server — adjust after testing yours

// ── HASH: call on signup, before saving to DB ─────────────────
async function hashPassword(plainTextPassword) {
  // bcrypt.hash() generates a salt, runs N rounds, returns a 60-char hash string
  // The hash encodes the salt and rounds — no separate storage needed
  const hash = await bcrypt.hash(plainTextPassword, SALT_ROUNDS);
  return hash;
  // e.g. "$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewdBPj/oH6e.UBei"
}

// ── COMPARE: call on login ────────────────────────────────────
async function verifyPassword(plainTextPassword, storedHash) {
  // Extracts salt from storedHash, re-hashes input, compares with constant-time check
  const match = await bcrypt.compare(plainTextPassword, storedHash);
  return match; // true = correct password, false = wrong
}

// ── Usage demo ────────────────────────────────────────────────
async function demo() {
  const password = 'my-secure-password!';

  console.time('hash');
  const hash = await hashPassword(password);
  console.timeEnd('hash'); // ~400ms at 12 rounds

  console.log(await verifyPassword(password, hash)); // true
  console.log(await verifyPassword('wrong', hash));  // false
}

demo();
module.exports = { hashPassword, verifyPassword };`,

      extraCodes:[{code:`// routes/auth.js — signup and login using bcrypt
const express = require('express');
const bcrypt  = require('bcrypt');
const User    = require('../models/User');
const router  = express.Router();

// POST /auth/signup
router.post('/signup', async (req, res, next) => {
  try {
    const { name, email, password } = req.body;

    if (!name || !email || !password) {
      return res.status(400).json({ error: 'name, email, and password required' });
    }
    if (password.length < 8) {
      return res.status(400).json({ error: 'Password must be at least 8 characters' });
    }

    // Hash BEFORE saving — never store plain text
    const passwordHash = await bcrypt.hash(password, 12);

    const user = await User.create({ name, email, passwordHash });

    // Return user WITHOUT the hash
    res.status(201).json({ id: user._id, name: user.name, email: user.email });

  } catch (err) {
    if (err.code === 11000) return res.status(409).json({ error: 'Email already registered' });
    next(err);
  }
});

// POST /auth/login
router.post('/login', async (req, res, next) => {
  try {
    const { email, password } = req.body;

    // .select('+passwordHash') — passwordHash is excluded by default, we need it here
    const user = await User.findOne({ email }).select('+passwordHash');

    // Same error message for "not found" AND "wrong password"
    // Prevents attackers from learning which emails are registered (enumeration attack)
    if (!user || !await bcrypt.compare(password, user.passwordHash)) {
      return res.status(401).json({ error: 'Invalid email or password' });
    }

    // Password correct — issue a JWT (see JWT section)
    res.json({ message: 'Login successful', userId: user._id });

  } catch (err) { next(err); }
});

module.exports = router;`, file:'routes/auth.js', lang:'javascript'}],
