      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>A <strong>JSON Web Token (JWT)</strong> is a compact signed string that encodes a payload. After a user logs in, you issue a JWT containing their user ID and role. They send it with every subsequent request in the <code>Authorization: Bearer &lt;token&gt;</code> header. Your server verifies the signature on each request — no database lookup needed to confirm identity.</p>
  <p>A JWT has three parts separated by dots: <code>header.payload.signature</code>. The header declares the algorithm. The payload contains your data. The signature is computed from header + payload + your secret — if anyone tampers with the payload, the signature breaks.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>HTTP is stateless — the server has no memory between requests. Traditional sessions store state server-side (in Redis or a DB) and give clients a session ID cookie. JWTs move that state into the token itself, signed so the client can't forge it. The server stores nothing — every request is self-contained.</p>
  <p>This makes JWTs ideal for APIs serving mobile apps, SPAs, and microservices — any client that can store a string and set a header.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">A JWT is a <strong>concert wristband</strong>. At the entrance (login), staff verify your ID and put on a wristband (JWT). At each stage or bar, security checks the wristband — they verify it's genuine from this venue (signature check) without calling the front desk. The band has the venue's mark, your access level, and expires at midnight. Forging or modifying it is immediately detectable.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">The three steps</span></div>
  <ol class="steps">
    <li><strong>Issue on login:</strong> <code>jwt.sign({ sub: userId, role }, JWT_SECRET, { expiresIn: '7d' })</code>. The payload carries whatever you need on every request. The secret is a long random string in your <code>.env</code>.</li>
    <li><strong>Client stores and sends:</strong> every subsequent request includes <code>Authorization: Bearer &lt;token&gt;</code> in the headers.</li>
    <li><strong>Verify in middleware:</strong> extract the token, call <code>jwt.verify(token, JWT_SECRET)</code>. If valid: attach decoded payload to <code>req.user</code>, call <code>next()</code>. If expired or tampered: return 401.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">What to put in the payload</span></div>
  <div class="prose"><p>The payload is base64-encoded, <strong>not encrypted</strong>. Anyone with the token can decode it with <code>atob(token.split('.')[1])</code>. The signature proves it hasn't been tampered with — it doesn't hide the contents.</p>
  <p><strong>Safe to include:</strong> user ID (<code>sub</code>), role, plan tier — anything needed for auth decisions without a DB call.</p>
  <p><strong>Never include:</strong> passwords, full PII (SSN, DOB), credit card numbers, or any other sensitive data.</p></div>
</div>`,

      code:`// auth/jwt.js — sign and verify JWTs
// Install: npm install jsonwebtoken
const jwt = require('jsonwebtoken');

// Load from environment — never hardcode
const JWT_SECRET = process.env.JWT_SECRET;
const JWT_EXPIRY = '7d';

// Issue a token after successful login
function signToken(userId, role = 'user') {
  return jwt.sign(
    { sub: userId.toString(), role }, // payload — non-sensitive data only
    JWT_SECRET,
    { expiresIn: JWT_EXPIRY }
  );
}

// Verify a token — throws if invalid or expired
function verifyToken(token) {
  return jwt.verify(token, JWT_SECRET); // returns decoded payload or throws
}

module.exports = { signToken, verifyToken };`,

      extraCodes:[{code:`// middleware/auth.js — the protect middleware used on private routes
const { verifyToken } = require('../auth/jwt');

function protect(req, res, next) {
  const authHeader = req.get('Authorization'); // "Bearer eyJhbGci..."

  if (!authHeader?.startsWith('Bearer ')) {
    return res.status(401).json({ error: 'Authentication required. Send: Authorization: Bearer <token>' });
  }

  const token = authHeader.split(' ')[1];

  try {
    const decoded = verifyToken(token);
    req.user = { id: decoded.sub, role: decoded.role }; // available in all route handlers
    next();
  } catch (err) {
    if (err.name === 'TokenExpiredError') {
      return res.status(401).json({ error: 'Session expired. Please log in again.' });
    }
    return res.status(401).json({ error: 'Invalid token.' });
  }
}

// Role-based guard factory: protect, requireRole('admin')
function requireRole(role) {
  return (req, res, next) => {
    if (req.user?.role !== role) {
      return res.status(403).json({ error: \`\${role} access required\` });
    }
    next();
  };
}

module.exports = { protect, requireRole };

// ─── Usage in routes ─────────────────────────────────────────

      id:'cors', group:'Phase 2 — Building Real APIs', icon:'shield', title:'CORS — Cross-Origin Resource Sharing',
      sub:'Why browsers block cross-origin calls, how to configure the cors package, and the credentials gotcha.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>CORS</strong> is a browser security mechanism. When JavaScript on <code>localhost:5173</code> calls an API on <code>localhost:3000</code>, the browser intercepts the response and checks: did the API send an <code>Access-Control-Allow-Origin</code> header permitting this origin? If not, the browser silently drops the response — even though the request reached the server and returned successfully.</p>
  <p>Two URLs are "same origin" only if their protocol, host, and port are all identical. Different port = different origin. Different protocol (http vs https) = different origin. In production: <code>https://myapp.com</code> and <code>https://api.myapp.com</code> are different origins.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Every beginner connecting a React frontend to an Express backend hits CORS errors in the first session. The server logs show the request arriving — but the browser throws "blocked by CORS policy". The fix is always server-side: add headers to permit the requesting origin.</p>
  <p>CORS errors only happen in browsers. curl, Postman, Insomnia, and server-to-server calls bypass CORS entirely. If your API works in Postman but not in a browser, it's a CORS configuration issue.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">CORS is a <strong>guest list at a private event</strong>. The venue (API) prepares your order — but a bouncer (the browser) checks the response packaging: "is this frontend on the guest list?" <code>Access-Control-Allow-Origin</code> is the list. If your app's domain isn't on it, the bouncer confiscates the order before it reaches you. The kitchen (server) did the work — the bouncer decides whether the response gets through. You, as the API owner, control the list.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install: <code>npm install cors</code>.</li>
    <li>Register before all other middleware: <code>app.use(cors(options))</code>. Preflight OPTIONS requests must receive CORS headers before body parsers or routes process them.</li>
    <li><strong>Development</strong>: <code>app.use(cors())</code> — allows all origins. Never use in production.</li>
    <li><strong>Production</strong>: <code>app.use(cors({ origin: process.env.ALLOWED_ORIGIN, credentials: true }))</code>. Only your frontend domain is allowed.</li>
    <li><strong>Preflight</strong>: browsers send an OPTIONS request before non-simple requests (DELETE, custom headers). The cors package handles these automatically — you don't need to write OPTIONS routes.</li>
    <li><strong>Credentials</strong>: if sending cookies or auth headers from the browser, set <code>credentials: true</code> AND use an explicit origin (not the <code>*</code> wildcard — credentials + wildcard is a browser error).</li>
  </ol>
</div>`,
      boxes:[
        {type:'warn',title:'Never use cors() with wildcard in production',body:`<p><code>app.use(cors())</code> sets <code>Access-Control-Allow-Origin: *</code> — any website can call your API from a browser. Fine for a public read-only data API, wrong for anything with user accounts or mutations.</p><p>Production config:</p><pre style="font-size:12px;padding:8px;background:rgba(255,255,255,.05);border-radius:4px;font-family:'JetBrains Mono',monospace">app.use(cors({
  origin: process.env.ALLOWED_ORIGIN,
  credentials: true,
}));</pre>`},
        {type:'nd',title:'CORS does not protect your server from non-browser clients',body:`<p>CORS is enforced by browsers, not by your server. An attacker with curl, Python, or a server can call your API regardless of CORS settings. CORS only prevents untrusted browser-based JavaScript on other domains from reading your API responses. Your actual security is JWT authentication and server-side validation — CORS is a browser safety net, not a general access control.</p>`},
      ],
      code:`// app.js — CORS configuration
const express = require('express');
const cors    = require('cors');
const helmet  = require('helmet');

const app = express();

// ── CORS before everything else ───────────────────────────────
const corsOptions = {
  origin: process.env.NODE_ENV === 'production'
    ? process.env.ALLOWED_ORIGIN          // e.g. 'https://myapp.vercel.app'
    : 'http://localhost:5173',            // Vite dev server
  methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS'],
  allowedHeaders: ['Content-Type', 'Authorization'],
  credentials: true,                      // allow cookies and auth headers
  maxAge: 86400,                          // preflight cached for 24 hours
};

app.use(cors(corsOptions));

// Then security headers and body parsing
app.use(helmet());
app.use(express.json());

app.get('/api/test', (req, res) => {
  res.json({ corsWorking: true });
});

app.listen(3000);`,
      codeFile:'app.js', codeLang:'javascript',
      extraCodes:[{code:`// Multiple allowed origins (www + non-www, or multiple frontends)
const allowedOrigins = [
  'https://myapp.com',
  'https://www.myapp.com',
  'https://staging.myapp.com',
  process.env.NODE_ENV !== 'production' && 'http://localhost:5173',
].filter(Boolean);

app.use(cors({
  origin: (requestOrigin, callback) => {
    if (!requestOrigin) return callback(null, true); // allow non-browser clients
    if (allowedOrigins.includes(requestOrigin)) {
      callback(null, true);
    } else {
      callback(new Error('CORS: origin not allowed: ' + requestOrigin));
    }
  },
  credentials: true,
}));

// Debugging CORS errors:
// 1. Check server logs — did the request arrive? (CORS errors happen in the browser)
// 2. Browser DevTools → Network → your request → Response Headers

      sub:'What each security header protects against, what Helmet sets by default, and when to customise.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>Helmet</strong> is an Express middleware that sets ~14 HTTP security response headers with a single <code>app.use(helmet())</code> call. Without Helmet, Express sets no security headers — browsers are left to their default (often unsafe) behaviour. Helmet tells browsers to behave more securely: don't load untrusted scripts, don't embed this page in iframes, enforce HTTPS, don't guess file types.</p>
  <p>Each header targets a specific attack vector. Helmet bundles them all into one dependency with sensible defaults. You override what doesn't fit your app.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Many web vulnerabilities are browser-level. XSS (injecting malicious scripts), clickjacking (tricking users via invisible iframes), MIME sniffing (browser guessing file types to execute JS) — security headers are the defence layer. Writing them manually is error-prone. Helmet gives you correct defaults in one line with the ability to configure per-header as needed.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The headers Helmet sets</span></div>
  <ol class="steps">
    <li><strong>Content-Security-Policy</strong> — the most powerful. Declares which domains scripts, styles, images and fonts may load from. Blocks XSS by preventing inline scripts and unauthorised external resources. Requires configuration for apps loading CDN assets or fonts.</li>
    <li><strong>Strict-Transport-Security (HSTS)</strong> — forces browsers to use HTTPS only after the first visit. <code>maxAge: 31536000</code> (1 year) is the standard. Prevents protocol-downgrade attacks.</li>
    <li><strong>X-Content-Type-Options: nosniff</strong> — prevents browsers from "sniffing" and guessing content types. Without it, a server sending a file as <code>text/plain</code> might still have it executed as JavaScript.</li>
    <li><strong>X-Frame-Options: SAMEORIGIN</strong> — prevents your pages being embedded in <code>&lt;iframe&gt;</code> on other domains. Blocks clickjacking — where attackers overlay your UI to capture user interactions.</li>
    <li><strong>Referrer-Policy: no-referrer</strong> — controls what's sent in the <code>Referer</code> header when users navigate away. Prevents internal URLs leaking to third parties.</li>
    <li><strong>Cross-Origin-* policies</strong> — isolate browsing context from other origins. Required for APIs using advanced features like SharedArrayBuffer.</li>
  </ol>
</div>`,

const express = require('express');

app.use(cors({ origin: process.env.ALLOWED_ORIGIN, credentials: true }));

// OPTION C: Pure JSON API with no HTML frontend — disable CSP

app.use(express.json());

app.get('/api/secure', (req, res) => {

});

    {
      id:'validation', group:'Phase 2 — Building Real APIs', icon:'check2', title:'Validation',
      sub:'Using Zod to validate incoming request data and return consistent, structured error messages.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>"Validation" means checking that incoming request data matches what you expect before you use it. Zod is a TypeScript-first schema declaration and validation library. You describe the shape and rules of your data in a schema, then call <code>schema.parse(data)</code> — if the data matches, you get back a typed result; if not, you get a structured error explaining exactly what's wrong.</p>
  <p>Joi is the older alternative you'll see in existing projects. Zod is the current default for new projects, especially those using TypeScript.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without validation, bad data reaches your database. A user sending <code>{ "price": "free" }</code> for a number field, or an empty string for a required name — these cause runtime errors deep in your code that are hard to debug. Validation catches them at the boundary, returns a clean 400 response, and prevents garbage from ever touching your data layer.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Validation is the <strong>form review step before submitting a job application</strong>. Before the recruiter even reads your application (your route handler), there's a system check: is the name field filled? Is the email formatted correctly? Is the start date a real date? If anything fails, it's rejected immediately with specific feedback — "email must include @". The recruiter never sees incomplete applications.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install Zod: <code>npm install zod</code>.</li>
    <li>Define a schema: <code>const schema = z.object({ name: z.string().min(1), price: z.number().positive() })</code>.</li>
    <li>Use <code>schema.parse(data)</code> — throws a <code>ZodError</code> if validation fails. Use <code>schema.safeParse(data)</code> for a non-throwing version that returns <code>{ success, data, error }</code>.</li>
    <li>Wrap validation in a reusable middleware: it parses the body, and on failure calls <code>next()</code> with a formatted error.</li>
    <li>Zod infers TypeScript types from schemas automatically — a big benefit if you're using TypeScript.</li>
  </ol>
</div>`,
      boxes:[
        {type:'nd',title:'Zod schema building blocks',body:`<ul><li><code>z.string()</code> — any string. Chain <code>.min(1)</code>, <code>.max(100)</code>, <code>.email()</code>, <code>.url()</code>, <code>.trim()</code></li><li><code>z.number()</code> — any number. Chain <code>.int()</code>, <code>.positive()</code>, <code>.min(0).max(1000)</code></li><li><code>z.boolean()</code></li><li><code>z.enum(['admin', 'user'])</code> — one of a fixed set</li><li><code>z.array(z.string())</code> — array of strings</li><li><code>z.object({...})</code> — nested objects</li><li><code>.optional()</code> — field may be absent</li><li><code>.default('value')</code> — use this if field is absent</li></ul>`},
        {type:'ex',title:'safeParse vs parse',body:`<p><strong><code>schema.parse(data)</code></strong> — throws a <code>ZodError</code> if validation fails. Use this inside try/catch.</p><p><strong><code>schema.safeParse(data)</code></strong> — never throws. Returns <code>{ success: true, data }</code> on success or <code>{ success: false, error }</code> on failure. Use this in middleware where you want to inspect the error before deciding how to respond.</p>`},

      code:`// validation/schemas.js — defining Zod schemas for your API
// Install: npm install zod

const { z } = require('zod');              // import the main Zod object

// ── USER SCHEMAS ──────────────────────────────────────────────
const createUserSchema = z.object({
  name: z.string()
    .min(1, 'Name is required')            // empty string is not allowed
    .max(100, 'Name must be under 100 characters')
    .trim(),                               // strip whitespace before validating

  email: z.string()
    .email('Must be a valid email address'), // validates format: user@example.com

  password: z.string()
    .min(8, 'Password must be at least 8 characters')
    .max(72, 'Password must be under 72 characters'), // bcrypt truncates at 72 bytes

  role: z.enum(['user', 'admin'])
    .optional()                            // not required in the request
    .default('user'),                      // if absent, default to 'user'
});

// ── PRODUCT SCHEMAS ───────────────────────────────────────────
const createProductSchema = z.object({
  name: z.string().min(1).max(200).trim(),
  price: z.number().positive('Price must be a positive number'),
  stock: z.number().int('Stock must be a whole number').min(0).default(0),
  category: z.string().optional(),
});

// Partial schema for updates — all fields become optional
const updateProductSchema = createProductSchema.partial();

// ── QUERY PARAM SCHEMA ────────────────────────────────────────
// Query strings are always strings — use .coerce to convert types
const paginationSchema = z.object({
  page: z.coerce.number().int().positive().default(1), // "2" → 2
  limit: z.coerce.number().int().min(1).max(100).default(20),
});

module.exports = { createUserSchema, createProductSchema, updateProductSchema, paginationSchema };`,
      codeFile:'validation/schemas.js', codeLang:'javascript',
      extraCodes:[{code:`// validation/validate.js — a reusable Express middleware factory
const { z } = require('zod');

// validate() returns a middleware that validates req.body against the given schema
function validate(schema) {
  return (req, res, next) => {
    const result = schema.safeParse(req.body);  // never throws — returns success/error object

    if (!result.success) {
      // result.error.errors is an array of { path, message } objects
      const errors = result.error.errors.map(e => ({
        field: e.path.join('.'),                // e.g. "address.city"
        message: e.message,                     // e.g. "Required"
      }));

      return res.status(400).json({
        error: 'Validation failed',
        errors,                                 // array of per-field errors
      });
    }

    // Replace req.body with the validated and coerced data
    // This strips unknown fields and applies defaults automatically
    req.body = result.data;
    next();                                     // validation passed — continue to the handler
  };
}

// validateQuery() validates query string params instead of body
function validateQuery(schema) {
  return (req, res, next) => {
    const result = schema.safeParse(req.query);
    if (!result.success) {
      return res.status(400).json({ error: 'Invalid query parameters' });
    }
    req.query = result.data;                    // replace with coerced values (strings → numbers)
    next();
  };
}

module.exports = { validate, validateQuery };

// ─────────────────────────────────────────────────────────────
// Usage in a route file:
// ─────────────────────────────────────────────────────────────
// const { validate } = require('../validation/validate');
// const { createProductSchema } = require('../validation/schemas');
//
// router.post('/', validate(createProductSchema), async (req, res, next) => {
//   // req.body is now guaranteed to match the schema
//   // price is a number, name is trimmed, stock defaults to 0
//   const product = await Product.create(req.body);
//   res.status(201).json(product);
// });`, file:'validation/validate.js', lang:'javascript'}],
      afterCode:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">08</span><span class="ch-head">Common mistakes beginners make</span></div>
  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Using .parse() without a try/catch</div>
    <div class="cmp">
      <div><div class="cmp-lbl lbl-bad">Unhandled ZodError crashes the route</div><div class="cb"><pre class="language-javascript"><code>router.post('/', (req, res) => {
  const data = createUserSchema.parse(req.body); // throws ZodError if invalid
  // unhandled throw → Express default error handler → ugly 500 response

});</code></pre></div></div>
      <div><div class="cmp-lbl lbl-good">Fixed — use safeParse or try/catch</div><div class="cb"><pre class="language-javascript"><code>router.post('/', (req, res) => {
  const result = createUserSchema.safeParse(req.body); // never throws
  if (!result.success) {
    return res.status(400).json({ errors: result.error.errors });
  }
  User.create(result.data); // result.data is the validated, coerced value
});</code></pre></div></div>
    </div>
    <p class="mistake-why"><code>.parse()</code> throws on invalid data. Unless you're inside a try/catch, the error will propagate unhandled. Use <code>safeParse()</code> in Express route/middleware contexts.</p>

  <div class="mistake">
    <div class="mistake-name">${ICONS.alert} Forgetting to use result.data after safeParse</div>
    <div class="cmp">
      <div><div class="cmp-lbl lbl-bad">Using unvalidated data</div><div class="cb"><pre class="language-javascript"><code>const result = schema.safeParse(req.body);
if (!result.success) return res.status(400).json(...);
// Bug: using req.body instead of result.data — defaults and coercions are lost
await Product.create(req.body);</code></pre></div></div>
      <div><div class="cmp-lbl lbl-good">Fixed</div><div class="cb"><pre class="language-javascript"><code>const result = schema.safeParse(req.body);
if (!result.success) return res.status(400).json(...);
// Use result.data — it has applied defaults, trimmed strings, coerced types
await Product.create(result.data);</code></pre></div></div>
    </div>
    <p class="mistake-why"><code>result.data</code> is the validated, transformed version of your data. Using <code>req.body</code> directly after safeParse means you bypass all the coercions and defaults Zod applied.</p>

  <div class="mistake">

const skip = (page - 1) * 20; // NaN - invalid, query returns wrong results</code></pre></div></div>

});

const skip = (page - 1) * 20; // always a valid number</code></pre></div></div>
    </div>
    <p class="mistake-why">Query parameters are always strings. Use <code>z.coerce.number()</code> to safely convert them — it fails validation if the value isn't a valid number.</p>
  </div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">09</span><span class="ch-head">Quick recap</span></div>
  <div class="box box-ok">
    <div class="box-body"><ul class="recap-list">
      <li>Validate all incoming request data before it touches your database or business logic.</li>
      <li>Use <code>safeParse()</code> in Express — it returns <code>{ success, data, error }</code> without throwing.</li>
      <li>Always use <code>result.data</code> after validation — it has applied defaults, trims, and type coercions.</li>
      <li>For query strings, use <code>z.coerce.number()</code> to convert string values to numbers.</li>
      <li>Extract validation into reusable middleware with a factory function: <code>validate(schema)</code>.</li>
    </ul></div>
  </div>
</div>
<div class="wnext"><div class="wnext-lbl">What's next</div>You're validating inputs and sending 400s for bad data. But what about unexpected crashes — database failures, network timeouts, bugs in your code? <strong>Error handling</strong> with a global error handler and custom error classes makes your API respond consistently to every kind of failure.</div>`,

    {
      id:'validation-errors', group:'Phase 2 — Building Real APIs', icon:'check2', title:'Consistent Validation Error Responses',
      sub:'Designing a standard error response format, transforming Zod errors into field-level messages, and the reusable validate() middleware pattern.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>When validation fails, the shape of the error response matters as much as the validation logic itself. A raw Zod error sent directly to a client is nearly useless — a deeply nested object that no frontend can act on. A well-designed validation error response tells the client exactly <em>which</em> fields failed and <em>why</em>, in a predictable shape that can be mapped directly to form field error states.</p>
  <p>The goal: every validation failure across your entire API returns the same shape. Frontend developers write one error handler; it works everywhere.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>When a user submits a form with an invalid email and missing password, the ideal response highlights both fields with specific messages. If your API returns <code>{ "error": "ZodError: invalid_type at email..." }</code>, the frontend must parse that string to figure out which field failed — fragile, slow to build, and breaks whenever Zod's error format changes.</p>
  <p>Consistent, field-keyed responses make validation errors part of your API contract. They're predictable, testable, and a pleasure for every frontend developer who uses your API.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The standard response shape</span></div>
  <div class="cb" style="margin:16px 0"><pre class="language-json"><code>{
  "error": "Validation failed",
  "errors": {
    "email":    "Invalid email address",
    "password": "Password must be at least 8 characters",
    "name":     "Name is required"
  }
}</code></pre></div>
  <ol class="steps">
    <li><strong>error</strong> — top-level human-readable summary. Always present on failures.</li>
    <li><strong>errors</strong> — object keyed by field name, values are the first error message for each field. Frontend maps each key to its input component.</li>
    <li><strong>HTTP status 422</strong> — Unprocessable Entity (semantically correct for validation failures; field is present but value is invalid). Use 400 if you prefer simplicity — pick one and be consistent across your entire API.</li>
    <li>Never include: stack traces, raw Zod errors, database error messages, or internal field names.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">The reusable validate() middleware factory</span></div>
  <div class="prose"><p>Instead of repeating <code>safeParse</code> + error formatting in every route, build it once as a middleware factory. One line to add type-safe validation to any route. Errors are always formatted identically.</p></div>
  <ol class="steps">
    <li><code>formatZodErrors(zodError)</code> — reduces <code>error.issues</code> array to <code>{ fieldName: firstMessage }</code>.</li>
    <li><code>validate(schema)</code> — returns middleware that calls <code>safeParse</code>, formats errors on failure, or attaches <code>result.data</code> to <code>req.validatedBody</code> on success.</li>
    <li>Use: <code>router.post('/', validate(createUserSchema), handler)</code>. Handler receives typed, validated data in <code>req.validatedBody</code>.</li>
    <li>Add <code>validateQuery(schema)</code> variant for query string validation with coercion.</li>
  </ol>
</div>`,

        {type:'nd',title:'400 vs 422 — the status code question',body:`<p><strong>400 Bad Request</strong>: request is malformed — invalid JSON syntax, wrong Content-Type, completely missing body.</p><p><strong>422 Unprocessable Entity</strong>: request is syntactically valid but semantically invalid — JSON parsed fine, but the email field has a bad value. More semantically precise for Zod validation failures.</p><p><strong>In practice</strong>: most APIs use 400 for simplicity. Use 422 if you want semantic precision or if your clients handle the two differently. Whatever you choose, be consistent.</p>`},

      code:`// middleware/validate.js — reusable validation middleware factory
const { z } = require('zod');

// Convert Zod issues array to { fieldName: firstMessage }
// Input: [{ path: ['email'], message: 'Invalid email' }, ...]
// Output: { email: 'Invalid email address' }
function formatZodErrors(zodError) {
  return zodError.issues.reduce((acc, issue) => {
    const field = issue.path.join('.');    // handles nested: "address.city"
    if (!acc[field]) acc[field] = issue.message;  // only keep first error per field
    return acc;
  }, {});
}

// Middleware factory: validate req.body against a Zod schema
function validate(schema) {
  return (req, res, next) => {
    const result = schema.safeParse(req.body);  // never throws — returns { success, data, error }

    if (!result.success) {
      return res.status(422).json({
        error:  'Validation failed',
        errors: formatZodErrors(result.error),   // field-keyed messages
      });
    }

    req.validatedBody = result.data;   // parsed + transformed + default-filled
    next();
  };
}

// Middleware factory for query string validation (coerces strings to numbers)
function validateQuery(schema) {
  return (req, res, next) => {
    const result = schema.safeParse(req.query);
    if (!result.success) return res.status(400).json({ error: 'Invalid query parameters', errors: formatZodErrors(result.error) });
    req.validatedQuery = result.data;
    next();
  };
}

module.exports = { validate, validateQuery, formatZodErrors };`,

      sub:'Global error middleware, custom error classes, and consistent error responses across your API.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>A "global error handler" is a special Express middleware with four parameters <code>(err, req, res, next)</code> that catches any error passed to <code>next(err)</code> — or thrown by an async route in Express 5. It sits at the end of your middleware chain and converts any error into a clean, consistent HTTP response.</p>
  <p>"Custom error classes" are JavaScript classes that extend <code>Error</code>. They let you attach a <code>status</code> code and structured message to an error so your error handler can respond with the right HTTP status without duplicating that logic everywhere.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without a global error handler, every route has to format its own error responses. They'll be inconsistent, clients can't reliably parse them, and unexpected errors (like a database timeout) will return Express's default HTML error page — which leaks implementation details and breaks any client expecting JSON.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Error handling is like <strong>customer service at a hotel</strong>. Every department (route) can flag a problem — "this guest's room isn't ready", "payment declined". Instead of each department improvising their own response, everything routes through the front desk (global error handler), which has a standard script: apologise, explain clearly, offer the appropriate fix. One consistent experience, no matter which department the problem came from.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Create custom error classes that extend <code>Error</code> — add a <code>status</code> property and set <code>this.name</code>.</li>
    <li>In route handlers, <code>throw new NotFoundError('User not found')</code> or <code>throw new ValidationError(...)</code>.</li>
    <li>In Express 5, thrown errors in async routes are automatically forwarded to your error handler. In Express 4, use <code>try/catch</code> + <code>next(err)</code>.</li>
    <li>Register your global error handler as the last <code>app.use()</code> call — after all routes.</li>
    <li>The error handler checks <code>err.status</code> and <code>err.name</code> to decide the HTTP status code and response shape.</li>
    <li>Log the error on the server (to a log file or console) but only send safe information to the client — never send stack traces to production.</li>
  </ol>
</div>`,
      boxes:[
        {type:'nd',title:'Express 5 vs Express 4 async error handling',body:`<p><strong>Express 5</strong>: if an async route handler throws (or returns a rejected promise), Express automatically calls <code>next(err)</code> for you. You still need try/catch for specific error handling, but unhandled async throws no longer crash the process.</p><p><strong>Express 4</strong>: you must manually catch every async error and call <code>next(err)</code>. Many projects use a wrapper like <code>asyncHandler(fn)</code> that wraps routes in a try/catch for you.</p>`},

      code:`// errors/AppError.js — custom error classes for your API
// Throw these in route handlers instead of generic Error objects

// Base class — all our custom errors extend this
class AppError extends Error {
  constructor(message, status) {
    super(message);                        // pass message to the built-in Error constructor
    this.name = this.constructor.name;     // e.g. "NotFoundError", "ValidationError"
    this.status = status;                  // the HTTP status code to respond with
    this.isOperational = true;             // marks errors we deliberately threw (not bugs)
    Error.captureStackTrace(this, this.constructor); // cleaner stack traces in Node
  }
}

// 400 — the client sent bad data
class ValidationError extends AppError {
  constructor(message, errors = []) {
    super(message, 400);
    this.errors = errors;                  // array of per-field errors (from Zod, etc.)
  }
}

// 401 — not authenticated
class UnauthorizedError extends AppError {
  constructor(message = 'Authentication required') {
    super(message, 401);
  }
}

// 403 — authenticated but not permitted
class ForbiddenError extends AppError {
  constructor(message = 'You do not have permission to do this') {
    super(message, 403);
  }
}

// 404 — resource doesn't exist
class NotFoundError extends AppError {
  constructor(resource = 'Resource') {
    super(\`\${resource} not found\`, 404);
  }
}

// 409 — conflict (e.g. duplicate email)
class ConflictError extends AppError {
  constructor(message) {
    super(message, 409);
  }
}

module.exports = { AppError, ValidationError, UnauthorizedError, ForbiddenError, NotFoundError, ConflictError };`,

      extraCodes:[{code:`// errors/errorHandler.js — global error handling middleware
// Register this as the LAST app.use() in server.js, after all routes

const { AppError } = require('./AppError');

// The 4-parameter signature is what makes Express treat this as error middleware
function globalErrorHandler(err, req, res, next) {
  const isDev = process.env.NODE_ENV !== 'production';

  // ── OPERATIONAL ERRORS (errors we threw deliberately) ─────────
  if (err.isOperational) {
    const response = {
      error: err.message,
    };

    // Include per-field validation errors if present
    if (err.errors && err.errors.length > 0) {
      response.errors = err.errors;
    }

    // In development, include the stack trace to help debugging
    if (isDev) response.stack = err.stack;

    return res.status(err.status).json(response);
  }

  // ── MONGOOSE VALIDATION ERROR ──────────────────────────────────
  if (err.name === 'ValidationError') {
    const errors = Object.values(err.errors).map(e => ({
      field: e.path,
      message: e.message,
    }));
    return res.status(400).json({ error: 'Validation failed', errors });
  }

  // ── MONGOOSE DUPLICATE KEY ──────────────────────────────────────
  if (err.code === 11000) {
    const field = Object.keys(err.keyValue)[0]; // which field caused the conflict
    return res.status(409).json({ error: \`\${field} already exists\` });
  }

  // ── JWT ERRORS ──────────────────────────────────────────────────
  if (err.name === 'JsonWebTokenError') {
    return res.status(401).json({ error: 'Invalid token' });
  }
  if (err.name === 'TokenExpiredError') {
    return res.status(401).json({ error: 'Token has expired. Please log in again' });
  }

  // ── UNEXPECTED ERRORS (bugs, network failures, etc.) ───────────
  // Log the full error on the server — never send the stack to the client
  console.error('Unexpected error:', err);

  res.status(500).json({
    error: isDev ? err.message : 'Something went wrong. Please try again later.',
    ...(isDev && { stack: err.stack }),    // only expose stack in development
  });
}

module.exports = globalErrorHandler;

      sub:'Differentiating 4xx from 5xx errors with typed error classes and centralising error responses.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>Custom error classes extend JavaScript's built-in <code>Error</code> to carry extra information: an HTTP status code, an error code string, and whether the error is operational (expected, like "user not found") or a programmer error (unexpected, like a null pointer). Your global error handler reads these properties to decide what status code to return and how much detail to expose.</p>
  <p>Without custom error classes, every route's catch block reinvents the same logic: <code>if (err.name === 'CastError') res.status(400)...</code> repeated in dozens of places. With custom classes, you throw a typed error once — the handler knows exactly what to do.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Two categories of errors need different handling:</p>
  <p><strong>Operational errors</strong> — expected runtime conditions: user not found (404), email already exists (409), validation failed (422), not authenticated (401). These are safe to describe in detail to the client — the message is informative and helps them fix the issue.</p>
  <p><strong>Programmer errors</strong> — unexpected bugs: null pointer, wrong type, corrupted state, unhandled database error. These should return a generic "Internal Server Error" to the client — you don't want to leak implementation details — but log the full stack trace on the server for debugging.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Custom error classes are like <strong>colour-coded alert tags in a hospital</strong>. A blue tag (operational error) means "patient has a known condition — follow protocol X." A red tag (programmer error) means "unknown emergency — call senior staff immediately and don't tell the patient what's in the chart." The same response desk handles all tags, but reads the colour to decide the appropriate action. Without the tags, every nurse has to diagnose the situation from scratch.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Create a base <code>AppError</code> class extending <code>Error</code> with <code>statusCode</code>, <code>code</code>, and <code>isOperational</code> properties.</li>
    <li>Create specific subclasses: <code>NotFoundError</code> (404), <code>UnauthorizedError</code> (401), <code>ForbiddenError</code> (403), <code>ConflictError</code> (409), <code>ValidationError</code> (422).</li>
    <li>Throw them in route handlers and controllers: <code>throw new NotFoundError('User')</code>.</li>
    <li>The global error handler checks <code>err.isOperational</code>: if true, send <code>err.statusCode</code> + <code>err.message</code>. If false (programmer error), send 500 + generic message and log the full stack trace.</li>
  </ol>

// Base class — all custom errors extend this
class AppError extends Error {
  constructor(message, statusCode, code = 'APP_ERROR') {
    super(message);
    this.name        = this.constructor.name;
    this.statusCode  = statusCode;
    this.code        = code;
    this.isOperational = true;    // expected runtime error — safe to describe to client
    Error.captureStackTrace(this, this.constructor);
  }
}

// 4xx — operational: the client did something wrong or a resource is in the wrong state
class NotFoundError extends AppError {
  constructor(resource = 'Resource') {
    super(\`\${resource} not found\`, 404, 'NOT_FOUND');
  }
}

class UnauthorizedError extends AppError {
  constructor(message = 'Authentication required') {
    super(message, 401, 'UNAUTHORIZED');
  }
}

class ForbiddenError extends AppError {
  constructor(message = 'You do not have permission') {
    super(message, 403, 'FORBIDDEN');
  }
}

class ConflictError extends AppError {
  constructor(message = 'Resource already exists') {
    super(message, 409, 'CONFLICT');
  }
}

class ValidationError extends AppError {
  constructor(message = 'Validation failed', errors = {}) {
    super(message, 422, 'VALIDATION_ERROR');
    this.errors = errors;    // field-level error messages
  }
}

module.exports = { AppError, NotFoundError, UnauthorizedError, ForbiddenError, ConflictError, ValidationError };`,

const { AppError } = require('../errors/AppError');

function errorHandler(err, req, res, next) {
  // Log everything on the server side (always)
  console.error({
    name:    err.name,
    message: err.message,
    code:    err.code,
    stack:   err.stack,
    url:     req.originalUrl,
    method:  req.method,
  });

  // ── Operational errors (our custom AppError subclasses) ──────
  if (err.isOperational) {
    const body = { error: err.message, code: err.code };
    if (err.errors) body.errors = err.errors; // include field errors for ValidationError
    return res.status(err.statusCode).json(body);
  }

  // ── Mongoose cast error (invalid ObjectId) ───────────────────
  if (err.name === 'CastError') {
    return res.status(400).json({ error: 'Invalid ID format', code: 'INVALID_ID' });
  }

  // ── Mongoose duplicate key ────────────────────────────────────
  if (err.code === 11000) {
    const field = Object.keys(err.keyValue || {})[0] || 'field';
    return res.status(409).json({ error: \`\${field} already in use\`, code: 'DUPLICATE_KEY' });
  }

  // ── JWT errors ────────────────────────────────────────────────
  if (err.name === 'JsonWebTokenError') {
    return res.status(401).json({ error: 'Invalid token', code: 'INVALID_TOKEN' });
  }
  if (err.name === 'TokenExpiredError') {
    return res.status(401).json({ error: 'Token has expired', code: 'TOKEN_EXPIRED' });
  }

  // ── Programmer error (unexpected bug) ─────────────────────────
  // Never send implementation details to the client
  const statusCode = err.statusCode || 500;
  const message    = process.env.NODE_ENV === 'production'
    ? 'Something went wrong'   // generic message in production
    : err.message;             // detailed message in development

  res.status(statusCode).json({
    error: message,
    ...(process.env.NODE_ENV !== 'production' && { stack: err.stack }),
  });
}

module.exports = errorHandler;

      id:'typescript', group:'Phase 3 — Scaling & Architecture', icon:'ts', title:'TypeScript with Express',
      sub:'Adding TypeScript to your Express project for typed req/res objects, shared interfaces, and safer code.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>TypeScript is a superset of JavaScript that adds static type checking. Your code is still JavaScript — TypeScript adds type annotations that are checked at compile time (when you run <code>tsc</code> or <code>ts-node</code>), then stripped out. The output is regular JavaScript that Node runs.</p>
  <p>In an Express context, TypeScript lets you type the <code>req</code> and <code>res</code> objects, define interfaces for request bodies and responses, and catch mismatches (like accessing a property that doesn't exist on <code>req.user</code>) before you even run your code.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Express's <code>req.body</code> is typed as <code>any</code> by default — TypeScript can't help you there. But by extending Express's types with your own interfaces, you get autocomplete, type errors on typos, and documentation that's always up to date because the types and the code are the same file.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">JavaScript is like cooking from memory — you roughly know what goes in a dish. <strong>TypeScript is having the recipe card in front of you</strong> — it tells you exactly what ingredients are needed, in what quantities, and flags it immediately if you reach for salt when the recipe says sugar. The meal still gets cooked the same way; you just have guardrails preventing mistakes before they happen.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install: <code>npm install -D typescript ts-node @types/node @types/express</code>. Run <code>npx tsc --init</code> to generate <code>tsconfig.json</code>.</li>
    <li>Rename your files to <code>.ts</code>. Change <code>require()</code> to <code>import</code> (TypeScript prefers ESM syntax, compiled to CJS).</li>
    <li>Type your route handlers: <code>import { Request, Response, NextFunction } from 'express'</code>.</li>
    <li>Extend <code>Request</code> to add custom properties like <code>req.user</code> using "declaration merging" — a TypeScript feature for extending existing types.</li>
    <li>Define interfaces for request bodies and use generics: <code>Request&lt;Params, ResBody, ReqBody&gt;</code>.</li>
    <li>In development, use <code>ts-node-dev</code> (like nodemon for TypeScript). For production, compile with <code>tsc</code> and run the output JS.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">The four Express generic slots — Request&lt;P, ResBody, ReqBody, ReqQuery&gt;</span></div>
  <div class="prose"><p>Express's <code>Request</code> type accepts four generic parameters. Most beginners only use the third one and wonder why their query strings are untyped. Here is what each slot controls:</p>
  <p><code>Request&lt;Params, ResBody, ReqBody, ReqQuery&gt;</code></p>
  <ul>
    <li><strong>Params</strong> — the shape of <code>req.params</code> (URL path segments). For route <code>/users/:id</code>: <code>{ id: string }</code>. Always strings — <code>parseInt()</code> still required at runtime.</li>
    <li><strong>ResBody</strong> — the shape of the response body. Mostly decorative in Express 4/5 since <code>res.json()</code> accepts <code>any</code>. Leave as <code>{}</code> or <code>unknown</code> unless you're generating API docs from types.</li>
    <li><strong>ReqBody</strong> — the shape of <code>req.body</code>. This is the one you use constantly: <code>Request&lt;{}, {}, CreateUserBody&gt;</code> gives you a typed <code>req.body</code>.</li>
    <li><strong>ReqQuery</strong> — the shape of <code>req.query</code>. For <code>/users?page=2&amp;role=admin</code>: <code>{ page?: string; role?: string }</code>. All query values are always strings or string arrays — model them that way.</li>
  </ul>
  <p>In practice you'll most often type slots 1, 3, and 4. Slot 2 (ResBody) is rarely worth the effort in standard Express apps.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">06</span><span class="ch-head">Sharing types between backend and frontend</span></div>
  <div class="prose"><p>One of the biggest wins of using TypeScript on both the backend (Node/Express) and frontend (React/Vue) is that you can share the same type definitions — define once, use everywhere. If the API's response shape changes, TypeScript catches every place in the frontend that consumed the old shape.</p>
  <p>The two main approaches are: a <strong>shared types package</strong> in a monorepo, or <strong>exporting Zod-inferred types</strong> directly from the schemas you already have.</p></div>
  <ol class="steps">
    <li><strong>Approach 1 — shared package in a monorepo:</strong> create a <code>packages/types/</code> folder at the root of your repo. Define all API request/response interfaces there. Both <code>apps/api</code> and <code>apps/web</code> import from it. Use npm workspaces or pnpm workspaces to link the package locally.</li>
    <li><strong>Approach 2 — export Zod inferred types from the backend:</strong> since you already defined Zod schemas for validation, use <code>z.infer</code> to export the inferred TypeScript types from those schemas. The frontend imports and uses them. The schema is the single source of truth — change it once, types update everywhere.</li>
    <li>In either approach, avoid putting database-model types (Mongoose documents, Prisma models) in shared types — they contain backend-only fields. Create separate "API response" interfaces that represent what the API actually returns.</li>
    <li>For REST APIs in a monorepo, tools like <strong>tRPC</strong> take this further — they share the entire API contract (routes + types) between backend and frontend, so the frontend can call backend functions with full type safety and autocomplete, no manual types needed.</li>
  </ol>
</div>`,

      };
    }
  }
}

// This export is needed to make TypeScript treat this as a module

      extraCodes:[{code:`// src/routes/users.ts — Express routes with full TypeScript typing
import { Router, Request, Response, NextFunction } from 'express';
import { z } from 'zod';

const router = Router();

// ── Define request body shapes with Zod + infer TS types ─────
const createUserSchema = z.object({
  name: z.string().min(1).max(100),
  email: z.string().email(),
  password: z.string().min(8),
});

// Infer the TypeScript type from the Zod schema — stays in sync automatically
type CreateUserBody = z.infer<typeof createUserSchema>;

// ── Typed route handler ───────────────────────────────────────
// Request<Params, ResBody, ReqBody, QueryString>
router.post(
  '/',
  async (
    req: Request<{}, {}, CreateUserBody>, // req.body is now typed as CreateUserBody
    res: Response,
    next: NextFunction
  ) => {
    try {
      const { name, email, password } = req.body; // TypeScript knows these fields exist
      // TypeScript error if you typo: req.body.naem — catches bugs at compile time
      res.status(201).json({ name, email });
    } catch (err) {
      next(err);
    }
  }
);

// ── Using req.user (typed by our declaration merging) ─────────
router.get('/me', (req: Request, res: Response) => {
  if (!req.user) {
    return res.status(401).json({ error: 'Not authenticated' });
  }
  // TypeScript knows req.user has id, email, and role
  res.json({ id: req.user.id, email: req.user.email, role: req.user.role });
});

export default router;`, file:'src/routes/users.ts', lang:'typescript'},
        {code:`// ── All four Request generics in one file ─────────────────────
// Route: GET /users/:id/posts?page=2&status=published

import { Router, Request, Response, NextFunction } from 'express';
import { z } from 'zod';

const router = Router();

// ── Define shapes for each generic slot ──────────────────────

// Slot 1 — Params (req.params): path segments are always strings
interface UserPostsParams {
  id: string;                         // :id in the URL — still a string, parse it
}

// Slot 3 — ReqBody (req.body): for POST/PATCH payloads
const createPostSchema = z.object({
  title:  z.string().min(1).max(200),
  body:   z.string().min(1),
  status: z.enum(['draft', 'published']).default('draft'),
});
type CreatePostBody = z.infer<typeof createPostSchema>;

// Slot 4 — ReqQuery (req.query): query string values are ALWAYS strings or string[]
interface PostsQuery {
  page?:   string;                    // ?page=2   → "2", not 2
  limit?:  string;
  status?: 'draft' | 'published';
}

// ── Slot 2 (ResBody) is usually left as {} — type the return in res.json() if needed

// GET /users/:id/posts?page=2&status=published
router.get(
  '/:id/posts',
  async (
    req: Request<UserPostsParams, {}, {}, PostsQuery>,
    res: Response,
    next: NextFunction
  ) => {
    const userId = parseInt(req.params.id, 10);       // params are strings — convert
    const page   = parseInt(req.query.page  || '1', 10); // query strings — convert
    const limit  = parseInt(req.query.limit || '10', 10);
    const status = req.query.status;                  // typed as 'draft'|'published'|undefined

    // TypeScript now gives you autocomplete and errors on all four objects:
    // req.params.id       ✓  req.params.userId     ✗ (doesn't exist)
    // req.query.page      ✓  req.query.pageNumber  ✗ (not in the interface)

    res.json({ userId, page, limit, status, posts: [] });
  }
);

// POST /users/:id/posts — typed body
router.post(
  '/:id/posts',
  async (
    req: Request<UserPostsParams, {}, CreatePostBody>,
    res: Response,
    next: NextFunction
  ) => {
    // Validate at runtime with Zod, then TypeScript knows req.body is safe
    const result = createPostSchema.safeParse(req.body);
    if (!result.success) return res.status(400).json({ errors: result.error.errors });

    const { title, body, status } = result.data;      // typed AND runtime-validated
    // create post in DB...
    res.status(201).json({ title, body, status });
  }
);

export default router;

// packages/types/src/index.ts — shared types package (monorepo approach)
// Both the Express API and the React frontend import from here.

  email:     string;

}

export interface ApiPost {
  id:       number;
  title:    string;
  body:     string;
  status:   'draft' | 'published';
  authorId: number;
}

export interface PaginatedResponse<T> {
  data:       T[];
  pagination: {
    total:      number;
    page:       number;
    limit:      number;
    totalPages: number;
  };
}

// Backend uses it:  res.json<PaginatedResponse<ApiUser>>({ data: users, pagination })
// Frontend uses it: const result: PaginatedResponse<ApiUser> = await fetch('/api/users').then(r => r.json())

    <p class="mistake-why">The <code>dist/</code> folder is generated output. Add it to <code>.gitignore</code> and compile it during your deploy process, not manually before committing.</p>
  </div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">09</span><span class="ch-head">Quick recap</span></div>
  <div class="box box-ok">
    <div class="box-body"><ul class="recap-list">
      <li>TypeScript types are compile-time only — always pair them with Zod for runtime validation.</li>
      <li>Use declaration merging in a <code>.d.ts</code> file to add custom properties (like <code>req.user</code>) to Express's <code>Request</code> type.</li>
      <li><code>Request&lt;Params, ResBody, ReqBody, ReqQuery&gt;</code> — type slots 1 (params), 3 (body), and 4 (query) in practice. All params and query values are always <em>strings</em> at runtime.</li>
      <li>Infer TypeScript types from Zod schemas with <code>z.infer&lt;typeof schema&gt;</code> — they stay in sync automatically.</li>
      <li>Share types between backend and frontend via a shared package or by exporting Zod-inferred types. Define API response interfaces separately from database model types.</li>
      <li>Always enable <code>"strict": true</code> in <code>tsconfig.json</code> — it catches the most bugs.</li>
      <li>Add <code>dist/</code> to <code>.gitignore</code> and compile during deployment, not before commits.</li>
    </ul></div>
  </div>
</div>
<div class="wnext"><div class="wnext-lbl">What's next</div>TypeScript keeps your code clean inside individual files. <strong>MVC architecture</strong> is how you organise your project at a higher level — splitting code into Models, Controllers, and Routes so each file has one clear responsibility and the project stays manageable as it grows.</div>`,

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p>MVC stands for Model-View-Controller. In an API context (where there's no HTML view), it's really MC: <strong>Models</strong> define your data structures and database interaction. <strong>Controllers</strong> contain your business logic — they receive a request, call models, and send a response. <strong>Routes</strong> map URLs to controllers. Each layer has exactly one job.</p>
  <p>The "View" in a traditional MVC is replaced by your JSON responses in an API — some people call this pattern "MCR" (Model-Controller-Router) for APIs, but most just say MVC.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>When everything is in one file, every change is risky — you don't know what else you might break. MVC gives each piece of code a home. Adding a new field to a response? Touch only the controller. Changing a database query? Touch only the model. Adding a new route? Touch only the routes file.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">MVC is a restaurant kitchen. The <strong>Model</strong> is the pantry and the recipes — it knows where the ingredients are and how to combine them. The <strong>Controller</strong> is the chef — they receive an order (request), go to the pantry, cook the meal, and plate it. The <strong>Route</strong> is the waiter — they take the order from the customer and hand it to the right chef. The customer never talks to the pantry directly.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Create a <code>models/</code> folder. Each file exports a Mongoose model (or Prisma model). No business logic here — just data shape and database queries.</li>
    <li>Create a <code>controllers/</code> folder. Each file imports a model and exports handler functions. Business logic lives here: validation fallback, authorization checks, data transformation.</li>
    <li>Create a <code>routes/</code> folder. Each file creates an Express router, imports controller functions, and maps HTTP method + path to each controller.</li>
    <li>In <code>server.js</code> (or <code>app.js</code>), import route files and mount them with <code>app.use('/prefix', router)</code>.</li>
    <li>Controllers never <code>require()</code> other controllers. Models never <code>require()</code> controllers. The dependency flow is one-way: Routes → Controllers → Models.</li>
  </ol>
</div>`,

// Controllers receive (req, res, next), call models, and send responses

const { User } = require('../models/User');
const { NotFoundError, ConflictError } = require('../errors/AppError');

// GET /users — list all users with pagination
async function getAllUsers(req, res) {
  const page = parseInt(req.query.page, 10) || 1;   // default to page 1
  const limit = parseInt(req.query.limit, 10) || 20; // default 20 per page
  const skip = (page - 1) * limit;                  // how many records to skip

  const [users, total] = await Promise.all([         // run both queries in parallel
    User.find().select('-passwordHash').skip(skip).limit(limit),
    User.countDocuments(),                           // total count for pagination metadata
  ]);

  res.json({
    users,
    pagination: {
      page,
      limit,
      total,
      pages: Math.ceil(total / limit),               // total number of pages
    },
  });
}

// GET /users/:id — get one user
async function getUserById(req, res) {
  const user = await User.findById(req.params.id).select('-passwordHash');

  if (!user) throw new NotFoundError('User');        // Express 5: thrown errors reach error handler

  res.json(user);
}

// PATCH /users/:id — partial update
async function updateUser(req, res) {
  // Only allow updating name and email — never let users update their role via this endpoint
  const allowedFields = { name: req.body.name, email: req.body.email };

  // Remove undefined fields so we don't accidentally unset them
  Object.keys(allowedFields).forEach(key => {
    if (allowedFields[key] === undefined) delete allowedFields[key];
  });

  const user = await User.findByIdAndUpdate(
    req.params.id,
    allowedFields,
    { new: true, runValidators: true }               // return updated doc, run schema validators
  ).select('-passwordHash');

  if (!user) throw new NotFoundError('User');

  res.json(user);
}

// DELETE /users/:id — remove a user
async function deleteUser(req, res) {
  const user = await User.findByIdAndDelete(req.params.id);
  if (!user) throw new NotFoundError('User');
  res.status(204).send();
}

module.exports = { getAllUsers, getUserById, updateUser, deleteUser };`,

    {
      id:'dependency-injection', group:'Phase 3 — Scaling & Architecture', icon:'layers', title:'Dependency Injection',
      sub:'Keeping code testable and modular by passing dependencies in rather than hardcoding them.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>Dependency Injection (DI)</strong> is a pattern where a module receives its dependencies from the outside rather than creating or importing them directly. Instead of a controller calling <code>require('../models/User')</code> internally, the User model is passed into the controller as a parameter.</p>
  <p>In JavaScript/Node, DI is usually done without a framework — just functions and closures. A controller factory function accepts its dependencies and returns the handler functions. You call it once with the real dependencies in production, and once with mock dependencies in tests.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>When a controller hardcodes <code>require('../models/User')</code>, unit testing it requires a real MongoDB connection — slow, brittle, and hard to isolate. With DI, you pass in a fake User model in tests and a real one in production. The controller doesn't care which it gets.</p>
  <p>DI also makes dependencies explicit. Reading a controller's factory signature tells you exactly what it needs to work — no hidden imports to trace.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">A coffee machine with a built-in grinder only works with one coffee source — if you want to test it, you need real beans. <strong>Dependency injection is making the machine accept pre-ground coffee through a slot</strong>. In production you feed it real ground beans. In your kitchen tests, you feed it sawdust. The machine runs the same either way — you've decoupled what it does from where the input comes from.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How to implement it in Node.js</span></div>
  <ol class="steps">
    <li>Instead of exporting handler functions directly, export a <strong>factory function</strong> that accepts dependencies and returns the handlers.</li>
    <li>In your route file, call the factory with the real dependencies: <code>const controller = makeUserController({ User, emailService })</code>.</li>
    <li>In your tests, call the factory with mock objects: <code>const controller = makeUserController({ User: mockUser, emailService: mockEmail })</code>.</li>
    <li>The controller function never calls <code>require()</code> for its core dependencies — they all come in through the factory parameter.</li>
    <li>For service-layer DI at scale, tools like <code>awilix</code> automate registration and resolution — but for most Express apps, plain factory functions are enough.</li>
  </ol>
</div>`,

        {type:'nd',title:'DI vs just importing — what changes?',body:`<p><strong>Without DI (hardcoded import):</strong></p><ul><li><code>const User = require('../models/User')</code> inside the controller</li><li>To test: need a real DB connection</li><li>To swap the model: edit the controller file</li></ul><p><strong>With DI (factory function):</strong></p><ul><li><code>module.exports = function makeUserController({ User }) { ... }</code></li><li>To test: pass a mock User object — no DB needed</li><li>To swap the model: pass a different object to the factory — controller unchanged</li></ul>`},

  }

}

module.exports = makeUserController;`,

    {
      id:'swagger', group:'Phase 3 — Scaling & Architecture', icon:'list2', title:'API Docs — Swagger & OpenAPI',
      sub:'Auto-generating interactive API documentation with swagger-jsdoc and swagger-ui-express.',
      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>OpenAPI</strong> (formerly Swagger) is a standard format for describing REST APIs in JSON or YAML — endpoints, HTTP methods, request parameters, request bodies, responses, and authentication. When your API has an OpenAPI specification, tools can automatically generate:</p>
  <ul>
    <li>An interactive UI where developers can explore and test every endpoint</li>
    <li>Client SDKs in any language</li>
    <li>Automated API testing and mocking</li>
  </ul>
  <p><strong>swagger-jsdoc</strong> generates an OpenAPI spec from JSDoc comments in your code. <strong>swagger-ui-express</strong> serves that spec as an interactive web UI at a URL like <code>/api-docs</code>.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>Without documentation, every new developer has to read source code to understand what your API does. With an OpenAPI spec, they visit <code>/api-docs</code>, see every endpoint, and can test them with real requests directly in the browser — no Postman needed. It also forces you to think through your API design before writing code.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text">Your API without documentation is like a restaurant with no menu — diners have to shout into the kitchen asking what's available. <strong>An OpenAPI spec is the menu</strong>: every dish (endpoint), its ingredients (parameters), and what it comes with (response shape) — all in one place, readable by both humans and machines.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works</span></div>
  <ol class="steps">
    <li>Install: <code>npm install swagger-jsdoc swagger-ui-express</code></li>
    <li>Create a <code>config/swagger.js</code> file that defines your API metadata (title, version, server URL) and tells swagger-jsdoc where to find your annotated route files.</li>
    <li>Annotate each route with a <code>@openapi</code> or <code>@swagger</code> JSDoc comment that describes the endpoint — method, path, parameters, request body, and possible responses.</li>
    <li>In <code>app.js</code>, call <code>swaggerJsdoc()</code> with your config to generate the spec object, then serve the UI: <code>app.use('/api-docs', swaggerUi.serve, swaggerUi.setup(spec))</code>.</li>
    <li>Visit <code>http://localhost:3000/api-docs</code> in your browser. Every annotated endpoint appears with "Try it out" buttons.</li>
  </ol>
</div>`,

      content:`
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">01</span><span class="ch-head">What is it?</span></div>
  <div class="prose"><p><strong>WebSockets</strong> are persistent two-way connections between client and server. Unlike HTTP (client asks, server responds, connection closes), a WebSocket stays open — the server can push data to the client at any time. Socket.io wraps WebSockets with a friendlier API and fallbacks for older browsers.</p>
  <p><strong>Redis</strong> is an in-memory key-value store used as a cache. Instead of hitting your database for the same data on every request, you store the result in Redis for a few seconds — subsequent requests get it instantly.</p>
  <p><strong>Structured logging</strong> with <code>winston</code> means every log line is a JSON object with consistent fields — timestamp, level, message, request ID, user ID. Unlike <code>console.log</code>, these logs can be ingested, queried, and alerted on by log aggregation tools like Datadog, Logtail, or CloudWatch.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">02</span><span class="ch-head">Why does it matter?</span></div>
  <div class="prose"><p>HTTP polling ("ask the server every 5 seconds if anything changed") is wasteful and laggy. WebSockets enable chat apps, live dashboards, collaborative editing, and real-time notifications that feel instant. Redis cuts database load dramatically — a cached query that returns in 1ms instead of 200ms makes the difference between an app that scales and one that collapses under load.</p>
  <p>In production, <code>console.log</code> output is noise — a wall of text with no structure. Structured JSON logs let you query: "show me all 500 errors in the last hour from the /payments route for user ID 42." That query is impossible on plain-text logs and trivial on structured ones.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">03</span><span class="ch-head">The analogy</span></div>
  <div class="analogy"><p class="analogy-text"><strong>HTTP is a letter service</strong>: you send a letter, wait for a reply, the exchange is over. <strong>WebSocket is a phone call</strong>: both sides can talk at any time, the line stays open until one side hangs up. <strong>Redis is a whiteboard by the phone</strong>: when the last caller asked "what's the weather?", you wrote the answer on the board. When the next caller asks the same thing, you read the board — instant answer. <strong>Structured logging is swapping sticky notes for a searchable spreadsheet</strong>: instead of "something failed around 3pm", you have exact timestamps, routes, user IDs, and stack traces, all queryable.</p></div>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">04</span><span class="ch-head">How it works (Socket.io)</span></div>
  <ol class="steps">
    <li>Install: <code>npm install socket.io</code>. Attach it to your HTTP server (not directly to Express).</li>
    <li>Clients connect using the Socket.io client library. Each connection gets a unique <code>socket.id</code>.</li>
    <li>Use <code>socket.emit('event', data)</code> to send to one client, <code>io.emit()</code> to broadcast to all, or <code>socket.to(roomId).emit()</code> to send to a room.</li>
    <li>Clients listen with <code>socket.on('event', handler)</code>. The server does the same to receive messages from clients.</li>
    <li>Rooms are named groups of sockets — useful for chat rooms, game sessions, user-specific channels.</li>
  </ol>
</div>
<div class="ch-part">
  <div class="ch-label"><span class="ch-num">05</span><span class="ch-head">Structured logging with Winston + Morgan</span></div>
  <div class="prose"><p><strong>Winston</strong> is a multi-transport logging library. A "transport" is a destination for log output — console, a file, a remote logging service. You configure a Winston logger once, then call <code>logger.info()</code>, <code>logger.warn()</code>, and <code>logger.error()</code> throughout your app instead of <code>console.log</code>.</p>
  <p><strong>Morgan</strong> is HTTP request logging middleware for Express. In development, you use its colorized <code>'dev'</code> format. In production, you pipe its output through your Winston logger as structured JSON — every incoming request becomes a log entry with method, URL, status code, response time, and any custom fields you add.</p></div>
  <ol class="steps">
    <li>Install: <code>npm install winston morgan</code>.</li>
    <li>Create <code>utils/logger.js</code> — configure Winston with two transports: a console transport (human-readable in dev, JSON in production) and optionally a file transport for errors.</li>
    <li>In development, use Winston's <code>colorize()</code> and <code>simple()</code> formatters. In production, use <code>json()</code> so each log line is a parseable JSON object.</li>
    <li>Create a Morgan middleware that feeds each HTTP log entry into Winston: <code>morgan('combined', { stream: { write: msg => logger.http(msg.trim()) } })</code>.</li>
    <li>Replace every <code>console.log</code> in your codebase with <code>logger.info()</code>, <code>console.error</code> with <code>logger.error()</code>. Pass structured context as a second argument: <code>logger.error('DB query failed', { route: req.path, userId: req.user?.id, err: err.message })</code>.</li>
  </ol>
</div>`,

      code:`// realtime/chat.js — Socket.io chat room example
// Install: npm install socket.io
// Attach to your HTTP server, not directly to Express

const { Server } = require('socket.io');   // Socket.io server class
const http = require('http');
const express = require('express');

const app = express();
const server = http.createServer(app);     // create the raw HTTP server

// Attach Socket.io to the HTTP server
// cors: allow your frontend's origin in production
const io = new Server(server, {
  cors: { origin: process.env.FRONTEND_URL || 'http://localhost:5173' },
});

// A Map to track which username owns each socket ID
const users = new Map();                   // socketId → username

// 'connection' fires every time a new client connects
io.on('connection', (socket) => {
  console.log('New connection:', socket.id);

  // Client sends 'join' with their username and a room name
  socket.on('join', ({ username, room }) => {
    socket.join(room);                     // add this socket to the named room
    users.set(socket.id, username);        // remember who this socket belongs to

    // Notify everyone in the room that someone joined (excluding the joiner)
    socket.to(room).emit('system', \`\${username} joined the room\`);
  });

  // Client sends a chat message
  socket.on('message', ({ room, text }) => {
    const username = users.get(socket.id); // look up who sent it

    // Broadcast to everyone in the room INCLUDING the sender
    io.to(room).emit('message', {
      username,
      text,
      timestamp: new Date().toISOString(),
    });
  });

  // 'disconnect' fires when the connection drops
  socket.on('disconnect', () => {
    const username = users.get(socket.id);
    users.delete(socket.id);              // clean up
    console.log(\`\${username || socket.id} disconnected\`);
  });
});

const PORT = process.env.PORT || 3000;
server.listen(PORT, () => console.log(\`Server + WebSocket on port \${PORT}\`));`,
