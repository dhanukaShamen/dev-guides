<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next.js 16 — Complete Beginner's Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        :root {
            --bg: #07090f;
            --surf: #0c1018;
            --surf2: #111820;
            --surf3: #17202e;
            --border: rgba(0,180,216,0.18);
            --border2: rgba(0,180,216,0.10);
            --text: #d0f0ff;
            --text2: #6db8d0;
            --text3: #2d5a6e;
            --accent: #06b6d4;
            --accent-dim: rgba(6,182,212,0.12);
            --nxt: #06b6d4;
            --nxt-bg: rgba(6,182,212,0.10);
            --nxt-border: rgba(6,182,212,0.30);
            --tip: #34d399;
            --tip-bg: rgba(52,211,153,0.08);
            --tip-border: rgba(52,211,153,0.25);
            --warn: #f59e0b;
            --warn-bg: rgba(245,158,11,0.08);
            --warn-border: rgba(245,158,11,0.25);
            --new: #a78bfa;
            --new-bg: rgba(167,139,250,0.09);
            --new-border: rgba(167,139,250,0.28);
            --red: #f87171;
            --ok: #34d399;
            --ok-bg: rgba(52,211,153,0.08);
            --ok-border: rgba(52,211,153,0.25);
            --vercel: #ffffff;
            --react: #61dafb;
            --react-bg: rgba(97,218,251,0.08);
            --sidebar-w: 278px;
            --hdr: 58px;
            --radius: 10px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow:hidden;height:100vh;}

        /* HEADER */
        .hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:rgba(7,9,15,0.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:200;}
        .hdr-left{display:flex;align-items:center;gap:10px;}
        .logo{font-size:15px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
        .logo span{color:var(--accent);}
        .pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
        .pill-nxt{background:var(--nxt-bg);color:var(--nxt);border:1px solid var(--nxt-border);}
        .pill-new{background:var(--new-bg);color:var(--new);border:1px solid var(--new-border);}
        .pill-react{background:var(--react-bg);color:var(--react);border:1px solid rgba(97,218,251,0.25);}
        .hdr-search{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:260px;}
        .hdr-search svg{flex-shrink:0;color:var(--text3);}
        .hdr-search input{background:none;border:none;color:var(--text);font-family:'Geist',sans-serif;font-size:13px;width:100%;outline:none;}
        .hdr-search input::placeholder{color:var(--text3);}
        .hdr-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text2);}
        .prog-bar{width:100px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden;}
        .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--new));border-radius:2px;transition:width .4s ease;}
        .home-link-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;color:#6db8d0;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;}
        .home-link-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);}
        .hdr-search-row{display:none;width:100%;padding:0 14px 10px;box-sizing:border-box;}

        /* LAYOUT */
        .layout{display:flex;margin-top:var(--hdr);height:calc(100vh - var(--hdr));}

        /* SIDEBAR */
        .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;overflow-y:auto;background:var(--surf);border-right:1px solid var(--border);padding:12px 0 80px;}
        .sidebar::-webkit-scrollbar{width:3px;}
        .sidebar::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px;}
        .sg-label{padding:14px 18px 5px;font-size:9.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);}
        .si{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;font-size:12.5px;color:var(--text2);border-left:2px solid transparent;transition:all .12s ease;user-select:none;}
        .si:hover{background:var(--surf2);color:var(--text);}
        .si.active{background:rgba(6,182,212,0.07);color:var(--accent);border-left-color:var(--accent);}
        .si .sn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);}
        .si svg{flex-shrink:0;opacity:.7;}
        .si.active svg{opacity:1;}

        /* CONTENT */
        .content{flex:1;overflow-y:auto;padding:44px 56px 80px;}
        .content::-webkit-scrollbar{width:5px;}
        .content::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px;}

        /* SECTION */
        .sec{display:none;animation:fadeUp .28s ease;}
        .sec.vis{display:block;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .sec-crumb{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
        .sec-crumb span{color:var(--text2);}
        .sec-title{font-size:30px;font-weight:800;letter-spacing:-0.8px;line-height:1.15;margin-bottom:14px;background:linear-gradient(130deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .sec-sub{font-size:15px;color:var(--text2);line-height:1.7;max-width:660px;margin-bottom:28px;}
        .divider{border:none;border-top:1px solid var(--border2);margin:28px 0;}

        /* PROSE */
        .prose{font-size:14px;color:var(--text2);line-height:1.8;}
        .prose p{margin-bottom:14px;}
        .prose p:last-child{margin-bottom:0;}
        .prose strong{color:var(--text);font-weight:600;}
        .prose code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--surf3);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:var(--accent);}
        .prose ul{padding-left:0;list-style:none;}
        .prose ul li{padding:4px 0 4px 18px;position:relative;font-size:14px;color:var(--text2);}
        .prose ul li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700;}
        .prose h3{font-size:17px;font-weight:700;color:var(--text);margin:24px 0 10px;}
        .prose h4{font-size:14px;font-weight:700;color:var(--text);margin:18px 0 8px;}

        /* CODE BLOCK */
        .cb{background:#070a12;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:20px 0;}
        .cb-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--border);}
        .cb-fname{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:7px;}
        .cb-lang{font-size:10px;color:var(--text3);background:var(--surf3);padding:2px 7px;border-radius:4px;}
        .cb-copy{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);padding:2px 9px;border-radius:4px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s;}
        .cb-copy:hover{color:var(--text);border-color:var(--text3);}
        .cb pre[class*="language-"]{margin:0;padding:18px 20px;background:transparent !important;font-family:'JetBrains Mono',monospace !important;font-size:13px !important;line-height:1.72;overflow-x:auto;}

        /* INFO BOXES */
        .box{border-radius:var(--radius);padding:18px 22px;margin:18px 0;border-left:3px solid;}
        .box-hdr{display:flex;align-items:center;gap:9px;font-weight:700;font-size:12px;margin-bottom:10px;letter-spacing:0.3px;font-family:'Geist',sans-serif;}
        .box-hdr svg{flex-shrink:0;}
        .box-body{font-size:13.5px;line-height:1.72;color:var(--text2);}
        .box-body code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px;}
        .box-body p{margin-bottom:7px;} .box-body p:last-child{margin-bottom:0;}
        .box-body ul{list-style:none;padding:0;} .box-body ul li{padding:3px 0 3px 15px;position:relative;}
        .box-body ul li::before{content:'›';position:absolute;left:0;font-weight:700;}
        .box-nxt{background:var(--nxt-bg);border-color:var(--nxt);} .box-nxt .box-hdr{color:var(--nxt);} .box-nxt .box-body ul li::before{color:var(--nxt);}
        .box-tip{background:var(--tip-bg);border-color:var(--tip);} .box-tip .box-hdr{color:var(--tip);} .box-tip .box-body ul li::before{color:var(--tip);}
        .box-warn{background:var(--warn-bg);border-color:var(--warn);} .box-warn .box-hdr{color:var(--warn);} .box-warn .box-body ul li::before{color:var(--warn);}
        .box-new{background:var(--new-bg);border-color:var(--new);} .box-new .box-hdr{color:var(--new);} .box-new .box-body ul li::before{color:var(--new);}
        .box-ok{background:var(--ok-bg);border-color:var(--ok);} .box-ok .box-hdr{color:var(--ok);} .box-ok .box-body ul li::before{color:var(--ok);}

        /* GRID */
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:18px 0;}
        .card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
        .card-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
        .card-b{font-size:12.5px;color:var(--text2);line-height:1.6;}
        .card-b code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf3);padding:1px 5px;border-radius:3px;color:var(--accent);}
        .card-icon{font-size:22px;margin-bottom:8px;}
        .card-ico-wrap{width:32px;height:32px;border-radius:8px;background:var(--accent-dim);border:1px solid var(--nxt-border);display:flex;align-items:center;justify-content:center;margin-bottom:10px;color:var(--accent);}

        /* TABLE */
        .tbl-wrap{overflow-x:auto;margin:18px 0;}
        table{width:100%;border-collapse:collapse;font-size:13px;}
        th{background:var(--surf2);color:var(--text);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);}
        td{padding:10px 14px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:top;}
        td code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf2);padding:1px 5px;border-radius:3px;color:var(--accent);}
        tr:last-child td{border-bottom:none;}
        .badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;font-family:'JetBrains Mono',monospace;}
        .badge-nxt{background:var(--nxt-bg);color:var(--nxt);}
        .badge-new{background:var(--new-bg);color:var(--new);}
        .badge-warn{background:var(--warn-bg);color:var(--warn);}
        .badge-ok{background:var(--ok-bg);color:var(--ok);}

        /* NAV BTNS */
        .nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:44px;padding-top:28px;border-top:1px solid var(--border2);}
        .nav-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Geist',sans-serif;transition:all .18s;max-width:48%;overflow:hidden;}
        .nav-btn .nav-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .nav-btn:hover{background:var(--surf2);color:var(--text);border-color:var(--accent);}
        .nav-btn.next{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;margin-left:auto;}
        .nav-btn.next:hover{background:#22d3ee;}

        /* COMPARE */
        .cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
        .cmp > div{min-width:0;overflow:hidden;}
        .cmp-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border-radius:6px 6px 0 0;}
        .lbl-bad{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);border-bottom:none;}
        .lbl-good{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border);border-bottom:none;}
        .lbl-before{background:rgba(245,158,11,0.1);color:var(--warn);border:1px solid var(--warn-border);border-bottom:none;}
        .lbl-after{background:var(--nxt-bg);color:var(--nxt);border:1px solid var(--nxt-border);border-bottom:none;}

        /* STEP LIST */
        .steps{counter-reset:step;margin:18px 0;}
        .step{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start;}
        .step-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(6,182,212,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0;margin-top:2px;}
        .step-content{flex:1;}
        .step-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
        .step-desc{font-size:13px;color:var(--text2);line-height:1.7;}
        .step-desc code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf3);padding:1px 5px;border-radius:3px;color:var(--accent);}

        /* CONCEPT PILL */
        .concept-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
        .concept-pill{padding:4px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;}

        /* HIGHLIGHT ROW */
        .hl-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surf2);border-radius:8px;margin:6px 0;font-size:13px;color:var(--text2);}
        .hl-row strong{color:var(--text);}
        .hl-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

        /* FILETREE */
        .filetree{background:#070a12;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.9;margin:18px 0;overflow-x:auto;}
        .ft-row{display:flex;align-items:baseline;white-space:nowrap;min-width:0;}
        .ft-i{flex-shrink:0;color:var(--text3);}
        .ft-comment{flex-shrink:0;margin-left:10px;}
        .ft-dir{color:var(--text2);}
        .ft-tsx{color:var(--accent);}
        .ft-ts{color:#a78bfa;}
        .ft-json{color:var(--warn);}
        .ft-css{color:#f472b6;}
        .ft-other{color:var(--text3);}
        .ft-i{color:var(--text3);white-space:pre;flex-shrink:0;}

        /* MENTAL SHIFT BOX */
        .mental-shift{background:linear-gradient(135deg,rgba(6,182,212,0.06),rgba(167,139,250,0.04));border:1px solid rgba(6,182,212,0.22);border-radius:14px;padding:26px 30px;margin:24px 0;}
        .mental-shift h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
        .mental-shift-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;}
        .ms-side{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
        .ms-side-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
        .ms-side ul{list-style:none;padding:0;}
        .ms-side ul li{font-size:12px;color:var(--text2);padding:2px 0 2px 14px;position:relative;}
        .ms-side ul li::before{content:'›';position:absolute;left:0;font-weight:700;}
        .ms-arrow{font-size:24px;color:var(--accent);text-align:center;}
        .ms-old .ms-side-label{color:var(--warn);}
        .ms-old ul li::before{color:var(--warn);}
        .ms-new .ms-side-label{color:var(--tip);}
        .ms-new ul li::before{color:var(--tip);}

        /* DECISION TREE */
        .dtree{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin:20px 0;}
        .dtree-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;}
        .dtree-q{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
        .dtree-q svg{color:var(--accent);flex-shrink:0;}
        .dtree-branch{display:flex;gap:12px;margin-top:10px;}
        .dtree-opt{flex:1;border-radius:8px;padding:10px 14px;font-size:12px;border:1px solid;}
        .dtree-opt-yes{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
        .dtree-opt-no{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn);}
        .dtree-opt strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}

        /* SEARCH DROPDOWN */
        .srch-drop{position:fixed;width:320px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.65);z-index:300;display:none;overflow:hidden;}
        .srch-drop.vis{display:block;}
        .srch-item{padding:10px 15px;cursor:pointer;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border2);transition:background .1s;}
        .srch-item:last-child{border-bottom:none;}
        .srch-item:hover,.srch-item.sel{background:var(--surf2);color:var(--text);}
        .srch-item .sg{font-size:9.5px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px;letter-spacing:.5px;}
        .srch-empty{padding:18px 15px;font-size:12.5px;color:var(--text3);text-align:center;}

        /* PRISM TOKEN OVERRIDES */
        .token.keyword{color:#c792ea;}.token.string{color:#c3e88d;}.token.comment{color:#546e7a;font-style:italic;}
        .token.number{color:#f78c6c;}.token.boolean{color:#f78c6c;}.token.function{color:#82aaff;}
        .token.class-name{color:#ffcb6b;}.token.operator{color:#89ddff;}.token.punctuation{color:#89ddff;}

        /* HAMBURGER */
        .menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surf);cursor:pointer;color:var(--text2);transition:background .15s,color .15s;flex-shrink:0;}
        .menu-btn:hover{background:var(--surf2);color:var(--text);}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:149;}
        .sidebar-overlay.vis{display:block;}

        @media(max-width:800px){
            :root{--hdr:100px;}
            .hdr{flex-wrap:wrap;align-items:center;height:auto;min-height:58px;padding:0 14px 0;}
            .menu-btn{display:flex;}
            .hdr-search-wrap{display:none;}
            .hdr-search{display:none;}
            .hdr-search-row .hdr-search{display:flex;}
            .pill-nxt{display:none;}
            .pill-new{display:none;}
            .hdr-left{flex:1;min-width:0;flex-shrink:1;padding:10px 0;}
            .logo{white-space:nowrap;}
            .hdr-right{padding:10px 0;gap:8px;flex-shrink:0;}
            .hdr-search-row{display:flex;}
            .sidebar{position:fixed;top:var(--hdr);left:0;bottom:0;height:calc(100vh - var(--hdr));z-index:150;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.5);overflow-y:auto;padding-bottom:80px;}
            .sidebar.open{transform:translateX(0);}
            .content{padding:28px 18px 80px;}
            .g2,.g3,.cmp{grid-template-columns:1fr;}
            .nav-row{flex-direction:column;gap:8px;}
            .nav-btn{max-width:100%;width:100%;justify-content:center;font-size:12px;padding:10px 14px;}
            .nav-btn.next{margin-left:0;}
            .mental-shift-grid{grid-template-columns:1fr;}
            .ms-arrow{display:none;}
        }

        /* FAB */
        .fab-wrap{position:fixed;bottom:88px;right:16px;z-index:9999;touch-action:none;user-select:none;}

        {
            id:'welcome', group:'Phase 1 — Foundations', icon:'rocket', title:'Welcome to Next.js 16',
            sub:'What Next.js is, why it exists, how it bridges React and backend development, and what you need to get started.',
            content:`
<div class="prose">
  <p><strong>Next.js</strong> is a full-stack React framework built by Vercel. While React itself is a UI library focused on building components and managing state, Next.js adds everything else you need to build a complete web application — routing, server-side rendering, API endpoints, caching, image optimization, and deployment tooling — all in one opinionated package.</p>
  <p>Think of it this way: React is the <strong>engine</strong>, and Next.js is the entire <strong>car</strong> — steering wheel, brakes, GPS, and all. You can use React without Next.js, but you'll end up building many of these features yourself, or stitching together multiple libraries that may conflict.</p>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — React vs Next.js</div>
  <div class="box-body"><p>Imagine you want to open a restaurant. <strong>React</strong> is like having a brilliant chef — she can cook incredible food, but that's <em>all</em> she does. You still need to find a building, set up tables, hire waiters, design a menu, handle payments, and organise the kitchen. Each of those is a separate decision.</p>
<p style="margin-top:8px;"><strong>Next.js</strong> is the complete restaurant franchise package — it comes with a building, tables, a menu system, a payment process, a marketing plan, and the same great chef already installed. You skip straight to cooking great food.</p>
<p style="margin-top:8px;">This is why most professional teams choose Next.js over plain React: the infrastructure decisions are already made for you, and they are made <em>well</em>.</p></div>
</div>
  <p><strong>Next.js 16</strong>, released alongside <strong>React 19.2</strong>, is one of the most significant releases in the framework's history. It makes Turbopack the stable default bundler, introduces a new Cache Components model with Partial Pre-Rendering (PPR), replaces Middleware with a clearer <code>proxy.ts</code> primitive, and integrates deeply with React 19.2's new APIs including View Transitions and <code>&lt;Activity/&gt;</code>.</p>
</div>
<div class="g3" style="margin-top:22px;">
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div class="card-t">Zero Config</div><div class="card-b">Works out of the box. No Webpack config, no Babel setup. <code>create-next-app</code> gets you to a running app in seconds.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="card-t">Full-Stack</div><div class="card-b">Write database queries, API handlers, and UI components in the same project — even in the same file.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10z"/></svg></div><div class="card-t">Production-Ready</div><div class="card-b">Used by Vercel, TikTok, Twitch, GitHub, and thousands of startups. Built for the real web.</div></div>
</div>
<div class="box box-nxt">
  <div class="box-hdr">${SVG.info} Prerequisites — What You Need to Know First</div>
  <div class="box-body">
    <ul>
      <li><strong>HTML & CSS:</strong> Comfortable with basic structure and styling</li>
      <li><strong>JavaScript:</strong> Functions, arrays, objects, async/await, ES6+ syntax (arrow functions, destructuring, modules)</li>
      <li><strong>React:</strong> Components, props, useState, useEffect — at least beginner level. If you're new to React, spend a week with the official React docs first.</li>
      <li><strong>Node.js:</strong> Installed on your machine (v20.9.0+ required for Next.js 16)</li>
      <li><strong>TypeScript:</strong> Helpful but not required — Next.js works with both JS and TS</li>
    </ul>
  </div>
</div>`,
            boxes:[
                {type:'new',title:'Next.js 16 + React 19.2',body:`<p>Next.js 16 ships with React 19.2 by default. React 19.2 adds View Transitions API integration, the <code>useEffectEvent()</code> hook, and the <code>&lt;Activity/&gt;</code> component for selectively activating or deactivating parts of the UI. Everything in this guide uses the latest stable APIs.</p>`},
                {type:'tip',title:'TypeScript is the Default',body:`<p>When you run <code>create-next-app</code>, TypeScript is selected by default. All examples in this guide use TypeScript. If you prefer JavaScript, simply remove the type annotations — the logic is identical.</p>`},

        {
            id:'what-is-nextjs', group:'Phase 1 — Foundations', icon:'globe', title:'What is Next.js?',
            sub:'Exploring the full-stack React framework — server-side rendering, static generation, and the file-based routing system.',
            content:`
<div class="prose">
  <p>Before Next.js, building a React application meant choosing between two deployment strategies: ship the entire app as a <strong>Single Page Application (SPA)</strong> where React renders everything in the browser, or set up a complex custom server to render React on the server. Neither approach was ideal — SPAs hurt SEO and initial load performance, while custom SSR setups were difficult to maintain.</p>
  <p>Next.js solves this by giving you <strong>multiple rendering strategies</strong> in the same project, letting you choose per page or even per component how data is fetched and when HTML is generated.</p>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> The Mental Shift: SPA vs Server-First</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Old SPA Mindset (CRA / Vite)</div>
      <ul>
        <li>Everything renders in the browser</li>
        <li>One HTML file, JavaScript does the rest</li>
        <li>Data fetched on the client with useEffect</li>
        <li>SEO is an afterthought</li>
        <li>Slow initial paint on large apps</li>
        <li>Frontend and backend are separate projects</li>
      </ul>
    </div>
    <div class="ms-arrow">→</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">Next.js Server-First Mindset</div>
      <ul>
        <li>Components run on the server by default</li>
        <li>HTML is pre-rendered, fast for users & SEO</li>
        <li>Data fetched directly in components (async/await)</li>
        <li>SEO built-in with metadata API</li>
        <li>Instant page loads with streaming</li>
        <li>One project for frontend + backend</li>
      </ul>
    </div>
  </div>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Four Rendering Strategies</div>
  <div class="box-body"><p>Think of a newspaper vs a whiteboard vs a live news ticker:</p>
<ul>
  <li><strong>SSG (Static Generation)</strong> = a <em>printed newspaper</em>. The articles are written and printed at press time (build time). Everyone who picks up a copy gets the exact same pages instantly. Perfect for content that doesn't change often — blogs, docs, marketing sites.</li>
  <li><strong>SSR (Server-Side Rendering)</strong> = a <em>personalised letter</em> printed on-demand. Each time you request a page, the server generates fresh HTML just for you at that moment. Slightly slower but always up-to-date and personalised — dashboards, user profiles, stock prices.</li>
  <li><strong>ISR (Incremental Static Regen)</strong> = a <em>magazine with periodic reprints</em>. Start with a printed copy (fast!), but reprint it every N minutes when content changes. Best of both worlds — e-commerce product pages, news articles.</li>
  <li><strong>CSR (Client-Side Rendering)</strong> = a <em>whiteboard in the room</em>. The page arrives blank and JavaScript draws the content live in the browser. Most flexible for highly interactive pieces — real-time charts, collaborative editors.</li>
</ul></div>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Strategy</th><th>When HTML is Generated</th><th>Best For</th></tr></thead>
    <tbody>
      <tr><td><code>Static Generation (SSG)</code></td><td>At build time</td><td>Blogs, marketing pages, docs</td></tr>
      <tr><td><code>Server-Side Rendering (SSR)</code></td><td>On each request</td><td>Dashboards, user-specific pages</td></tr>
      <tr><td><code>Incremental Static Regen (ISR)</code></td><td>Build time + revalidate</td><td>Product pages, news sites</td></tr>
      <tr><td><code>Client-Side Rendering</code></td><td>In the browser</td><td>Highly interactive widgets</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'tip',title:'One Framework, All Strategies',body:`<p>The revolutionary part of Next.js is that you can mix these rendering strategies in the same app. Your homepage can be fully static, your blog posts ISR, your user dashboard SSR, and a charts component client-side — all in one codebase.</p>`},
                {type:'nxt',title:'File-Based Routing',body:`<p>Next.js uses your file system as your router. Create a file at <code>app/about/page.tsx</code> and your app immediately has an <code>/about</code> route. No route configuration files, no manual imports — just files and folders.</p>`},
            ]
        },

        {
            id:'installation', group:'Phase 1 — Foundations', icon:'settings', title:'Installation & Setup',
            sub:'Using create-next-app, understanding the project structure, next.config.ts, and the difference between dev, build, and start.',
            content:`
<div class="prose">
  <p>The fastest way to start a Next.js project is with the official <code>create-next-app</code> CLI. It scaffolds a complete project with TypeScript, ESLint, Tailwind CSS, and the App Router already configured.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Create a New Project</div><div class="step-desc">Run the following command in your terminal. The CLI will ask you a few questions about TypeScript, ESLint, Tailwind, and src/ directory.</div></div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npx create-next-app@latest my-app
cd my-app
npm run dev</code></pre></div>

<div class="steps">
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Answer the Prompts</div><div class="step-desc">For beginners, the recommended answers: TypeScript → <code>Yes</code>, ESLint → <code>Yes</code>, Tailwind CSS → <code>Yes</code>, src/ directory → <code>No</code>, App Router → <code>Yes</code>, import alias → <code>@/*</code></div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Open in Your Editor</div><div class="step-desc">Open the project in VS Code: <code>code my-app</code>. Install the official Next.js extension and the Tailwind CSS IntelliSense extension for the best experience.</div></div></div>
</div>

<div class="tbl-wrap" style="margin-top:20px;">
  <table>
    <thead><tr><th>Command</th><th>What It Does</th><th>When to Use</th></tr></thead>
    <tbody>
      <tr><td><code>npm run dev</code></td><td>Starts dev server with hot reload</td><td>While you're building</td></tr>
      <tr><td><code>npm run build</code></td><td>Creates an optimized production build</td><td>Before deploying</td></tr>
      <tr><td><code>npm run start</code></td><td>Runs the production build locally</td><td>Testing prod before deploy</td></tr>
      <tr><td><code>npm run lint</code></td><td>Runs ESLint on your code</td><td>Checking code quality</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'nxt',title:'next.config.ts',body:`<p>The <code>next.config.ts</code> file is where you configure Next.js behavior — enabling experimental features, setting image domains, configuring redirects, and customizing the build output. In Next.js 16, you can also opt into the new <strong>Build Adapters API</strong> (alpha) here to create custom adapters that modify the build process for non-standard deployment targets.</p>`},
                {type:'new',title:'React Compiler (Stable in Next.js 16)',body:`<p>Next.js 16 ships with <strong>React Compiler support as stable</strong>. The React Compiler automatically memoizes your components and hooks — the equivalent of manually wrapping everything in <code>useMemo</code>, <code>useCallback</code>, and <code>React.memo</code>. Enable it in <code>next.config.ts</code> with <code>experimental: { reactCompiler: true }</code>. No code changes needed; it works on your existing components automatically.</p>`},
                {type:'tip',title:'Turbopack is Now Stable in Next.js 16',body:`<p>Next.js 16 ships <strong>Turbopack as the stable default bundler</strong> — replacing Webpack for both the dev server and production builds. Built in Rust, Turbopack delivers up to <strong>5–10× faster Fast Refresh</strong> and <strong>2–5× faster production builds</strong>. Additionally, Turbopack File System Caching (beta) makes repeat startups and incremental compiles dramatically faster in large apps. No configuration needed — it just works.</p>`},
                {type:'new',title:'New Debugging Tools in Next.js 16',body:`<p>Next.js 16 significantly improved the developer experience with two debugging upgrades beginners should know about:</p><ul>
<li><strong>Hydration Diff Indicator:</strong> When the HTML the server renders doesn't match what the client renders (a hydration error), Next.js now shows a clear <code>+</code> / <code>-</code> diff in the error overlay — exactly like a git diff. You'll see the specific element and attribute that caused the mismatch instead of a cryptic error. Don't fear hydration errors: read the diff, find the mismatch (often a timestamp, random ID, or browser-only value), and fix it.</li>
<li><strong>Upgrade CLI:</strong> Run <code>npx next upgrade</code> to upgrade Next.js, automatically apply codemods for breaking changes, and update your config. This is the official, recommended way to stay up to date — it handles API changes that would otherwise take hours to migrate manually.</li>
</ul>`},
            ]
        },

        {
            id:'project-structure', group:'Phase 1 — Foundations', icon:'folder', title:'Project Structure Deep Dive',
            sub:'Navigating app/, public/, components/, lib/, and middleware.ts — understanding where everything lives.',
            content:`
<div class="prose">
  <p>A clean understanding of the project structure will save you hours of confusion. Every folder has a purpose, and Next.js treats some folders with special meaning.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — A Well-Organised Wardrobe</div>
  <div class="box-body"><p>Think of your project as a <strong>professionally organised wardrobe</strong>:</p>
<ul>
  <li><code>app/</code> = the main wardrobe section. Next.js has a strict system here — only certain item names are recognised (<code>page.tsx</code>, <code>layout.tsx</code>, <code>loading.tsx</code>). Anything else is ignored by the routing system.</li>
  <li><code>components/</code> = the accessories drawer. Reusable buttons, cards, and inputs live here. Nothing magical — just organised.</li>
  <li><code>lib/</code> = the locked jewellery box. Private server-side utilities: DB client, auth helpers, secrets. You would not leave these in the main section.</li>
  <li><code>public/</code> = the front-facing display shelf. Images, fonts, and static files you want the world to see directly at a URL.</li>
</ul>
<p style="margin-top:8px;"><strong>The most important rule:</strong> <code>app/</code> is <em>special</em> to Next.js. The other folders (<code>components/</code>, <code>lib/</code>, <code>hooks/</code>, <code>utils/</code>) are <em>conventions</em> — you can name them whatever you like. Next.js only cares about what is inside <code>app/</code>.</p></div>
</div>
<div class="filetree">
<div class="ft-row"><span class="ft-dir">my-app/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">app/</span>                   <span class="ft-other ft-comment">← App Router root (special)</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">layout.tsx</span>         <span class="ft-other ft-comment">← Root layout (wraps all pages)</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>           <span class="ft-other ft-comment">← Homepage ( / route)</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">globals.css</span>        <span class="ft-other ft-comment">← Global styles</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-dir">about/</span>             <span class="ft-other ft-comment">← /about route</span></div>
<div class="ft-row"><span class="ft-i">│   │   └── </span><span class="ft-tsx">page.tsx</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-dir">api/</span>               <span class="ft-other ft-comment">← API routes</span></div>
<div class="ft-row"><span class="ft-i">│       └── </span><span class="ft-tsx">route.ts</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">components/</span>            <span class="ft-other ft-comment">← Reusable UI components</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">Button.tsx</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-tsx">Navbar.tsx</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">lib/</span>                   <span class="ft-other ft-comment">← Utilities, DB helpers, auth</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-ts">db.ts</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-ts">auth.ts</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">public/</span>                <span class="ft-other ft-comment">← Static files (images, fonts)</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-other ft-comment">logo.svg</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-ts">middleware.ts</span>          <span class="ft-other ft-comment">← Runs before every request</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-json">next.config.ts</span>         <span class="ft-other ft-comment">← Next.js configuration</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-json">package.json</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-ts">tsconfig.json</span></div>
</div>
<div class="g2" style="margin-top:20px;">
  <div class="card"><div class="card-t">app/ — The Router</div><div class="card-b">Everything inside <code>app/</code> is controlled by Next.js's file-based router. Only files named <code>page.tsx</code>, <code>layout.tsx</code>, <code>loading.tsx</code>, <code>error.tsx</code>, and <code>route.ts</code> have special meaning. Everything else (like shared components) should live outside <code>app/</code>.</div></div>
  <div class="card"><div class="card-t">public/ — Static Assets</div><div class="card-b">Files in <code>public/</code> are served directly at the root URL. A file at <code>public/logo.svg</code> is accessible at <code>/logo.svg</code>. Use this for images, fonts, and <code>robots.txt</code>.</div></div>
  <div class="card"><div class="card-t">components/ — UI Pieces</div><div class="card-b">Your reusable React components live here. This folder has <strong>no special meaning to Next.js</strong> — it's a convention. You can organize it however you like: by feature, by type, or flat.</div></div>
  <div class="card"><div class="card-t">lib/ — Backend Logic</div><div class="card-b">Server-only code lives here — database clients, authentication helpers, utility functions. Separating this from <code>components/</code> makes the server/client boundary explicit and your code easier to reason about.</div></div>
</div>`,
            boxes:[
                {type:'warn',title:'app/ vs pages/ — Do Not Mix',body:`<p>Next.js supports both <code>app/</code> (App Router, new) and <code>pages/</code> (Pages Router, legacy) in the same project during migration. However, you should not put the same route in both. For new projects, use <strong>only App Router</strong>. Do not create a <code>pages/</code> folder.</p>`},
                {type:'tip',title:'Import Alias @/*',body:`<p>When you set up Next.js with <code>@/*</code> as the import alias, you can import files from your project root as <code>import { Button } from '@/components/Button'</code> instead of <code>'../../components/Button'</code>. Much cleaner in deeply nested files.</p>`},
            ]
        },

        {
            id:'app-vs-pages', group:'Phase 1 — Foundations', icon:'map', title:'App Router vs Pages Router',
            sub:'Key differences, which one to learn in 2025, migration paths, and when each makes sense.',
            content:`
<div class="prose">
  <p>Next.js has two routing systems. The <strong>Pages Router</strong> is the original system, introduced in 2016. The <strong>App Router</strong> was introduced in Next.js 13 and became stable in Next.js 14. In Next.js 16, the App Router is the clear and only path for new development. All new features — PPR, Cache Components, proxy.ts, and Devtools MCP — are App Router only.</p>
</div>
<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-before">Pages Router (Legacy)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">pages/index.tsx</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>import { GetServerSideProps } from 'next'

// Data fetching via special functions
export const getServerSideProps: GetServerSideProps = async () => {
  const data = await fetch('/api/users').then(r => r.json())
  return { props: { users: data } }
}

// Everything is a Client Component by default
export default function Page({ users }) {
  return &lt;ul&gt;{users.map(u => &lt;li&gt;{u.name}&lt;/li&gt;)}&lt;/ul&gt;
}</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-after">App Router (Modern)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">app/page.tsx</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>// Everything is a Server Component by default
// Fetch data directly in the component — no special functions

async function getUsers() {
  const res = await fetch('https://api.example.com/users')
  return res.json()
}

export default async function Page() {
  const users = await getUsers()
  return &lt;ul&gt;{users.map(u => &lt;li&gt;{u.name}&lt;/li&gt;)}&lt;/ul&gt;
}</code></pre></div>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Feature</th><th>Pages Router</th><th>App Router</th></tr></thead>
    <tbody>
      <tr><td>Default component type</td><td>Client Component</td><td><span class="badge badge-nxt">Server Component</span></td></tr>
      <tr><td>Data fetching</td><td><code>getServerSideProps</code>, <code>getStaticProps</code></td><td>async/await in component</td></tr>
      <tr><td>Layouts</td><td><code>_app.tsx</code> (global only)</td><td>Nested layouts per route</td></tr>
      <tr><td>Loading states</td><td>Manual implementation</td><td><code>loading.tsx</code> convention</td></tr>
      <tr><td>Error boundaries</td><td>Manual</td><td><code>error.tsx</code> convention</td></tr>
      <tr><td>Server Actions</td><td>Not available</td><td><span class="badge badge-ok">Built-in</span></td></tr>
      <tr><td>Streaming / Suspense</td><td>Limited</td><td><span class="badge badge-ok">First-class</span></td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'tip',title:'🌍 Real-World Analogy — Old vs New Headquarters',body:`<p>The Pages Router is like an <strong>old company headquarters</strong> that was built in 2016. It works fine, everyone knows their way around, but the layout was designed before modern requirements. Adding new features means retrofitting — awkward extensions bolted onto the original building.</p><p>The App Router is the <strong>new headquarters</strong> built from the ground up with modern needs in mind: open-plan collaboration between server and client, smart energy use (Server Components = zero JS budget), and flexible layouts (nested layouts). Everything your team asked for over the years is baked in. Existing staff (Pages Router tutorials) still know useful skills, but the new building has different rules and you shouldn't try to apply the old floor plan to the new one.</p>`},
                {type:'nxt',title:'Start with App Router',body:`<p>If you are starting a new project in 2026: use the <strong>App Router</strong>. It is the present and future of Next.js. All new features are App Router only. The Pages Router is maintained but will not receive new capabilities.</p>`},
                {type:'warn',title:'Learning App Router takes adjustment',body:`<p>The App Router introduces new mental models: Server Components, client/server boundaries, nested layouts. It feels different from traditional React. This guide is designed to teach these concepts from scratch — do not try to map App Router onto your Pages Router knowledge.</p>`},
            ]
        },

// ═══════════════════════════════════════
// PHASE 2 — ROUTING & NAVIGATION
// ═══════════════════════════════════════
        {
            id:'file-routing', group:'Phase 2 — Routing & Navigation', icon:'folder', title:'File-Based Routing',
            sub:'How folders become URLs — using page.tsx, layout.tsx, and creating nested routes.',
            content:`
<div class="prose">
  <p>Next.js uses your <code>app/</code> folder as a router. The folder structure directly maps to your URL structure. There are no route configuration files — just create a folder and a <code>page.tsx</code> inside it.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Your Folder Structure IS Your URL Map</div>
  <div class="box-body"><p>Imagine a company office building. The <strong>building address</strong> is your domain (<code>myapp.com</code>). Each <strong>floor</strong> is a folder. Each <strong>reception desk</strong> on that floor is a <code>page.tsx</code> file — the publicly visible entrance to that section.</p>
<ul>
  <li><code>app/page.tsx</code> = Ground floor reception → <code>/</code></li>
  <li><code>app/about/page.tsx</code> = 2nd floor "About" dept → <code>/about</code></li>
  <li><code>app/dashboard/page.tsx</code> = 5th floor dashboard → <code>/dashboard</code></li>
  <li><code>app/dashboard/settings/page.tsx</code> = Room 501 settings → <code>/dashboard/settings</code></li>
</ul>
<p style="margin-top:8px;">Just like an office, you can have storage rooms (utility folders without <code>page.tsx</code>) that are never publicly accessible. Only floors with a reception desk (<code>page.tsx</code>) are open to visitors.</p></div>
</div>

<div class="g2">
  <div>
    <div class="prose"><h3>Folder Structure</h3></div>
    <div class="filetree">
<div class="ft-row"><span class="ft-dir">app/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">page.tsx</span>        <span class="ft-other ft-comment">→ /</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">layout.tsx</span>      <span class="ft-other ft-comment">→ root layout</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">about/</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-tsx">page.tsx</span>    <span class="ft-other ft-comment">→ /about</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">blog/</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>    <span class="ft-other ft-comment">→ /blog</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-dir">new/</span></div>
<div class="ft-row"><span class="ft-i">│       └── </span><span class="ft-tsx">page.tsx</span><span class="ft-other ft-comment">→ /blog/new</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-dir">dashboard/</span></div>
<div class="ft-row"><span class="ft-i">    ├── </span><span class="ft-tsx">page.tsx</span>    <span class="ft-other ft-comment">→ /dashboard</span></div>
<div class="ft-row"><span class="ft-i">    └── </span><span class="ft-tsx">layout.tsx</span>  <span class="ft-other ft-comment">→ dashboard layout</span></div>
</div>
  </div>
  <div>
    <div class="prose"><h3>Special File Names</h3></div>
    <div class="steps" style="margin-top:0;">
      <div class="step"><div class="step-num" style="font-size:10px;width:24px;height:24px;">p</div><div class="step-content"><div class="step-title">page.tsx</div><div class="step-desc">Makes a route publicly accessible. Without this file, a folder is not a route — it's just a layout or organization folder.</div></div></div>
      <div class="step"><div class="step-num" style="font-size:10px;width:24px;height:24px;">l</div><div class="step-content"><div class="step-title">layout.tsx</div><div class="step-desc">Wraps all pages in the same folder and all nested folders. Persists across navigation — does not unmount.</div></div></div>
      <div class="step"><div class="step-num" style="font-size:10px;width:24px;height:24px;">~</div><div class="step-content"><div class="step-title">loading.tsx</div><div class="step-desc">Automatically shown while a page is loading. Uses React Suspense under the hood.</div></div></div>
      <div class="step"><div class="step-num" style="font-size:10px;width:24px;height:24px;">!</div><div class="step-content"><div class="step-title">error.tsx</div><div class="step-desc">Catches errors in the route segment and shows a fallback UI instead of crashing the whole app.</div></div></div>
    </div>
  </div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// This is the homepage — accessible at /
// Server Component by default (no 'use client' needed)
export default function HomePage() {
  return (
    &lt;main&gt;
      &lt;h1&gt;Welcome to my app&lt;/h1&gt;
      &lt;p&gt;This is the homepage.&lt;/p&gt;
    &lt;/main&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Colocation — Keep Related Files Together',body:`<p>Only <code>page.tsx</code> and other special files are exposed as routes. You can place helper files, tests, and components inside <code>app/</code> folders freely — they won't become routes unless they export from a <code>page.tsx</code>. This means you can colocate a component next to the page that uses it.</p>`},
                {type:'warn',title:'page.tsx must export a default function',body:`<p>A <code>page.tsx</code> must have a <strong>default export</strong> that is a React component. Named exports are not recognized as page components. The function name doesn't matter — <code>export default function Page()</code> is fine.</p>`},
            ]
        },

        {
            id:'dynamic-routes', group:'Phase 2 — Routing & Navigation', icon:'map', title:'Dynamic Routes',
            sub:'Implementing [id], [...slug] catch-all, and [[...slug]] optional catch-all routes.',
            content:`
<div class="prose">
  <p>Static routes cover fixed URLs, but real apps need <strong>dynamic routes</strong> — URLs that include variable segments like a blog post ID, a username, or a product slug. Next.js handles this with bracket syntax in folder names.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Hotel Room Numbers</div>
  <div class="box-body"><p>A hotel doesn't build a separate corridor for every room number. Instead, it has one corridor template: <em>"go to floor 3, find room [number]"</em>. The <strong>[number]</strong> slot accepts any value — room 301, 302, 350 — and the same set of instructions applies to all of them.</p>
<p style="margin-top:8px;"><code>app/rooms/[roomId]/page.tsx</code> is exactly this. The folder <code>[roomId]</code> is the template slot. It matches <code>/rooms/301</code>, <code>/rooms/302</code>, and <code>/rooms/penthouse</code> — all handled by the same component, which receives the specific value via the <code>params</code> prop.</p>
<p style="margin-top:8px;">You only write the page <em>once</em> and it works for every possible room. Without dynamic routes, you would need a separate page file for every single post, product, or user in your database — which is obviously impossible.</p></div>
</div>
<div class="g3">
  <div class="card"><div class="card-t">[id] — Single Segment</div><div class="card-b"><code>app/posts/[id]/page.tsx</code> matches <code>/posts/1</code>, <code>/posts/abc</code>, <code>/posts/hello-world</code></div></div>
  <div class="card"><div class="card-t">[...slug] — Catch-All</div><div class="card-b"><code>app/docs/[...slug]/page.tsx</code> matches <code>/docs/a</code>, <code>/docs/a/b</code>, <code>/docs/a/b/c</code></div></div>
  <div class="card"><div class="card-t">[[...slug]] — Optional</div><div class="card-b"><code>app/shop/[[...slug]]/page.tsx</code> also matches <code>/shop</code> (the slug itself is optional)</div></div>
</div>

<div class="tbl-wrap" style="margin-top:4px;">
  <table>
    <thead><tr><th>URL</th><th><code>[id]</code></th><th><code>[...slug]</code> catch-all</th><th><code>[[...slug]]</code> optional</th></tr></thead>
    <tbody>
      <tr><td><code>/posts</code></td><td>✗ No match</td><td>✗ No match</td><td><span class="badge badge-ok">✓ Matches</span> — slug = <code>undefined</code></td></tr>
      <tr><td><code>/posts/a</code></td><td><span class="badge badge-ok">✓ Matches</span> id=<code>a</code></td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a']</code></td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a']</code></td></tr>
      <tr><td><code>/posts/a/b</code></td><td>✗ No match</td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a','b']</code></td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a','b']</code></td></tr>
      <tr><td><code>/posts/a/b/c</code></td><td>✗ No match</td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a','b','c']</code></td><td><span class="badge badge-ok">✓ Matches</span> slug=<code>['a','b','c']</code></td></tr>
    </tbody>
  </table>
</div>
<div class="box box-tip" style="margin-top:12px;">
  <div class="box-hdr">${SVG.info} When to Use Each Pattern</div>
  <div class="box-body">
    <ul>
      <li>Use <strong>[id]</strong> for simple IDs: <code>/posts/123</code>, <code>/users/alice</code></li>
      <li>Use <strong>[...slug]</strong> when the base URL is always required: <code>/docs/getting-started/installation</code> — a <code>/docs</code> listing page would be a separate route</li>
      <li>Use <strong>[[...slug]]</strong> when one component handles both the index and nested paths: <code>/shop</code> shows all products, <code>/shop/electronics/laptops</code> shows a filtered view</li>
    </ul>
  </div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/[id]/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// The params prop is automatically injected by Next.js
// In Next.js 15+, params is a Promise — must be awaited!
interface PageProps {
  params: Promise&lt;{ id: string }&gt;
}

export default async function PostPage({ params }: PageProps) {
  // Await params — required since Next.js 15
  const { id } = await params

  const post = await fetch(\`https://api.example.com/posts/\${id}\`)
    .then(res => res.json())

  return (
    &lt;article&gt;
      &lt;h1&gt;{post.title}&lt;/h1&gt;
      &lt;p&gt;{post.body}&lt;/p&gt;
    &lt;/article&gt;
  )
}

// Optional: pre-generate known routes at build time
export async function generateStaticParams() {
  const posts = await fetch('https://api.example.com/posts').then(r => r.json())
  return posts.map((post: { id: number }) => ({ id: String(post.id) }))
}</code></pre></div>`,
            boxes:[
                {type:'new',title:'Breaking Change: params is a Promise',body:`<p>This was introduced as a breaking change in Next.js 15 and continues in Next.js 16. In earlier versions, <code>params</code> was a plain object. Now it is a <strong>Promise</strong> that must be awaited. This applies to <code>params</code>, <code>searchParams</code>, and header-related APIs. If you're upgrading from Next.js 14, update all your page components.</p>`},
                {type:'warn',title:'All Async APIs in Next.js 15/16 — The Full List',body:`<p>These APIs changed from synchronous to <strong>async</strong> and will throw TypeScript errors (and silent runtime bugs) if not awaited. Memorize this list:</p><ul>
<li><code>params</code> — <strong>await params</strong> before destructuring in any page/layout</li>
<li><code>searchParams</code> — <strong>await searchParams</strong> before reading query strings</li>
<li><code>cookies()</code> — <strong>await cookies()</strong> before calling <code>.get()</code> or <code>.set()</code></li>
<li><code>headers()</code> — <strong>await headers()</strong> before calling <code>.get()</code></li>
<li><code>draftMode()</code> — <strong>await draftMode()</strong> before <code>.isEnabled</code></li>
</ul><p style="margin-top:8px;">Pattern to remember: <strong>if Next.js injects it or reads from the request, it's now a Promise.</strong></p>`},
                {type:'tip',title:'generateStaticParams for Performance',body:`<p>Use <code>generateStaticParams</code> to tell Next.js which dynamic routes exist at build time. These pages will be statically generated (HTML pre-built) instead of rendered on-demand — much faster and cheaper to serve. You only need dynamic rendering for pages whose content changes per-request.</p>`},
            ]
        },

        {
            id:'navigation', group:'Phase 2 — Routing & Navigation', icon:'link', title:'Navigation with next/link',
            sub:'Using the Link component, prefetching, the useRouter hook, and programmatic navigation.',
            content:`
<div class="prose">
  <p>Next.js has two ways to navigate: the <code>&lt;Link&gt;</code> component for declarative navigation in JSX, and the <code>useRouter()</code> hook for programmatic navigation in JavaScript code (after a form submission, button click, etc.).</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/components/Navbar.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import Link from 'next/link'

export default function Navbar() {
  return (
    &lt;nav&gt;
      {/* Basic link */}
      &lt;Link href="/"&gt;Home&lt;/Link&gt;

      {/* With active state styling */}
      &lt;Link href="/about" className="hover:text-blue-500"&gt;
        About
      &lt;/Link&gt;

      {/* Dynamic route */}
      &lt;Link href="/posts/123"&gt;Post 123&lt;/Link&gt;

      {/* With object syntax for query params */}
      &lt;Link href={{ pathname: '/search', query: { q: 'nextjs' } }}&gt;
        Search Next.js
      &lt;/Link&gt;
    &lt;/nav&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/components/LoginForm.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useRouter } from 'next/navigation'

export default function LoginForm() {
  const router = useRouter()

  async function handleSubmit(e: React.FormEvent) {
    e.preventDefault()
    // ... authenticate user ...

    // Programmatic navigation after login
    router.push('/dashboard')

    // Other router methods:
    // router.replace('/dashboard') // no back button history
    // router.back()               // go back
    // router.refresh()            // re-fetch server data
    // router.prefetch('/about')   // manually prefetch
  }

  return &lt;form onSubmit={handleSubmit}&gt;...&lt;/form&gt;
}</code></pre></div>`,
            boxes:[
                {type:'nxt',title:'Incremental Prefetching in Next.js 16',body:`<p>Next.js 16 enhances the <code>&lt;Link&gt;</code> prefetching system with <strong>incremental prefetching</strong> and <strong>layout deduplication</strong>. When prefetching a page that shares layouts with the current route, only the new page segment is fetched — not the layouts you already have. This significantly reduces prefetch payloads and navigation overhead in large apps with deeply nested layouts.</p>`},
                {type:'new',title:'View Transitions with transitionTypes (React 19.2)',body:`<p>React 19.2 adds native View Transitions API support to <code>&lt;Link&gt;</code> via the <code>unstable_viewTransition</code> and <code>transitionTypes</code> props. You can create "app-like" slide or fade animations between pages with almost no CSS.</p>
<pre style="background:#070a12;border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;overflow-x:auto;margin:10px 0;">
<span style="color:#c792ea;">import</span> Link <span style="color:#c792ea;">from</span> <span style="color:#c3e88d;">'next/link'</span>

<span style="color:#546e7a;">// Pass transitionTypes to hint which animation to use</span>
&lt;Link href="/blog/post-1" <span style="color:#82aaff;">unstable_viewTransition</span>
  <span style="color:#82aaff;">transitionTypes</span>={[<span style="color:#c3e88d;">'slide-left'</span>]}&gt;
  Read Post
&lt;/Link&gt;

<span style="color:#546e7a;">// In your CSS — name the transition based on the type:</span>
<span style="color:#c3e88d;">@keyframes</span> <span style="color:#ffcb6b;">slide-in-left</span> {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}

<span style="color:#c3e88d;">::view-transition-new</span>(root) {
  animation: slide-in-left 300ms ease;
}
</pre>
<p>The <code>transitionTypes</code> prop is an array of strings you define. Read them in CSS using <code>:active-view-transition-type(slide-left)</code> to apply different animations per navigation direction. Works in any modern browser with no JavaScript animation library needed.</p>`},
                {type:'warn',title:'next/navigation vs next/router',body:`<p>In the App Router, always import from <code>'next/navigation'</code>. The old <code>'next/router'</code> import only works in the Pages Router. They are not interchangeable. Common mistake for people migrating.</p>`},
            ]
        },

        {
            id:'layouts', group:'Phase 2 — Routing & Navigation', icon:'layout', title:'Layouts & Templates',
            sub:'Working with root layouts, nested layouts, and understanding template.tsx vs layout.tsx.',
            content:`
<div class="prose">
  <p>Layouts are the secret weapon of Next.js's App Router. A <code>layout.tsx</code> wraps all pages within its folder and all nested folders. It <strong>persists across navigation</strong> — meaning its component state, scroll position, and DOM are preserved when you navigate between routes that share the same layout.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Layouts are Like Picture Frames</div>
  <div class="box-body"><p>Picture a set of <strong>nested picture frames</strong>. The outermost frame (<code>app/layout.tsx</code>) is always visible — it's the border that surrounds <em>every single page</em> in your app. It typically holds the navbar, global fonts, and the footer.</p>
<p style="margin-top:8px;">Inside that is a second frame (<code>app/dashboard/layout.tsx</code>) — a more specific frame that only surrounds pages within the <code>/dashboard</code> section. It might hold a sidebar that's only relevant for the app's logged-in area.</p>
<p style="margin-top:8px;">The page content (<code>page.tsx</code>) is the actual <em>artwork</em> that slides in and out of the frame. When you navigate from <code>/dashboard</code> to <code>/dashboard/settings</code>, the frames <strong>stay put</strong> — only the artwork changes. This is why your sidebar doesn't flash or lose its scroll position when navigating.</p>
<p style="margin-top:8px;"><strong>Key insight:</strong> Unlike a regular component, a layout is <em>never unmounted</em> while you are navigating between routes it covers. A regular React component would re-render; the layout simply swaps out its <code>{children}</code>.</p></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/layout.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { Metadata } from 'next'
import { Geist } from 'next/font/google'
import './globals.css'

const geist = Geist({ subsets: ['latin'] })

// Every page in your app gets this metadata as a base
export const metadata: Metadata = {
  title: { template: '%s | My App', default: 'My App' },
  description: 'Built with Next.js 16',
}

// This layout wraps EVERY page in your entire app
export default function RootLayout({
  children,
}: {
  children: React.ReactNode
}) {
  return (
    &lt;html lang="en"&gt;
      &lt;body className={geist.className}&gt;
        &lt;header&gt;Global Navbar here&lt;/header&gt;
        {/* All pages render here */}
        &lt;main&gt;{children}&lt;/main&gt;
        &lt;footer&gt;Global Footer here&lt;/footer&gt;
      &lt;/body&gt;
    &lt;/html&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/layout.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// Nested layout — only wraps /dashboard/* routes
// The root layout still wraps this
export default function DashboardLayout({
  children,
}: {
  children: React.ReactNode
}) {
  return (
    &lt;div className="flex"&gt;
      &lt;aside&gt;Dashboard Sidebar&lt;/aside&gt;
      &lt;section&gt;{children}&lt;/section&gt;
    &lt;/div&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'layout.tsx vs template.tsx',body:`<p><code>layout.tsx</code> persists and does <strong>not</strong> re-mount when navigating between child routes. <code>template.tsx</code> creates a new instance on every navigation — useful when you need the component to reset state or re-trigger animations. Use <code>layout.tsx</code> for 95% of cases.</p>`},
                {type:'nxt',title:'The Root Layout is Required',body:`<p>The <code>app/layout.tsx</code> file is the only required file in the App Router. It must contain the <code>&lt;html&gt;</code> and <code>&lt;body&gt;</code> tags. Do not put these tags anywhere else — only in the root layout.</p>`},
            ]
        },

        {
            id:'loading-error', group:'Phase 2 — Routing & Navigation', icon:'refresh', title:'Loading & Error States',
            sub:'Implementing loading.tsx, error.tsx, not-found.tsx, and error boundaries.',
            content:`
<div class="prose">
  <p>Next.js has a convention-based system for loading and error states. Instead of manually wrapping every page in Suspense or try-catch, you create special files that Next.js automatically uses as React Suspense boundaries and error boundaries.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Scaffolding and Safety Nets</div>
  <div class="box-body"><p>When a building is under construction, engineers don't just leave an empty plot with a sign saying "Building coming soon." They put up <strong>scaffolding</strong> — a temporary structure that shows the building's shape and keeps things safe while the real structure goes up. When it's complete, the scaffolding comes down and the real building is revealed.</p>
<p style="margin-top:8px;"><strong><code>loading.tsx</code> is your scaffolding.</strong> While the real page data is loading, Next.js shows your loading UI (typically skeleton screens that match the page's shape). The moment data arrives, the real content swaps in seamlessly.</p>
<p style="margin-top:8px;"><strong><code>error.tsx</code> is your safety net.</strong> If something goes wrong during construction (a database error, a failed fetch), the safety net catches the fall. Instead of the whole app crashing, only the affected section shows your error UI, and users can hit "Try Again" without refreshing the page.</p>
<p style="margin-top:8px;"><code>not-found.tsx</code> is the "This address doesn't exist" sign you put on an empty plot.</p></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/loading.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// This component is shown while dashboard/page.tsx is loading
// No need to add Suspense manually — Next.js does it for you
export default function DashboardLoading() {
  return (
    &lt;div className="animate-pulse space-y-4"&gt;
      &lt;div className="h-8 bg-gray-200 rounded w-1/3"&gt;&lt;/div&gt;
      &lt;div className="h-4 bg-gray-200 rounded w-full"&gt;&lt;/div&gt;
      &lt;div className="h-4 bg-gray-200 rounded w-2/3"&gt;&lt;/div&gt;
    &lt;/div&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/error.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client' // Error boundaries must be Client Components

import { useEffect } from 'react'

interface ErrorProps {
  error: Error & { digest?: string }
  reset: () => void  // Retry the failed segment
}

export default function DashboardError({ error, reset }: ErrorProps) {
  useEffect(() => {
    // Log the error to an error reporting service
    console.error(error)
  }, [error])

  return (
    &lt;div&gt;
      &lt;h2&gt;Something went wrong!&lt;/h2&gt;
      &lt;p&gt;{error.message}&lt;/p&gt;
      &lt;button onClick={reset}&gt;Try again&lt;/button&gt;
    &lt;/div&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/not-found.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import Link from 'next/link'

export default function NotFound() {
  return (
    &lt;div&gt;
      &lt;h2&gt;Page Not Found&lt;/h2&gt;
      &lt;p&gt;Could not find the requested resource.&lt;/p&gt;
      &lt;Link href="/"&gt;Return Home&lt;/Link&gt;
    &lt;/div&gt;
  )
}

// Trigger 404 programmatically in any Server Component:
// import { notFound } from 'next/navigation'
// if (!post) notFound()</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Error boundaries must be Client Components',body:`<p>The <code>error.tsx</code> file must include <code>'use client'</code> at the top. This is because error boundaries in React rely on <code>componentDidCatch</code> lifecycle, which only works in the client. The <code>reset</code> function re-renders the route segment to attempt recovery.</p>`},
            ]
        },

        {
            id:'route-groups', group:'Phase 2 — Routing & Navigation', icon:'folder', title:'Route Groups',
            sub:'Using (marketing) or (shop) folders to group routes without affecting the URL structure.',
            content:`
<div class="prose">
  <p>Route groups let you organize your <code>app/</code> folder without affecting the URL. Wrap a folder name in parentheses — like <code>(marketing)</code> or <code>(auth)</code> — and Next.js will ignore it when generating the URL. This is purely for code organization and to apply different layouts to different sections of your site.</p>
</div>
<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-before">Without Route Groups</div>
    <div class="filetree">
<div class="ft-row"><span class="ft-dir">app/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">layout.tsx</span>  <span class="ft-other ft-comment">(one layout for all)</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">page.tsx</span>    <span class="ft-other ft-comment">→ /</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">about/</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other ft-comment">→ /about</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-dir">dashboard/</span></div>
<div class="ft-row"><span class="ft-i">    └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other ft-comment">→ /dashboard</span></div>
</div>
  </div>
  <div>
    <div class="cmp-lbl lbl-after">With Route Groups</div>
    <div class="filetree">
<div class="ft-row"><span class="ft-dir">app/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">(marketing)/</span>  <span class="ft-other ft-comment">(ignored in URL)</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">layout.tsx</span>  <span class="ft-other ft-comment">(marketing layout)</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>    <span class="ft-other ft-comment">→ /</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-dir">about/</span></div>
<div class="ft-row"><span class="ft-i">│       └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other ft-comment">→ /about</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-dir">(dashboard)/</span>  <span class="ft-other ft-comment">(ignored in URL)</span></div>
<div class="ft-row"><span class="ft-i">    ├── </span><span class="ft-tsx">layout.tsx</span>  <span class="ft-other ft-comment">(dashboard layout)</span></div>
<div class="ft-row"><span class="ft-i">    └── </span><span class="ft-dir">dashboard/</span></div>
<div class="ft-row"><span class="ft-i">        └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other ft-comment">→ /dashboard</span></div>
</div>
  </div>
</div>
<div class="box box-tip">
  <div class="box-hdr">${SVG.info} Common Use Cases for Route Groups</div>
  <div class="box-body">
    <ul>
      <li><strong>(auth)</strong> — Login/register pages that share a centered, minimal layout</li>
      <li><strong>(marketing)</strong> — Public pages with a marketing header and footer</li>
      <li><strong>(dashboard)</strong> — Protected pages with a sidebar navigation layout</li>
      <li><strong>(shop)</strong> — E-commerce pages with a shopping cart header</li>
    </ul>
  </div>
</div>`,
            boxes:[
                {type:'warn',title:'Multiple Root Layouts',body:`<p>When using route groups, you can have <strong>multiple root-level layouts</strong>, each with their own <code>&lt;html&gt;</code> and <code>&lt;body&gt;</code> tags. Navigating between routes in different root layouts causes a <strong>full page reload</strong> (not client-side navigation). Keep this in mind for performance.</p>`},
            ]
        },

        {
            id:'server-vs-client', group:'Phase 3 — Rendering & Components', icon:'server', title:'Server vs Client Components',
            sub:'Understanding the use client directive, when to use each, and the server-first approach.',
            content:`
<div class="prose">
  <p>This is the most important concept in the Next.js App Router. The App Router introduces two types of React components: <strong>Server Components</strong> and <strong>Client Components</strong>. Understanding the difference is fundamental to building performant Next.js apps.</p>
  <p>If you only learn one concept from this entire guide, make it this one. Everything else — data fetching, caching, performance — flows naturally from understanding <em>where</em> your code runs.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Kitchen vs The Dining Room</div>
  <div class="box-body"><p>Think of your app as a <strong>restaurant</strong>:</p>
<ul>
  <li>The <strong>kitchen</strong> is the <strong>server</strong>. The chef (Server Component) has full access to the fridge (database), the storeroom (file system), and the safe with the secret recipes (environment secrets). Customers never go into the kitchen — they have no idea what equipment is back there or how it works.</li>
  <li>The <strong>dining room</strong> is the <strong>browser</strong>. The waiter (Client Component) interacts directly with the customer — takes orders, reacts to what the customer says, hands over the food. The waiter cannot see inside the kitchen fridge; they only work with what the kitchen sends out.</li>
</ul>
<p style="margin-top:8px;"><strong>Server Component</strong> = works entirely in the kitchen. Can query the database directly. Zero JavaScript sent to the customer's browser. Cannot respond to button clicks (customers aren't in the kitchen).</p>
