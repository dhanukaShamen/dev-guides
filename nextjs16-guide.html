      {state?.errors?.title &amp;&amp; &lt;p&gt;{state.errors.title[0]}&lt;/p&gt;}

      &lt;textarea name="content" placeholder="Write your post..." /&gt;
      {state?.errors?.content &amp;&amp; &lt;p&gt;{state.errors.content[0]}&lt;/p&gt;}

      &lt;button type="submit" disabled={isPending}&gt;
        {isPending ? 'Publishing...' : 'Publish Post'}
      &lt;/button&gt;
    &lt;/form&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'new',title:'useActionState — React 19',body:`<p><code>useActionState</code> is a new React 19 hook (replacing the old <code>useFormState</code>). It connects a form to a Server Action and manages the pending state, returned data, and error states. It works with HTML forms natively — even without JavaScript enabled (progressive enhancement).</p>`},
                {type:'warn',title:'Always authenticate in Server Actions',body:`<p>Server Actions are public endpoints — anyone can call them. Always verify the user is authenticated and authorized inside the action. Never trust data that comes in through <code>formData</code>. Always validate with a schema library like Zod.</p>`},
            ]
        },

        {
            id:'form-power-trio', group:'Phase 4 — Data Fetching', icon:'zap', title:'Form Power Trio: useFormStatus & useOptimistic',
            sub:'Using useFormStatus for button loading states and useOptimistic for instant UI updates.',
            content:`
<div class="prose">
  <p>React 19 ships three form hooks that work together. You've seen <code>useActionState</code>. Here are the other two that elevate your forms from functional to professional.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">useFormStatus</div><div class="card-b">Reads the pending state of the nearest parent <code>&lt;form&gt;</code>. Use it to disable buttons, show spinners, and give instant feedback — without threading state through props.</div></div>
  <div class="card"><div class="card-t">useOptimistic</div><div class="card-b">Shows an optimistic (assumed-success) value while a Server Action is running. If the action fails, it automatically reverts. Makes lists and likes feel instant.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/SubmitButton.tsx — useFormStatus</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useFormStatus } from 'react-dom'

// This component must be a CHILD of the &lt;form&gt; to read its status
export default function SubmitButton({ label }: { label: string }) {
  const { pending } = useFormStatus()  // Reads nearest parent form's state

  return (
    &lt;button
      type="submit"
      disabled={pending}
      className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded disabled:opacity-50"
    &gt;
      {pending &amp;&amp; (
        &lt;svg className="animate-spin w-4 h-4" viewBox="0 0 24 24"&gt;
          &lt;circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/&gt;
          &lt;path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/&gt;
        &lt;/svg&gt;
      )}
      {pending ? 'Saving...' : label}
    &lt;/button&gt;
  )
}

// Usage inside a Server Action form:
// &lt;form action={createPost}&gt;
//   &lt;input name="title" /&gt;
//   &lt;SubmitButton label="Publish" /&gt;  ← automatically reads form pending state
// &lt;/form&gt;</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/TodoList.tsx — useOptimistic</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useOptimistic, useTransition } from 'react'
import { toggleTodo } from '@/app/actions/todos'

interface Todo {
  id: string
  text: string
  completed: boolean
}

export default function TodoList({ todos }: { todos: Todo[] }) {
  // optimisticTodos reflects the "assumed" state while the action runs
  const [optimisticTodos, setOptimisticTodo] = useOptimistic(
    todos,
    (current, updatedId: string) =>
      current.map(t =&gt; t.id === updatedId ? { ...t, completed: !t.completed } : t)
  )

  const [, startTransition] = useTransition()

  async function handleToggle(id: string) {
    startTransition(async () => {
      setOptimisticTodo(id)    // ← UI updates INSTANTLY (optimistic)
      await toggleTodo(id)     // ← server catches up in the background
      // If toggleTodo throws, React reverts to the original todos
    })
  }

  return (
    &lt;ul&gt;
      {optimisticTodos.map(todo =&gt; (
        &lt;li key={todo.id} onClick={() =&gt; handleToggle(todo.id)}&gt;
          &lt;span style={{ textDecoration: todo.completed ? 'line-through' : 'none' }}&gt;
            {todo.text}
          &lt;/span&gt;
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'useFormStatus must be in a child component',body:`<p>A common beginner mistake: calling <code>useFormStatus()</code> inside the same component that renders the <code>&lt;form&gt;</code>. It won't work — it must be in a <strong>child</strong> component of the form. That's why a separate <code>&lt;SubmitButton&gt;</code> component is the standard pattern.</p>`},
                {type:'new',title:'useOptimistic — zero perceived latency',body:`<p><code>useOptimistic</code> is the "wow" feature of React 19 forms. Show users their action succeeded immediately — the to-do toggles, the like count increments, the item disappears — before the server has even responded. If the action fails, React automatically reverts the optimistic state. This makes apps feel as fast as native applications.</p>`},
            ]
        },

        {
            id:'cache-components', group:'Phase 4 — Data Fetching', icon:'database', title:'Cache Components & use cache',
            sub:'The new Next.js 16 caching model using Partial Pre-Rendering (PPR) and the use cache directive.',
            content:`
<div class="prose">
  <p>Next.js 16 introduces a new caching model built around two complementary features: <strong>Partial Pre-Rendering (PPR)</strong> and the <strong><code>'use cache'</code> directive</strong>. Together they give you fine-grained control over what is cached, when it expires, and how the page streams to the user — enabling instant navigation while keeping content fresh.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — PPR = A Newspaper With a Personalised Insert</div>
  <div class="box-body"><p>A printed newspaper is fast to distribute — it's pre-printed in bulk and delivered to your door instantly. But every copy is identical; there's no personalisation.</p>
<p style="margin-top:8px;"><strong>Partial Pre-Rendering</strong> is like a newspaper that has a pre-printed main section (fast, identical for all readers, served from CDN) with a <em>personalised insert</em> slipped inside (your name, your local news, your recommendations — generated fresh just for you).</p>
<p style="margin-top:8px;">In Next.js terms:</p>
<ul>
  <li>The <strong>static shell</strong> (navbar, product listing, article body) is pre-rendered at build time and served from the CDN edge in milliseconds</li>
  <li>The <strong>dynamic holes</strong> (welcome back Alex!, your cart, personalised recommendations) stream in as server-rendered fragments immediately after</li>
</ul>
<p style="margin-top:8px;">The user sees the page frame instantly, then the personalised content fills in within milliseconds — the best of both worlds. Previously you had to choose: fully static (fast but identical for everyone) or fully dynamic (personalised but slower for everyone).</p></div>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg> The New Cache Model</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Old Model (Next.js 14–15)</div>
      <ul>
        <li>Cache controlled via fetch() options</li>
        <li>unstable_cache for non-fetch data</li>
        <li>Route-level static vs dynamic</li>
        <li>Hard to cache individual components</li>
        <li>Full route opt-in/out of caching</li>
      </ul>
    </div>
    <div class="ms-arrow">→</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">New Model (Next.js 16)</div>
      <ul>
        <li>'use cache' directive on any async function</li>
        <li>Component-level caching granularity</li>
        <li>PPR splits static shell + dynamic holes</li>
        <li>Instant navigation for cached parts</li>
        <li>Dynamic content streams in afterward</li>
      </ul>
    </div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/products/page.tsx — use cache</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { unstable_cacheLife as cacheLife } from 'next/cache'
import { Suspense } from 'react'

// 'use cache' can be placed on any async function or component.
// Next.js caches the result and reuses it across requests.
async function getProducts() {
  'use cache'
  cacheLife('hours') // built-in profile: cache for hours, stale for 1 day

  const res = await fetch('https://api.example.com/products')
  return res.json()
}

// This component is cached independently from the rest of the page
async function ProductList() {
  'use cache'
  cacheLife({ revalidate: 3600, stale: 86400 }) // custom profile

  const products = await getProducts()
  return (
    &lt;ul&gt;
      {products.map(p =&gt; &lt;li key={p.id}&gt;{p.name}&lt;/li&gt;)}
    &lt;/ul&gt;
  )
}

// This component is dynamic — re-rendered on every request
async function PersonalizedBanner() {
  const user = await getCurrentUser() // reads cookies → dynamic
  return &lt;div&gt;Welcome back, {user.name}!&lt;/div&gt;
}

// PPR: the page shell is pre-rendered statically.
// Dynamic holes stream in after. Instant first paint!
export default function ProductsPage() {
  return (
    &lt;div&gt;
      {/* Dynamic part — streams in */}
      &lt;Suspense fallback={&lt;div&gt;Loading greeting...&lt;/div&gt;}&gt;
        &lt;PersonalizedBanner /&gt;
      &lt;/Suspense&gt;

      {/* Cached part — served instantly */}
      &lt;Suspense fallback={&lt;div&gt;Loading products...&lt;/div&gt;}&gt;
        &lt;ProductList /&gt;
      &lt;/Suspense&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts — Enable PPR</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { NextConfig } from 'next'

const config: NextConfig = {
  experimental: {
    ppr: true, // Enable Partial Pre-Rendering globally
    // Or enable per-route via export const experimental_ppr = true in page.tsx
  },
}

export default config</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>cacheLife Profile</th><th>Revalidate</th><th>Stale Period</th><th>Best For</th></tr></thead>
    <tbody>
      <tr><td><code>'seconds'</code></td><td>Every second</td><td>1 minute</td><td>Real-time data</td></tr>
      <tr><td><code>'minutes'</code></td><td>Every minute</td><td>1 hour</td><td>Frequently updated</td></tr>
      <tr><td><code>'hours'</code></td><td>Every hour</td><td>1 day</td><td>Product listings</td></tr>
      <tr><td><code>'days'</code></td><td>Every day</td><td>1 week</td><td>Blog posts, docs</td></tr>
      <tr><td><code>'weeks'</code></td><td>Every week</td><td>1 month</td><td>Static content</td></tr>
      <tr><td><code>'max'</code></td><td>1 year</td><td>Forever</td><td>Immutable assets</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'new',title:'PPR — Partial Pre-Rendering',body:`<p>PPR is the core idea behind the new caching model. Instead of a route being entirely static or entirely dynamic, PPR splits it: the <strong>static shell</strong> (layout, navigation, cached components) is pre-rendered and served instantly from the CDN edge. <strong>Dynamic holes</strong> (personalized content, real-time data) stream in afterward via React Suspense. Users get an instant first paint with progressively loaded fresh content.</p>`},
                {type:'tip',title:'use cache vs unstable_cache',body:`<p>The new <code>'use cache'</code> directive replaces <code>unstable_cache</code> from previous versions. It is more expressive (works as a directive on functions or entire components), integrates with PPR natively, and uses the built-in <code>cacheLife()</code> API for readable cache profiles. Prefer <code>'use cache'</code> for all new code in Next.js 16.</p>`},
                {type:'warn',title:'Which cache should I use? use cache vs cache()',body:`<p>React ships its own <code>cache()</code> function — beginners often confuse it with Next.js's <code>'use cache'</code> directive. They solve different problems:</p>
<div class="tbl-wrap" style="margin:12px 0 0;">
<table>
<thead><tr><th>Feature</th><th>React <code>cache()</code></th><th>Next.js <code>'use cache'</code></th></tr></thead>
<tbody>
<tr><td>Scope</td><td>Per request (server only)</td><td>Cross-request, persistent</td></tr>
<tr><td>Storage</td><td>In-memory, discarded after render</td><td>Data cache (survives deploys)</td></tr>
<tr><td>Shared between users?</td><td>No — each request has its own</td><td>Yes — shared across all users</td></tr>
<tr><td>Use case</td><td>Dedupe identical DB calls in one render</td><td>Cache expensive fetches for hours/days</td></tr>
<tr><td>Example</td><td><code>const getUser = cache(db.getUser)</code></td><td><code>async function getData() { 'use cache'; ... }</code></td></tr>
</tbody>
</table>
</div>
<p style="margin-top:10px;">Rule of thumb: <strong>React <code>cache()</code></strong> for deduplication within one request (e.g., fetching the current user in multiple components). <strong><code>'use cache'</code></strong> for data that is expensive and safe to share between users across many requests.</p>`},
            ]
        },

// ═══════════════════════════════════════
// PHASE 5 — STYLING & ASSETS
// ═══════════════════════════════════════
        {
            id:'css', group:'Phase 5 — Styling & Assets', icon:'monitor', title:'CSS in Next.js',
            sub:'Implementing Global CSS, CSS Modules, and Tailwind CSS setup.',
            content:`
<div class="prose">
  <p>Next.js supports multiple styling approaches out of the box. You can use them together in the same project — global styles for base resets, CSS Modules for component-level isolation, and Tailwind for utility-first styling.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Global CSS</div><div class="step-desc">Import global styles only in <code>app/layout.tsx</code>. These apply to the entire app — use them for CSS resets, custom properties, and base typography.</div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">CSS Modules</div><div class="step-desc">Files named <code>*.module.css</code> are automatically scoped to the component that imports them. Next.js generates unique class names, preventing style collisions.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Tailwind CSS</div><div class="step-desc">Utility-first CSS framework. Created by default in <code>create-next-app</code>. Uses a <code>tailwind.config.ts</code> for customization.</div></div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Button.module.css</span><span class="cb-lang">css</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-css"><code>.button {
  padding: 8px 16px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
}
.primary { background: #0070f3; color: white; }
.secondary { background: transparent; border: 1px solid #0070f3; }</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Button.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import styles from './Button.module.css'

interface ButtonProps {
  variant?: 'primary' | 'secondary'
  children: React.ReactNode
  onClick?: () => void
}

export default function Button({ variant = 'primary', children, onClick }: ButtonProps) {
  return (
    // styles.button is transformed to a unique class like Button_button__abc123
    &lt;button className={\`\${styles.button} \${styles[variant]}\`} onClick={onClick}&gt;
      {children}
    &lt;/button&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Global CSS can only be imported in layout.tsx',body:`<p>In the App Router, regular CSS files (not modules) can only be imported from <code>app/layout.tsx</code> or the root layout. Importing global styles from individual components or pages causes a build error. CSS Modules can be imported anywhere.</p>`},
            ]
        },

        {
            id:'tailwind', group:'Phase 5 — Styling & Assets', icon:'monitor', title:'Tailwind CSS Integration',
            sub:'Built-in support, className patterns, responsive design, and dark mode.',
            content:`
<div class="prose">
  <p>Tailwind CSS is the dominant styling choice for Next.js projects. It ships pre-configured with <code>create-next-app</code> and works seamlessly with Server Components — unlike CSS-in-JS solutions that require client-side hydration.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/components/Card.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>interface CardProps {

}

export default function Card({ title, description, featured }: CardProps) {
  return (
    &lt;div className={[
      // Base styles
      'rounded-xl border p-6 transition-all duration-200',
      // Responsive

      // Dark mode
      'bg-white dark:bg-gray-900',

        ? 'ring-2 ring-blue-500 shadow-lg shadow-blue-500/10'

      &lt;/p&gt;
    &lt;/div&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'cn() utility for conditional classes',body:`<p>Install <code>clsx</code> and <code>tailwind-merge</code> and create a <code>cn()</code> utility: it merges Tailwind classes without conflicts. Example: <code>cn('px-4 py-2', isPrimary && 'bg-blue-500', className)</code>. This is the standard pattern in every serious Next.js project.</p>`},
                {type:'nxt',title:'Tailwind v4 with Next.js 16',body:`<p>Next.js 16 supports Tailwind v4, which uses a CSS-based configuration (<code>@import "tailwindcss"</code> in your CSS file) instead of a <code>tailwind.config.ts</code>. It is significantly faster and removes the need for a PostCSS config in most setups. Check if <code>create-next-app</code> sets up v3 or v4.</p>`},
            ]
        },

        {
            id:'fonts-images', group:'Phase 5 — Styling & Assets', icon:'star', title:'Fonts & Images',
            sub:'Using next/font (Google/Local fonts) and the next/image component for automatic optimization.',
            content:`
<div class="prose">
  <p>Next.js provides two built-in optimization tools: <code>next/font</code> for fonts and <code>next/image</code> for images. Both handle performance optimizations automatically that would otherwise require significant manual configuration.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — next/image — The Auto-Pilot for Images</div>
  <div class="box-body"><p>A raw HTML <code>&lt;img&gt;</code> tag is like manually flying a plane. You have to think about: Will this image cause the page to jump when it loads (CLS)? Is it too large for mobile screens? Should I pre-load it? What format should it be — JPEG, WebP, AVIF?</p>
<p style="margin-top:8px;"><code>next/image</code> is the auto-pilot. Give it a source image and it handles everything:</p>
<ul>
  <li><strong>Format conversion</strong>: serves WebP or AVIF automatically to browsers that support it (often 30–50% smaller)</li>
  <li><strong>Responsive sizes</strong>: serves appropriately-sized images to mobile vs desktop</li>
  <li><strong>Lazy loading</strong>: images below the fold don't load until the user scrolls near them</li>
  <li><strong>No layout shift</strong>: reserves the correct space before the image loads (<code>width</code>/<code>height</code> props)</li>
  <li><strong>Priority loading</strong>: add <code>priority</code> to tell the browser "start loading this image immediately" for above-the-fold content</li>
</ul>
<p style="margin-top:8px;">The trade-off: you <em>must</em> provide <code>width</code> and <code>height</code> so Next.js can reserve space. Use the <code>fill</code> prop with a positioned parent when the image should fill its container responsively.</p></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/layout.tsx — Static Metadata</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { Metadata } from 'next'

        {
            id:'route-handlers', group:'Phase 6 — Backend Features', icon:'server', title:'Route Handlers (API Routes)',
            sub:'Creating route.ts files and handling HTTP methods GET, POST, PUT, DELETE.',
            content:`
<div class="prose">
  <p>Route Handlers are the App Router equivalent of API routes. Create a <code>route.ts</code> file in the <code>app/</code> directory, and export functions named after HTTP methods. They're used for webhooks, third-party API proxying, and when Server Actions aren't the right fit.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/posts/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest, NextResponse } from 'next/server'
import { db } from '@/lib/db'

// GET /api/posts — returns all posts
export async function GET(request: NextRequest) {
  const { searchParams } = new URL(request.url)
  const page = parseInt(searchParams.get('page') ?? '1')
  const limit = parseInt(searchParams.get('limit') ?? '10')

  const posts = await db.posts.findMany({
    skip: (page - 1) * limit,
    take: limit,
    orderBy: { createdAt: 'desc' },
  })

  return NextResponse.json({ posts, page, limit })
}

// POST /api/posts — create a new post
export async function POST(request: NextRequest) {
  const body = await request.json()

  const user = await getAuthUser(request)
  if (!user) {
    return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })
  }

  const post = await db.posts.create({
    data: { ...body, authorId: user.id }
  })

  return NextResponse.json(post, { status: 201 })
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/posts/[id]/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>export async function DELETE(
  request: NextRequest,
  { params }: { params: Promise&lt;{ id: string }&gt; }
) {
  const { id } = await params
  await db.posts.delete({ where: { id } })
  return new NextResponse(null, { status: 204 })
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Server Actions vs Route Handlers',body:`<p>Use <strong>Server Actions</strong> for form submissions and mutations triggered by UI. Use <strong>Route Handlers</strong> for webhooks from external services, building a REST API consumed by mobile apps, or endpoints that need specific HTTP caching headers. Don't create a Route Handler just to call it from your own React components — use Server Actions instead.</p>`},
            ]
        },

        {
            id:'middleware', group:'Phase 6 — Backend Features', icon:'shield', title:'Middleware',
            sub:'Using middleware.ts for matchers, redirects, rewrites, and authentication checks.',
            content:`
<div class="prose">
  <p>Middleware runs before every request — before the page is rendered or the route handler is called. It's perfect for authentication checks, A/B testing, internationalization redirects, and request logging. Middleware runs at the Edge, making it extremely fast.</p>
  <p><strong>Next.js 16:</strong> <code>middleware.ts</code> is <strong>deprecated</strong> in Next.js 16 in favour of <code>proxy.ts</code>. The file still works for Edge runtime use cases but will be removed in a future version. See the <em>proxy.ts</em> section below for the migration — it is largely a rename. The examples on this page still apply; just use <code>proxy.ts</code> and rename the exported function to <code>proxy()</code> going forward.</p>
</div>
<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Security Checkpoint at the Building Entrance</div>
  <div class="box-body"><p>Think of middleware as the <strong>security guard at the front door</strong> of your app. Before any visitor (request) can reach the offices (pages, API routes), they must pass through the checkpoint.</p>
<ul>
  <li>The guard checks their badge (<strong>auth token</strong>) — no badge, you get redirected to reception (<code>/login</code>).</li>
  <li>The guard directs VIP visitors to the executive floor (<strong>redirects based on role</strong>).</li>
  <li>The guard logs every entry in the visitor book (<strong>request logging</strong>).</li>
  <li>The guard stamps a visitor's pass with today's date (<strong>adding custom headers</strong>).</li>
</ul>
<p style="margin-top:8px;">Crucially, the guard doesn't do the actual work of the office — they just control <em>who gets in and where they go</em>. Middleware should be fast and lightweight, not doing complex business logic. The heavy lifting happens inside the offices (Server Components, Route Handlers).</p>
<p style="margin-top:8px;"><strong>The <code>config.matcher</code></strong> is the guard's instruction card: "Only check visitors going to floors 3 and 5 — let delivery people (static assets) skip the checkpoint."</p></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts (root of project)</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

export function middleware(request: NextRequest) {
  const { pathname } = request.nextUrl

  // Read cookies for auth token
  const token = request.cookies.get('auth-token')?.value

  // Protect /dashboard and all nested routes
  if (pathname.startsWith('/dashboard')) {
    if (!token) {
      // Redirect to login, preserving the intended destination
      const loginUrl = new URL('/login', request.url)
      loginUrl.searchParams.set('redirect', pathname)
      return NextResponse.redirect(loginUrl)
    }
  }

  // Redirect logged-in users away from auth pages
  if (['/login', '/register'].includes(pathname) && token) {
    return NextResponse.redirect(new URL('/dashboard', request.url))
  }

  // Add custom headers to all responses
  const response = NextResponse.next()
  response.headers.set('X-Custom-Header', 'my-value')
  return response
}

// Limit middleware to specific paths (performance!)
// Without this, middleware runs on EVERY request including
// static assets, fonts, and API routes
export const config = {
  matcher: ['/((?!api|_next/static|_next/image|favicon.ico).*)'],
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Middleware runs on the Edge — no Node.js APIs',body:`<p>Middleware runs in the Edge Runtime, not the full Node.js runtime. This means no access to <code>fs</code>, database clients, or Node.js-specific packages. For database-backed auth, validate a JWT in middleware and put the real session check in the Server Component or Route Handler.</p>`},
                {type:'tip',title:'Always use the matcher config',body:`<p>Without the <code>config.matcher</code> export, middleware runs on every single request — including static files, Next.js internals, and fonts. This wastes resources. Always configure a matcher to limit middleware to the paths that actually need it.</p>`},
            ]
        },

        {
            id:'proxy-ts', group:'Phase 6 — Backend Features', icon:'globe', title:'proxy.ts — Replacing Middleware',
            sub:'middleware.ts is deprecated in Next.js 16 and renamed to proxy.ts — same logic, clearer name, Node.js runtime.',
            content:`
<div class="prose">
  <p>In Next.js 16, <code>middleware.ts</code> is <strong>deprecated</strong> and renamed to <code>proxy.ts</code>. This is primarily a rename — your existing auth checks, redirects, and header manipulation all move over unchanged. The reason for the rename: the word "middleware" caused confusion with Express.js-style middleware chains, whereas "proxy" better conveys that this file sits at the network boundary in front of your app.</p>
  <p><strong>Key runtime change:</strong> <code>proxy.ts</code> runs on the <strong>Node.js runtime</strong> (not Edge). If you specifically need Edge runtime execution, keep using <code>middleware.ts</code> — it still works but is deprecated and will be removed in a future version.</p>
</div>

<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-before">Before — middleware.ts (deprecated)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

export function middleware(request: NextRequest) {
  const token = request.cookies.get('auth-token')?.value
  if (request.nextUrl.pathname.startsWith('/dashboard') && !token) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
}

export const config = {
  matcher: ['/dashboard/:path*'],
}</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-after">After — proxy.ts (Next.js 16)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">proxy.ts</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

// Renamed: middleware → proxy (same logic, same API)
export function proxy(request: NextRequest) {
  const token = request.cookies.get('auth-token')?.value
  if (request.nextUrl.pathname.startsWith('/dashboard') && !token) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
}

export const config = {
  matcher: ['/dashboard/:path*'],
}</code></pre></div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Run the codemod to migrate automatically</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># Next.js provides a codemod that handles the rename for you:
# - Renames middleware.ts → proxy.ts
# - Renames the exported function from middleware() → proxy()
# - Updates config flag names (e.g. skipMiddlewareUrlNormalize → skipProxyUrlNormalize)
npx @next/codemod@latest upgrade</code></pre></div>`,
            boxes:[
                {type:'warn',title:'proxy.ts runs on Node.js — not Edge',body:`<p>Unlike the old <code>middleware.ts</code> which defaulted to the Edge Runtime, <code>proxy.ts</code> runs on the <strong>Node.js runtime</strong> and cannot be changed. This means you now have full access to Node.js APIs (database clients, <code>fs</code>, etc.) in your proxy — but it no longer runs closer to the user on the Edge. If you need Edge execution for performance reasons (e.g., geo-based redirects at CDN level), keep <code>middleware.ts</code> for now, but note it is deprecated.</p>`},
                {type:'new',title:'Why the rename?',body:`<p>The word "middleware" was misleading — it implied Express-style request pipelines that could be stacked. In reality this file is a single network boundary in front of your app: it intercepts requests, can rewrite/redirect/add headers, and then passes them on. "Proxy" describes that behavior accurately. The logic inside is unchanged — it's genuinely just a rename backed by a one-line codemod.</p>`},
                {type:'nxt',title:'Migration Note — Coming from Older Tutorials',body:`<p>If you are following a Next.js tutorial from 2023 or 2024 and it uses <code>middleware.ts</code>, do not panic — the file still works in Next.js 16. The migration path is mechanical: (1) rename <code>middleware.ts</code> → <code>proxy.ts</code>, (2) rename the exported function from <code>middleware()</code> → <code>proxy()</code>, (3) rename <code>skipMiddlewareUrlNormalize</code> → <code>skipProxyUrlNormalize</code> in <code>next.config.ts</code> if you use it. Everything else is identical. Run <code>npx next upgrade</code> to have the codemod do it automatically.</p><p style="margin-top:8px;">Key reason for the change beyond naming: <code>proxy.ts</code> runs the <strong>full Node.js runtime</strong>, so you can now safely import database clients and use <code>crypto</code>, <code>fs</code>, and other Node.js APIs inside it — something that was forbidden in the old Edge-only <code>middleware.ts</code>.</p>`},
            ]
        },

        {
            id:'env-vars', group:'Phase 6 — Backend Features', icon:'lock', title:'Environment Variables',
            sub:'Handling .env.local, process.env, NEXT_PUBLIC_ prefix, and schema.ts validation.',
            content:`
<div class="prose">
  <p>Environment variables let you store secrets (API keys, database URLs) outside your code. This is one of the most important concepts for real-world apps — almost every project needs them from day one. Next.js has a layered system for managing them across different environments.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Office Safe vs. The Public Noticeboard</div>
  <div class="box-body"><p>Imagine your office has two places to put information:</p>
<ul>
  <li><strong>The safe</strong> (server-only env vars, no prefix): Bank account numbers, the alarm code, the wifi password for the server room. Only trusted staff who work in the back office can access it. You would never paste these on the wall where clients can see them.</li>
  <li><strong>The public noticeboard</strong> (<code>NEXT_PUBLIC_</code> prefix): Office hours, the public phone number, the website address. Fine to display publicly — everyone is allowed to know these.</li>
</ul>
<p style="margin-top:8px;"><strong>Critical rule:</strong> If you prefix a variable with <code>NEXT_PUBLIC_</code>, Next.js bakes it into the JavaScript bundle that gets sent to every user's browser. It is on the public noticeboard. Never put a password or secret key there — anyone can open DevTools and read it.</p>
<p style="margin-top:8px;"><strong>Variables without the prefix</strong> stay in the safe — they exist only on the server and are never shipped to the browser. Even if someone tries to access <code>process.env.DATABASE_URL</code> in a Client Component, they get <code>undefined</code>.</p></div>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> The Critical Rule: Server vs Public Variables</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label" style="color:var(--warn);">Server-Only (NO prefix)</div>
      <ul>
        <li><code>DATABASE_URL</code></li>
        <li><code>JWT_SECRET</code></li>
        <li><code>STRIPE_SECRET_KEY</code></li>
        <li><code>SENDGRID_API_KEY</code></li>
        <li>Only in Server Components, Actions, Handlers</li>
        <li>Never sent to the browser — stays on server</li>
      </ul>
    </div>
    <div class="ms-arrow">vs</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">Client-Accessible (NEXT_PUBLIC_ prefix)</div>
      <ul>
        <li><code>NEXT_PUBLIC_APP_URL</code></li>
        <li><code>NEXT_PUBLIC_STRIPE_PUBLIC_KEY</code></li>
        <li><code>NEXT_PUBLIC_ANALYTICS_ID</code></li>
        <li>Safe to expose — baked into JS bundle</li>
        <li>Accessible anywhere (Server + Client)</li>
        <li>Never use for secrets or API keys</li>
      </ul>
    </div>
  </div>
</div>

<div class="filetree">
<div class="ft-row"><span class="ft-other ft-comment">.env                  </span><span class="ft-other ft-comment">← Defaults for all environments (commit to git)</span></div>
<div class="ft-row"><span class="ft-other ft-comment">.env.local            </span><span class="ft-other ft-comment">← Local overrides (NEVER commit — add to .gitignore)</span></div>

<div class="ft-row"><span class="ft-other ft-comment">.env.production       </span><span class="ft-other ft-comment">← Production-only (commit ok)</span></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">.env.local</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># Server-only — NEVER sent to the browser
DATABASE_URL="postgresql://localhost:5432/mydb"
JWT_SECRET="your-super-secret-key-here"
STRIPE_SECRET_KEY="sk_test_..."

# Public — accessible in the browser (NEXT_PUBLIC_ prefix required)
NEXT_PUBLIC_APP_URL="http://localhost:3000"
NEXT_PUBLIC_STRIPE_PUBLIC_KEY="pk_test_..."
NEXT_PUBLIC_ANALYTICS_ID="G-XXXXXXXXXX"</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">Usage in code</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// ✅ Server Component — can access all env vars
const db = new Database(process.env.DATABASE_URL!)
const secret = process.env.JWT_SECRET!
