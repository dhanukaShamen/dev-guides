const apiUrl = process.env.NEXT_PUBLIC_APP_URL
const trackingId = process.env.NEXT_PUBLIC_ANALYTICS_ID

// ❌ This will be undefined in the browser — silent bug!
const leaked = process.env.JWT_SECRET // undefined on client</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">env.schema.ts — Next.js 16 native validation</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// Next.js 16 automatically validates .env files if this file exists.
// Place it at the root of your project. If a required variable is
// missing or has the wrong type, the build FAILS with a clear error.
import { z } from 'zod'

export default {
  server: {
    DATABASE_URL: z.string().url(),
    JWT_SECRET: z.string().min(32, 'JWT secret must be at least 32 characters'),
    STRIPE_SECRET_KEY: z.string().startsWith('sk_'),
  },
  client: {
    NEXT_PUBLIC_APP_URL: z.string().url(),
    NEXT_PUBLIC_STRIPE_PUBLIC_KEY: z.string().startsWith('pk_'),
  },
}</code></pre></div>`,
            boxes:[
                {type:'new',title:'env.schema.ts — Native Validation in Next.js 16',body:`<p>Next.js 16 introduces <strong>native environment variable validation</strong>. Create an <code>env.schema.ts</code> file at the root of your project with Zod schemas for your variables. Next.js will validate your <code>.env</code> files against this schema during <code>next build</code> and <code>next dev</code> — if a required variable is missing or malformed, you get a clear build error instead of a mysterious <code>undefined</code> crash in production. No extra libraries needed.</p>`},
                {type:'warn',title:'NEXT_PUBLIC_ variables are baked into the bundle',body:`<p>Any variable prefixed with <code>NEXT_PUBLIC_</code> is <strong>inlined at build time</strong> into the JavaScript bundle sent to every user. This means: (1) changing a public env var requires a rebuild, (2) never put API secrets or passwords in them — they are fully visible in browser DevTools, and (3) they work in both Server and Client Components.</p>`},
                {type:'tip',title:'Never commit .env.local',body:`<p><code>.env.local</code> is your machine's local secret store. It must be in <code>.gitignore</code> (Next.js adds it automatically). Instead, create a <code>.env.example</code> file with all the variable names but no real values, and commit that. New team members copy it to <code>.env.local</code> and fill in their own credentials.</p>`},
            ]
        },

        {
            id:'database', group:'Phase 6 — Backend Features', icon:'database', title:'Database Integration',
            sub:'Prisma setup, connection pooling, and performing queries in Server Components.',
            content:`
<div class="prose">
  <p>Next.js Server Components can query databases directly — no API layer needed. The most popular ORMs are <strong>Prisma</strong> (TypeScript-first, great DX) and <strong>Drizzle ORM</strong> (lightweight, SQL-like API). Here's a practical Prisma setup.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — ORM = A Translator Between Your Code and Your Database</div>
  <div class="box-body"><p>A database speaks SQL — a terse, declarative language full of <code>SELECT * FROM users WHERE id = 1</code>. Your TypeScript code speaks objects and arrays. An <strong>ORM (Object Relational Mapper)</strong> is a live translator sitting between the two.</p>
<p style="margin-top:8px;">Instead of writing <code>SELECT id, name, email FROM users WHERE id = 'abc'</code>, with Prisma you write: <code>db.user.findUnique({ where: { id: 'abc' } })</code>. Prisma translates this to the correct SQL query, runs it, and hands back a fully-typed TypeScript object.</p>
<p style="margin-top:8px;"><strong>Benefits for beginners:</strong></p>
<ul>
  <li>No SQL syntax to learn for basic CRUD operations</li>
  <li>Full TypeScript autocomplete on query results</li>
  <li>Schema changes tracked in migration files (like git for your database)</li>
  <li><code>npx prisma studio</code> opens a visual database browser — like Excel for your DB</li>
</ul></div>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Install Prisma</div><div class="step-desc"><code>npm install prisma @prisma/client</code> then <code>npx prisma init --datasource-provider postgresql</code></div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Define your schema</div><div class="step-desc">Edit <code>prisma/schema.prisma</code> to define your data models.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Create a singleton client</div><div class="step-desc">Create <code>lib/db.ts</code> to export a single Prisma client instance (see below).</div></div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/db.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { PrismaClient } from '@prisma/client'

// Prevent multiple Prisma clients in development (hot reload)
const globalForPrisma = globalThis as unknown as { prisma: PrismaClient }

export const db = globalForPrisma.prisma ?? new PrismaClient({
  log: process.env.NODE_ENV === 'development' ? ['query'] : [],
})

if (process.env.NODE_ENV !== 'production') globalForPrisma.prisma = db</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/users/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { db } from '@/lib/db'

export default async function UsersPage() {
  // Direct DB query in a Server Component — clean and simple
  const users = await db.user.findMany({
    include: { posts: { take: 3 } },
    orderBy: { createdAt: 'desc' },
  })

  return (
    &lt;ul&gt;
      {users.map(user => (
        &lt;li key={user.id}&gt;
          {user.name} — {user.posts.length} posts
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Connection Pooling in Serverless',body:`<p>Serverless deployments (Vercel) create many short-lived function instances, quickly exhausting your database's connection limit. Use a connection pooler like <strong>PgBouncer</strong>, <strong>Supabase Pooler</strong>, or <strong>Prisma Accelerate</strong> to proxy connections. Add <code>?pgbouncer=true</code> to your <code>DATABASE_URL</code> when using PgBouncer with Prisma.</p>`},
            ]
        },

// ═══════════════════════════════════════
// PHASE 7 — AUTHENTICATION & SECURITY
// ═══════════════════════════════════════
        {
            id:'auth-patterns', group:'Phase 7 — Authentication & Security', icon:'lock', title:'Auth Patterns in Next.js',
            sub:'Session-based vs JWT authentication, comparing auth libraries and approaches.',
            content:`
<div class="prose">
  <p>Authentication in Next.js 16 spans the full stack — you need auth in Server Components (to check if users can see a page), in Server Actions (to validate mutations), in Route Handlers (to protect APIs), and in Middleware (to redirect unauthenticated users). Understanding the different approaches helps you choose the right tool.</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t">Session-Based (Recommended)</div><div class="card-b">After login, a session record is stored in the database. The client gets a session ID cookie. On each request, the session ID is looked up in the DB. <strong>Pros:</strong> Can revoke sessions instantly, simple mental model. <strong>Cons:</strong> DB lookup on every request (mitigated by caching).</div></div>
  <div class="card"><div class="card-t">JWT (Stateless)</div><div class="card-b">After login, a signed token is stored in a cookie. The token contains user info and is verified on each request without a DB lookup. <strong>Pros:</strong> Fast, no DB required for verification. <strong>Cons:</strong> Cannot revoke tokens until expiry — requires a denylist to force logout.</div></div>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Library</th><th>Approach</th><th>Best For</th></tr></thead>
    <tbody>
      <tr><td><strong>Auth.js v5</strong> (NextAuth)</td><td>Session or JWT</td><td>Social OAuth + email, built for Next.js</td></tr>
      <tr><td><strong>Lucia Auth</strong></td><td>Session-based</td><td>Custom auth with full control</td></tr>
      <tr><td><strong>Clerk</strong></td><td>Hosted service</td><td>Fastest setup, zero maintenance</td></tr>
      <tr><td><strong>Supabase Auth</strong></td><td>JWT (Supabase)</td><td>Already using Supabase</td></tr>
      <tr><td><strong>Better Auth</strong></td><td>Session-based</td><td>TypeScript-first, modern API</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'tip',title:'Recommendation for Beginners',body:`<p>If you just want auth to work with minimal effort: use <strong>Clerk</strong> (hosted) or <strong>Auth.js v5</strong> (self-hosted). Both have excellent Next.js 16 support. If you want to understand auth deeply and have full control: implement it yourself using <strong>Lucia Auth</strong> as a reference, or use <strong>Better Auth</strong>.</p>`},
            ]
        },

        {
            id:'nextauth', group:'Phase 7 — Authentication & Security', icon:'shield', title:'Auth.js Setup',
            sub:'Setup, configuring providers, using callbacks, and session strategies.',
            content:`
<div class="prose">
  <p>Auth.js (formerly NextAuth.js) is the most widely used authentication library for Next.js. Version 5 was rewritten to work natively with the App Router, Server Components, and Next.js Middleware.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">auth.ts (root of project)</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import NextAuth from 'next-auth'
import GitHub from 'next-auth/providers/github'
import Google from 'next-auth/providers/google'
import Credentials from 'next-auth/providers/credentials'
import { PrismaAdapter } from '@auth/prisma-adapter'
import { db } from '@/lib/db'
import bcrypt from 'bcrypt'

export const { handlers, auth, signIn, signOut } = NextAuth({
  adapter: PrismaAdapter(db),
  providers: [
    GitHub({ clientId: process.env.GITHUB_ID!, clientSecret: process.env.GITHUB_SECRET! }),
    Google({ clientId: process.env.GOOGLE_ID!, clientSecret: process.env.GOOGLE_SECRET! }),
    Credentials({
      async authorize(credentials) {
        const user = await db.user.findUnique({
          where: { email: credentials.email as string }
        })
        if (!user?.password) return null
        const valid = await bcrypt.compare(credentials.password as string, user.password)
        return valid ? user : null
      },
    }),
  ],
  session: { strategy: 'jwt' },  // or 'database' for session table
  callbacks: {
    jwt({ token, user }) {
      if (user) token.role = (user as any).role
      return token
    },
    session({ session, token }) {
      session.user.role = token.role as string
      return session
    },
  },
})</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/auth/[...nextauth]/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { handlers } from '@/auth'
export const { GET, POST } = handlers</code></pre></div>`,
            boxes:[
                {type:'nxt',title:'Using auth() in Server Components',body:`<p>Call <code>auth()</code> from <code>'@/auth'</code> in any Server Component to get the current session: <code>const session = await auth()</code>. If <code>session</code> is null, the user is not authenticated. This replaces the old <code>getServerSession()</code> pattern from NextAuth v4.</p>`},
            ]
        },

        {
            id:'protected-routes', group:'Phase 7 — Authentication & Security', icon:'lock', title:'Protected Routes',
            sub:'Middleware auth checks, route guards, and role-based access control.',
            content:`
<div class="prose">
  <p>Protection should happen at multiple levels. Middleware provides fast redirection before the page loads. Server Components provide the actual data-access guard. Never rely on the client to hide protected content.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { auth } from '@/auth'
import { NextResponse } from 'next/server'

// Auth.js v5 provides an auth() wrapper for middleware
export default auth((request) => {
  const isAuthenticated = !!request.auth
  const isAuthPage = request.nextUrl.pathname.startsWith('/login')
  const isProtected = request.nextUrl.pathname.startsWith('/dashboard')

  if (isProtected && !isAuthenticated) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
  if (isAuthPage && isAuthenticated) {
    return NextResponse.redirect(new URL('/dashboard', request.url))
  }
})

export const config = { matcher: ['/dashboard/:path*', '/login', '/register'] }</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/admin/page.tsx — RBAC</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { auth } from '@/auth'
import { notFound } from 'next/navigation'

export default async function AdminPage() {
  const session = await auth()

  // Double-check role even if middleware redirected
  // Never trust middleware alone for sensitive pages!
  if (!session || session.user.role !== 'admin') {
    notFound() // Return 404 rather than revealing page exists
  }

  return &lt;div&gt;Admin-only content&lt;/div&gt;
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Defense in depth',body:`<p>Never protect routes with <strong>only</strong> middleware. Middleware validates JWTs but does not hit the database. A valid JWT from a deleted user would still pass middleware. Always add a secondary check in the Server Component or Server Action that verifies the user still exists and has the required permissions.</p>`},
            ]
        },

        {
            id:'secure-actions', group:'Phase 7 — Authentication & Security', icon:'shield', title:'Secure Server Actions',
            sub:'Adding auth validation in actions, input sanitization, and rate limiting.',
            content:`
<div class="prose">
  <p>Server Actions are automatically protected against CSRF attacks (they require a same-origin POST with a specific content type). But you are still responsible for authentication, authorization, and input validation.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/deletePost.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { auth } from '@/auth'
import { db } from '@/lib/db'
import { revalidatePath } from 'next/cache'
import { z } from 'zod'

const DeletePostSchema = z.object({
  postId: z.string().uuid('Invalid post ID'),
})

export async function deletePost(formData: FormData) {
  // 1. Always authenticate first
  const session = await auth()
  if (!session?.user) throw new Error('You must be logged in')

  // 2. Validate input (never trust user-provided data)
  const result = DeletePostSchema.safeParse({ postId: formData.get('postId') })
  if (!result.success) throw new Error('Invalid input')

  const { postId } = result.data

  // 3. Check ownership (authorization, not just authentication)
  const post = await db.post.findUnique({ where: { id: postId } })
  if (!post) throw new Error('Post not found')
  if (post.authorId !== session.user.id && session.user.role !== 'admin') {
    throw new Error('You do not have permission to delete this post')
  }

  // 4. Perform the operation
  await db.post.delete({ where: { id: postId } })
  revalidatePath('/posts')
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'next-safe-action — Type-safe Server Actions',body:`<p>The <code>next-safe-action</code> library wraps Server Actions with automatic Zod validation, authentication middleware, rate limiting, and consistent error handling. It's the recommended approach for production apps: <code>const action = authActionClient.schema(schema).action(handler)</code>.</p>`},
            ]
        },

        {
            id:'zod-actions', group:'Phase 7 — Authentication & Security', icon:'shield', title:'Zod Validation in Server Actions',
            sub:'Parsing formData with a Zod schema — security by design, from day one.',
            content:`
<div class="prose">
  <p>Every Server Action that receives user input is a potential attack surface. The pattern below is the "lightbulb moment" for secure Next.js development: <strong>parse before you touch the database</strong>. Zod guarantees the shape and type of data coming in, so your database query only ever sees clean, validated input.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/createPost.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { z } from 'zod'
import { db } from '@/lib/db'
import { auth } from '@/auth'
import { revalidatePath } from 'next/cache'
import { redirect } from 'next/navigation'

// 1. Define the schema FIRST — this is your contract
const CreatePostSchema = z.object({
  title: z.string()
    .min(1, 'Title is required')
    .max(100, 'Title must be under 100 characters')
    .trim(),
  content: z.string()
    .min(10, 'Content must be at least 10 characters')
    .trim(),
  published: z.boolean().default(false),
  // Coerce the string "on"/"off" from a checkbox to a boolean
  featured: z.coerce.boolean().default(false),
})

// The type Next.js expects: (prevState, formData) => state
type ActionState = {
  errors?: { title?: string[]; content?: string[]; _?: string[] }
  message?: string
}

export async function createPost(
  prevState: ActionState,
  formData: FormData
): Promise&lt;ActionState&gt; {
  // 2. Always authenticate first — before touching user data
  const session = await auth()
  if (!session?.user?.id) {
    return { errors: { _: ['You must be logged in.'] } }
  }

  // 3. Parse + validate with Zod
  //    Object.fromEntries converts FormData to a plain object
  const result = CreatePostSchema.safeParse(
    Object.fromEntries(formData)
  )

  // 4. Return field-level errors if validation fails
  if (!result.success) {
    return { errors: result.error.flatten().fieldErrors }
  }

  // 5. At this point, result.data is fully type-safe ✅
  const { title, content, published, featured } = result.data

  try {
    const post = await db.post.create({
      data: { title, content, published, featured, authorId: session.user.id },
    })
    revalidatePath('/posts')
    redirect(\`/posts/\${post.id}\`)
  } catch (err) {
    return { errors: { _: ['Database error. Please try again.'] } }
  }
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/new/page.tsx — the form</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useActionState } from 'react'
import { createPost } from '@/app/actions/createPost'
import SubmitButton from '@/components/SubmitButton'

export default function NewPostPage() {
  const [state, action] = useActionState(createPost, {})

  return (
    &lt;form action={action} className="space-y-4"&gt;
      {/* Global errors */}
      {state.errors?._?.map(e =&gt; &lt;p key={e} className="text-red-500"&gt;{e}&lt;/p&gt;)}

      &lt;div&gt;
        &lt;input name="title" placeholder="Post title" /&gt;
        {/* Field-level errors from Zod */}
        {state.errors?.title?.map(e =&gt; (
          &lt;p key={e} className="text-red-400 text-sm"&gt;{e}&lt;/p&gt;
        ))}
      &lt;/div&gt;

      &lt;div&gt;
        &lt;textarea name="content" placeholder="Write your post..." /&gt;
        {state.errors?.content?.map(e =&gt; (
          &lt;p key={e} className="text-red-400 text-sm"&gt;{e}&lt;/p&gt;
        ))}
      &lt;/div&gt;

      &lt;label&gt;
        &lt;input type="checkbox" name="published" /&gt; Publish immediately
      &lt;/label&gt;

      &lt;SubmitButton label="Create Post" /&gt;
    &lt;/form&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Object.fromEntries converts FormData cleanly',body:`<p>Using <code>Object.fromEntries(formData)</code> converts the entire form to a plain object that Zod's <code>safeParse()</code> can process in one line. For fields with multiple values (like a multi-select), use <code>formData.getAll('field')</code> separately and combine with the rest of the parsed data.</p>`},
                {type:'warn',title:'z.coerce for checkbox and number inputs',body:`<p>HTML form inputs always return strings. A checkbox sends <code>"on"</code> when checked and nothing when unchecked. Use <code>z.coerce.boolean()</code> to convert this automatically. Similarly, use <code>z.coerce.number()</code> for numeric inputs instead of manually calling <code>parseInt()</code>.</p>`},
            ]
        },
        {
            id:'parallel-routes', group:'Phase 8 — Advanced Features', icon:'layers', title:'Parallel Routes',
            sub:'Using @team and @analytics slots to show multiple pages in one layout.',
            content:`
<div class="prose">
  <p>Parallel Routes let you render multiple pages simultaneously in the same layout. Each slot is an independent route that can navigate independently, have its own loading and error states, and be conditionally rendered. They're perfect for dashboards with multiple panes.</p>
</div>
<div class="filetree">
<div class="ft-row"><span class="ft-dir">app/dashboard/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">layout.tsx</span>       <span class="ft-other ft-comment">← Receives @team and @analytics as props</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-tsx">page.tsx</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">@team/</span>            <span class="ft-other ft-comment">← Slot named "team"</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-tsx">loading.tsx</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-dir">@analytics/</span>       <span class="ft-other ft-comment">← Slot named "analytics"</span></div>
<div class="ft-row"><span class="ft-i">    ├── </span><span class="ft-tsx">page.tsx</span></div>
<div class="ft-row"><span class="ft-i">    └── </span><span class="ft-tsx">error.tsx</span></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/layout.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>interface DashboardLayoutProps {
  children: React.ReactNode
  team: React.ReactNode      // @team slot
  analytics: React.ReactNode // @analytics slot
}

export default function DashboardLayout({
  children,
  team,
  analytics,
}: DashboardLayoutProps) {
  return (
    &lt;div className="grid grid-cols-2 gap-6"&gt;
      {/* Each pane renders independently */}
      &lt;div&gt;{team}&lt;/div&gt;
      &lt;div&gt;{analytics}&lt;/div&gt;
    &lt;/div&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'default.tsx for unmatched slots',body:`<p>When you navigate to a URL that matches one slot but not another, the unmatched slot renders a <code>default.tsx</code> file as a fallback. Without it, Next.js will render a 404. Always create a <code>default.tsx</code> (can be identical to <code>page.tsx</code>) in each parallel route slot.</p>`},
            ]
        },

        {
            id:'intercepting-routes', group:'Phase 8 — Advanced Features', icon:'map', title:'Intercepting Routes',
            sub:'Creating modal patterns and photo galleries using (.), (..), and (...) syntax.',
            content:`
<div class="prose">
  <p>Intercepting Routes let you "intercept" a route and show it within a different context. The classic use case: clicking a photo in a feed shows it in a modal overlay (the URL updates to <code>/photos/123</code>), but refreshing the page or sharing the link shows the full photo page. Instagram's photo viewing works exactly this way.</p>
</div>
<div class="filetree">
<div class="ft-row"><span class="ft-dir">app/</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">photos/</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-dir">[id]/</span></div>
<div class="ft-row"><span class="ft-i">│       └── </span><span class="ft-tsx">page.tsx</span>   <span class="ft-other ft-comment">← Full photo page (direct URL / refresh)</span></div>
<div class="ft-row"><span class="ft-i">├── </span><span class="ft-dir">feed/</span></div>
<div class="ft-row"><span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>       <span class="ft-other ft-comment">← Photo feed</span></div>
<div class="ft-row"><span class="ft-i">│   └── </span><span class="ft-dir">(.)photos/</span>     <span class="ft-other ft-comment">← Intercepts /photos when navigating from feed</span></div>
<div class="ft-row"><span class="ft-i">│       └── </span><span class="ft-dir">[id]/</span></div>
<div class="ft-row"><span class="ft-i">│           └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other ft-comment">← Modal content</span></div>
<div class="ft-row"><span class="ft-i">└── </span><span class="ft-tsx">layout.tsx</span>         <span class="ft-other ft-comment">← Includes @modal parallel route slot</span></div>
</div>
<div class="box box-nxt">
  <div class="box-hdr">${SVG.info} Intercept Syntax</div>
  <div class="box-body">
    <ul>
      <li><strong>(.) </strong> — intercept routes at the <strong>same</strong> level (e.g., <code>/feed/(.)photos/[id]</code> intercepts <code>/photos/[id]</code> from <code>/feed</code>)</li>
      <li><strong>(..) </strong> — intercept routes one level <strong>above</strong></li>
      <li><strong>(..)(..) </strong> — intercept routes two levels above</li>
      <li><strong>(...) </strong> — intercept from the <strong>root</strong> app directory</li>
    </ul>
  </div>
</div>`,
            boxes:[
                {type:'tip',title:'Combine with Parallel Routes for modals',body:`<p>The canonical Next.js modal pattern uses <strong>Parallel Routes + Intercepting Routes</strong> together. The modal renders in a <code>@modal</code> parallel slot. When navigating from the feed, the intercepted route fills the modal slot. On direct URL access, the real page renders. This gives you shareable URLs that open in a full page, but a smooth modal experience for in-app navigation.</p>`},
            ]
        },

        {
            id:'activity-component', group:'Phase 8 — Advanced Features', icon:'zap', title:'&lt;Activity /&gt; — Background Rendering',
            sub:'Using React 19.2\'s Activity component to keep tab state alive without consuming resources.',
            content:`
<div class="prose">
  <p>React 19.2 introduces the <code>&lt;Activity&gt;</code> component — the successor to the experimental Offscreen API. It lets you keep part of your UI alive in the background (preserving state, subscriptions, and scroll position) while hiding it from the user and deprioritizing its rendering. This is the "wow" feature for tab-based layouts and complex navigations.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">mode="visible" (default)</div><div class="card-b">Children render normally, receive full priority, are painted to screen. Switch to this mode to bring a tab into focus.</div></div>
  <div class="card"><div class="card-t">mode="hidden"</div><div class="card-b">Children are hidden from the user and painted at low priority, but <strong>remain mounted</strong>. State, timers, and subscriptions stay alive. No unmount/remount cost when switching back.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/TabPanel.tsx — Activity in practice</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { Activity } from 'react'  // React 19.2
import { useState } from 'react'

const TABS = ['Dashboard', 'Analytics', 'Settings'] as const
type Tab = (typeof TABS)[number]

export default function TabPanel() {
  const [activeTab, setActiveTab] = useState&lt;Tab&gt;('Dashboard')

  return (
    &lt;div&gt;
      {/* Tab buttons */}
      &lt;nav className="flex gap-2 border-b mb-4"&gt;
        {TABS.map(tab =&gt; (
          &lt;button
            key={tab}
            onClick={() =&gt; setActiveTab(tab)}
            className={activeTab === tab ? 'border-b-2 border-blue-500' : ''}
          &gt;
            {tab}
          &lt;/button&gt;
        ))}
      &lt;/nav&gt;

      {/* Each tab is wrapped in Activity */}
      {/* mode="hidden" keeps state alive — no remount on switch! */}
      &lt;Activity mode={activeTab === 'Dashboard' ? 'visible' : 'hidden'}&gt;
        &lt;DashboardTab /&gt;     {/* Scroll position, filters preserved */}
      &lt;/Activity&gt;

      &lt;Activity mode={activeTab === 'Analytics' ? 'visible' : 'hidden'}&gt;
        &lt;AnalyticsTab /&gt;     {/* Chart selections preserved */}
      &lt;/Activity&gt;

      &lt;Activity mode={activeTab === 'Settings' ? 'visible' : 'hidden'}&gt;
        &lt;SettingsTab /&gt;      {/* Unsaved form values preserved */}
      &lt;/Activity&gt;
    &lt;/div&gt;
  )
}

// Example: This component keeps its data and scroll when hidden
function DashboardTab() {
  const [filter, setFilter] = useState('all')
  // filter survives tab switches — no re-fetch, no scroll reset
  return &lt;div&gt;...&lt;/div&gt;
}</code></pre></div>`,
            boxes:[
                {type:'new',title:'Activity vs CSS display:none — Why it matters',body:`<p>You might wonder: why not just use <code>display:none</code>? CSS hiding removes elements visually but React still renders them at full priority. <code>&lt;Activity mode="hidden"&gt;</code> tells React to <strong>defer and deprioritize</strong> rendering for hidden children — the browser won't paint them, event listeners are paused, and layout is skipped. The component stays mounted (state preserved), but consumes near-zero resources until it becomes visible again.</p>`},
                {type:'tip',title:'Perfect for complex dashboards',body:`<p>Use <code>&lt;Activity&gt;</code> whenever you have tab panels, slide-out drawers, or wizard steps where users frequently switch back and forth. Without it, unmounting and remounting tabs on every switch loses scroll position, resets form state, re-fires data fetches, and causes layout jank. With it, switching tabs feels instant — the background tab's HTML is kept alive, just hidden from paint.</p>`},
            ]
        },

        {
            id:'hydration-errors', group:'Phase 8 — Advanced Features', icon:'warn', title:'Hydration Errors — Fixing Mismatches',
            sub:'Why "Text content did not match" happens and how to fix it with useEffect or suppressHydrationWarning.',
            content:`
<div class="prose">
  <p>Hydration errors are the most common source of confusion for Next.js beginners. They happen because Next.js renders your component on the server to produce HTML, then React runs the same component in the browser to "hydrate" it — attach event listeners. If the output doesn't match exactly, React throws a hydration error.</p>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> The Root Cause</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label" style="color:var(--warn);">Server renders at build/request time</div>
      <ul>
        <li>Server has no browser, no clock sync</li>
        <li><code>new Date()</code> → "2026-01-15T10:00:00Z"</li>
        <li><code>Math.random()</code> → 0.832...</li>
        <li><code>window</code> → undefined (crashes)</li>
        <li>Result: HTML with specific values</li>
      </ul>
    </div>
    <div class="ms-arrow">≠</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">Client runs milliseconds later</div>
      <ul>
        <li>Browser has current time, its own RNG</li>
        <li><code>new Date()</code> → "2026-01-15T10:00:02Z"</li>
        <li><code>Math.random()</code> → 0.417...</li>
        <li><code>window</code> → available</li>
        <li>Result: different HTML → MISMATCH 💥</li>
      </ul>
    </div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Common causes and their fixes</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState, useEffect } from 'react'

// ❌ BROKEN — Date renders differently on server vs client
function BrokenTime() {
  return &lt;p&gt;It is currently: {new Date().toLocaleTimeString()}&lt;/p&gt;
}

// ✅ FIX 1: useEffect — render a placeholder server-side,
//            then update with the real value client-side
function FixedTime() {
  const [time, setTime] = useState('...')  // placeholder for server

  useEffect(() => {
    setTime(new Date().toLocaleTimeString())
    const id = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000)
    return () => clearInterval(id)
  }, [])

  return &lt;p&gt;It is currently: {time}&lt;/p&gt;
}

// ✅ FIX 2: suppressHydrationWarning — for intentional mismatches
//            Use sparingly — only when the mismatch is expected
function UserGreeting({ serverName }: { serverName: string }) {
  return (
    &lt;html lang="en" suppressHydrationWarning&gt;
      {/* Used on &lt;html&gt; for theme scripts that run before hydration */}
      &lt;body&gt;...&lt;/body&gt;
    &lt;/html&gt;
  )
}

// ✅ FIX 3: Dynamic import with ssr:false — skip server render entirely
// (In a Server Component parent:)
// import dynamic from 'next/dynamic'
// const ClientOnlyWidget = dynamic(() => import('./Widget'), { ssr: false })</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Error Pattern</th><th>Likely Cause</th><th>Fix</th></tr></thead>
    <tbody>
      <tr><td>"Text content did not match"</td><td><code>new Date()</code>, <code>Math.random()</code></td><td><code>useEffect</code> + placeholder</td></tr>
      <tr><td>"Expected server HTML to contain..."</td><td>Invalid HTML nesting (e.g. <code>&lt;div&gt;</code> inside <code>&lt;p&gt;</code>)</td><td>Fix the HTML structure</td></tr>
      <tr><td>"Prop className did not match"</td><td>CSS-in-JS library generating different class names</td><td>Use Tailwind or CSS Modules instead</td></tr>
      <tr><td>"window is not defined"</td><td>Browser API called at top level of component</td><td>Move to <code>useEffect</code> or <code>dynamic(..., {ssr:false})</code></td></tr>
      <tr><td>Browser extension errors</td><td>Ad blocker / password manager injecting DOM</td><td>Add <code>suppressHydrationWarning</code> to <code>&lt;body&gt;</code></td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'nxt',title:'Next.js 16 Hydration Diff in the Overlay',body:`<p>When a hydration error occurs in development, Next.js 16 shows a <strong>visual diff</strong> in the error overlay — a <code>+</code> / <code>-</code> format showing exactly what the server produced vs. what the client expected. Look for the red/green diff lines to instantly pinpoint the mismatch. No need to add <code>console.log</code> calls — the diff shows the exact HTML tree divergence.</p>`},
                {type:'tip',title:'useEffect is the right tool — not suppressHydrationWarning',body:`<p>Beginners often reach for <code>suppressHydrationWarning</code> as a quick fix. Use it only for elements where a mismatch is genuinely intentional (like <code>&lt;html&gt;</code> when a theme script runs). For dynamic values like dates, counters, and window-dependent UI, use the <code>useEffect</code> + placeholder pattern — it also gives you better UX because the server sends meaningful content.</p>`},
            ]
        },

        {
            id:'debug-logs', group:'Phase 8 — Advanced Features', icon:'monitor', title:'Debugging: Where Are My Logs?',
            sub:'Server Component logs go to the terminal, Client Component logs go to the browser console.',
            content:`
<div class="prose">
  <p>One of the most disorienting beginner experiences in Next.js: you add a <code>console.log()</code> to debug a problem, but you cannot find the output anywhere. This happens because logs go to <strong>different places</strong> depending on which type of component they are in.</p>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Where the code runs</th><th>Where to find console.log</th><th>How to identify it</th></tr></thead>
    <tbody>
      <tr><td><strong>Server Component</strong></td><td>🖥️ <strong>VS Code terminal</strong> (the one running <code>npm run dev</code>)</td><td>No <code>'use client'</code> at top, component is <code>async</code></td></tr>
      <tr><td><strong>Server Action</strong> (<code>'use server'</code>)</td><td>🖥️ <strong>VS Code terminal</strong></td><td>File or function has <code>'use server'</code> directive</td></tr>
      <tr><td><strong>Route Handler</strong> (<code>route.ts</code>)</td><td>🖥️ <strong>VS Code terminal</strong></td><td>Inside <code>app/api/</code> files</td></tr>
      <tr><td><strong>Client Component</strong> (<code>'use client'</code>)</td><td>🌐 <strong>Browser DevTools Console</strong></td><td>Has <code>'use client'</code> at top</td></tr>
      <tr><td><strong>Client Component</strong> (during SSR)</td><td>Both terminal AND browser console</td><td>Client Components also run on the server for the first render</td></tr>
      <tr><td><strong>middleware.ts / proxy.ts</strong></td><td>🖥️ <strong>VS Code terminal</strong></td><td>Root-level proxy/middleware file</td></tr>
    </tbody>
  </table>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Quick debug pattern</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// In a SERVER COMPONENT — check your VS Code terminal, not the browser
async function ServerComp() {
  const data = await fetchData()
  console.log('SERVER:', data)  // → appears in TERMINAL
  return &lt;div&gt;...&lt;/div&gt;
}

// In a CLIENT COMPONENT — check browser DevTools (F12 → Console tab)
'use client'
function ClientComp() {
  const [count, setCount] = useState(0)
  console.log('CLIENT:', count)  // → appears in BROWSER CONSOLE
  return &lt;button onClick={() =&gt; setCount(c =&gt; c + 1)}&gt;{count}&lt;/button&gt;
}

// Pro tip: prefix your logs to make them easy to scan
console.log('[DB Query]', result)        // terminal
console.log('[Action State]', prevState) // terminal (in Server Actions)
console.log('[UI State]', { isOpen })    // browser</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Quick identification tip',body:`<p>Not sure if your component is a Server or Client Component? Open it in your editor. If it has <code>'use client'</code> at the top → logs go to browser. If it's an <code>async function</code> with no <code>'use client'</code> → logs go to terminal. Middleware and Server Actions always go to terminal. When in doubt, look in both places.</p>`},
                {type:'warn',title:'Client Components log to BOTH places on first load',body:`<p>Client Components are first rendered on the server (for SSR) and then hydrated in the browser. This means on the <strong>initial page load</strong>, a <code>console.log</code> inside a Client Component will appear in <strong>both</strong> your terminal and the browser console. After navigation (client-side), it only appears in the browser. This can be confusing — just remember that hydration involves the component running twice.</p>`},
            ]
        },

        {
            id:'advanced-handlers', group:'Phase 8 — Advanced Features', icon:'server', title:'Route Handlers Advanced',
            sub:'File uploads, streaming responses, and WebSockets with Route Handlers.',
            content:`
<div class="prose">
  <p>Route Handlers support advanced use cases beyond basic JSON APIs — streaming responses for AI applications, file uploads via multipart form data, and real-time communication.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/stream/route.ts — Streaming</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest } from 'next/server'

// Perfect for AI text generation (OpenAI, Claude, etc.)
export async function POST(request: NextRequest) {
  const { prompt } = await request.json()

  const encoder = new TextEncoder()

  const stream = new ReadableStream({
    async start(controller) {
      const response = await openai.chat.completions.create({
        model: 'gpt-4',
        messages: [{ role: 'user', content: prompt }],
        stream: true,
      })

      for await (const chunk of response) {
        const text = chunk.choices[0]?.delta?.content ?? ''
        controller.enqueue(encoder.encode(text))
      }
      controller.close()
    },
  })

  return new Response(stream, {
    headers: { 'Content-Type': 'text/event-stream' },
  })
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/upload/route.ts — File Upload</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest, NextResponse } from 'next/server'
import { writeFile } from 'fs/promises'
import path from 'path'

export async function POST(request: NextRequest) {
  const formData = await request.formData()
  const file = formData.get('file') as File

  if (!file) return NextResponse.json({ error: 'No file' }, { status: 400 })

  const bytes = await file.arrayBuffer()
  const buffer = Buffer.from(bytes)

  const uploadPath = path.join(process.cwd(), 'public/uploads', file.name)
  await writeFile(uploadPath, buffer)

  return NextResponse.json({ url: \`/uploads/\${file.name}\` })
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Vercel AI SDK for streaming AI',body:`<p>If you're building AI-powered features, use the <strong>Vercel AI SDK</strong> (<code>ai</code> package). It provides <code>streamText()</code>, <code>streamObject()</code>, and React hooks like <code>useChat()</code> and <code>useCompletion()</code> that work seamlessly with Next.js Route Handlers and Server Actions, handling all the streaming complexity for you.</p>`},
            ]
        },

<div class="g2" style="margin-top:20px;">

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Dockerfile</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>FROM node:18-alpine AS base

# Install dependencies
FROM base AS deps
WORKDIR /app
COPY package.json package-lock.json ./
RUN npm ci

# Build
FROM base AS builder
WORKDIR /app
COPY --from=deps /app/node_modules ./node_modules
COPY . .
RUN npm run build

# Production image — minimal size
FROM base AS runner
WORKDIR /app
ENV NODE_ENV production

RUN addgroup --system --gid 1001 nodejs
RUN adduser --system --uid 1001 nextjs

COPY --from=builder /app/public ./public
COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static

USER nextjs
EXPOSE 3000
CMD ["node", "server.js"]</code></pre></div>

            sub:'Model Context Protocol integration for AI-assisted debugging, inspecting routes, and improving workflow.',
            content:`
<div class="prose">
  <p>Next.js 16 ships a first-party <strong>Devtools MCP server</strong> — a Model Context Protocol integration that exposes your running Next.js application's internals to AI tools like Claude, Cursor, and VS Code Copilot. This means you can ask your AI assistant questions about your app's routes, caching state, build output, and request logs directly, without switching context.</p>
  <p>The MCP server runs alongside your dev server and provides structured data about your application that AI tools can query. It dramatically shortens the debugging loop: instead of manually inspecting build output or adding console logs, you describe the problem to your AI assistant and it queries the live app state.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="card-t">Route Inspector</div><div class="card-b">Query which routes are static vs dynamic, what layouts they use, and their current cache status — all via natural language in your AI tool.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div><div class="card-t">Cache Inspector</div><div class="card-b">See which cache entries exist, when they were last revalidated, and their TTL — making it easy to debug stale data issues without guessing.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="card-t">Request Logs</div><div class="card-b">Improved structured logging for both builds and development requests in Next.js 16 — clear timing, cache hit/miss indicators, and streaming boundaries in the terminal output.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div><div class="card-t">Build Analysis</div><div class="card-b">Ask your AI tool why a route became dynamic, what triggered a cache invalidation, or why a component is included in the client bundle — the MCP server provides the context.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Enabling the Devtools MCP</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># The Devtools MCP server starts automatically with npm run dev

<div class="box box-nxt">

datasource db {

model Task {

        {
            id:'crud-actions', group:'Phase 10 — Full-Stack Project', icon:'code', title:'CRUD with Server Actions',
            sub:'Building Create, Read, Update, and Delete operations for tasks.',
            content:`
<div class="prose">
  <p>All task mutations will be Server Actions. This keeps our business logic on the server, ensures authentication, and gives us type-safe calls from any Client Component without writing API routes.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">actions/tasks.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { auth } from '@/auth'
import { db } from '@/lib/db'
import { revalidatePath } from 'next/cache'
import { redirect } from 'next/navigation'
import { z } from 'zod'

const TaskSchema = z.object({
  title: z.string().min(1).max(200),
  description: z.string().optional(),
  priority: z.enum(['LOW', 'MEDIUM', 'HIGH', 'URGENT']),
  dueDate: z.string().optional(),
})

export async function createTask(prevState: any, formData: FormData) {
  const session = await auth()
  if (!session?.user?.id) return { error: 'Unauthorized' }

  const result = TaskSchema.safeParse({
    title: formData.get('title'),
    description: formData.get('description'),
    priority: formData.get('priority'),
    dueDate: formData.get('dueDate'),
  })

  if (!result.success) return { errors: result.error.flatten().fieldErrors }

  await db.task.create({
    data: { ...result.data, userId: session.user.id }
  })

  revalidatePath('/tasks')
  return { success: true }
}

export async function updateTaskStatus(taskId: string, status: string) {
  const session = await auth()
  if (!session?.user?.id) return

  // Verify ownership before updating
  const task = await db.task.findFirst({
    where: { id: taskId, userId: session.user.id }
  })
  if (!task) return

  await db.task.update({
    where: { id: taskId },
    data: { status: status as any }
  })

  revalidatePath('/tasks')
}

export async function deleteTask(taskId: string) {
  const session = await auth()
  if (!session?.user?.id) return

  await db.task.deleteMany({
    where: { id: taskId, userId: session.user.id }
  })

  revalidatePath('/tasks')
}</code></pre></div>`,

                {type:'tip',title:'Optimistic updates with useOptimistic',body:`<p>For a snappier UX, use React 19's <code>useOptimistic</code> hook to immediately update the UI before the Server Action completes. The UI shows the optimistic state instantly, then syncs with the real server response. If the action fails, the optimistic state is rolled back automatically.</p>`},
            ]
        },

        {
            id:'error-handling-advanced', group:'Phase 11 — Advanced Topics', icon:'warn', title:'Error Handling: Client & Server',
            sub:'Robust error boundaries, Server Action failures, global error pages, and user-friendly recovery flows.',
            content:`
<div class="prose">
  <p>Next.js provides a layered error handling system. You already saw <code>error.tsx</code> for route-level boundaries — but a production-grade app needs consistent strategies across Server Components, Server Actions, API routes, and client-side interactions.</p>
</div>

<div class="g3">
  <div class="card"><div class="card-t">error.tsx</div><div class="card-b">Catches errors thrown by Server Components and async operations within a route segment. Receives an <code>error</code> object and a <code>reset</code> callback to re-render.</div></div>
  <div class="card"><div class="card-t">global-error.tsx</div><div class="card-b">Catches errors thrown by the root <code>layout.tsx</code> itself. Must define its own <code>&lt;html&gt;</code> and <code>&lt;body&gt;</code> tags since it replaces the entire layout on error.</div></div>
  <div class="card"><div class="card-t">not-found.tsx</div><div class="card-b">Rendered when you call <code>notFound()</code> from <code>next/navigation</code>. Use this for missing resources rather than throwing a generic error.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/error.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useEffect } from 'react'

interface ErrorProps {
  error: Error & { digest?: string }
  reset: () => void
}

export default function DashboardError({ error, reset }: ErrorProps) {
  useEffect(() => {
    // Log to an error monitoring service (e.g. Sentry, Datadog)
    console.error('[Dashboard Error]', error.message, error.digest)
  }, [error])

  return (
    &lt;div className="p-8 text-center"&gt;
      &lt;h2 className="text-xl font-bold mb-2"&gt;Something went wrong&lt;/h2&gt;
      &lt;p className="text-gray-500 mb-4 text-sm"&gt;
        {error.digest ? \`Error ID: \${error.digest}\` : 'An unexpected error occurred.'}
      &lt;/p&gt;
      &lt;button onClick={reset} className="btn-primary"&gt;Try again&lt;/button&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Handling Errors in Server Actions</h3><p>Server Actions should never throw unhandled errors to the client — they should return structured error state. Use a consistent result pattern combined with Zod validation:</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/createPost.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { z } from 'zod'

type ActionResult =
  | { ok: true; id: string }
  | { ok: false; error: string; fieldErrors?: Record&lt;string, string[]&gt; }

const PostSchema = z.object({
  title: z.string().min(3).max(100).trim(),
  body:  z.string().min(10).trim(),
})

export async function createPost(
  _prev: ActionResult | null,
  formData: FormData
): Promise&lt;ActionResult&gt; {
  const result = PostSchema.safeParse(Object.fromEntries(formData))

  if (!result.success) {
    return {
      ok: false,
      error: 'Validation failed',
      fieldErrors: result.error.flatten().fieldErrors as Record&lt;string, string[]&gt;,
    }
  }

  try {
    const post = await db.post.create({ data: result.data })
    return { ok: true, id: post.id }
  } catch (err) {
    // Log internally, return safe message to client
    console.error('[createPost] DB error:', err)
    return { ok: false, error: 'Could not save post. Please try again.' }
  }
}</code></pre></div>

<div class="prose"><h3>Global Error Page</h3><p>The <code>app/global-error.tsx</code> is your last line of defense — it catches errors in the root layout that <code>error.tsx</code> cannot reach:</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/global-error.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

export default function GlobalError({
  error,
  reset,
}: {
  error: Error & { digest?: string }
  reset: () => void
}) {
  return (
    &lt;html&gt;
      &lt;body&gt;
        &lt;div style={{ padding: '2rem', textAlign: 'center' }}&gt;
          &lt;h1&gt;Application Error&lt;/h1&gt;
          &lt;p&gt;{error.digest ?? 'An unexpected error occurred.'}&lt;/p&gt;
          &lt;button onClick={reset}&gt;Reload&lt;/button&gt;
        &lt;/div&gt;
      &lt;/body&gt;
    &lt;/html&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Never expose internal error details to users',body:`<p>When catching database or third-party API errors in Server Actions or Route Handlers, always log the full error server-side but return only a safe, generic message to the client. Exposing stack traces or database error messages is a security risk. Use the <code>error.digest</code> hash (automatically generated by Next.js) to correlate user-facing errors with server logs without revealing internals.</p>`},
                {type:'tip',title:'Use error monitoring tools in production',body:`<p>Console logging is not enough for production. Integrate an error monitoring service: <strong>Sentry</strong> (<code>@sentry/nextjs</code>) is the most popular and has first-class Next.js support with automatic source maps and Server Action tracing. It captures both server-side and client-side errors, groups them by type, and alerts you to new issues. The free tier is sufficient for most indie projects.</p>`},
                {type:'nxt',title:'error.digest — correlating errors across client and server',body:`<p>Next.js generates a <code>digest</code> hash for every unhandled server error. This hash is safe to show to users (it reveals nothing about internals) but lets you cross-reference a user-reported error ID with your server logs to find the exact stack trace. Always include <code>error.digest</code> in your error UI so users can report it, and always log it alongside the full error on the server.</p>`},
            ]
        },

        {
            id:'testing-strategies', group:'Phase 11 — Advanced Topics', icon:'check', title:'Testing Strategies',
            sub:'Unit tests with Vitest + React Testing Library, E2E tests with Playwright, and testing Server Actions.',
            content:`
<div class="prose">
  <p>Testing is often skipped by beginners but quickly becomes essential as apps grow. Next.js apps are well-suited to two levels of testing: <strong>unit/component tests</strong> for individual functions and components, and <strong>end-to-end (E2E) tests</strong> that drive a real browser through complete user flows.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">Vitest + React Testing Library</div><div class="card-b">Fast unit and component tests. Vitest is Vite-native and significantly faster than Jest. RTL tests components from the user's perspective — what renders, what you can click — not implementation details.</div></div>
  <div class="card"><div class="card-t">Playwright</div><div class="card-b">Full browser E2E tests. Spins up real Chromium/Firefox/WebKit instances and navigates your running app. Best for testing complete user flows: sign up, create a post, verify it appears in a list.</div></div>
</div>

<div class="prose"><h3>Setting Up Vitest</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install -D vitest @vitejs/plugin-react jsdom @testing-library/react @testing-library/jest-dom @testing-library/user-event</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">vitest.config.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { defineConfig } from 'vitest/config'
import react from '@vitejs/plugin-react'
import path from 'path'

export default defineConfig({
  plugins: [react()],
  test: {
    environment: 'jsdom',
    globals: true,
    setupFiles: ['./vitest.setup.ts'],
  },
  resolve: {
    alias: { '@': path.resolve(__dirname, './') },
  },
})</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">vitest.setup.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import '@testing-library/jest-dom'</code></pre></div>

<div class="prose"><h3>Testing a Client Component</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/__tests__/Counter.test.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { render, screen } from '@testing-library/react'
import userEvent from '@testing-library/user-event'
import { Counter } from '../Counter'

describe('Counter', () => {
  it('starts at 0 and increments on click', async () => {
    const user = userEvent.setup()
    render(&lt;Counter /&gt;)

    expect(screen.getByText('Count: 0')).toBeInTheDocument()

    await user.click(screen.getByRole('button', { name: /increment/i }))

    expect(screen.getByText('Count: 1')).toBeInTheDocument()
  })
})</code></pre></div>

<div class="prose"><h3>Testing a Server Action (Unit)</h3><p>Server Actions are just async functions — you can test the logic directly without a running server:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/__tests__/createPost.test.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { vi, describe, it, expect, beforeEach } from 'vitest'

// Mock the database module before importing the action
vi.mock('@/lib/db', () => ({
  db: {
    post: {
      create: vi.fn(),
    },
  },
}))

import { createPost } from '../createPost'
import { db } from '@/lib/db'

describe('createPost action', () => {
  beforeEach(() => vi.clearAllMocks())

  it('returns fieldErrors for short title', async () => {
    const fd = new FormData()
    fd.append('title', 'ab')  // too short
    fd.append('body', 'valid body content here')

    const result = await createPost(null, fd)

    expect(result.ok).toBe(false)
    if (!result.ok) expect(result.fieldErrors?.title).toBeDefined()
    expect(db.post.create).not.toHaveBeenCalled()
  })

  it('returns ok:true on valid input', async () => {
    vi.mocked(db.post.create).mockResolvedValue({ id: 'post-1' } as any)

    const fd = new FormData()
    fd.append('title', 'Valid Post Title')
    fd.append('body', 'This is a valid post body with enough text.')

    const result = await createPost(null, fd)
    expect(result.ok).toBe(true)
  })
})</code></pre></div>

<div class="prose"><h3>E2E Tests with Playwright</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm init playwright@latest</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">e2e/create-post.spec.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { test, expect } from '@playwright/test'

test('user can create a post', async ({ page }) => {
  await page.goto('/posts/new')

  await page.getByLabel('Title').fill('My E2E Test Post')
  await page.getByLabel('Body').fill('This post was created by Playwright.')
  await page.getByRole('button', { name: /publish/i }).click()

  // After redirect, the new post should appear
  await expect(page).toHaveURL(/\/posts\//)
  await expect(page.getByText('My E2E Test Post')).toBeVisible()
})</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Test behavior, not implementation',body:`<p>React Testing Library is designed around the principle that tests should resemble how users interact with the app. Avoid testing internal state or CSS class names — instead query by accessible role (<code>getByRole</code>), label (<code>getByLabel</code>), or visible text (<code>getByText</code>). This makes your tests resilient to refactors: changing a button's color or moving state into a custom hook won't break tests that only care about what the user sees and can do.</p>`},
                {type:'nxt',title:'Run Playwright against a production build',body:`<p>For the most accurate E2E tests, run Playwright against <code>next build &amp;&amp; next start</code> rather than the dev server. The dev server has different error handling, slower responses, and source maps that can mask production issues. Configure Playwright's <code>webServer</code> option in <code>playwright.config.ts</code> to auto-start the production server before running tests.</p>`},
                {type:'warn',title:'Mock external services in unit tests',body:`<p>When unit testing Server Actions or API routes, always mock database calls, email clients, payment SDKs, and other external services using <code>vi.mock()</code> (Vitest) or <code>jest.mock()</code>. Tests that hit a real database are slow, flaky, and require test data setup. Save real-database interactions for integration tests in CI pipelines where a test database is available.</p>`},
            ]
        },

        {
            id:'deployment-platforms', group:'Phase 11 — Advanced Topics', icon:'upload', title:'Deployment Beyond Vercel',
            sub:'Netlify, AWS Amplify, Docker, and custom Node.js server deployments with platform-specific considerations.',
            content:`
<div class="prose">
  <p>Vercel is the easiest deployment target for Next.js — it was built by the same team and supports every feature automatically. But production apps often need to run on other platforms due to cost, compliance, organizational preference, or infrastructure requirements.</p>
</div>

<div class="tbl-wrap"><table>
  <thead><tr><th>Platform</th><th>Rendering Support</th><th>Edge Runtime</th><th>Key Consideration</th></tr></thead>
  <tbody>
    <tr><td><strong>Vercel</strong></td><td>Full (SSR, ISR, Static, PPR)</td><td>✅ Native</td><td>Zero config. Most features work out of the box.</td></tr>
    <tr><td><strong>Netlify</strong></td><td>Full (via Next.js runtime)</td><td>✅ Netlify Edge</td><td>Requires <code>@netlify/plugin-nextjs</code>. Near-zero config for most projects.</td></tr>
    <tr><td><strong>AWS Amplify</strong></td><td>SSR + Static</td><td>⚠️ Limited</td><td>Managed deployment on AWS. Good for orgs already in AWS ecosystem.</td></tr>
    <tr><td><strong>Docker + Node.js</strong></td><td>Full (standalone output)</td><td>❌ Node only</td><td>Maximum control. Required for Kubernetes, on-prem, or custom cloud.</td></tr>
    <tr><td><strong>Static Export</strong></td><td>Static only</td><td>❌</td><td>No server required. Works on any CDN but no SSR, ISR, or Server Actions.</td></tr>
  </tbody>
</table></div>

<div class="prose"><h3>Docker Deployment (Standalone Output)</h3><p>Next.js can produce a minimal <code>standalone</code> output that includes only the files needed to run the server — no <code>node_modules</code> copying required:</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { NextConfig } from 'next'

const config: NextConfig = {
  output: 'standalone', // produces .next/standalone/
}

export default config</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Dockerfile</span><span class="cb-lang">dockerfile</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>FROM node:22-alpine AS base

# Install dependencies
FROM base AS deps
WORKDIR /app
COPY package*.json ./
RUN npm ci

# Build
FROM base AS builder
WORKDIR /app
COPY --from=deps /app/node_modules ./node_modules
COPY . .
RUN npm run build

# Production image — copy only the standalone output
FROM base AS runner
WORKDIR /app
ENV NODE_ENV=production

COPY --from=builder /app/.next/standalone ./
COPY --from=builder /app/.next/static ./.next/static
COPY --from=builder /app/public ./public

EXPOSE 3000
CMD ["node", "server.js"]</code></pre></div>

<div class="prose"><h3>Netlify Deployment</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install -D @netlify/plugin-nextjs
# Then push to GitHub and connect to Netlify — it auto-detects Next.js.</code></pre></div>

<div class="prose"><h3>Static Export (CDN / GitHub Pages)</h3><p>If your app has no dynamic server-side logic, you can export it as fully static HTML:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>const config: NextConfig = {
  output: 'export',
  // Optional: set basePath if deploying to a subdirectory
  // basePath: '/my-app',
}
// After 'next build', the 'out/' directory contains static HTML/CSS/JS
// Deploy this directory to any static host: GitHub Pages, S3, Cloudflare Pages</code></pre></div>`,
            boxes:[
                {type:'warn',title:'ISR and PPR require a server runtime',body:`<p>Incremental Static Regeneration (<code>revalidate</code>), Partial Pre-Rendering (PPR), and Server Actions all require a running Node.js server. They will not work with <code>output: 'export'</code> (static export). If you need these features, use a platform that supports server-side rendering: Vercel, Netlify, AWS Amplify, or your own Docker/Node deployment.</p>`},
                {type:'tip',title:'Environment variables across platforms',body:`<p>Each platform has its own way to set environment variables. Vercel and Netlify have dashboard UIs. Docker deployments use <code>--env-file</code> or Kubernetes secrets. The key rule: never commit <code>.env.local</code> to git. For CI/CD pipelines, set <code>DATABASE_URL</code>, <code>NEXTAUTH_SECRET</code>, and other production secrets in your platform's secret manager — never in <code>.env.production</code> committed to your repo.</p>`},
                {type:'nxt',title:'Build Adapters API (Next.js 16 alpha)',body:`<p>Next.js 16 introduces the <strong>Build Adapters API</strong> (currently alpha) in <code>next.config.ts</code>. Adapters let you customize how Next.js generates its output for non-standard deployment targets — for example, producing a format compatible with a proprietary edge runtime or an on-premises container platform. Most developers won't need this, but it's how platforms like Netlify and Cloudflare build their first-class Next.js integrations.</p>`},
            ]
        },

        {
            id:'accessibility', group:'Phase 11 — Advanced Topics', icon:'globe', title:'Accessibility (A11y) Fundamentals',
            sub:'Semantic HTML, ARIA attributes, keyboard navigation, and tooling to build inclusive Next.js applications.',
            content:`
<div class="prose">
  <p>Accessibility means building apps that work for everyone — including people who use screen readers, keyboard navigation, or have cognitive differences. In Next.js, most a11y improvements happen at the component level: proper HTML structure, meaningful labels, and keyboard-friendly interactions.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">Semantic HTML</div><div class="card-b">Use the right element for the job: <code>&lt;button&gt;</code> for actions, <code>&lt;a&gt;</code> for navigation, <code>&lt;nav&gt;</code> for navigation landmarks, <code>&lt;main&gt;</code> for page content, <code>&lt;article&gt;</code> for self-contained content. Screen readers use these to build a document map.</div></div>
  <div class="card"><div class="card-t">ARIA Attributes</div><div class="card-b">ARIA supplements HTML when semantics can't be conveyed natively. Common ones: <code>aria-label</code> for unlabeled controls, <code>aria-expanded</code> for toggleable sections, <code>aria-live</code> for dynamic content, <code>aria-describedby</code> to link errors to inputs.</div></div>
  <div class="card"><div class="card-t">Focus Management</div><div class="card-b">When a dialog opens, focus should move inside it. When it closes, focus should return to the trigger. SPA navigation (Next.js <code>&lt;Link&gt;</code>) can lose focus — Next.js handles this automatically by resetting focus on route change.</div></div>
  <div class="card"><div class="card-t">Color Contrast</div><div class="card-b">Text must have a contrast ratio of at least 4.5:1 against its background (3:1 for large text). Use tools like WebAIM Contrast Checker or the browser DevTools accessibility panel to verify.</div></div>
</div>

<div class="prose"><h3>Accessible Form Pattern</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/AccessibleForm.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>export function SignupForm({ errors }: { errors?: Record&lt;string, string&gt; }) {
  return (
    &lt;form&gt;
      {/* Associate label with input via htmlFor/id */}
      &lt;label htmlFor="email"&gt;Email address&lt;/label&gt;
      &lt;input
        id="email"
        type="email"
        name="email"
        autoComplete="email"
        aria-required="true"
        aria-invalid={!!errors?.email}
        aria-describedby={errors?.email ? 'email-error' : undefined}
      /&gt;
      {errors?.email &amp;&amp; (
        &lt;p id="email-error" role="alert" aria-live="polite"&gt;
          {errors.email}
        &lt;/p&gt;
      )}

      {/* Icon-only button needs accessible label */}
      &lt;button type="submit" aria-label="Create account"&gt;
        &lt;PlusIcon aria-hidden="true" /&gt;
        &lt;span&gt;Sign up&lt;/span&gt;
      &lt;/button&gt;
    &lt;/form&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Alt Text for Images</h3><p><code>next/image</code> requires an <code>alt</code> prop. The value should describe the image for users who can't see it:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">Correct alt text patterns</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// Informative image — describe what it shows
&lt;Image src="/chart.png" alt="Bar chart showing 40% growth in Q3 2025" /&gt;

// Decorative image — empty string tells screen readers to skip it
&lt;Image src="/divider.svg" alt="" /&gt;

// Linked image — describe the destination, not the image
&lt;Link href="/about"&gt;
  &lt;Image src="/logo.png" alt="Go to About page" /&gt;
&lt;/Link&gt;</code></pre></div>

<div class="prose"><h3>Tooling: eslint-plugin-jsx-a11y</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install -D eslint-plugin-jsx-a11y</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">eslint.config.mjs</span><span class="cb-lang">js</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-javascript"><code>import jsxA11y from 'eslint-plugin-jsx-a11y'

export default [
  // ... your existing config
  {
    plugins: { 'jsx-a11y': jsxA11y },
    rules: {
      ...jsxA11y.configs.recommended.rules,
    },
  },
]</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Test with a screen reader',body:`<p>The fastest way to understand accessibility issues is to use a real screen reader. On macOS, VoiceOver is built in (Cmd + F5 to toggle). On Windows, NVDA is free. On mobile, iOS has VoiceOver and Android has TalkBack. Spend 10 minutes navigating your own app with a screen reader — you'll immediately discover missing labels, unlabeled buttons, and focus traps that automated tools miss.</p>`},
                {type:'nxt',title:'Next.js Route Announcer',body:`<p>Next.js includes a built-in <strong>route announcer</strong> that automatically announces page title changes to screen readers on navigation — bridging the gap that SPA routing creates (traditional multi-page apps announce page loads natively via browser, but client-side navigation is invisible to screen readers without this). This works automatically with the App Router and requires no configuration.</p>`},
                {type:'warn',title:'Never use div/span as interactive elements',body:`<p>Using <code>&lt;div onClick={...}&gt;</code> instead of <code>&lt;button&gt;</code> is one of the most common a11y mistakes. Divs are not keyboard-focusable, not announced as interactive by screen readers, and don't receive keyboard events naturally. Always use the semantically correct element. If you need a custom look, style a real <code>&lt;button&gt;</code> with CSS — never fake interactivity with divs.</p>`},
            ]
        },

        {
            id:'performance-advanced', group:'Phase 11 — Advanced Topics', icon:'zap', title:'Performance: Beyond Caching',
            sub:'Bundle analysis, lazy loading, font optimization, Web Workers, and resource hints for production speed.',
            content:`
<div class="prose">
  <p>Next.js handles much of performance automatically: code splitting per route, image optimization, font subsetting. But as apps grow, manual optimization becomes necessary. This section covers tools and techniques beyond the basics.</p>
</div>

<div class="prose"><h3>Bundle Analysis</h3><p>The first step is knowing what's in your bundle. <code>@next/bundle-analyzer</code> generates a visual treemap:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install -D @next/bundle-analyzer</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import bundleAnalyzer from '@next/bundle-analyzer'

const withBundleAnalyzer = bundleAnalyzer({
  enabled: process.env.ANALYZE === 'true',
})

export default withBundleAnalyzer({
  // ...your config
})

// Run: ANALYZE=true npm run build
