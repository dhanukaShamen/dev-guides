    {
      id:'parallel-routes', group:'Phase 8 — Advanced Features', icon:'layers', title:'Parallel Routes',
      sub:'Using @team and @analytics slots to show multiple pages in one layout.',
      content:`
<div class="prose">
  <p>Parallel Routes let you render multiple pages simultaneously in the same layout. Each slot is an independent route that can navigate independently, have its own loading and error states, and be conditionally rendered. They're perfect for dashboards with multiple panes.</p>
</div>
<div class="filetree">
<span class="ft-dir">app/dashboard/</span>
<span class="ft-i">├── </span><span class="ft-tsx">layout.tsx</span>       <span class="ft-other">← Receives @team and @analytics as props</span>
<span class="ft-i">├── </span><span class="ft-tsx">page.tsx</span>
<span class="ft-i">├── </span><span class="ft-dir">@team/</span>            <span class="ft-other">← Slot named "team"</span>
<span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>
<span class="ft-i">│   └── </span><span class="ft-tsx">loading.tsx</span>
<span class="ft-i">└── </span><span class="ft-dir">@analytics/</span>       <span class="ft-other">← Slot named "analytics"</span>
<span class="ft-i">    ├── </span><span class="ft-tsx">page.tsx</span>
<span class="ft-i">    └── </span><span class="ft-tsx">error.tsx</span>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/layout.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>interface DashboardLayoutProps {
  children: React.ReactNode
  team: React.ReactNode      // @team slot
  analytics: React.ReactNode // @analytics slot
}

export default function DashboardLayout({
  children,
  team,
  analytics,
}: DashboardLayoutProps) {
  return (
    &lt;div className="grid grid-cols-2 gap-6"&gt;
      {/* Each pane renders independently */}
      &lt;div&gt;{team}&lt;/div&gt;
      &lt;div&gt;{analytics}&lt;/div&gt;
    &lt;/div&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'default.tsx for unmatched slots',body:`<p>When you navigate to a URL that matches one slot but not another, the unmatched slot renders a <code>default.tsx</code> file as a fallback. Without it, Next.js will render a 404. Always create a <code>default.tsx</code> (can be identical to <code>page.tsx</code>) in each parallel route slot.</p>`},
      ]
    },

    {
      id:'intercepting-routes', group:'Phase 8 — Advanced Features', icon:'map', title:'Intercepting Routes',
      sub:'Creating modal patterns and photo galleries using (.), (..), and (...) syntax.',
      content:`
<div class="prose">
  <p>Intercepting Routes let you "intercept" a route and show it within a different context. The classic use case: clicking a photo in a feed shows it in a modal overlay (the URL updates to <code>/photos/123</code>), but refreshing the page or sharing the link shows the full photo page. Instagram's photo viewing works exactly this way.</p>
</div>
<div class="filetree">
<span class="ft-dir">app/</span>
<span class="ft-i">├── </span><span class="ft-dir">photos/</span>
<span class="ft-i">│   └── </span><span class="ft-dir">[id]/</span>
<span class="ft-i">│       └── </span><span class="ft-tsx">page.tsx</span>   <span class="ft-other">← Full photo page (direct URL / refresh)</span>
<span class="ft-i">├── </span><span class="ft-dir">feed/</span>
<span class="ft-i">│   ├── </span><span class="ft-tsx">page.tsx</span>       <span class="ft-other">← Photo feed</span>
<span class="ft-i">│   └── </span><span class="ft-dir">(.)photos/</span>     <span class="ft-other">← Intercepts /photos when navigating from feed</span>
<span class="ft-i">│       └── </span><span class="ft-dir">[id]/</span>
<span class="ft-i">│           └── </span><span class="ft-tsx">page.tsx</span>  <span class="ft-other">← Modal content</span>
<span class="ft-i">└── </span><span class="ft-tsx">layout.tsx</span>         <span class="ft-other">← Includes @modal parallel route slot</span>
</div>
<div class="box box-nxt">
  <div class="box-hdr">${SVG.info} Intercept Syntax</div>
  <div class="box-body">
    <ul>
      <li><strong>(.) </strong> — intercept routes at the <strong>same</strong> level (e.g., <code>/feed/(.)photos/[id]</code> intercepts <code>/photos/[id]</code> from <code>/feed</code>)</li>
      <li><strong>(..) </strong> — intercept routes one level <strong>above</strong></li>
      <li><strong>(..)(..) </strong> — intercept routes two levels above</li>
      <li><strong>(...) </strong> — intercept from the <strong>root</strong> app directory</li>
    </ul>
  </div>
</div>`,
      boxes:[
        {type:'tip',title:'Combine with Parallel Routes for modals',body:`<p>The canonical Next.js modal pattern uses <strong>Parallel Routes + Intercepting Routes</strong> together. The modal renders in a <code>@modal</code> parallel slot. When navigating from the feed, the intercepted route fills the modal slot. On direct URL access, the real page renders. This gives you shareable URLs that open in a full page, but a smooth modal experience for in-app navigation.</p>`},
      ]
    },

    {
      id:'advanced-handlers', group:'Phase 8 — Advanced Features', icon:'server', title:'Route Handlers Advanced',
      sub:'File uploads, streaming responses, and WebSockets with Route Handlers.',
      content:`
<div class="prose">
  <p>Route Handlers support advanced use cases beyond basic JSON APIs — streaming responses for AI applications, file uploads via multipart form data, and real-time communication.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/stream/route.ts — Streaming</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest } from 'next/server'

// Perfect for AI text generation (OpenAI, Claude, etc.)
export async function POST(request: NextRequest) {
  const { prompt } = await request.json()

  const encoder = new TextEncoder()

  const stream = new ReadableStream({
    async start(controller) {
      const response = await openai.chat.completions.create({
        model: 'gpt-4',
        messages: [{ role: 'user', content: prompt }],
        stream: true,
      })

      for await (const chunk of response) {
        const text = chunk.choices[0]?.delta?.content ?? ''
        controller.enqueue(encoder.encode(text))
      }
      controller.close()
    },
  })

  return new Response(stream, {
    headers: { 'Content-Type': 'text/event-stream' },
  })
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/upload/route.ts — File Upload</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest, NextResponse } from 'next/server'
import { writeFile } from 'fs/promises'
import path from 'path'

export async function POST(request: NextRequest) {
  const formData = await request.formData()
  const file = formData.get('file') as File

  if (!file) return NextResponse.json({ error: 'No file' }, { status: 400 })

  const bytes = await file.arrayBuffer()
  const buffer = Buffer.from(bytes)

  const uploadPath = path.join(process.cwd(), 'public/uploads', file.name)
  await writeFile(uploadPath, buffer)

  return NextResponse.json({ url: \`/uploads/\${file.name}\` })
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'Vercel AI SDK for streaming AI',body:`<p>If you're building AI-powered features, use the <strong>Vercel AI SDK</strong> (<code>ai</code> package). It provides <code>streamText()</code>, <code>streamObject()</code>, and React hooks like <code>useChat()</code> and <code>useCompletion()</code> that work seamlessly with Next.js Route Handlers and Server Actions, handling all the streaming complexity for you.</p>`},
      ]
    },

    {
      id:'i18n', group:'Phase 8 — Advanced Features', icon:'globe', title:'Internationalization (i18n)',
      sub:'Using next-intl, routing localized paths, and supporting RTL languages.',
      content:`
<div class="prose">

<span class="ft-i">├── </span><span class="ft-json">en.json</span>

<span class="ft-i">└── </span><span class="ft-json">ar.json</span>               <span class="ft-other">← Arabic (RTL)</span>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/[locale]/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { useTranslations } from 'next-intl'

// Server Component — translations loaded on the server
export default function HomePage() {
  const t = useTranslations('HomePage')

  return (
    &lt;main&gt;
      &lt;h1&gt;{t('title')}&lt;/h1&gt;
      &lt;p&gt;{t('description')}&lt;/p&gt;

}

// messages/en.json
// { "HomePage": { "title": "Hello World", "description": "..." } }
// messages/ar.json
// { "HomePage": { "title": "مرحبا بالعالم", "description": "..." } }</code></pre></div>`,
      boxes:[
        {type:'tip',title:'RTL support',body:`<p>For RTL languages like Arabic and Hebrew, set <code>dir="rtl"</code> on the <code>&lt;html&gt;</code> element in your layout based on the locale. In Tailwind, use logical properties (<code>ms-4</code> instead of <code>ml-4</code>, <code>ps-4</code> instead of <code>pl-4</code>) to automatically flip margins and paddings for RTL without writing separate CSS.</p>`},
      ]
    },

    {
      id:'build-process', group:'Phase 9 — Deployment & Production', icon:'box', title:'Build Process',
      sub:'Running next build, understanding output modes, and static exports.',
      content:`
<div class="prose">
  <p>Before deploying, you run <code>npm run build</code> to create an optimized production build. Understanding what the build output means helps you debug issues and choose the right deployment target.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal — npm run build output</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>Route (app)                Size     First Load JS
─────────────────────────────────────────────────
○ /                        2.5 kB   95.5 kB
○ /about                   142 B    93.1 kB
λ /dashboard               4.2 kB   97.2 kB
λ /posts/[id]              1.8 kB   94.8 kB
○ /blog                    3.1 kB   96.1 kB

○  (Static)   prerendered as static content
λ  (Dynamic)  server-rendered on demand</code></pre></div>

<div class="g2" style="margin-top:20px;">
  <div class="card"><div class="card-t">○ Static Routes</div><div class="card-b">Pre-rendered to HTML at build time. Served directly from CDN. Fastest possible performance — no compute on each request. Routes with no dynamic functions become static automatically.</div></div>
  <div class="card"><div class="card-t">λ Dynamic Routes</div><div class="card-b">Rendered on each request by a Node.js function. Required when using <code>cookies()</code>, <code>headers()</code>, or <code>cache: 'no-store'</code>. Costs more to serve but always up-to-date.</div></div>
</div>

      id:'self-hosting', group:'Phase 9 — Deployment & Production', icon:'server', title:'Self-Hosting Options',
      sub:'Using Docker, Node.js servers, or static exports for any hosting provider.',
      content:`
<div class="prose">
  <p>You don't have to use Vercel. Next.js can be self-hosted on any platform that runs Node.js. The most common self-hosting targets are Docker containers (for any cloud provider), plain Node.js on a VPS, or static exports for static hosts.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">Dockerfile</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>FROM node:18-alpine AS base

# Install dependencies
FROM base AS deps
WORKDIR /app
COPY package.json package-lock.json ./
RUN npm ci

# Build
FROM base AS builder
WORKDIR /app
COPY --from=deps /app/node_modules ./node_modules
COPY . .
RUN npm run build

# Production image — minimal size
FROM base AS runner
WORKDIR /app
ENV NODE_ENV production

RUN addgroup --system --gid 1001 nodejs
RUN adduser --system --uid 1001 nextjs

COPY --from=builder /app/public ./public
COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static

USER nextjs
EXPOSE 3000
CMD ["node", "server.js"]</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts — Standalone Output</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>const config: NextConfig = {
  // Creates a .next/standalone directory with everything needed
  // to run the app without node_modules
  output: 'standalone',
}
export default config</code></pre></div>`,

<div class="prose">
  <p>Performance in Next.js is largely automatic — static rendering, image optimization, font optimization, and code splitting happen by default. But as apps grow, you need to actively monitor and optimize.</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t">Bundle Analysis</div><div class="card-b">Install <code>@next/bundle-analyzer</code> and run it to see which packages are largest. Often you'll find a large client-side dependency that can be moved to a Server Component or replaced with a lighter alternative.</div></div>
  <div class="card"><div class="card-t">Dynamic Imports</div><div class="card-b">Use <code>dynamic()</code> from <code>'next/dynamic'</code> to lazy-load heavy Client Components only when needed. Combined with the <code>loading</code> option, it code-splits the component out of the initial bundle.</div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import dynamic from 'next/dynamic'

  loading: () => &lt;div className="animate-pulse h-48 bg-gray-100 rounded"&gt;&lt;/div&gt;,
  ssr: false, // Don't render on server (if it uses browser APIs)
})</code></pre></div>

<div class="tbl-wrap">

</div>`,

      content:`
<div class="prose">
  <p>Next.js 16 ships a first-party <strong>Devtools MCP server</strong> — a Model Context Protocol integration that exposes your running Next.js application's internals to AI tools like Claude, Cursor, and VS Code Copilot. This means you can ask your AI assistant questions about your app's routes, caching state, build output, and request logs directly, without switching context.</p>
  <p>The MCP server runs alongside your dev server and provides structured data about your application that AI tools can query. It dramatically shortens the debugging loop: instead of manually inspecting build output or adding console logs, you describe the problem to your AI assistant and it queries the live app state.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="card-t">Route Inspector</div><div class="card-b">Query which routes are static vs dynamic, what layouts they use, and their current cache status — all via natural language in your AI tool.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div><div class="card-t">Cache Inspector</div><div class="card-b">See which cache entries exist, when they were last revalidated, and their TTL — making it easy to debug stale data issues without guessing.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="card-t">Request Logs</div><div class="card-b">Improved structured logging for both builds and development requests in Next.js 16 — clear timing, cache hit/miss indicators, and streaming boundaries in the terminal output.</div></div>
  <div class="card"><div class="card-ico-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div><div class="card-t">Build Analysis</div><div class="card-b">Ask your AI tool why a route became dynamic, what triggered a cache invalidation, or why a component is included in the client bundle — the MCP server provides the context.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Enabling the Devtools MCP</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># The Devtools MCP server starts automatically with npm run dev

# Once connected, you can ask things like:
# "Why is /dashboard being rendered dynamically?"
# "What is the cache status of the 'products' tag?"

<div class="box box-nxt">
  <div class="box-hdr">${SVG.info} Improved DX Logging in Next.js 16</div>
  <div class="box-body">
    <p>Alongside the MCP integration, Next.js 16 significantly improves the terminal output during development and builds. You now see:</p>
    <ul>
      <li><strong>Cache hit/miss indicators</strong> on every fetch request</li>
      <li><strong>Streaming boundary markers</strong> showing where Suspense splits the response</li>
      <li><strong>Revalidation events</strong> logged in real time when tags are invalidated</li>
      <li><strong>Build timing breakdown</strong> per route, showing Turbopack compile times</li>
    </ul>
  </div>
</div>`,

        {type:'new',title:'MCP is a Next.js 16 first-party feature',body:`<p>The Devtools MCP server is built into the Next.js 16 dev server — no plugins or separate packages needed. It follows the open Model Context Protocol standard, meaning it works with any MCP-compatible AI tool (Claude, Cursor, GitHub Copilot, and others). The server only runs in development mode and is never included in production builds.</p>`},

    {
      id:'crud-actions', group:'Phase 10 — Full-Stack Project', icon:'code', title:'CRUD with Server Actions',
      sub:'Building Create, Read, Update, and Delete operations for tasks.',
      content:`
<div class="prose">
  <p>All task mutations will be Server Actions. This keeps our business logic on the server, ensures authentication, and gives us type-safe calls from any Client Component without writing API routes.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">actions/tasks.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { auth } from '@/auth'
import { db } from '@/lib/db'
import { revalidatePath } from 'next/cache'
import { redirect } from 'next/navigation'
import { z } from 'zod'

const TaskSchema = z.object({
  title: z.string().min(1).max(200),
  description: z.string().optional(),
  priority: z.enum(['LOW', 'MEDIUM', 'HIGH', 'URGENT']),
  dueDate: z.string().optional(),
})

export async function createTask(prevState: any, formData: FormData) {
  const session = await auth()
  if (!session?.user?.id) return { error: 'Unauthorized' }

  const result = TaskSchema.safeParse({
    title: formData.get('title'),
    description: formData.get('description'),
    priority: formData.get('priority'),
    dueDate: formData.get('dueDate'),
  })

  if (!result.success) return { errors: result.error.flatten().fieldErrors }

  await db.task.create({
    data: { ...result.data, userId: session.user.id }
  })

  revalidatePath('/tasks')
  return { success: true }
}

export async function updateTaskStatus(taskId: string, status: string) {
  const session = await auth()
  if (!session?.user?.id) return

  // Verify ownership before updating
  const task = await db.task.findFirst({
    where: { id: taskId, userId: session.user.id }
  })
  if (!task) return

  await db.task.update({
    where: { id: taskId },
    data: { status: status as any }
  })

  revalidatePath('/tasks')
}

export async function deleteTask(taskId: string) {
  const session = await auth()
  if (!session?.user?.id) return

  await db.task.deleteMany({
    where: { id: taskId, userId: session.user.id }
  })

  revalidatePath('/tasks')
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'Optimistic updates with useOptimistic',body:`<p>For a snappier UX, use React 19's <code>useOptimistic</code> hook to immediately update the UI before the Server Action completes. The UI shows the optimistic state instantly, then syncs with the real server response. If the action fails, the optimistic state is rolled back automatically.</p>`},
      ]
    },

  ]; // end SECTIONS

  // ─────────────────────────────────────────────────────
  // RENDER ENGINE
  // ─────────────────────────────────────────────────────
  let currentIdx = 0;
  const visited = new Set();

  function buildSidebar() {
    const sb = document.getElementById('sidebar');
    let currentGroup = '';
    let html = '';
    SECTIONS.forEach((s, i) => {
      if (s.group !== currentGroup) {
        currentGroup = s.group;
        html += `<div class="sg-label">${s.group}</div>`;
      }
      html += `<div class="si${i===0?' active':''}" data-idx="${i}" onclick="showSection(${i})">
      ${SVG[s.icon]||SVG.code}
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.title}</span>
      <span class="sn">${String(i+1).padStart(2,'0')}</span>
    </div>`;
    });
    sb.innerHTML = html;
  }

  function buildBoxes(boxes) {
    if (!boxes || !boxes.length) return '';
    return boxes.map(b => `
    <div class="box box-${b.type}">
      <div class="box-hdr">${{nxt:SVG.info,tip:SVG.info,warn:SVG.warn,new:SVG.star,ok:SVG.check}[b.type]||SVG.info} ${b.title}</div>
      <div class="box-body">${b.body}</div>
    </div>`).join('');
  }

  function buildNavRow(idx) {
    const prev = idx > 0 ? SECTIONS[idx-1] : null;
    const next = idx < SECTIONS.length-1 ? SECTIONS[idx+1] : null;
    return `<div class="nav-row">
    ${prev ? `<button class="nav-btn" onclick="showSection(${idx-1})">${SVG.prev}<span class="nav-label">${prev.title}</span></button>` : '<span></span>'}
    ${next ? `<button class="nav-btn next" onclick="showSection(${idx+1})"><span class="nav-label">${next.title}</span>${SVG.next}</button>` : ''}
  </div>`;
  }

  function showSection(idx) {
    if (idx < 0 || idx >= SECTIONS.length) return;
    const s = SECTIONS[idx];
    currentIdx = idx;
    visited.add(idx);

    // Update sidebar
    document.querySelectorAll('.si').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });

    // Scroll sidebar item into view
    const activeItem = document.querySelector('.si.active');
    if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // Render content
    const content = document.getElementById('content');
    content.innerHTML = `
    <div class="sec vis" id="sec-${idx}">
      <div class="sec-crumb">${s.group} <span>›</span> ${s.title}</div>
      <h1 class="sec-title">${s.title}</h1>
      <p class="sec-sub">${s.sub}</p>
      <hr class="divider">
      ${s.content}
      ${buildBoxes(s.boxes)}
      ${buildNavRow(idx)}
    </div>`;
    content.scrollTop = 0;

    // Update progress
    const pct = Math.round((visited.size / SECTIONS.length) * 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progTxt').textContent = `${visited.size} / ${SECTIONS.length}`;

    // Syntax highlight
    if (window.Prism) Prism.highlightAllUnder(content);

    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('vis');
  }

  function copyCode(btn) {
    const code = btn.closest('.cb').querySelector('code');
    navigator.clipboard.writeText(code.innerText).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1600);
    });
  }

  // SEARCH
  function buildSearchIndex() {
    return SECTIONS.map((s, i) => ({
      idx: i,
      title: s.title,
      sub: s.sub,
      group: s.group,
      text: (s.title + ' ' + s.sub + ' ' + (s.content || '')).toLowerCase()
    }));
  }
  const searchIndex = buildSearchIndex();

  function doSearch(q) {
    const drop = document.getElementById('srchDrop');
    if (!q.trim()) { drop.classList.remove('vis'); return; }
    const results = searchIndex.filter(s => s.text.includes(q.toLowerCase())).slice(0, 8);
    if (!results.length) {
      drop.innerHTML = `<div class="srch-empty">No results for "${q}"</div>`;
    } else {
      drop.innerHTML = results.map(r => `
      <div class="srch-item" onclick="showSection(${r.idx});document.getElementById('srchDrop').classList.remove('vis');document.getElementById('searchInput').value='';document.getElementById('searchInputMobile').value='';">
        <div class="sg">${r.group}</div>${r.title}
      </div>`).join('');
    }
    // Position below search box
    const box = document.getElementById('searchBox');
    const rect = box.getBoundingClientRect();
    drop.style.left = rect.left + 'px';
    drop.style.top = (rect.bottom + 6) + 'px';
    drop.style.width = Math.max(rect.width, 280) + 'px';
    drop.classList.add('vis');
  }

  document.getElementById('searchInput').addEventListener('input', e => doSearch(e.target.value));
  document.getElementById('searchInputMobile').addEventListener('input', e => doSearch(e.target.value));
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      (document.getElementById('searchInput')).focus();
    }
    if (e.key === 'Escape') document.getElementById('srchDrop').classList.remove('vis');
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#srchDrop') && !e.target.closest('#searchBox')) {
      document.getElementById('srchDrop').classList.remove('vis');
    }
  });

  // MOBILE SIDEBAR
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('vis');
  });
  document.getElementById('overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('vis');
  });

  // FAB – handled inline after fab-wrap HTML
  // INIT
  buildSidebar();
  showSection(0);
</script>
<script>
  (function(){
    var wrap=document.getElementById('fabWrap'),btn=document.getElementById('fabBtn'),menu=document.getElementById('fabMenu'),items=menu.querySelectorAll('.fab-item');
    var open=false,dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0;
    function startDrag(cx,cy){dragging=true;moved=false;var r=wrap.getBoundingClientRect();sx=r.left;sy=r.top;ox=cx;oy=cy;wrap.style.transition='none';}
    function moveDrag(cx,cy){if(!dragging)return;var dx=cx-ox,dy=cy-oy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;var W=window.innerWidth,H=window.innerHeight,w=wrap.offsetWidth,h=wrap.offsetHeight;wrap.style.right='auto';wrap.style.bottom='auto';wrap.style.left=Math.max(8,Math.min(W-w-8,sx+dx))+'px';wrap.style.top=Math.max(8,Math.min(H-h-8,sy+dy))+'px';}
    function endDrag(){if(!dragging)return;dragging=false;wrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';var W=window.innerWidth,w=wrap.offsetWidth,r=wrap.getBoundingClientRect(),onLeft=(r.left+w/2)<W/2;wrap.style.left=(onLeft?16:W-w-16)+'px';wrap.classList.toggle('fab-left',onLeft);}
    function closeMenu(){open=false;btn.classList.remove('open');btn.setAttribute('aria-expanded','false');items.forEach(function(it){it.classList.remove('vis');});setTimeout(function(){menu.style.pointerEvents='none';},220);}
    function openMenu(){open=true;btn.classList.add('open');btn.setAttribute('aria-expanded','true');menu.style.pointerEvents='auto';items.forEach(function(it,i){setTimeout(function(){it.classList.add('vis');},i*65);});}
    wrap.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);e.preventDefault();});
    document.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
    document.addEventListener('mouseup',function(){endDrag();});
    wrap.addEventListener('touchstart',function(e){startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    document.addEventListener('touchmove',function(e){if(dragging){moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    document.addEventListener('touchend',function(){endDrag();});
    btn.addEventListener('click',function(){if(moved)return;open?closeMenu():openMenu();});
    document.addEventListener('click',function(e){if(open&&!wrap.contains(e.target))closeMenu();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&open)closeMenu();});
  })();
</script>
