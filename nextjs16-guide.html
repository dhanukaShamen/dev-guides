            content:`
<div class="prose">
  <p><strong>Authentication</strong> answers "who are you?" — it verifies identity via credentials, OAuth, or magic links. <strong>Authorization</strong> answers "what are you allowed to do?" — it governs which resources and actions are available to a given user. Auth.js handles authentication; authorization is your responsibility to implement.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">Authentication</div><div class="card-b">Verifying identity. "This is user@example.com and they are logged in." Handled by Auth.js, Clerk, Lucia, or custom JWT logic. Returns a <em>session</em> with user identity.</div></div>
  <div class="card"><div class="card-t">Authorization</div><div class="card-b">Enforcing permissions. "This user is a <em>viewer</em> — they can read posts but not delete them." Always implemented in your own application logic, not the auth library.</div></div>
</div>

<div class="prose"><h3>Adding Roles to Your Schema</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">prisma/schema.prisma</span><span class="cb-lang">prisma</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>enum Role {
  USER
  EDITOR
  ADMIN
}

model User {
  id    String @id @default(cuid())
  email String @unique
  role  Role   @default(USER)
}</code></pre></div>

<div class="prose"><h3>Including Role in the Session</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">auth.ts (Auth.js config)</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import NextAuth from 'next-auth'
import { db } from '@/lib/db'

export const { auth, handlers } = NextAuth({
  callbacks: {
    async session({ session, token }) {
      if (token.sub) {
        const user = await db.user.findUnique({
          where: { id: token.sub },
          select: { role: true },
        })
        session.user.id   = token.sub
        session.user.role = user?.role ?? 'USER'
      }
      return session
    },
    async jwt({ token, user }) {
      if (user) token.sub = user.id
      return token
    },
  },
})</code></pre></div>

<div class="prose"><h3>Authorization in Server Actions</h3><p>Every Server Action that mutates sensitive data must check both authentication and authorization:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/deletePost.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { auth } from '@/auth'
import { db } from '@/lib/db'

export async function deletePost(postId: string) {
  // Step 1: Authentication check
  const session = await auth()
  if (!session?.user) {
    return { ok: false, error: 'You must be signed in.' }
  }

  // Step 2: Fetch the resource
  const post = await db.post.findUnique({ where: { id: postId } })
  if (!post) return { ok: false, error: 'Post not found.' }

  // Step 3: Authorization — ADMIN can delete any post, USER only their own
  const isOwner = post.authorId === session.user.id
  const isAdmin = session.user.role === 'ADMIN'

  if (!isOwner &amp;&amp; !isAdmin) {
    return { ok: false, error: 'You do not have permission to delete this post.' }
  }

  await db.post.delete({ where: { id: postId } })
  return { ok: true }
}</code></pre></div>

<div class="prose"><h3>Reusable Permission Helper</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/permissions.ts</span><span class="cb-lang">ts</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { Role } from '@prisma/client'

type Permission = 'posts:delete' | 'posts:publish' | 'users:manage'

const ROLE_PERMISSIONS: Record&lt;Role, Permission[]&gt; = {
  USER:   [],
  EDITOR: ['posts:delete', 'posts:publish'],
  ADMIN:  ['posts:delete', 'posts:publish', 'users:manage'],
}

export function can(role: Role, permission: Permission): boolean {
  return ROLE_PERMISSIONS[role]?.includes(permission) ?? false
}

// Usage in a Server Action:
// if (!can(session.user.role, 'posts:publish')) {
//   return { ok: false, error: 'Insufficient permissions.' }
// }</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Never trust the client for authorization',body:`<p>Hiding a button in the UI is not authorization — it's just UX. A user can still call your Server Action or Route Handler directly by crafting an HTTP request. Authorization checks must always happen on the server, inside the Server Action or Route Handler, regardless of what the UI shows. The UI check is for usability; the server check is for security.</p>`},
                {type:'tip',title:'Centralize authorization in a lib/ module',body:`<p>Rather than writing role checks ad-hoc in every action, build a small <code>lib/permissions.ts</code> module (as shown above) that maps roles to permissions. This makes it trivial to audit what each role can do — you have a single file to review rather than grepping through every action. As your app grows, this can evolve into a full policy engine.</p>`},
                {type:'nxt',title:'Middleware for route-level role protection',body:`<p>For protecting entire route segments by role, you can check the session role in <code>middleware.ts</code>. For example, redirect any non-admin user away from <code>/admin/*</code> routes before the page even renders. Combine this with Server Action checks for defense in depth — middleware is fast (runs at the edge) but Server Actions should still verify authorization independently.</p>`},
            ]

            content:`
<div class="prose">
  <p>SWR's <code>useSWR</code> is for reading data. For writes — creating, updating, deleting — SWR provides <code>useSWRMutation</code>. Together they give you a complete client-side data layer: fresh reads, responsive writes, and automatic cache consistency.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">useSWR</div><div class="card-b">Fires on mount and re-fires on focus/network reconnect. Best for reading data that should stay fresh. Provides <code>data</code>, <code>error</code>, <code>isLoading</code>, <code>mutate</code>.</div></div>
  <div class="card"><div class="card-t">useSWRMutation</div><div class="card-b">Only fires when you call <code>trigger()</code>. Best for writes (POST/PUT/DELETE). Provides <code>trigger</code>, <code>isMutating</code>, <code>data</code>, <code>error</code>, and supports optimistic updates.</div></div>
</div>

<div class="prose"><h3>Basic useSWRMutation</h3></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/CreatePostButton.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWRMutation from 'swr/mutation'

interface NewPost { title: string; body: string }

async function createPost(url: string, { arg }: { arg: NewPost }) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(arg),
  })
  if (!res.ok) throw new Error('Failed to create post')
  return res.json()
}

export function CreatePostButton() {
  const { trigger, isMutating, error } = useSWRMutation(
    '/api/posts',
    createPost
  )

  return (
    &lt;div&gt;
      &lt;button
        onClick={() => trigger({ title: 'Hello', body: 'World' })}
        disabled={isMutating}
      &gt;
        {isMutating ? 'Saving...' : 'Create Post'}
      &lt;/button&gt;
      {error &amp;&amp; &lt;p className="text-red-500"&gt;{error.message}&lt;/p&gt;}
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Revalidating After Mutation</h3><p>After a successful write, revalidate the affected SWR keys so the UI reflects the new state:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/CreatePostForm.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR, { useSWRConfig } from 'swr'
import useSWRMutation from 'swr/mutation'

export function PostList() {
  const { mutate } = useSWRConfig()
  const { data: posts } = useSWR('/api/posts', fetcher)

  const { trigger, isMutating } = useSWRMutation(
    '/api/posts',
    async (url, { arg }: { arg: { title: string } }) => {
      const res = await fetch(url, { method: 'POST', body: JSON.stringify(arg) })
      if (!res.ok) throw new Error('Create failed')
      return res.json()
    },
    {
      // After success: revalidate the posts list from the server
      onSuccess: () => mutate('/api/posts'),
    }
  )

  return (
    &lt;div&gt;
      {posts?.map((p: any) =&gt; &lt;div key={p.id}&gt;{p.title}&lt;/div&gt;)}
      &lt;button onClick={() =&gt; trigger({ title: 'New Post' })} disabled={isMutating}&gt;
        Add Post
      &lt;/button&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Optimistic Updates</h3><p>Show the result immediately before the server confirms — remove it if the request fails:</p></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/LikeButton.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR from 'swr'
import useSWRMutation from 'swr/mutation'

interface Post { id: string; likes: number; likedByMe: boolean }

async function toggleLike(url: string) {
  const res = await fetch(url, { method: 'POST' })
  if (!res.ok) throw new Error('Like failed')
  return res.json()
}

export function LikeButton({ postId }: { postId: string }) {
  const key = \`/api/posts/\${postId}\`
  const { data: post } = useSWR&lt;Post&gt;(key, fetcher)

  const { trigger } = useSWRMutation(
    \`/api/posts/\${postId}/like\`,
    toggleLike,
    {
      // Immediately update the local cache — don't wait for server
      optimisticData: post
        ? { ...post, likes: post.likedByMe ? post.likes - 1 : post.likes + 1, likedByMe: !post.likedByMe }
        : post,
      // On error: automatically rolls back to the previous value
      rollbackOnError: true,
      // After server responds: revalidate to ensure consistency
      revalidate: true,
    }
  )

  if (!post) return null
  return (
    &lt;button onClick={() =&gt; trigger()}&gt;
      {post.likedByMe ? '❤️' : '🤍'} {post.likes}
    &lt;/button&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'useSWRMutation vs useOptimistic (Server Actions)',body:`<p><code>useSWRMutation</code> is for client-side API calls to Route Handlers or external APIs. React 19's <code>useOptimistic</code> is for Server Actions — it works within the form/action cycle and is the better choice when you're using <code>useActionState</code> with a Server Action. Choose based on where your mutation lives: client API call → <code>useSWRMutation</code>; Server Action → <code>useOptimistic</code>.</p>`},

                {type:'nxt',title:'Bound mutate vs global mutate',body:`<p>SWR provides two forms of <code>mutate</code>. The <em>bound mutate</em> from <code>useSWR</code> revalidates only the key it's bound to: <code>const { mutate } = useSWR(key, ...)</code>. The <em>global mutate</em> from <code>useSWRConfig()</code> can revalidate any key by string: <code>const { mutate } = useSWRConfig(); mutate('/api/posts')</code>. Use global mutate from <code>useSWRMutation</code>'s <code>onSuccess</code> callback to revalidate related data after a write — for example, revalidate a post list after creating a new post.</p>`},

        function endDrag(){if(!dragging)return;dragging=false;wrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';var W=window.innerWidth,w=wrap.offsetWidth,r=wrap.getBoundingClientRect(),onLeft=(r.left+w/2)<W/2;wrap.style.left=(onLeft?16:W-w-16)+'px';wrap.classList.toggle('fab-left',onLeft);}
        function closeMenu(){open=false;btn.classList.remove('open');btn.setAttribute('aria-expanded','false');items.forEach(function(it){it.classList.remove('vis');});setTimeout(function(){menu.style.pointerEvents='none';},220);}
        function openMenu(){open=true;btn.classList.add('open');btn.setAttribute('aria-expanded','true');menu.style.pointerEvents='auto';items.forEach(function(it,i){setTimeout(function(){it.classList.add('vis');},i*65);});}
        wrap.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);e.preventDefault();});
        document.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
        document.addEventListener('mouseup',function(){endDrag();});
        wrap.addEventListener('touchstart',function(e){startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
        document.addEventListener('touchmove',function(e){if(dragging){moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
        document.addEventListener('touchend',function(){endDrag();});
        btn.addEventListener('click',function(){if(moved)return;open?closeMenu():openMenu();});
        document.addEventListener('click',function(e){if(open&&!wrap.contains(e.target))closeMenu();});
    })();

    // INIT
    buildSidebar();
    showSection(0);
</script>
</body>
