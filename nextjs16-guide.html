<p style="margin-top:8px;"><strong>Client Component</strong> = works in the dining room. Has event handlers (can respond to the customer). Uses <code>useState</code> and <code>useEffect</code>. Does send JavaScript to the browser. Cannot directly touch the database (the customer can't walk into the kitchen).</p>
<p style="margin-top:8px;"><strong>The golden rule:</strong> Start in the kitchen (Server Component). Only move something to the dining room (<code>'use client'</code>) when it needs to interact with the user directly.</p></div>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg> Server Component vs Client Component</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Server Component (Default)</div>
      <ul>
        <li>Renders on the server</li>
        <li>Zero JavaScript sent to browser</li>
        <li>Can use async/await directly</li>
        <li>Can access databases, file system, secrets</li>
        <li>Cannot use useState, useEffect</li>
        <li>Cannot use browser APIs</li>
        <li>Cannot have event handlers (onClick, etc.)</li>
      </ul>
    </div>
    <div class="ms-arrow">vs</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">Client Component ('use client')</div>
      <ul>
        <li>Renders on client (and optionally server)</li>
        <li>JavaScript bundle sent to browser</li>
        <li>Can use all React hooks</li>
        <li>Can use browser APIs (localStorage, etc.)</li>
        <li>Can use useState, useEffect</li>
        <li>Can have event handlers</li>
        <li>Cannot use async/await at component level</li>
      </ul>
    </div>
  </div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// SERVER COMPONENT — no directive needed, this is the default
// Runs only on the server. No JS sent to browser for this component.
// Can use async/await directly!

import LikeButton from './LikeButton' // Client Component

async function getPosts() {
  // Direct database access — never exposed to browser
  const { db } = await import('@/lib/db')
  return db.select().from(posts)
}

export default async function PostsPage() {
  const posts = await getPosts() // Works! Server Components can be async

  return (
    &lt;ul&gt;
      {posts.map(post =&gt; (
        &lt;li key={post.id}&gt;
          &lt;h2&gt;{post.title}&lt;/h2&gt;
          {/* Pass server data to a client component */}
          &lt;LikeButton postId={post.id} initialLikes={post.likes} /&gt;
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'nxt',title:'Server-First: The Default is Server',body:`<p>In the App Router, <strong>every component is a Server Component by default</strong>. You only add <code>'use client'</code> at the top of a file when you need interactivity or browser APIs. Think of it as opting into the browser, not opting into the server.</p>`},
                {type:'tip',title:'The Golden Rule: Push use client down',body:`<p>Keep <code>'use client'</code> boundaries as low in the component tree as possible. If only a button needs interactivity, extract just the button as a Client Component — not the entire page. This minimizes the JavaScript bundle sent to the browser.</p>`},
            ]
        },

        {
            id:'server-components', group:'Phase 3 — Rendering & Components', icon:'server', title:'How Server Components Work',
            sub:'Zero JS bundle impact, direct data access, streaming, and React Server Components (RSC).',
            content:`
<div class="prose">
  <p>React Server Components (RSC) are a new primitive in React 19 that Next.js is built upon. They change the fundamental model of React rendering — components that run exclusively on the server produce HTML that is sent to the browser, with <strong>zero JavaScript</strong> shipped for the component itself.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">What Server Components Can Do</div><div class="card-b">
    <ul style="list-style:none;padding:0;">
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> async/await at the component level</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Direct DB queries without APIs</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Read environment secrets safely</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Access file system</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Import heavy server-only packages</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> useState, useEffect, hooks</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> onClick, onChange, event handlers</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> Browser APIs (window, localStorage)</li>
    </ul>
  </div></div>
  <div class="card"><div class="card-t">Performance Benefits</div><div class="card-b">
    <ul style="list-style:none;padding:0;">
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Zero JS bundle size for the component</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Data fetched close to the database</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Secrets never leave the server</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> No waterfall client fetches</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Faster Time to First Byte (TTFB)</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Better Core Web Vitals scores</li>
    </ul>
  </div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// This entire component runs on the SERVER
// The browser receives HTML, not this JavaScript
import { db } from '@/lib/db'

export default async function Dashboard() {
  // Direct database query — no fetch, no API route needed!
  const user = await db.query.users.findFirst({
    where: eq(users.id, getCurrentUserId())
  })

  // These run in parallel on the server — fast!
  const [stats, recentActivity] = await Promise.all([
    db.query.stats.findMany({ where: eq(stats.userId, user.id) }),
    db.query.activity.findMany({ limit: 10 })
  ])

  return (
    &lt;div&gt;
      &lt;h1&gt;Welcome, {user.name}&lt;/h1&gt;
      &lt;StatsGrid stats={stats} /&gt;         {/* Server Component */}
      &lt;ActivityFeed items={recentActivity} /&gt; {/* Server Component */}
    &lt;/div&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Server-only packages',body:`<p>Some npm packages only work on Node.js (like <code>fs</code>, <code>bcrypt</code>, database drivers). If you accidentally import them in a Client Component, you'll get a build error. Use the <code>server-only</code> package to prevent this: <code>import 'server-only'</code> at the top of any module that must never run in the browser.</p>`},
                {type:'warn',title:'The Third-Party Library Trap — Boundary Strategy',body:`<p>Most popular UI libraries — <code>framer-motion</code>, <code>react-toastify</code>, <code>react-select</code>, <code>recharts</code>, and others — were built before Server Components existed. They use browser APIs and React hooks internally, which means <strong>importing them directly in a Server Component will crash your app</strong>.</p>
<p style="margin-top:8px;"><strong>The Boundary Strategy:</strong> wrap any third-party UI library in a thin <code>'use client'</code> component that you control:</p>
<pre style="background:#070a12;border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;overflow-x:auto;margin:10px 0;">
<span style="color:#546e7a;">// components/Toast.tsx — the 'use client' wrapper</span>
<span style="color:#c3e88d;">'use client'</span>
<span style="color:#c792ea;">import</span> { ToastContainer, toast } <span style="color:#c792ea;">from</span> <span style="color:#c3e88d;">'react-toastify'</span>
<span style="color:#c792ea;">import</span> <span style="color:#c3e88d;">'react-toastify/dist/ReactToastify.css'</span>

<span style="color:#c792ea;">export</span> { toast }  <span style="color:#546e7a;">// re-export for convenience</span>
<span style="color:#c792ea;">export</span> <span style="color:#c792ea;">default function</span> <span style="color:#82aaff;">Toaster</span>() {
  <span style="color:#c792ea;">return</span> &lt;ToastContainer /&gt;
}

<span style="color:#546e7a;">// app/layout.tsx — import the WRAPPER, not the library directly</span>
<span style="color:#c792ea;">import</span> Toaster <span style="color:#c792ea;">from</span> <span style="color:#c3e88d;">'@/components/Toast'</span>  <span style="color:#546e7a;">// ✅ safe in Server Component</span>
</pre>
<p>Many popular libraries like <code>shadcn/ui</code> already do this for you. Check if a library has a Next.js guide before using it directly in Server Components.</p>`},
            ]
        },

        {
            id:'client-components', group:'Phase 3 — Rendering & Components', icon:'monitor', title:'Client Components in Next.js',
            sub:'Handling interactivity, hooks, browser APIs, and defining use client boundaries.',
            content:`
<div class="prose">
  <p>Client Components are React components that include interactivity. They are still rendered on the server initially (for fast first paint and SEO), but they also ship JavaScript to the browser so users can interact with them.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/ThemeToggle.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client' // 👈 This marks the boundary

import { useState, useEffect } from 'react'

export default function ThemeToggle() {
  const [theme, setTheme] = useState&lt;'light' | 'dark'&gt;('light')

  useEffect(() => {
    // ✅ Can use browser APIs inside useEffect
    const stored = localStorage.getItem('theme')
    if (stored) setTheme(stored as 'light' | 'dark')
  }, [])

  function toggle() {
    const next = theme === 'light' ? 'dark' : 'light'
    setTheme(next)
    localStorage.setItem('theme', next)
    document.documentElement.classList.toggle('dark')
  }

  return (
    &lt;button onClick={toggle}&gt; {/* ✅ Event handlers work in Client Components */}
      {theme === 'light' ? 'Switch to Dark' : 'Switch to Light'}
    &lt;/button&gt;
  )
}</code></pre></div>

<div class="dtree" style="margin-top:20px;">
  <div class="dtree-title">Decision: Do I need 'use client'?</div>
  <div class="dtree-q"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Does your component use useState, useEffect, or other hooks?</div>
  <div class="dtree-branch">
    <div class="dtree-opt dtree-opt-yes"><strong>YES</strong>Needs 'use client'</div>
    <div class="dtree-opt dtree-opt-no"><strong>NO</strong>Continue checking...</div>
  </div>
  <div class="dtree-q" style="margin-top:14px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Does it have onClick, onChange, or other event handlers?</div>
  <div class="dtree-branch">
    <div class="dtree-opt dtree-opt-yes"><strong>YES</strong>Needs 'use client'</div>
    <div class="dtree-opt dtree-opt-no"><strong>NO</strong>Use as Server Component — no directive needed</div>
  </div>
</div>`,
            boxes:[
                {type:'tip',title:'use client is a module boundary, not a component flag',body:`<p>When you add <code>'use client'</code> to a file, <strong>every component exported from that file</strong> becomes a Client Component — including all its children that don't have their own directive. The directive marks a boundary in the module graph, not a single component. This is why you should keep <code>'use client'</code> files small and focused.</p>`},
            ]
        },

        {
            id:'component-patterns', group:'Phase 3 — Rendering & Components', icon:'layers', title:'Component Composition Patterns',
            sub:'Mastering Server → Client composition and passing server data to the client.',
            content:`
<div class="prose">
  <p>The most powerful pattern in Next.js is <strong>composing Server and Client Components together</strong>. Server Components can render Client Components and pass them data as props. But Client Components cannot render Server Components directly — that would break the server/client boundary.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/[id]/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// SERVER COMPONENT — fetches data, renders Client Components
import { CommentSection } from '@/components/CommentSection'
import { LikeButton } from '@/components/LikeButton'
import { db } from '@/lib/db'

export default async function PostPage({ params }: { params: Promise&lt;{id:string}&gt; }) {
  const { id } = await params
  // Fetch on server — no loading state needed for initial render
  const post = await db.posts.findUnique({ where: { id } })
  const comments = await db.comments.findMany({ where: { postId: id } })

  return (
    &lt;article&gt;
      &lt;h1&gt;{post.title}&lt;/h1&gt;
      &lt;p&gt;{post.body}&lt;/p&gt;

      {/* Pass server data down to Client Components as props */}
      &lt;LikeButton postId={post.id} initialLikes={post.likes} /&gt;
      &lt;CommentSection postId={post.id} initialComments={comments} /&gt;
    &lt;/article&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/LikeButton.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState } from 'react'

interface Props {
  postId: string
  initialLikes: number  // ← Passed from Server Component
}

export function LikeButton({ postId, initialLikes }: Props) {
  // Client-side state, initialized from server data
  const [likes, setLikes] = useState(initialLikes)
  const [liked, setLiked] = useState(false)

  async function handleLike() {
    setLiked(true)
    setLikes(l => l + 1)
    await fetch(\`/api/posts/\${postId}/like\`, { method: 'POST' })
  }

  return (
    &lt;button onClick={handleLike} disabled={liked}&gt;
      {liked ? 'Liked!' : \`Like (\${likes})\`}
    &lt;/button&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'nxt',title:'The children pattern for Server Components inside Client Components',body:`<p>Client Components cannot <em>import</em> Server Components. But they can accept them as <code>children</code> props. This lets you nest a Server Component inside a Client Component: <code>&lt;ClientWrapper&gt;&lt;ServerComponent /&gt;&lt;/ClientWrapper&gt;</code>. The Server Component is still rendered on the server — the Client Component just slots it in.</p>`},
            ]
        },

        {
            id:'streaming', group:'Phase 3 — Rendering & Components', icon:'refresh', title:'Streaming & Suspense',
            sub:'Progressive rendering, setting Suspense boundaries, and designing loading UI.',
            content:`
<div class="prose">
  <p>Streaming allows Next.js to send parts of the UI to the browser as they become ready, rather than waiting for all data to load before sending anything. Slow parts of the page stream in progressively while fast parts are already interactive.</p>
  <p>You control streaming by placing React <code>&lt;Suspense&gt;</code> boundaries around components that fetch data. Next.js streams the fallback immediately, then streams the actual content when ready.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Turning On the Kitchen Taps, Not Waiting for the Water Tower</div>
  <div class="box-body"><p>Imagine ordering a full meal at a restaurant. Without streaming, the kitchen would hold your soup, main course, and dessert until <em>everything</em> is ready — then bring it all out at once. If the dessert takes 30 extra minutes, your soup goes cold and you wait hungry.</p>
<p style="margin-top:8px;">With streaming, the waiter brings each dish <strong>as it is ready</strong>: soup arrives first, main course when it's cooked, dessert last. You start eating immediately — the total wait feels much shorter.</p>
<p style="margin-top:8px;"><strong>In Next.js:</strong> the page's fast parts (heading, navigation, quick actions) arrive at the browser instantly. Slow parts (database-heavy stats, personalised feeds) arrive when ready, smoothly replacing their skeleton placeholders. The user is never staring at a blank screen.</p>
<p style="margin-top:8px;"><strong>The <code>&lt;Suspense&gt;</code> boundary</strong> is the individual dish: it says "stream this part independently." Without Suspense, the whole page waits for the slowest component.</p></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { Suspense } from 'react'
import { StatsGrid, StatsGridSkeleton } from './StatsGrid'
import { RecentActivity, ActivitySkeleton } from './RecentActivity'
import { QuickActions } from './QuickActions'

export default function DashboardPage() {
  return (
    &lt;div&gt;
      {/* This loads instantly — no data fetching */}
      &lt;h1&gt;Dashboard&lt;/h1&gt;
      &lt;QuickActions /&gt;

      {/* StatsGrid fetches slow data — show skeleton while loading */}
      &lt;Suspense fallback={&lt;StatsGridSkeleton /&gt;}&gt;
        &lt;StatsGrid /&gt;
      &lt;/Suspense&gt;

      {/* These stream independently — each shows when ready */}
      &lt;Suspense fallback={&lt;ActivitySkeleton /&gt;}&gt;
        &lt;RecentActivity /&gt;
      &lt;/Suspense&gt;
    &lt;/div&gt;
  )
}</code></pre></div>
<div class="box box-tip">
  <div class="box-hdr">${SVG.info} Streaming vs loading.tsx</div>
  <div class="box-body"><p><code>loading.tsx</code> creates a Suspense boundary around the <strong>entire page</strong>. Manual <code>&lt;Suspense&gt;</code> gives you <strong>granular control</strong> — you can stream parts of the page independently. Use <code>loading.tsx</code> for simple pages, and manual Suspense for dashboards where different sections have different data speeds.</p></div>
</div>`,
            boxes:[
                {type:'new',title:'React 19.2 — View Transitions & Activity',body:`<p>React 19.2 (shipped with Next.js 16) adds the <strong>View Transitions API</strong> for animated page transitions, the <code>useEffectEvent()</code> hook for stable callbacks in effects, and the <code>&lt;Activity/&gt;</code> component which lets you deactivate parts of the UI (hiding them from the screen while preserving their state) and reactivate them later — perfect for tabs, modals, and background panels.</p>`},
            ]
        },

// ═══════════════════════════════════════
// PHASE 4 — DATA FETCHING
// ═══════════════════════════════════════
        {
            id:'server-fetching', group:'Phase 4 — Data Fetching', icon:'database', title:'Fetching in Server Components',
            sub:'Using direct fetch(), async components, and why useEffect is no longer needed for initial loads.',
            content:`
<div class="prose">
  <p>One of the biggest quality-of-life improvements in Next.js is that Server Components can be <code>async</code>. You can fetch data directly at the top of your component with <code>await</code> — no <code>useEffect</code>, no loading state, no separate API routes for initial data.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — Pre-Set Table vs. Ordering at the Table</div>
  <div class="box-body"><p>The old way (client-side <code>useEffect</code>) is like sitting down at a restaurant where the table is completely empty. You have to call the waiter, wait for them to write down your order, walk to the kitchen, wait for it to be cooked, and walk back — all while you sit there staring at an empty table (loading spinner).</p>
<p style="margin-top:8px;">The new way (Server Component <code>async/await</code>) is like arriving at a restaurant where your table is <strong>already set</strong> with your meal because the chef saw your reservation and prepared it in advance. You sit down and the food is already there — <em>zero wait, zero loading state</em>.</p>
<p style="margin-top:8px;"><strong>In code terms:</strong> the server runs your <code>await fetch()</code> or database query <em>before</em> sending any HTML to the browser. The user receives a fully-populated page, not a skeleton that fills in later.</p></div>
</div>
<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-bad">Old Way — Client-side useEffect</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">posts.tsx (old)</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>'use client'
import { useState, useEffect } from 'react'

export default function Posts() {
  const [posts, setPosts] = useState([])
  const [loading, setLoading] = useState(true)
  const [error, setError] = useState(null)

  useEffect(() => {
    fetch('/api/posts')
      .then(r => r.json())
      .then(setPosts)
      .catch(setError)
      .finally(() => setLoading(false))
  }, [])

  if (loading) return &lt;Spinner /&gt;
  if (error) return &lt;Error /&gt;
  return &lt;ul&gt;{posts.map(p => &lt;li&gt;{p.title}&lt;/li&gt;)}&lt;/ul&gt;
}</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-good">New Way — Server Component async/await</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/page.tsx</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>// No 'use client' — Server Component
// No useState, no useEffect, no loading state
// Errors bubble up to the nearest error.tsx

async function getPosts() {
  const res = await fetch('https://api.example.com/posts')
  if (!res.ok) throw new Error('Failed to fetch')
  return res.json()
}

export default async function Posts() {
  // Just await — Next.js handles the rest
  const posts = await getPosts()

  return (
    &lt;ul&gt;
      {posts.map(p => &lt;li key={p.id}&gt;{p.title}&lt;/li&gt;)}
    &lt;/ul&gt;
  )
}</code></pre></div>
  </div>
</div>`,
            boxes:[
                {type:'tip',title:'Parallel Fetching with Promise.all',body:`<p>When you need multiple pieces of data, fetch them in parallel: <code>const [users, posts] = await Promise.all([getUsers(), getPosts()])</code>. This runs both requests simultaneously, taking only as long as the slower one — not the sum of both.</p>`},
                {type:'warn',title:'useEffect for initial data is an anti-pattern in Next.js',body:`<p>If you find yourself writing <code>useEffect(() => { fetch(...) }, [])</code> for initial page data, stop. Move that component to a Server Component and use async/await. You'll eliminate the loading state, reduce JavaScript bundle size, and improve performance.</p>`},
            ]
        },

        {
            id:'fetch-api', group:'Phase 4 — Data Fetching', icon:'refresh', title:'The fetch API in Next.js',
            sub:'Extended fetch options like force-cache and next.revalidate — Next.js superpowers.',
            content:`
<div class="prose">
  <p>Next.js extends the native <code>fetch</code> API with extra options for controlling caching and revalidation. These options let you precisely define how long data is cached and when it should be refreshed — giving you static performance with dynamic data.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/examples/fetch-options.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// 1. STATIC — cached indefinitely (like getStaticProps)
// Best for data that never changes: config, constants
const staticData = await fetch('https://api.example.com/config', {
  cache: 'force-cache'
})

// 2. DYNAMIC — never cached, always fresh (like getServerSideProps)
// Best for per-request data: user profile, cart
const dynamicData = await fetch('https://api.example.com/user', {
  cache: 'no-store'
})

// 3. ISR — cached, revalidated every 60 seconds
// Best for frequently updated content: news, prices
const isrData = await fetch('https://api.example.com/news', {
  next: { revalidate: 60 }
})

// 4. TAG-BASED — cached until a specific tag is invalidated
// Best for content that changes on specific events
const taggedData = await fetch('https://api.example.com/products', {
  next: { tags: ['products'] }
})</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Option</th><th>Behavior</th><th>Use Case</th></tr></thead>
    <tbody>
      <tr><td><code>cache: 'force-cache'</code></td><td>Cached forever (until rebuild)</td><td>Static content, docs</td></tr>
      <tr><td><code>cache: 'no-store'</code></td><td>Never cached, always fresh</td><td>Auth-sensitive data</td></tr>
      <tr><td><code>next: { revalidate: N }</code></td><td>Cached for N seconds (ISR)</td><td>Product listings, news</td></tr>
      <tr><td><code>next: { tags: ['x'] }</code></td><td>Cached until tag invalidated</td><td>CMS content, e-commerce</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'new',title:'Next.js 16: Refined Caching APIs',body:`<p>Next.js 16 introduces <code>updateTag()</code> alongside the existing <code>revalidateTag()</code>. While <code>revalidateTag()</code> purges a cache entry so it is re-fetched on the next request, <code>updateTag()</code> lets you <strong>push new data directly into the cache</strong> without waiting for a request — useful for real-time updates and background revalidation flows. Both work with the <code>next: { tags: [...] }</code> fetch option.</p>`},
            ]
        },

        {
            id:'caching', group:'Phase 4 — Data Fetching', icon:'database', title:'Caching Strategies',
            sub:'Static vs Dynamic rendering, unstable_cache, and request memoization.',
            content:`
<div class="prose">
  <p>Next.js has a layered caching system. Understanding all four layers helps you build fast apps while keeping data fresh. Each layer serves a different purpose and has different invalidation behavior.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Four Layers of Caching = Your Restaurant Supply Chain</div>
  <div class="box-body"><p>Think of data as <strong>ingredients</strong>. Getting them fresh every single time is expensive and slow. Caching is the art of storing them at the right level so you use fresh produce without making a farmer's market run for every single dish.</p>
<ul>
  <li><strong>Request Memoization</strong> = the <em>prep station</em>. If you need the same onion chopped multiple times during one meal service, you chop it once and leave it on the station. Within a single render pass, identical <code>fetch()</code> calls are deduplicated automatically.</li>
  <li><strong>Data Cache</strong> = the <em>walk-in fridge</em>. Expensive fetch results (API calls, DB queries) stored persistently across many requests. Survives server restarts. You control freshness via <code>revalidate</code>.</li>
  <li><strong>Full Route Cache</strong> = <em>pre-cooked dishes in warming trays</em>. At build time, static pages are fully rendered and stored. Served instantly to every user — no cooking needed.</li>
  <li><strong>Router Cache</strong> = the <em>waiter's memory</em>. On the client side, recently visited pages are remembered in memory. Navigating back feels instant because the waiter already knows what you ordered last time.</li>
</ul></div>
</div>
<div class="g2">
  <div class="card"><div class="card-t">Request Memoization</div><div class="card-b">Within a single request, identical <code>fetch()</code> calls to the same URL are automatically deduplicated. If 5 components all fetch the same user data, only one HTTP request is made. This is automatic — you don't configure it.</div></div>
  <div class="card"><div class="card-t">Data Cache</div><div class="card-b">Persists fetch responses on the server across multiple requests. Controlled by <code>cache</code> and <code>next.revalidate</code> options on fetch calls. Survives server restarts.</div></div>
  <div class="card"><div class="card-t">Full Route Cache</div><div class="card-b">At build time, static routes are pre-rendered to HTML and stored. These cached responses are served instantly for all users — no compute needed per request.</div></div>
  <div class="card"><div class="card-t">Router Cache</div><div class="card-b">Client-side cache of prefetched pages. When you hover a Link, the page is fetched and cached in memory. Navigation feels instant.</div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/data.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { unstable_cache } from 'next/cache'

// unstable_cache wraps non-fetch data sources (like DB queries)
// with the same caching behavior as extended fetch
export const getUser = unstable_cache(
  async (id: string) => {
    // This database query result is cached
    return db.query.users.findFirst({ where: eq(users.id, id) })
  },
  ['user'],           // Cache key prefix
  {
    revalidate: 300,  // Refresh every 5 minutes
    tags: ['users'],  // Tag for on-demand invalidation
  }
)</code></pre></div>`,
            boxes:[
                {type:'warn',title:'Dynamic functions opt out of static rendering',body:`<p>Calling <code>cookies()</code>, <code>headers()</code>, <code>searchParams</code>, or using <code>cache: 'no-store'</code> makes a route <strong>dynamic</strong>. Dynamic routes are rendered fresh on every request. This is correct behavior for user-specific pages — just be aware that it opts out of the Full Route Cache.</p>`},
            ]
        },

        {
            id:'revalidation', group:'Phase 4 — Data Fetching', icon:'refresh', title:'Revalidation',
            sub:'Time-based revalidation, on-demand revalidation, revalidatePath, and the new updateTag().',
            content:`
<div class="prose">
  <p>Revalidation lets you update cached data without rebuilding the entire app. Next.js 16 supports two strategies: <strong>time-based</strong> (automatically refresh after N seconds) and <strong>on-demand</strong> (manually trigger a refresh from a Server Action or Route Handler). Next.js 16 also adds the new <code>updateTag()</code> API for pushing data directly into the cache.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/revalidate.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { revalidatePath, revalidateTag } from 'next/cache'
// New in Next.js 16:
import { updateTag } from 'next/cache'

// Revalidate a specific path — clears the full route cache
// for that URL and all its variants
export async function updatePost(postId: string, data: PostData) {
  await db.posts.update({ where: { id: postId }, data })

  // Tell Next.js to re-render this page next time it's requested
  revalidatePath(\`/posts/\${postId}\`)
  revalidatePath('/posts') // Also revalidate the list page
}

// Revalidate all fetches tagged with a specific tag
export async function clearProductCache() {
  revalidateTag('products') // Clears all fetch({ next: { tags: ['products'] } })
}

// NEW in Next.js 16 — updateTag: push data INTO the cache
// instead of waiting for the next request to re-fetch it
export async function pushProductUpdate() {
  await updateTag('products', async () => {
    // This result is stored in the cache immediately
    return await db.products.findMany()
  })
}

// On-demand revalidation via Route Handler (webhook from CMS)
export async function POST(request: Request) {
  const { tag, secret } = await request.json()
  if (secret !== process.env.REVALIDATE_SECRET) {
    return Response.json({ error: 'Invalid secret' }, { status: 401 })
  }
  revalidateTag(tag)
  return Response.json({ revalidated: true })
}</code></pre></div>`,
            boxes:[
                {type:'new',title:'updateTag() — Push-based Cache Updates',body:`<p><code>updateTag()</code> is a new Next.js 16 API that complements <code>revalidateTag()</code>. The key difference: <code>revalidateTag()</code> <em>invalidates</em> a cache entry so the next request triggers a re-fetch, while <code>updateTag()</code> <em>replaces</em> the cache value immediately by running your async function and storing the result. Use <code>updateTag()</code> when you already have new data and want to warm the cache proactively without a stale window.</p>`},
                {type:'tip',title:'Revalidation vs Re-deployment',body:`<p>With on-demand revalidation, you can update your site's content without a new deployment. A CMS like Contentful or Sanity can send a webhook to your <code>/api/revalidate</code> endpoint whenever content is published — Next.js will re-render just the affected pages.</p>`},
            ]
        },

        {
            id:'swr-intro', group:'Phase 4 — Data Fetching', icon:'refresh', title:'SWR — What It Is & Why Use It',
            sub:'Understanding stale-while-revalidate, installing SWR, and the core hook: keys, fetchers, and return values.',
            content:`
<div class="prose">
  <p><strong>SWR</strong> is a React Hooks library for client-side data fetching, created by Vercel (the same team behind Next.js). The name stands for <strong>stale-while-revalidate</strong> — an HTTP caching strategy that says: show the user the cached (stale) data immediately, then quietly fetch fresh data in the background and update the UI when it arrives.</p>
  <p>Before SWR, client-side fetching in React meant writing the same boilerplate over and over: <code>useState</code> for the data, <code>useState</code> for loading, <code>useState</code> for errors, a <code>useEffect</code> to fetch, and manual cleanup. SWR replaces all of that with a single hook call — and adds automatic caching, deduplication, revalidation, and error retry on top.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The 'Stale-While-Revalidate' Strategy — Your Morning News Habit</div>
  <div class="box-body"><p>Imagine you wake up and check yesterday's newspaper on your breakfast table (the <strong>stale cached data</strong>). You read it immediately — zero wait time. Meanwhile, the paperboy is already cycling over with today's edition (the <strong>background revalidation</strong>). The moment it arrives, you swap it for the fresh one.</p>
<p style="margin-top:8px;">This is exactly what SWR does: it shows you what it already knows (<em>stale</em>) while quietly fetching the latest version in the background (<em>revalidate</em>). Users get an instant experience with no loading spinner, and the data updates automatically the moment fresh data arrives.</p>
<p style="margin-top:8px;"><strong>Without SWR:</strong> the table is completely empty. You have to order the newspaper, wait for delivery, then read it. That's the loading spinner experience.</p>
<p style="margin-top:8px;"><strong>With SWR + <code>fallbackData</code> from a Server Component:</strong> the newspaper was pre-delivered before you woke up (server fetch), AND the paperboy still brings the fresh one every few minutes automatically (<code>refreshInterval</code>).</p></div>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> The SWR Mental Model</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Without SWR</div>
      <ul>
        <li>Manual useState for data, loading, error</li>
        <li>useEffect with cleanup logic</li>
        <li>Duplicate requests across components</li>
        <li>No automatic refresh on focus</li>
        <li>No built-in retry on failure</li>
        <li>Cache logic written from scratch</li>
      </ul>
    </div>
    <div class="ms-arrow">→</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">With SWR</div>
      <ul>
        <li>One <code>useSWR(key, fetcher)</code> call</li>
        <li>Automatic request deduplication</li>
        <li>Built-in loading and error states</li>
        <li>Re-fetches when tab regains focus</li>
        <li>Auto-retry with backoff on errors</li>
        <li>Global cache shared across components</li>
      </ul>
    </div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal — install SWR</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install swr</code></pre></div>

<div class="prose"><h3>The Three Parts of useSWR</h3><p>Every <code>useSWR</code> call has three ingredients: a <strong>key</strong>, a <strong>fetcher</strong>, and optional <strong>config</strong>.</p></div>

<div class="g3">
  <div class="card"><div class="card-t">1 — Key</div><div class="card-b">A unique string (usually a URL) that identifies the request. SWR uses it as the cache key. If two components use the same key, only one request is made — both components share the cached result.</div></div>
  <div class="card"><div class="card-t">2 — Fetcher</div><div class="card-b">A plain async function that takes the key and returns data. SWR does not care how you fetch — <code>fetch()</code>, <code>axios</code>, GraphQL — anything works. You define it once and reuse it globally.</div></div>
  <div class="card"><div class="card-t">3 — Config</div><div class="card-b">Optional object to customise behaviour: revalidation intervals, retry logic, initial data, deduplication intervals, and more. Can also be set globally with <code>SWRConfig</code>.</div></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/fetcher.ts — define your fetcher once</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// A fetcher is just an async function that accepts the key (URL)
// and returns the parsed JSON response.
// Define it once and reuse it across your whole app.

export const fetcher = (url: string) =>
  fetch(url).then((res) => {
    if (!res.ok) throw new Error('Request failed: ' + res.status)
    return res.json()
  })</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/UserProfile.tsx — basic useSWR usage</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR from 'swr'
import { fetcher } from '@/lib/fetcher'

interface User {
  id: string
  name: string
  email: string
  avatar: string
}

export default function UserProfile({ userId }: { userId: string }) {
  // useSWR(key, fetcher, config?)
  // - key:     the URL — also acts as the cache key
  // - fetcher: the async function to load data
  // Returns: data, error, isLoading, isValidating, mutate
  const { data, error, isLoading } = useSWR&lt;User&gt;(
    \`/api/users/\${userId}\`,
    fetcher
  )

  // Three simple states — no useState or useEffect needed
  if (isLoading) return &lt;div&gt;Loading profile...&lt;/div&gt;
  if (error)     return &lt;div&gt;Failed to load user.&lt;/div&gt;
  if (!data)     return null

  return (
    &lt;div&gt;
      &lt;img src={data.avatar} alt={data.name} /&gt;
      &lt;h2&gt;{data.name}&lt;/h2&gt;
      &lt;p&gt;{data.email}&lt;/p&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>What useSWR Returns</h3></div>
<div class="tbl-wrap">
  <table>
    <thead><tr><th>Return Value</th><th>Type</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td><code>data</code></td><td><code>T | undefined</code></td><td>The fetched data. <code>undefined</code> while loading or on error.</td></tr>
      <tr><td><code>error</code></td><td><code>any | undefined</code></td><td>The error thrown by the fetcher. <code>undefined</code> when successful.</td></tr>
      <tr><td><code>isLoading</code></td><td><code>boolean</code></td><td><code>true</code> only on the very first load (no cached data yet).</td></tr>
      <tr><td><code>isValidating</code></td><td><code>boolean</code></td><td><code>true</code> whenever a request is in-flight — including background revalidations.</td></tr>
      <tr><td><code>mutate</code></td><td><code>function</code></td><td>Manually trigger a revalidation or update the local cache. Covered in the next section.</td></tr>
    </tbody>
  </table>
</div>

<div class="prose"><h3>Deduplication — One Key, One Request</h3><p>One of SWR's most powerful features is <strong>automatic request deduplication</strong>. If many components on the same page call <code>useSWR('/api/user', fetcher)</code>, SWR fires only one HTTP request and shares the result across all of them. This means you can freely call <code>useSWR</code> wherever you need data — in deeply nested components, in layout components, in sidebars — without worrying about making duplicate network requests.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Navbar.tsx + components/Sidebar.tsx — same key, one request</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'
import useSWR from 'swr'
import { fetcher } from '@/lib/fetcher'

// Both components call useSWR with the SAME key: '/api/me'
// SWR fires only ONE network request and shares the cached result.

export function Navbar() {
  const { data: user } = useSWR('/api/me', fetcher)
  return &lt;nav&gt;{user ? \`Hello, \${user.name}\` : 'Loading...'}&lt;/nav&gt;
}

export function Sidebar() {
  const { data: user } = useSWR('/api/me', fetcher)
  return &lt;aside&gt;{user?.avatar &amp;&amp; &lt;img src={user.avatar} /&gt;}&lt;/aside&gt;
}

// When either component triggers revalidation (e.g., on focus),
// both components update simultaneously from the new cached data.</code></pre></div>`,
            boxes:[
                {type:'nxt',title:'SWR is for Client Components only',body:`<p>SWR uses React hooks (<code>useState</code>, <code>useEffect</code> internally) and runs in the browser. It must be used inside <code>'use client'</code> components. For Server Components, use <code>async/await</code> with <code>fetch()</code> directly — no SWR needed. A common Next.js pattern: fetch initial data on the server, pass it as <code>fallbackData</code> to SWR, then let SWR keep it fresh on the client. More on this in the next section.</p>`},
                {type:'tip',title:'Install once, use a global fetcher',body:`<p>Define one <code>fetcher</code> function in <code>lib/fetcher.ts</code> and import it everywhere. You can also set it globally via <code>&lt;SWRConfig value={{ fetcher }}&gt;</code> so you never need to pass it to individual <code>useSWR</code> calls — covered in the next section under Global Config.</p>`},
                {type:'warn',title:'SWR fetcher errors must be thrown, not returned',body:`<p>SWR detects errors only when the fetcher function <strong>throws</strong>. If your fetcher silently returns <code>null</code> or an error object on a failed request, SWR treats it as success. Always check <code>res.ok</code> and throw if the response is not OK: <code>if (!res.ok) throw new Error('Failed')</code>. This ensures the <code>error</code> return value works correctly and SWR's retry logic kicks in.</p>`},
            ]
        },

        {
            id:'swr-advanced', group:'Phase 4 — Data Fetching', icon:'refresh', title:'SWR — Patterns & Features',
            sub:'Conditional fetching, keepPreviousData, global SWRConfig, mutate, revalidation options, and when to pick SWR vs Server Components.',
            content:`
<div class="prose">
  <p>With the basics down, here are the SWR patterns you'll use in real apps. These cover the most common scenarios: fetching only when ready, smooth loading UX, global setup, manually updating the cache, and integrating server-fetched data with client-side freshness.</p>
</div>

<div class="prose"><h3>Conditional Fetching — Pass null to Pause</h3><p>Passing <code>null</code> as the key tells SWR to do nothing. Use this to delay a fetch until you have the data you need — a user ID from auth, a search query from input, or a selected item from a list.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/ConditionalFetch.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR from 'swr'
import { fetcher } from '@/lib/fetcher'

export function UserPosts({ userId }: { userId: string | null }) {
  // Pass null as key → SWR skips the fetch entirely
  // The moment userId becomes a real value, SWR starts fetching
  const { data, isLoading } = useSWR(
    userId ? \`/api/users/\${userId}/posts\` : null,
    fetcher
  )

  if (!userId)   return &lt;p&gt;Select a user to see their posts.&lt;/p&gt;
  if (isLoading) return &lt;p&gt;Loading posts...&lt;/p&gt;
  return &lt;ul&gt;{data?.map(p =&gt; &lt;li key={p.id}&gt;{p.title}&lt;/li&gt;)}&lt;/ul&gt;
}

// ── Another common pattern: wait for auth ───────────────
function useCurrentUserPosts() {
  const { data: user } = useSWR('/api/me', fetcher)

  // Don't fetch posts until we know who the user is
  return useSWR(user ? \`/api/users/\${user.id}/posts\` : null, fetcher)
}</code></pre></div>

<div class="prose"><h3>keepPreviousData — Smooth UX While Re-fetching</h3><p>Without <code>keepPreviousData</code>, every time the key changes (e.g., the user types a new search query) SWR clears <code>data</code> and shows <code>isLoading: true</code> — causing a flash of empty content. With <code>keepPreviousData: true</code>, the old data stays visible until the new data arrives.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/LiveSearch.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState } from 'react'
import useSWR from 'swr'
import { fetcher } from '@/lib/fetcher'

export default function LiveSearch() {
  const [query, setQuery] = useState('')

  const { data, isLoading, isValidating } = useSWR(
    query ? \`/api/search?q=\${encodeURIComponent(query)}\` : null,
    fetcher,
    {
      keepPreviousData: true, // ← keep old results while new ones load
      dedupingInterval: 300,  // ← wait 300ms before firing a new request
    }
  )

  return (
    &lt;div&gt;
      &lt;input
        value={query}
        onChange={e =&gt; setQuery(e.target.value)}
        placeholder="Search..."
      /&gt;

      {/* Subtle spinner for background refreshes — not a full loading state */}
      {isValidating &amp;&amp; &lt;span&gt;Updating...&lt;/span&gt;}

      {/* Results stay visible while the next query loads */}
      {data?.results.map(r =&gt; &lt;div key={r.id}&gt;{r.title}&lt;/div&gt;)}
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Global Config with SWRConfig</h3><p>Wrap your app (or a subtree) in <code>SWRConfig</code> to set defaults that apply to every <code>useSWR</code> call inside it. This is where you set the global fetcher, revalidation behaviour, and error handling.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/providers.tsx — global SWR setup</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { SWRConfig } from 'swr'

const globalFetcher = (url: string) =>
  fetch(url).then(res =&gt; {
    if (!res.ok) throw new Error('Fetch error: ' + res.status)
    return res.json()
  })

export function Providers({ children }: { children: React.ReactNode }) {
  return (
    &lt;SWRConfig
      value={{
        fetcher: globalFetcher,        // No need to pass fetcher to each useSWR
        revalidateOnFocus: true,        // Re-fetch when tab comes back into focus
        revalidateOnReconnect: true,    // Re-fetch when internet reconnects
        shouldRetryOnError: true,       // Retry failed requests automatically
        errorRetryCount: 3,             // Stop retrying after 3 failures
        dedupingInterval: 2000,         // Deduplicate requests within 2s window
      }}
    &gt;
      {children}
    &lt;/SWRConfig&gt;
  )
}

// In app/layout.tsx:
// import { Providers } from './providers'
// &lt;body&gt;&lt;Providers&gt;{children}&lt;/Providers&gt;&lt;/body&gt;</code></pre></div>

<div class="prose"><h3>mutate — Update the Cache Manually</h3><p><code>mutate</code> lets you either trigger a re-fetch or directly update the local cache. It's essential for optimistic updates — changing the UI instantly before the server confirms, then syncing with the real response.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/LikeButton.tsx — optimistic update with mutate</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR from 'swr'

interface Post { id: string; title: string; likes: number; likedByMe: boolean }

export default function PostCard({ postId }: { postId: string }) {
  const { data: post, mutate } = useSWR&lt;Post&gt;(\`/api/posts/\${postId}\`)

  async function handleLike() {
    if (!post) return

    // 1. Optimistically update the cache immediately (no wait)
    mutate({ ...post, likes: post.likes + 1, likedByMe: true }, false)
    //                                                          ↑ false = don't revalidate yet

    // 2. Send the real request to the server
    await fetch(\`/api/posts/\${postId}/like\`, { method: 'POST' })

    // 3. Revalidate to sync with server truth
    mutate()
  }

  if (!post) return null
  return (
    &lt;div&gt;
      &lt;h2&gt;{post.title}&lt;/h2&gt;
      &lt;button onClick={handleLike} disabled={post.likedByMe}&gt;
        {post.likedByMe ? 'Liked ✓' : 'Like'} · {post.likes}
      &lt;/button&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="prose"><h3>Hydration — Combining Server & Client Data</h3><p>The best pattern in Next.js: fetch initial data on the server (fast, SEO-friendly, no loading flash), then hand it to SWR as <code>fallbackData</code> so SWR keeps it fresh on the client without the user ever seeing a loading state.</p></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx — server fetch + SWR handoff</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// Server Component — no 'use client'
import { StatsPanel } from './StatsPanel'
import { fetcher } from '@/lib/fetcher'

export default async function DashboardPage() {
  // Fetch on the server — instant first paint, no loading state
  const initialStats = await fetcher('https://api.example.com/stats')

  return (
    // Pass the server data as fallbackData to the Client Component
    &lt;StatsPanel initialStats={initialStats} /&gt;
  )
}</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/StatsPanel.tsx — SWR takes over from server data</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import useSWR from 'swr'

export function StatsPanel({ initialStats }: { initialStats: Stats }) {
  const { data: stats } = useSWR('/api/stats', {
    fallbackData: initialStats,     // ← show server data immediately
    refreshInterval: 30_000,        // ← then auto-refresh every 30 seconds
  })

  // data is never undefined — initialStats fills the gap
  return &lt;div&gt;Revenue: {stats.revenue}&lt;/div&gt;
}</code></pre></div>

<div class="prose"><h3>When to Use SWR vs Server Components</h3></div>
<div class="tbl-wrap">
  <table>
    <thead><tr><th>Scenario</th><th>Best Approach</th><th>Reason</th></tr></thead>
    <tbody>
      <tr><td>Initial page data (blog post, product listing)</td><td><span class="badge badge-nxt">Server Component</span></td><td>No loading state, better SEO, faster first paint</td></tr>
      <tr><td>Data that changes while user is on the page</td><td><span class="badge badge-ok">SWR</span></td><td>Auto-revalidation keeps it fresh without a page reload</td></tr>
      <tr><td>User-triggered search or filter</td><td><span class="badge badge-ok">SWR</span></td><td>Reactive to input state, built-in deduplication</td></tr>
      <tr><td>Polling / live scores / dashboards</td><td><span class="badge badge-ok">SWR</span></td><td>Use <code>refreshInterval</code> for automatic polling</td></tr>
      <tr><td>User-specific data (profile, cart, notifications)</td><td><span class="badge badge-ok">SWR</span> or both</td><td>Server fetch for initial render + SWR for live updates</td></tr>
      <tr><td>Mutations (form submit, like, delete)</td><td>Server Actions + SWR <code>mutate</code></td><td>Server Action for the write, mutate to refresh the read</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'tip',title:'refreshInterval — automatic polling',body:`<p>To poll an endpoint every N milliseconds, pass <code>refreshInterval: N</code> to <code>useSWR</code>. SWR will silently re-fetch in the background and update the UI when data changes. Example: <code>useSWR('/api/notifications', fetcher, { refreshInterval: 10_000 })</code> checks for new notifications every 10 seconds. The component re-renders only when the data actually changes.</p>`},
                {type:'nxt',title:'useSWRMutation — for on-demand actions',body:`<p>For POST / PUT / DELETE operations that should only fire when triggered (not on mount), SWR ships <code>useSWRMutation</code>. It gives you a <code>trigger()</code> function you call explicitly: <code>const { trigger, isMutating } = useSWRMutation('/api/posts', createPost)</code>. Use it instead of <code>useState + fetch</code> inside a button handler — it handles loading and error states for you.</p>`},
                {type:'warn',title:'SWR is not a replacement for Server Components',body:`<p>A common beginner mistake is reaching for SWR for <em>all</em> data fetching. In Next.js, <strong>Server Components should be your default</strong>. Use SWR specifically for data that needs to stay live after the initial render — search results that react to user input, dashboards that auto-refresh, or data that changes while the user is on the page. If data only needs to be there when the page loads, a Server Component with <code>async/await</code> is simpler and faster.</p>`},
            ]
        },

        {
            id:'client-fetching', group:'Phase 4 — Data Fetching', icon:'monitor', title:'Fetching in Client Components',
            sub:'Using useEffect + fetch, SWR, and TanStack Query integration.',
            content:`
<div class="prose">
  <p>While Server Components handle most data fetching, some scenarios still require client-side fetching: <strong>real-time data</strong> that changes while the user is on the page, <strong>user-triggered searches</strong>, <strong>infinite scroll</strong>, or data that depends on client state like filter selections.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/SearchResults.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState } from 'react'
import useSWR from 'swr'

const fetcher = (url: string) => fetch(url).then(r => r.json())

interface Props {
  initialQuery: string
}

export default function SearchResults({ initialQuery }: Props) {
  const [query, setQuery] = useState(initialQuery)

  // SWR: handles caching, revalidation, loading/error states
  const { data, error, isLoading } = useSWR(
    query ? \`/api/search?q=\${query}\` : null,
    fetcher,
    { keepPreviousData: true }  // Don't flash empty while typing
  )

  return (
    &lt;div&gt;
      &lt;input
        value={query}
        onChange={e => setQuery(e.target.value)}
        placeholder="Search..."
      /&gt;
      {isLoading &amp;&amp; &lt;p&gt;Searching...&lt;/p&gt;}
      {error &amp;&amp; &lt;p&gt;Something went wrong.&lt;/p&gt;}
      {data?.results.map(r => &lt;div key={r.id}&gt;{r.title}&lt;/div&gt;)}
    &lt;/div&gt;
  )
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'SWR vs TanStack Query',body:`<p><strong>SWR</strong> (by Vercel) is lightweight and integrates naturally with Next.js — great for simple use cases. <strong>TanStack Query</strong> (formerly React Query) is more powerful, with mutation handling, optimistic updates, and complex cache management. Both work well with Next.js. Start with SWR and upgrade if needed.</p>`},
                {type:'nxt',title:'Hydration — Initial data from server',body:`<p>Best practice: fetch initial data on the server, pass it as props to the client component, and use it as the initial cache value. The user sees content immediately, and the client library takes over from there. With SWR: <code>useSWR(key, fetcher, { fallbackData: serverData })</code>.</p>`},
            ]
        },

        {
            id:'zod-basics', group:'Phase 4 — Data Fetching', icon:'shield', title:'Zod — Schema Validation Basics',
            sub:'What Zod is, how to install it, and the core building blocks: strings, numbers, objects, and arrays.',
            content:`
<div class="prose">
  <p>Before diving into Server Actions, you need to know about <strong>Zod</strong> — a TypeScript-first schema validation library. You will see it in almost every serious Next.js codebase, and for good reason: it solves the problem of "I received data from a user, can I trust it?"</p>
  <p>The short answer is <strong>never trust user data</strong>. A user can submit anything through a form — an empty string where you expected a number, a 10,000-character essay where you expected a name, a malformed email, a negative price. Zod lets you describe the exact shape and rules your data must follow, then validates incoming data against that description in one line.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">Without Zod</div><div class="card-b">Manual checks scattered everywhere: <code>if (!title) throw...</code>, <code>if (title.length > 100) throw...</code>, <code>if (typeof age !== 'number') throw...</code>. Tedious, inconsistent, easy to forget one.</div></div>
  <div class="card"><div class="card-t">With Zod</div><div class="card-b">One schema definition captures all the rules. One <code>.safeParse()</code> call validates everything and returns typed, clean data or a structured list of errors. No conditionals needed.</div></div>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — The Bouncer at the Club Door</div>
  <div class="box-body"><p>Imagine a nightclub with a strict door policy. A <strong>Zod schema</strong> is the bouncer. Before anyone (any data) enters the venue (your database), the bouncer checks their ID against a strict set of rules:</p>
<ul>
  <li>Must be over 18 (minimum age/value)</li>
  <li>ID must not be expired (valid format)</li>
  <li>Name on the ID must match the face (cross-field validation)</li>
  <li>No weapons allowed (disallowed content)</li>
</ul>
<p style="margin-top:8px;">Without a bouncer, <em>anyone</em> gets in — a 10-year-old, someone with a fake name, someone carrying harmful items. Without Zod, <em>any data</em> reaches your database: empty strings where you expected names, negative prices, SQL injection attempts, or 50,000-character essays where you expected a 100-character title.</p>
<p style="margin-top:8px;">Zod checks the data at the door, hands back a clean guest list (<code>result.data</code>), or a report of every violation (<code>result.error.flatten().fieldErrors</code>) — without ever letting the bad data near the venue.</p></div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">terminal — install</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code>npm install zod</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/zod-basics.ts — core primitives</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { z } from 'zod'

// ── Primitive types ────────────────────────────────────────
const nameSchema    = z.string()
const ageSchema     = z.number()
const activeSchema  = z.boolean()
const tagsSchema    = z.array(z.string())    // string[]
const roleSchema    = z.enum(['admin', 'user', 'guest'])

// ── String validators ──────────────────────────────────────
const emailSchema = z.string()
  .email('Must be a valid email address')
  .toLowerCase()            // transform: always store lowercase
  .trim()                   // transform: strip whitespace

const passwordSchema = z.string()
  .min(8,  'At least 8 characters')
  .max(72, 'Bcrypt limit — 72 characters maximum')

const slugSchema = z.string()
  .regex(/^[a-z0-9-]+$/, 'Only lowercase letters, numbers, and hyphens')

// ── Number validators ──────────────────────────────────────
const priceSchema = z.number()
  .positive('Price must be greater than 0')
  .max(99999, 'Price seems too high')
  .multipleOf(0.01, 'Max 2 decimal places')

const quantitySchema = z.number().int().min(1).max(100)

// ── Optional and default values ────────────────────────────
const bioSchema  = z.string().max(500).optional()   // string | undefined
const roleWithDefault = z.enum(['user','admin']).default('user')

// ── Object schemas — the ones you'll use most ──────────────
const UserSchema = z.object({
  name:     z.string().min(1, 'Name is required').max(100).trim(),
  email:    z.string().email(),
  age:      z.number().int().min(13, 'Must be 13 or older').optional(),
  role:     z.enum(['user', 'admin']).default('user'),
  bio:      z.string().max(500).optional(),
  tags:     z.array(z.string()).max(5, 'Maximum 5 tags').default([]),
})</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/zod-parsing.ts — parse vs safeParse</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { z } from 'zod'

const UserSchema = z.object({
  name:  z.string().min(1).trim(),
  email: z.string().email(),
  age:   z.number().int().min(13).optional(),
})

// ── .parse() — throws on failure ──────────────────────────
// Use when a failure is a programming error (e.g., config files)
try {
  const user = UserSchema.parse({ name: 'Alice', email: 'alice@example.com' })
  // user is fully typed: { name: string, email: string, age?: number }
  console.log(user.name) // TypeScript knows this is a string ✅
} catch (err) {
  // err is a ZodError with detailed messages
}

// ── .safeParse() — returns result object, never throws ────
// Use for user input — forms, API bodies, URL params
const result = UserSchema.safeParse({
  name:  '  Alice  ',   // will be trimmed to "Alice"
  email: 'not-an-email',
  age:   'thirty',      // wrong type!
})

if (!result.success) {
  // result.error.flatten() gives field-grouped error messages
  console.log(result.error.flatten().fieldErrors)
  // {
  //   email: ['Invalid email'],
  //   age:   ['Expected number, received string']
  // }
} else {
  // result.data is the TRANSFORMED, type-safe data
  console.log(result.data.name) // "Alice" (trimmed!) ✅
}</code></pre></div>`,
            boxes:[
                {type:'tip',title:'Always use .safeParse() for user input',body:`<p><code>.parse()</code> throws a <code>ZodError</code> if validation fails — great for config files and internal data where a failure is a bug. <code>.safeParse()</code> returns a <code>{ success, data, error }</code> object and never throws — perfect for form input and API bodies where invalid data is a normal user error you want to handle gracefully. In Server Actions, you will <strong>always</strong> use <code>.safeParse()</code>.</p>`},
                {type:'nxt',title:'Zod transforms your data, not just validates it',body:`<p>Notice <code>.trim()</code>, <code>.toLowerCase()</code>, and <code>.default()</code> in the examples above. Zod does not just reject bad data — it can also <strong>clean and transform</strong> it. After a successful <code>.safeParse()</code>, <code>result.data</code> contains the transformed values: strings are trimmed, emails are lowercased, missing optional fields have their defaults filled in. This means you never need to manually sanitize before saving to the database.</p>`},
            ]
        },

        {
            id:'zod-forms', group:'Phase 4 — Data Fetching', icon:'shield', title:'Zod — Forms & Real-World Patterns',
            sub:'Coercion for HTML inputs, union types, nested objects, and reading error messages in components.',
            content:`
<div class="prose">
  <p>HTML forms have one quirk that trips up beginners: <strong>every form field is a string</strong>. A number input sends <code>"42"</code>, not <code>42</code>. A checkbox sends <code>"on"</code> when checked and nothing when unchecked. Zod handles this cleanly with <code>z.coerce</code>.</p>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/form-schemas.ts — HTML form quirks solved with coerce</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { z } from 'zod'

// z.coerce.* converts the string "42" → number 42 automatically
// Use these whenever parsing HTML form data (FormData)
const ProductSchema = z.object({
  name:      z.string().min(1).trim(),
  price:     z.coerce.number().positive(),        // "19.99" → 19.99
  quantity:  z.coerce.number().int().min(0),      // "5" → 5
  inStock:   z.coerce.boolean(),                  // "on" → true, "" → false
  category:  z.enum(['electronics', 'clothing', 'food']),
})

// Parsing a real HTML form submission:
// &lt;input name="price" type="number" value="19.99" /&gt;
// &lt;input name="quantity" type="number" value="5" /&gt;
// &lt;input name="inStock" type="checkbox" /&gt;

const raw = Object.fromEntries(formData)
// raw = { name: "Widget", price: "19.99", quantity: "5", inStock: "on" }

const result = ProductSchema.safeParse(raw)
// result.data = { name: "Widget", price: 19.99, quantity: 5, inStock: true }
// All types correct — ready for the database ✅</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/advanced-schemas.ts — real patterns you'll encounter</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { z } from 'zod'

// ── Refinements: cross-field validation ───────────────────
const PasswordSchema = z.object({
  password:        z.string().min(8),
  confirmPassword: z.string().min(8),
}).refine(
  (data) => data.password === data.confirmPassword,
  { message: "Passwords don't match", path: ['confirmPassword'] }
)

// ── Union: one of several shapes ─────────────────────────
const PaymentSchema = z.discriminatedUnion('method', [
  z.object({ method: z.literal('card'), cardNumber: z.string().length(16) }),
  z.object({ method: z.literal('paypal'), email: z.string().email() }),
])

// ── Partial: all fields optional (useful for PATCH/update) ─
const UpdateUserSchema = z.object({
  name:  z.string().min(1).trim(),
  email: z.string().email(),
  bio:   z.string().max(500),
}).partial()  // makes ALL fields optional: { name?, email?, bio? }

// ── Inferring the TypeScript type from a schema ───────────
// You never need to write the interface manually!
const PostSchema = z.object({
  title:   z.string().min(1).max(100).trim(),
  content: z.string().min(10),
  tags:    z.array(z.string()).max(5).default([]),
})

type Post = z.infer&lt;typeof PostSchema&gt;
// type Post = { title: string; content: string; tags: string[] }
// Use this type anywhere you need to type a Post object ✅</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/FormErrors.tsx — displaying Zod errors in UI</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// This pattern repeats in every form — extract it to a component
interface FieldErrorProps {
  errors?: string[]  // comes from result.error.flatten().fieldErrors.fieldName
}

export function FieldError({ errors }: FieldErrorProps) {
  if (!errors?.length) return null
  return (
    &lt;ul className="mt-1 space-y-1"&gt;
      {errors.map((msg) => (
        &lt;li key={msg} className="text-sm text-red-500 flex items-center gap-1"&gt;
          &lt;span aria-hidden&gt;✕&lt;/span&gt; {msg}
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}

// Usage in a form (state comes from useActionState):
// &lt;input name="email" /&gt;
// &lt;FieldError errors={state.errors?.email} /&gt;
//
// &lt;input name="password" /&gt;
// &lt;FieldError errors={state.errors?.password} /&gt;</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Zod method</th><th>What it does</th><th>Common use</th></tr></thead>
    <tbody>
      <tr><td><code>z.string().min(n)</code></td><td>Minimum character count</td><td>Required fields, passwords</td></tr>
      <tr><td><code>z.string().max(n)</code></td><td>Maximum character count</td><td>Titles, bios, usernames</td></tr>
      <tr><td><code>z.string().email()</code></td><td>Valid email format</td><td>Login/register forms</td></tr>
      <tr><td><code>z.string().url()</code></td><td>Valid URL format</td><td>Link inputs, avatar URLs</td></tr>
      <tr><td><code>z.string().trim()</code></td><td>Strip leading/trailing whitespace</td><td>Every text input</td></tr>
      <tr><td><code>z.coerce.number()</code></td><td>String → number (for HTML forms)</td><td>Price, quantity, age inputs</td></tr>
      <tr><td><code>z.coerce.boolean()</code></td><td>"on"/undefined → true/false</td><td>Checkbox inputs</td></tr>
      <tr><td><code>z.enum([...])</code></td><td>Must be one of the listed values</td><td>Dropdowns, radio buttons</td></tr>
      <tr><td><code>.optional()</code></td><td>Value can be undefined</td><td>Non-required fields</td></tr>
      <tr><td><code>.default(val)</code></td><td>Use val if undefined</td><td>Role, status, flags</td></tr>
      <tr><td><code>z.infer&lt;typeof Schema&gt;</code></td><td>Extract TypeScript type</td><td>Typing props and return values</td></tr>
      <tr><td><code>.safeParse(data)</code></td><td>Validate without throwing</td><td>All user input (forms, APIs)</td></tr>
      <tr><td><code>.refine(fn, msg)</code></td><td>Custom cross-field rule</td><td>Password confirmation, date ranges</td></tr>
    </tbody>
  </table>
</div>`,
            boxes:[
                {type:'tip',title:'z.infer eliminates duplicate type definitions',body:`<p>One of the most useful Zod patterns: <code>type Post = z.infer&lt;typeof PostSchema&gt;</code>. Instead of writing a TypeScript interface <em>and</em> a Zod schema that describe the same shape, you write just the schema and infer the type from it. The schema is the single source of truth — change it once and the type updates everywhere automatically.</p>`},
                {type:'warn',title:'Put schemas in lib/, not in actions/',body:`<p>Schema definitions should live in <code>lib/schemas.ts</code> or <code>lib/validations.ts</code> — not inside Server Action files. This lets you import the same schema in multiple places: the Server Action uses it to validate, a client-side library like React Hook Form can use it too, and you can import the inferred type wherever you need to annotate a <code>Post</code> or <code>User</code> object. Co-location with just one action is a pattern that quickly becomes unmaintainable.</p>`},
                {type:'new',title:'Coming up next',body:`<p>The next two sections — <strong>Server Actions</strong> and <strong>Zod Validation in Server Actions</strong> — apply everything you just learned. You will see <code>z.object()</code>, <code>.safeParse()</code>, <code>Object.fromEntries(formData)</code>, <code>result.error.flatten().fieldErrors</code>, and <code>z.coerce</code> used together in a real form. They will look familiar now.</p>`},
            ]
        },

        {
            id:'server-actions', group:'Phase 4 — Data Fetching', icon:'server', title:'Server Actions',
            sub:'Using "use server", handling form submissions, mutations, and the useActionState hook.',
            content:`
<div class="prose">
  <p>Server Actions are async functions that run on the server but can be called from Client Components. They replace the need for separate API routes for form submissions and mutations. Marked with the <code>'use server'</code> directive, they are the primary way to mutate data in Next.js.</p>
</div>

<div class="box box-tip">
  <div class="box-hdr">${SVG.star} 🌍 Real-World Analogy — A Secure One-Way Mailbox</div>
  <div class="box-body"><p>Before Server Actions, if a user filled out a form you had to: (1) send the form data to a Route Handler (<code>/api/posts</code>), (2) the Route Handler validates, saves to DB, and returns a response, (3) the client handles the response. Three separate concerns, three separate files.</p>
<p style="margin-top:8px;">Think of a Server Action like a <strong>secure one-way mailbox</strong> built directly into the front door of your house (the component). The user drops their letter (form data) into the slot. The slot leads directly to your locked back room (the server). The back room processes the letter and optionally sends a reply slip back through the slot. The user never sees the back room — they just interact with the slot in the front door.</p>
<p style="margin-top:8px;"><strong>In practice:</strong> your <code>&lt;form action={createPost}&gt;</code> calls the Server Action directly. No fetch, no API URL to remember, no CORS issue. The function runs on the server — it has access to the database, secrets, and cookies — and returns a result the component can display.</p>
<p style="margin-top:8px;"><strong>Important:</strong> The slot (Server Action) is public. Anyone can drop something in. Always validate the letter (Zod), check the sender's identity (auth), and never trust the contents blindly.</p></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/post.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { revalidatePath } from 'next/cache'
import { redirect } from 'next/navigation'
import { db } from '@/lib/db'
import { z } from 'zod'

const CreatePostSchema = z.object({
  title: z.string().min(1, 'Title is required').max(100),
  content: z.string().min(10, 'Content must be at least 10 characters'),
})

export async function createPost(prevState: any, formData: FormData) {
  // 1. Parse and validate input
  const raw = {
    title: formData.get('title'),
    content: formData.get('content'),
  }

  const result = CreatePostSchema.safeParse(raw)
  if (!result.success) {
    return { errors: result.error.flatten().fieldErrors }
  }

  // 2. Authenticate (always validate auth in Server Actions!)
  const user = await getCurrentUser()
  if (!user) return { errors: { _: ['Unauthorized'] } }

  // 3. Perform the mutation
  const post = await db.posts.create({
    data: { ...result.data, authorId: user.id }
  })

  // 4. Revalidate and redirect
  revalidatePath('/posts')
  redirect(\`/posts/\${post.id}\`)
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/new/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useActionState } from 'react' // React 19!
import { createPost } from '@/app/actions/post'

export default function NewPostPage() {
  const [state, action, isPending] = useActionState(createPost, null)

  return (
    &lt;form action={action}&gt;
      &lt;input name="title" placeholder="Post title" /&gt;
