    {
      id:'server-vs-client', group:'Phase 3 — Rendering & Components', icon:'server', title:'Server vs Client Components',
      sub:'Understanding the use client directive, when to use each, and the server-first approach.',
      content:`
<div class="prose">
  <p>This is the most important concept in the Next.js App Router. The App Router introduces two types of React components: <strong>Server Components</strong> and <strong>Client Components</strong>. Understanding the difference is fundamental to building performant Next.js apps.</p>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg> Server Component vs Client Component</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Server Component (Default)</div>
      <ul>
        <li>Renders on the server</li>
        <li>Zero JavaScript sent to browser</li>
        <li>Can use async/await directly</li>
        <li>Can access databases, file system, secrets</li>
        <li>Cannot use useState, useEffect</li>
        <li>Cannot use browser APIs</li>
        <li>Cannot have event handlers (onClick, etc.)</li>
      </ul>
    </div>
    <div class="ms-arrow">vs</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">Client Component ('use client')</div>
      <ul>
        <li>Renders on client (and optionally server)</li>
        <li>JavaScript bundle sent to browser</li>
        <li>Can use all React hooks</li>
        <li>Can use browser APIs (localStorage, etc.)</li>
        <li>Can use useState, useEffect</li>
        <li>Can have event handlers</li>
        <li>Cannot use async/await at component level</li>
      </ul>
    </div>
  </div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// SERVER COMPONENT — no directive needed, this is the default
// Runs only on the server. No JS sent to browser for this component.
// Can use async/await directly!

import LikeButton from './LikeButton' // Client Component

async function getPosts() {
  // Direct database access — never exposed to browser
  const { db } = await import('@/lib/db')
  return db.select().from(posts)
}

export default async function PostsPage() {
  const posts = await getPosts() // Works! Server Components can be async

  return (
    &lt;ul&gt;
      {posts.map(post =&gt; (
        &lt;li key={post.id}&gt;
          &lt;h2&gt;{post.title}&lt;/h2&gt;
          {/* Pass server data to a client component */}
          &lt;LikeButton postId={post.id} initialLikes={post.likes} /&gt;
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'nxt',title:'Server-First: The Default is Server',body:`<p>In the App Router, <strong>every component is a Server Component by default</strong>. You only add <code>'use client'</code> at the top of a file when you need interactivity or browser APIs. Think of it as opting into the browser, not opting into the server.</p>`},
        {type:'tip',title:'The Golden Rule: Push use client down',body:`<p>Keep <code>'use client'</code> boundaries as low in the component tree as possible. If only a button needs interactivity, extract just the button as a Client Component — not the entire page. This minimizes the JavaScript bundle sent to the browser.</p>`},
      ]
    },

    {
      id:'server-components', group:'Phase 3 — Rendering & Components', icon:'server', title:'How Server Components Work',
      sub:'Zero JS bundle impact, direct data access, streaming, and React Server Components (RSC).',
      content:`
<div class="prose">
  <p>React Server Components (RSC) are a new primitive in React 19 that Next.js is built upon. They change the fundamental model of React rendering — components that run exclusively on the server produce HTML that is sent to the browser, with <strong>zero JavaScript</strong> shipped for the component itself.</p>
</div>

<div class="g2">
  <div class="card"><div class="card-t">What Server Components Can Do</div><div class="card-b">
    <ul style="list-style:none;padding:0;">
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> async/await at the component level</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Direct DB queries without APIs</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Read environment secrets safely</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Access file system</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--ok)">✓</span> Import heavy server-only packages</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> useState, useEffect, hooks</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> onClick, onChange, event handlers</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--red)">✗</span> Browser APIs (window, localStorage)</li>
    </ul>
  </div></div>
  <div class="card"><div class="card-t">Performance Benefits</div><div class="card-b">
    <ul style="list-style:none;padding:0;">
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Zero JS bundle size for the component</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Data fetched close to the database</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Secrets never leave the server</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> No waterfall client fetches</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Faster Time to First Byte (TTFB)</li>
      <li style="padding:3px 0 3px 15px;position:relative;font-size:12.5px;color:var(--text2)"><span style="position:absolute;left:0;color:var(--accent)">›</span> Better Core Web Vitals scores</li>
    </ul>
  </div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// This entire component runs on the SERVER
// The browser receives HTML, not this JavaScript
import { db } from '@/lib/db'

export default async function Dashboard() {
  // Direct database query — no fetch, no API route needed!
  const user = await db.query.users.findFirst({
    where: eq(users.id, getCurrentUserId())
  })

  // These run in parallel on the server — fast!
  const [stats, recentActivity] = await Promise.all([
    db.query.stats.findMany({ where: eq(stats.userId, user.id) }),
    db.query.activity.findMany({ limit: 10 })
  ])

  return (
    &lt;div&gt;
      &lt;h1&gt;Welcome, {user.name}&lt;/h1&gt;
      &lt;StatsGrid stats={stats} /&gt;         {/* Server Component */}
      &lt;ActivityFeed items={recentActivity} /&gt; {/* Server Component */}
    &lt;/div&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Server-only packages',body:`<p>Some npm packages only work on Node.js (like <code>fs</code>, <code>bcrypt</code>, database drivers). If you accidentally import them in a Client Component, you'll get a build error. Use the <code>server-only</code> package to prevent this: <code>import 'server-only'</code> at the top of any module that must never run in the browser.</p>`},
      ]
    },

    {
      id:'client-components', group:'Phase 3 — Rendering & Components', icon:'monitor', title:'Client Components in Next.js',
      sub:'Handling interactivity, hooks, browser APIs, and defining use client boundaries.',
      content:`
<div class="prose">
  <p>Client Components are React components that include interactivity. They are still rendered on the server initially (for fast first paint and SEO), but they also ship JavaScript to the browser so users can interact with them.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/ThemeToggle.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client' // 👈 This marks the boundary

import { useState, useEffect } from 'react'

export default function ThemeToggle() {
  const [theme, setTheme] = useState&lt;'light' | 'dark'&gt;('light')

  useEffect(() => {
    // ✅ Can use browser APIs inside useEffect
    const stored = localStorage.getItem('theme')
    if (stored) setTheme(stored as 'light' | 'dark')
  }, [])

  function toggle() {
    const next = theme === 'light' ? 'dark' : 'light'
    setTheme(next)
    localStorage.setItem('theme', next)
    document.documentElement.classList.toggle('dark')
  }

  return (
    &lt;button onClick={toggle}&gt; {/* ✅ Event handlers work in Client Components */}
      {theme === 'light' ? 'Switch to Dark' : 'Switch to Light'}
    &lt;/button&gt;
  )
}</code></pre></div>

<div class="dtree" style="margin-top:20px;">
  <div class="dtree-title">Decision: Do I need 'use client'?</div>
  <div class="dtree-q"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Does your component use useState, useEffect, or other hooks?</div>
  <div class="dtree-branch">
    <div class="dtree-opt dtree-opt-yes"><strong>YES</strong>Needs 'use client'</div>
    <div class="dtree-opt dtree-opt-no"><strong>NO</strong>Continue checking...</div>
  </div>
  <div class="dtree-q" style="margin-top:14px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Does it have onClick, onChange, or other event handlers?</div>
  <div class="dtree-branch">
    <div class="dtree-opt dtree-opt-yes"><strong>YES</strong>Needs 'use client'</div>
    <div class="dtree-opt dtree-opt-no"><strong>NO</strong>Use as Server Component — no directive needed</div>
  </div>
</div>`,
      boxes:[
        {type:'tip',title:'use client is a module boundary, not a component flag',body:`<p>When you add <code>'use client'</code> to a file, <strong>every component exported from that file</strong> becomes a Client Component — including all its children that don't have their own directive. The directive marks a boundary in the module graph, not a single component. This is why you should keep <code>'use client'</code> files small and focused.</p>`},
      ]
    },

    {
      id:'component-patterns', group:'Phase 3 — Rendering & Components', icon:'layers', title:'Component Composition Patterns',
      sub:'Mastering Server → Client composition and passing server data to the client.',
      content:`
<div class="prose">
  <p>The most powerful pattern in Next.js is <strong>composing Server and Client Components together</strong>. Server Components can render Client Components and pass them data as props. But Client Components cannot render Server Components directly — that would break the server/client boundary.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/[id]/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// SERVER COMPONENT — fetches data, renders Client Components
import { CommentSection } from '@/components/CommentSection'
import { LikeButton } from '@/components/LikeButton'
import { db } from '@/lib/db'

export default async function PostPage({ params }: { params: Promise&lt;{id:string}&gt; }) {
  const { id } = await params
  // Fetch on server — no loading state needed for initial render
  const post = await db.posts.findUnique({ where: { id } })
  const comments = await db.comments.findMany({ where: { postId: id } })

  return (
    &lt;article&gt;
      &lt;h1&gt;{post.title}&lt;/h1&gt;
      &lt;p&gt;{post.body}&lt;/p&gt;

      {/* Pass server data down to Client Components as props */}
      &lt;LikeButton postId={post.id} initialLikes={post.likes} /&gt;
      &lt;CommentSection postId={post.id} initialComments={comments} /&gt;
    &lt;/article&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/LikeButton.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState } from 'react'

interface Props {
  postId: string
  initialLikes: number  // ← Passed from Server Component
}

export function LikeButton({ postId, initialLikes }: Props) {
  // Client-side state, initialized from server data
  const [likes, setLikes] = useState(initialLikes)
  const [liked, setLiked] = useState(false)

  async function handleLike() {
    setLiked(true)
    setLikes(l => l + 1)
    await fetch(\`/api/posts/\${postId}/like\`, { method: 'POST' })
  }

  return (
    &lt;button onClick={handleLike} disabled={liked}&gt;
      {liked ? 'Liked!' : \`Like (\${likes})\`}
    &lt;/button&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'nxt',title:'The children pattern for Server Components inside Client Components',body:`<p>Client Components cannot <em>import</em> Server Components. But they can accept them as <code>children</code> props. This lets you nest a Server Component inside a Client Component: <code>&lt;ClientWrapper&gt;&lt;ServerComponent /&gt;&lt;/ClientWrapper&gt;</code>. The Server Component is still rendered on the server — the Client Component just slots it in.</p>`},
      ]
    },

    {
      id:'streaming', group:'Phase 3 — Rendering & Components', icon:'refresh', title:'Streaming & Suspense',
      sub:'Progressive rendering, setting Suspense boundaries, and designing loading UI.',
      content:`
<div class="prose">
  <p>Streaming allows Next.js to send parts of the UI to the browser as they become ready, rather than waiting for all data to load before sending anything. Slow parts of the page stream in progressively while fast parts are already interactive.</p>
  <p>You control streaming by placing React <code>&lt;Suspense&gt;</code> boundaries around components that fetch data. Next.js streams the fallback immediately, then streams the actual content when ready.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { Suspense } from 'react'
import { StatsGrid, StatsGridSkeleton } from './StatsGrid'
import { RecentActivity, ActivitySkeleton } from './RecentActivity'
import { QuickActions } from './QuickActions'

export default function DashboardPage() {
  return (
    &lt;div&gt;
      {/* This loads instantly — no data fetching */}
      &lt;h1&gt;Dashboard&lt;/h1&gt;
      &lt;QuickActions /&gt;

      {/* StatsGrid fetches slow data — show skeleton while loading */}
      &lt;Suspense fallback={&lt;StatsGridSkeleton /&gt;}&gt;
        &lt;StatsGrid /&gt;
      &lt;/Suspense&gt;

      {/* These stream independently — each shows when ready */}
      &lt;Suspense fallback={&lt;ActivitySkeleton /&gt;}&gt;
        &lt;RecentActivity /&gt;
      &lt;/Suspense&gt;
    &lt;/div&gt;
  )
}</code></pre></div>
<div class="box box-tip">
  <div class="box-hdr">${SVG.info} Streaming vs loading.tsx</div>
  <div class="box-body"><p><code>loading.tsx</code> creates a Suspense boundary around the <strong>entire page</strong>. Manual <code>&lt;Suspense&gt;</code> gives you <strong>granular control</strong> — you can stream parts of the page independently. Use <code>loading.tsx</code> for simple pages, and manual Suspense for dashboards where different sections have different data speeds.</p></div>
</div>`,
      boxes:[
        {type:'new',title:'React 19.2 — View Transitions & Activity',body:`<p>React 19.2 (shipped with Next.js 16) adds the <strong>View Transitions API</strong> for animated page transitions, the <code>useEffectEvent()</code> hook for stable callbacks in effects, and the <code>&lt;Activity/&gt;</code> component which lets you deactivate parts of the UI (hiding them from the screen while preserving their state) and reactivate them later — perfect for tabs, modals, and background panels.</p>`},
      ]
    },

// ═══════════════════════════════════════
// PHASE 4 — DATA FETCHING
// ═══════════════════════════════════════
    {
      id:'server-fetching', group:'Phase 4 — Data Fetching', icon:'database', title:'Fetching in Server Components',
      sub:'Using direct fetch(), async components, and why useEffect is no longer needed for initial loads.',
      content:`
<div class="prose">
  <p>One of the biggest quality-of-life improvements in Next.js is that Server Components can be <code>async</code>. You can fetch data directly at the top of your component with <code>await</code> — no <code>useEffect</code>, no loading state, no separate API routes for initial data.</p>
</div>
<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-bad">Old Way — Client-side useEffect</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">posts.tsx (old)</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>'use client'
import { useState, useEffect } from 'react'

export default function Posts() {
  const [posts, setPosts] = useState([])
  const [loading, setLoading] = useState(true)
  const [error, setError] = useState(null)

  useEffect(() => {
    fetch('/api/posts')
      .then(r => r.json())
      .then(setPosts)
      .catch(setError)
      .finally(() => setLoading(false))
  }, [])

  if (loading) return &lt;Spinner /&gt;
  if (error) return &lt;Error /&gt;
  return &lt;ul&gt;{posts.map(p => &lt;li&gt;{p.title}&lt;/li&gt;)}&lt;/ul&gt;
}</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-good">New Way — Server Component async/await</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/page.tsx</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>// No 'use client' — Server Component
// No useState, no useEffect, no loading state
// Errors bubble up to the nearest error.tsx

async function getPosts() {
  const res = await fetch('https://api.example.com/posts')
  if (!res.ok) throw new Error('Failed to fetch')
  return res.json()
}

export default async function Posts() {
  // Just await — Next.js handles the rest
  const posts = await getPosts()

  return (
    &lt;ul&gt;
      {posts.map(p => &lt;li key={p.id}&gt;{p.title}&lt;/li&gt;)}
    &lt;/ul&gt;
  )
}</code></pre></div>
  </div>
</div>`,
      boxes:[
        {type:'tip',title:'Parallel Fetching with Promise.all',body:`<p>When you need multiple pieces of data, fetch them in parallel: <code>const [users, posts] = await Promise.all([getUsers(), getPosts()])</code>. This runs both requests simultaneously, taking only as long as the slower one — not the sum of both.</p>`},
        {type:'warn',title:'useEffect for initial data is an anti-pattern in Next.js',body:`<p>If you find yourself writing <code>useEffect(() => { fetch(...) }, [])</code> for initial page data, stop. Move that component to a Server Component and use async/await. You'll eliminate the loading state, reduce JavaScript bundle size, and improve performance.</p>`},
      ]
    },

    {
      id:'fetch-api', group:'Phase 4 — Data Fetching', icon:'refresh', title:'The fetch API in Next.js',
      sub:'Extended fetch options like force-cache and next.revalidate — Next.js superpowers.',
      content:`
<div class="prose">
  <p>Next.js extends the native <code>fetch</code> API with extra options for controlling caching and revalidation. These options let you precisely define how long data is cached and when it should be refreshed — giving you static performance with dynamic data.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/examples/fetch-options.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// 1. STATIC — cached indefinitely (like getStaticProps)
// Best for data that never changes: config, constants
const staticData = await fetch('https://api.example.com/config', {
  cache: 'force-cache'
})

// 2. DYNAMIC — never cached, always fresh (like getServerSideProps)
// Best for per-request data: user profile, cart
const dynamicData = await fetch('https://api.example.com/user', {
  cache: 'no-store'
})

// 3. ISR — cached, revalidated every 60 seconds
// Best for frequently updated content: news, prices
const isrData = await fetch('https://api.example.com/news', {
  next: { revalidate: 60 }
})

// 4. TAG-BASED — cached until a specific tag is invalidated
// Best for content that changes on specific events
const taggedData = await fetch('https://api.example.com/products', {
  next: { tags: ['products'] }
})</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Option</th><th>Behavior</th><th>Use Case</th></tr></thead>
    <tbody>
      <tr><td><code>cache: 'force-cache'</code></td><td>Cached forever (until rebuild)</td><td>Static content, docs</td></tr>
      <tr><td><code>cache: 'no-store'</code></td><td>Never cached, always fresh</td><td>Auth-sensitive data</td></tr>
      <tr><td><code>next: { revalidate: N }</code></td><td>Cached for N seconds (ISR)</td><td>Product listings, news</td></tr>
      <tr><td><code>next: { tags: ['x'] }</code></td><td>Cached until tag invalidated</td><td>CMS content, e-commerce</td></tr>
    </tbody>
  </table>
</div>`,
      boxes:[
        {type:'new',title:'Next.js 16: Refined Caching APIs',body:`<p>Next.js 16 introduces <code>updateTag()</code> alongside the existing <code>revalidateTag()</code>. While <code>revalidateTag()</code> purges a cache entry so it is re-fetched on the next request, <code>updateTag()</code> lets you <strong>push new data directly into the cache</strong> without waiting for a request — useful for real-time updates and background revalidation flows. Both work with the <code>next: { tags: [...] }</code> fetch option.</p>`},
      ]
    },

    {
      id:'caching', group:'Phase 4 — Data Fetching', icon:'database', title:'Caching Strategies',
      sub:'Static vs Dynamic rendering, unstable_cache, and request memoization.',
      content:`
<div class="prose">
  <p>Next.js has a layered caching system. Understanding all four layers helps you build fast apps while keeping data fresh. Each layer serves a different purpose and has different invalidation behavior.</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t">Request Memoization</div><div class="card-b">Within a single request, identical <code>fetch()</code> calls to the same URL are automatically deduplicated. If 5 components all fetch the same user data, only one HTTP request is made. This is automatic — you don't configure it.</div></div>
  <div class="card"><div class="card-t">Data Cache</div><div class="card-b">Persists fetch responses on the server across multiple requests. Controlled by <code>cache</code> and <code>next.revalidate</code> options on fetch calls. Survives server restarts.</div></div>
  <div class="card"><div class="card-t">Full Route Cache</div><div class="card-b">At build time, static routes are pre-rendered to HTML and stored. These cached responses are served instantly for all users — no compute needed per request.</div></div>
  <div class="card"><div class="card-t">Router Cache</div><div class="card-b">Client-side cache of prefetched pages. When you hover a Link, the page is fetched and cached in memory. Navigation feels instant.</div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/data.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { unstable_cache } from 'next/cache'

// unstable_cache wraps non-fetch data sources (like DB queries)
// with the same caching behavior as extended fetch
export const getUser = unstable_cache(
  async (id: string) => {
    // This database query result is cached
    return db.query.users.findFirst({ where: eq(users.id, id) })
  },
  ['user'],           // Cache key prefix
  {
    revalidate: 300,  // Refresh every 5 minutes
    tags: ['users'],  // Tag for on-demand invalidation
  }
)</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Dynamic functions opt out of static rendering',body:`<p>Calling <code>cookies()</code>, <code>headers()</code>, <code>searchParams</code>, or using <code>cache: 'no-store'</code> makes a route <strong>dynamic</strong>. Dynamic routes are rendered fresh on every request. This is correct behavior for user-specific pages — just be aware that it opts out of the Full Route Cache.</p>`},
      ]
    },

    {
      id:'revalidation', group:'Phase 4 — Data Fetching', icon:'refresh', title:'Revalidation',
      sub:'Time-based revalidation, on-demand revalidation, revalidatePath, and the new updateTag().',
      content:`
<div class="prose">
  <p>Revalidation lets you update cached data without rebuilding the entire app. Next.js 16 supports two strategies: <strong>time-based</strong> (automatically refresh after N seconds) and <strong>on-demand</strong> (manually trigger a refresh from a Server Action or Route Handler). Next.js 16 also adds the new <code>updateTag()</code> API for pushing data directly into the cache.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/revalidate.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { revalidatePath, revalidateTag } from 'next/cache'
// New in Next.js 16:
import { updateTag } from 'next/cache'

// Revalidate a specific path — clears the full route cache
// for that URL and all its variants
export async function updatePost(postId: string, data: PostData) {
  await db.posts.update({ where: { id: postId }, data })

  // Tell Next.js to re-render this page next time it's requested
  revalidatePath(\`/posts/\${postId}\`)
  revalidatePath('/posts') // Also revalidate the list page
}

// Revalidate all fetches tagged with a specific tag
export async function clearProductCache() {
  revalidateTag('products') // Clears all fetch({ next: { tags: ['products'] } })
}

// NEW in Next.js 16 — updateTag: push data INTO the cache
// instead of waiting for the next request to re-fetch it
export async function pushProductUpdate() {
  await updateTag('products', async () => {
    // This result is stored in the cache immediately
    return await db.products.findMany()
  })
}

// On-demand revalidation via Route Handler (webhook from CMS)
export async function POST(request: Request) {
  const { tag, secret } = await request.json()
  if (secret !== process.env.REVALIDATE_SECRET) {
    return Response.json({ error: 'Invalid secret' }, { status: 401 })
  }
  revalidateTag(tag)
  return Response.json({ revalidated: true })
}</code></pre></div>`,
      boxes:[
        {type:'new',title:'updateTag() — Push-based Cache Updates',body:`<p><code>updateTag()</code> is a new Next.js 16 API that complements <code>revalidateTag()</code>. The key difference: <code>revalidateTag()</code> <em>invalidates</em> a cache entry so the next request triggers a re-fetch, while <code>updateTag()</code> <em>replaces</em> the cache value immediately by running your async function and storing the result. Use <code>updateTag()</code> when you already have new data and want to warm the cache proactively without a stale window.</p>`},
        {type:'tip',title:'Revalidation vs Re-deployment',body:`<p>With on-demand revalidation, you can update your site's content without a new deployment. A CMS like Contentful or Sanity can send a webhook to your <code>/api/revalidate</code> endpoint whenever content is published — Next.js will re-render just the affected pages.</p>`},
      ]
    },

    {
      id:'client-fetching', group:'Phase 4 — Data Fetching', icon:'monitor', title:'Fetching in Client Components',
      sub:'Using useEffect + fetch, SWR, and TanStack Query integration.',
      content:`
<div class="prose">
  <p>While Server Components handle most data fetching, some scenarios still require client-side fetching: <strong>real-time data</strong> that changes while the user is on the page, <strong>user-triggered searches</strong>, <strong>infinite scroll</strong>, or data that depends on client state like filter selections.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/SearchResults.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useState } from 'react'
import useSWR from 'swr'

const fetcher = (url: string) => fetch(url).then(r => r.json())

interface Props {
  initialQuery: string
}

export default function SearchResults({ initialQuery }: Props) {
  const [query, setQuery] = useState(initialQuery)

  // SWR: handles caching, revalidation, loading/error states
  const { data, error, isLoading } = useSWR(
    query ? \`/api/search?q=\${query}\` : null,
    fetcher,
    { keepPreviousData: true }  // Don't flash empty while typing
  )

  return (
    &lt;div&gt;
      &lt;input
        value={query}
        onChange={e => setQuery(e.target.value)}
        placeholder="Search..."
      /&gt;
      {isLoading &amp;&amp; &lt;p&gt;Searching...&lt;/p&gt;}
      {error &amp;&amp; &lt;p&gt;Something went wrong.&lt;/p&gt;}
      {data?.results.map(r => &lt;div key={r.id}&gt;{r.title}&lt;/div&gt;)}
    &lt;/div&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'SWR vs TanStack Query',body:`<p><strong>SWR</strong> (by Vercel) is lightweight and integrates naturally with Next.js — great for simple use cases. <strong>TanStack Query</strong> (formerly React Query) is more powerful, with mutation handling, optimistic updates, and complex cache management. Both work well with Next.js. Start with SWR and upgrade if needed.</p>`},
        {type:'nxt',title:'Hydration — Initial data from server',body:`<p>Best practice: fetch initial data on the server, pass it as props to the client component, and use it as the initial cache value. The user sees content immediately, and the client library takes over from there. With SWR: <code>useSWR(key, fetcher, { fallbackData: serverData })</code>.</p>`},
      ]
    },

    {
      id:'server-actions', group:'Phase 4 — Data Fetching', icon:'server', title:'Server Actions',
      sub:'Using "use server", handling form submissions, mutations, and the useActionState hook.',
      content:`
<div class="prose">
  <p>Server Actions are async functions that run on the server but can be called from Client Components. They replace the need for separate API routes for form submissions and mutations. Marked with the <code>'use server'</code> directive, they are the primary way to mutate data in Next.js.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/post.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { revalidatePath } from 'next/cache'
import { redirect } from 'next/navigation'
import { db } from '@/lib/db'
import { z } from 'zod'

const CreatePostSchema = z.object({
  title: z.string().min(1, 'Title is required').max(100),
  content: z.string().min(10, 'Content must be at least 10 characters'),
})

export async function createPost(prevState: any, formData: FormData) {
  // 1. Parse and validate input
  const raw = {
    title: formData.get('title'),
    content: formData.get('content'),
  }

  const result = CreatePostSchema.safeParse(raw)
  if (!result.success) {
    return { errors: result.error.flatten().fieldErrors }
  }

  // 2. Authenticate (always validate auth in Server Actions!)
  const user = await getCurrentUser()
  if (!user) return { errors: { _: ['Unauthorized'] } }

  // 3. Perform the mutation
  const post = await db.posts.create({
    data: { ...result.data, authorId: user.id }
  })

  // 4. Revalidate and redirect
  revalidatePath('/posts')
  redirect(\`/posts/\${post.id}\`)
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/new/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use client'

import { useActionState } from 'react' // React 19!
import { createPost } from '@/app/actions/post'

export default function NewPostPage() {
  const [state, action, isPending] = useActionState(createPost, null)

  return (
    &lt;form action={action}&gt;
      &lt;input name="title" placeholder="Post title" /&gt;
      {state?.errors?.title &amp;&amp; &lt;p&gt;{state.errors.title[0]}&lt;/p&gt;}

      &lt;textarea name="content" placeholder="Write your post..." /&gt;
      {state?.errors?.content &amp;&amp; &lt;p&gt;{state.errors.content[0]}&lt;/p&gt;}

      &lt;button type="submit" disabled={isPending}&gt;
        {isPending ? 'Publishing...' : 'Publish Post'}
      &lt;/button&gt;
    &lt;/form&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'new',title:'useActionState — React 19',body:`<p><code>useActionState</code> is a new React 19 hook (replacing the old <code>useFormState</code>). It connects a form to a Server Action and manages the pending state, returned data, and error states. It works with HTML forms natively — even without JavaScript enabled (progressive enhancement).</p>`},
        {type:'warn',title:'Always authenticate in Server Actions',body:`<p>Server Actions are public endpoints — anyone can call them. Always verify the user is authenticated and authorized inside the action. Never trust data that comes in through <code>formData</code>. Always validate with a schema library like Zod.</p>`},
      ]
    },

    {
      id:'cache-components', group:'Phase 4 — Data Fetching', icon:'database', title:'Cache Components & use cache',
      sub:'The new Next.js 16 caching model using Partial Pre-Rendering (PPR) and the use cache directive.',
      content:`
<div class="prose">
  <p>Next.js 16 introduces a new caching model built around two complementary features: <strong>Partial Pre-Rendering (PPR)</strong> and the <strong><code>'use cache'</code> directive</strong>. Together they give you fine-grained control over what is cached, when it expires, and how the page streams to the user — enabling instant navigation while keeping content fresh.</p>
</div>

<div class="mental-shift">
  <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg> The New Cache Model</h3>
  <div class="mental-shift-grid">
    <div class="ms-side ms-old">
      <div class="ms-side-label">Old Model (Next.js 14–15)</div>
      <ul>
        <li>Cache controlled via fetch() options</li>
        <li>unstable_cache for non-fetch data</li>
        <li>Route-level static vs dynamic</li>
        <li>Hard to cache individual components</li>
        <li>Full route opt-in/out of caching</li>
      </ul>
    </div>
    <div class="ms-arrow">→</div>
    <div class="ms-side ms-new">
      <div class="ms-side-label">New Model (Next.js 16)</div>
      <ul>
        <li>'use cache' directive on any async function</li>
        <li>Component-level caching granularity</li>
        <li>PPR splits static shell + dynamic holes</li>
        <li>Instant navigation for cached parts</li>
        <li>Dynamic content streams in afterward</li>
      </ul>
    </div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/products/page.tsx — use cache</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { unstable_cacheLife as cacheLife } from 'next/cache'
import { Suspense } from 'react'

// 'use cache' can be placed on any async function or component.
// Next.js caches the result and reuses it across requests.
async function getProducts() {
  'use cache'
  cacheLife('hours') // built-in profile: cache for hours, stale for 1 day

  const res = await fetch('https://api.example.com/products')
  return res.json()
}

// This component is cached independently from the rest of the page
async function ProductList() {
  'use cache'
  cacheLife({ revalidate: 3600, stale: 86400 }) // custom profile

  const products = await getProducts()
  return (
    &lt;ul&gt;
      {products.map(p =&gt; &lt;li key={p.id}&gt;{p.name}&lt;/li&gt;)}
    &lt;/ul&gt;
  )
}

// This component is dynamic — re-rendered on every request
async function PersonalizedBanner() {
  const user = await getCurrentUser() // reads cookies → dynamic
  return &lt;div&gt;Welcome back, {user.name}!&lt;/div&gt;
}

// PPR: the page shell is pre-rendered statically.
// Dynamic holes stream in after. Instant first paint!
export default function ProductsPage() {
  return (
    &lt;div&gt;
      {/* Dynamic part — streams in */}
      &lt;Suspense fallback={&lt;div&gt;Loading greeting...&lt;/div&gt;}&gt;
        &lt;PersonalizedBanner /&gt;
      &lt;/Suspense&gt;

      {/* Cached part — served instantly */}
      &lt;Suspense fallback={&lt;div&gt;Loading products...&lt;/div&gt;}&gt;
        &lt;ProductList /&gt;
      &lt;/Suspense&gt;
    &lt;/div&gt;
  )
}</code></pre></div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">next.config.ts — Enable PPR</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { NextConfig } from 'next'

const config: NextConfig = {
  experimental: {
    ppr: true, // Enable Partial Pre-Rendering globally
    // Or enable per-route via export const experimental_ppr = true in page.tsx
  },
}

export default config</code></pre></div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>cacheLife Profile</th><th>Revalidate</th><th>Stale Period</th><th>Best For</th></tr></thead>
    <tbody>
      <tr><td><code>'seconds'</code></td><td>Every second</td><td>1 minute</td><td>Real-time data</td></tr>
      <tr><td><code>'minutes'</code></td><td>Every minute</td><td>1 hour</td><td>Frequently updated</td></tr>
      <tr><td><code>'hours'</code></td><td>Every hour</td><td>1 day</td><td>Product listings</td></tr>
      <tr><td><code>'days'</code></td><td>Every day</td><td>1 week</td><td>Blog posts, docs</td></tr>
      <tr><td><code>'weeks'</code></td><td>Every week</td><td>1 month</td><td>Static content</td></tr>
      <tr><td><code>'max'</code></td><td>1 year</td><td>Forever</td><td>Immutable assets</td></tr>
    </tbody>
  </table>
</div>`,
      boxes:[
        {type:'new',title:'PPR — Partial Pre-Rendering',body:`<p>PPR is the core idea behind the new caching model. Instead of a route being entirely static or entirely dynamic, PPR splits it: the <strong>static shell</strong> (layout, navigation, cached components) is pre-rendered and served instantly from the CDN edge. <strong>Dynamic holes</strong> (personalized content, real-time data) stream in afterward via React Suspense. Users get an instant first paint with progressively loaded fresh content.</p>`},
        {type:'tip',title:'use cache vs unstable_cache',body:`<p>The new <code>'use cache'</code> directive replaces <code>unstable_cache</code> from previous versions. It is more expressive (works as a directive on functions or entire components), integrates with PPR natively, and uses the built-in <code>cacheLife()</code> API for readable cache profiles. Prefer <code>'use cache'</code> for all new code in Next.js 16.</p>`},
      ]
    },

// ═══════════════════════════════════════
// PHASE 5 — STYLING & ASSETS
// ═══════════════════════════════════════
    {
      id:'css', group:'Phase 5 — Styling & Assets', icon:'monitor', title:'CSS in Next.js',
      sub:'Implementing Global CSS, CSS Modules, and Tailwind CSS setup.',
      content:`
<div class="prose">
  <p>Next.js supports multiple styling approaches out of the box. You can use them together in the same project — global styles for base resets, CSS Modules for component-level isolation, and Tailwind for utility-first styling.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Global CSS</div><div class="step-desc">Import global styles only in <code>app/layout.tsx</code>. These apply to the entire app — use them for CSS resets, custom properties, and base typography.</div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">CSS Modules</div><div class="step-desc">Files named <code>*.module.css</code> are automatically scoped to the component that imports them. Next.js generates unique class names, preventing style collisions.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Tailwind CSS</div><div class="step-desc">Utility-first CSS framework. Created by default in <code>create-next-app</code>. Uses a <code>tailwind.config.ts</code> for customization.</div></div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Button.module.css</span><span class="cb-lang">css</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-css"><code>.button {
  padding: 8px 16px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
}
.primary { background: #0070f3; color: white; }
.secondary { background: transparent; border: 1px solid #0070f3; }</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Button.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import styles from './Button.module.css'

interface ButtonProps {
  variant?: 'primary' | 'secondary'
  children: React.ReactNode
  onClick?: () => void
}

export default function Button({ variant = 'primary', children, onClick }: ButtonProps) {
  return (
    // styles.button is transformed to a unique class like Button_button__abc123
    &lt;button className={\`\${styles.button} \${styles[variant]}\`} onClick={onClick}&gt;
      {children}
    &lt;/button&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Global CSS can only be imported in layout.tsx',body:`<p>In the App Router, regular CSS files (not modules) can only be imported from <code>app/layout.tsx</code> or the root layout. Importing global styles from individual components or pages causes a build error. CSS Modules can be imported anywhere.</p>`},
      ]
    },

    {
      id:'tailwind', group:'Phase 5 — Styling & Assets', icon:'monitor', title:'Tailwind CSS Integration',
      sub:'Built-in support, className patterns, responsive design, and dark mode.',
      content:`
<div class="prose">
  <p>Tailwind CSS is the dominant styling choice for Next.js projects. It ships pre-configured with <code>create-next-app</code> and works seamlessly with Server Components — unlike CSS-in-JS solutions that require client-side hydration.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/components/Card.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>interface CardProps {
  title: string
  description: string
  featured?: boolean
}

export default function Card({ title, description, featured }: CardProps) {
  return (
    &lt;div className={[
      // Base styles
      'rounded-xl border p-6 transition-all duration-200',
      // Responsive
      'md:p-8 lg:p-10',
      // Dark mode
      'bg-white dark:bg-gray-900',
      'border-gray-200 dark:border-gray-800',
      // Conditional
      featured
        ? 'ring-2 ring-blue-500 shadow-lg shadow-blue-500/10'
        : 'hover:border-gray-400 hover:shadow-sm',
    ].join(' ')}&gt;
      &lt;h3 className="text-lg font-bold text-gray-900 dark:text-white mb-2"&gt;
        {title}
      &lt;/h3&gt;
      &lt;p className="text-gray-600 dark:text-gray-400 leading-relaxed"&gt;
        {description}
      &lt;/p&gt;
    &lt;/div&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'cn() utility for conditional classes',body:`<p>Install <code>clsx</code> and <code>tailwind-merge</code> and create a <code>cn()</code> utility: it merges Tailwind classes without conflicts. Example: <code>cn('px-4 py-2', isPrimary && 'bg-blue-500', className)</code>. This is the standard pattern in every serious Next.js project.</p>`},
        {type:'nxt',title:'Tailwind v4 with Next.js 16',body:`<p>Next.js 16 supports Tailwind v4, which uses a CSS-based configuration (<code>@import "tailwindcss"</code> in your CSS file) instead of a <code>tailwind.config.ts</code>. It is significantly faster and removes the need for a PostCSS config in most setups. Check if <code>create-next-app</code> sets up v3 or v4.</p>`},
      ]
    },

    {
      id:'fonts-images', group:'Phase 5 — Styling & Assets', icon:'star', title:'Fonts & Images',
      sub:'Using next/font (Google/Local fonts) and the next/image component for automatic optimization.',
      content:`
<div class="prose">
  <p>Next.js provides two built-in optimization tools: <code>next/font</code> for fonts and <code>next/image</code> for images. Both handle performance optimizations automatically that would otherwise require significant manual configuration.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/layout.tsx — Fonts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { Geist, Geist_Mono } from 'next/font/google'
// For local fonts:
// import localFont from 'next/font/local'

// Self-hosted automatically — no requests to Google at runtime!
const geist = Geist({
  subsets: ['latin'],
  variable: '--font-geist',  // CSS variable for use in Tailwind/CSS
})

const geistMono = Geist_Mono({
  subsets: ['latin'],
  variable: '--font-mono',
})

export default function RootLayout({ children }: { children: React.ReactNode }) {
  return (
    &lt;html lang="en" className={\`\${geist.variable} \${geistMono.variable}\`}&gt;
      &lt;body className={geist.className}&gt;{children}&lt;/body&gt;
    &lt;/html&gt;
  )
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">components/Avatar.tsx — Images</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import Image from 'next/image'

export default function Avatar({ src, name }: { src: string; name: string }) {
  return (
    &lt;Image
      src={src}
      alt={name}
      width={64}
      height={64}
      className="rounded-full"
      // Optional optimization flags:
      priority   // Preload — use for above-the-fold images
      quality={85}  // Default is 75
      placeholder="blur"  // Show blur while loading
      blurDataURL="data:image/..."  // Custom blur placeholder
    /&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'nxt',title:'next/font Zero Layout Shift',body:`<p><code>next/font</code> eliminates Cumulative Layout Shift (CLS) from fonts by inlining the font-face declarations at build time. It also self-hosts Google Fonts — the font files are downloaded to your server during build and served from your domain, with zero requests to Google at runtime.</p>`},
        {type:'tip',title:'next/image requires width and height',body:`<p>The <code>next/image</code> component requires explicit <code>width</code> and <code>height</code> props to reserve space in the layout and prevent CLS. Use <code>fill</code> prop with a positioned parent container for flexible responsive images: <code>&lt;div className="relative h-48"&gt;&lt;Image src={...} alt={...} fill /&gt;&lt;/div&gt;</code></p>`},
      ]
    },

    {
      id:'metadata', group:'Phase 5 — Styling & Assets', icon:'globe', title:'Metadata API',
      sub:'Using the metadata export, dynamic metadata, generateMetadata, and Open Graph.',
      content:`
<div class="prose">
  <p>Next.js has a built-in Metadata API for managing <code>&lt;head&gt;</code> tags — titles, descriptions, Open Graph images, Twitter cards, and more. It replaces manual <code>&lt;Head&gt;</code> components from the Pages Router with a type-safe, declarative API.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/layout.tsx — Static Metadata</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { Metadata } from 'next'

export const metadata: Metadata = {
  title: {
    template: '%s | My Blog',  // "Post Title | My Blog"
    default: 'My Blog',        // Shown when child has no title
  },
  description: 'A blog about web development and design.',
  metadataBase: new URL('https://myblog.com'),
  openGraph: {
    type: 'website',
    locale: 'en_US',
    url: 'https://myblog.com',
    siteName: 'My Blog',
  },
  twitter: {
    card: 'summary_large_image',
    creator: '@myhandle',
  },
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/posts/[id]/page.tsx — Dynamic Metadata</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import type { Metadata } from 'next'

// generateMetadata runs on the server, can fetch data
export async function generateMetadata(
  { params }: { params: Promise&lt;{ id: string }&gt; }
): Promise&lt;Metadata&gt; {
  const { id } = await params
  const post = await getPost(id)

  return {
    title: post.title,  // "Post Title | My Blog" (uses template)
    description: post.excerpt,
    openGraph: {
      title: post.title,
      description: post.excerpt,
      images: [{ url: post.coverImage, width: 1200, height: 630 }],
    },
  }
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'opengraph-image.tsx — Auto OG images',body:`<p>Place an <code>opengraph-image.tsx</code> file next to a page to generate Open Graph images dynamically using React components and the <code>ImageResponse</code> API. Next.js renders it as a PNG at the route <code>/opengraph-image</code>. Perfect for auto-generating branded share cards for every blog post.</p>`},
      ]
    },

    {
      id:'route-handlers', group:'Phase 6 — Backend Features', icon:'server', title:'Route Handlers (API Routes)',
      sub:'Creating route.ts files and handling HTTP methods GET, POST, PUT, DELETE.',
      content:`
<div class="prose">
  <p>Route Handlers are the App Router equivalent of API routes. Create a <code>route.ts</code> file in the <code>app/</code> directory, and export functions named after HTTP methods. They're used for webhooks, third-party API proxying, and when Server Actions aren't the right fit.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/posts/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextRequest, NextResponse } from 'next/server'
import { db } from '@/lib/db'

// GET /api/posts — returns all posts
export async function GET(request: NextRequest) {
  const { searchParams } = new URL(request.url)
  const page = parseInt(searchParams.get('page') ?? '1')
  const limit = parseInt(searchParams.get('limit') ?? '10')

  const posts = await db.posts.findMany({
    skip: (page - 1) * limit,
    take: limit,
    orderBy: { createdAt: 'desc' },
  })

  return NextResponse.json({ posts, page, limit })
}

// POST /api/posts — create a new post
export async function POST(request: NextRequest) {
  const body = await request.json()

  const user = await getAuthUser(request)
  if (!user) {
    return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })
  }

  const post = await db.posts.create({
    data: { ...body, authorId: user.id }
  })

  return NextResponse.json(post, { status: 201 })
}</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/posts/[id]/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>export async function DELETE(
  request: NextRequest,
  { params }: { params: Promise&lt;{ id: string }&gt; }
) {
  const { id } = await params
  await db.posts.delete({ where: { id } })
  return new NextResponse(null, { status: 204 })
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'Server Actions vs Route Handlers',body:`<p>Use <strong>Server Actions</strong> for form submissions and mutations triggered by UI. Use <strong>Route Handlers</strong> for webhooks from external services, building a REST API consumed by mobile apps, or endpoints that need specific HTTP caching headers. Don't create a Route Handler just to call it from your own React components — use Server Actions instead.</p>`},
      ]
    },

    {
      id:'middleware', group:'Phase 6 — Backend Features', icon:'shield', title:'Middleware',
      sub:'Using middleware.ts for matchers, redirects, rewrites, and authentication checks.',
      content:`
<div class="prose">
  <p>Middleware runs before every request — before the page is rendered or the route handler is called. It's perfect for authentication checks, A/B testing, internationalization redirects, and request logging. Middleware runs at the Edge, making it extremely fast.</p>
  <p><strong>Next.js 16:</strong> <code>middleware.ts</code> is <strong>deprecated</strong> in Next.js 16 in favour of <code>proxy.ts</code>. The file still works for Edge runtime use cases but will be removed in a future version. See the <em>proxy.ts</em> section below for the migration — it is largely a rename. The examples on this page still apply; just use <code>proxy.ts</code> and rename the exported function to <code>proxy()</code> going forward.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts (root of project)</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

export function middleware(request: NextRequest) {
  const { pathname } = request.nextUrl

  // Read cookies for auth token
  const token = request.cookies.get('auth-token')?.value

  // Protect /dashboard and all nested routes
  if (pathname.startsWith('/dashboard')) {
    if (!token) {
      // Redirect to login, preserving the intended destination
      const loginUrl = new URL('/login', request.url)
      loginUrl.searchParams.set('redirect', pathname)
      return NextResponse.redirect(loginUrl)
    }
  }

  // Redirect logged-in users away from auth pages
  if (['/login', '/register'].includes(pathname) && token) {
    return NextResponse.redirect(new URL('/dashboard', request.url))
  }

  // Add custom headers to all responses
  const response = NextResponse.next()
  response.headers.set('X-Custom-Header', 'my-value')
  return response
}

// Limit middleware to specific paths (performance!)
// Without this, middleware runs on EVERY request including
// static assets, fonts, and API routes
export const config = {
  matcher: ['/((?!api|_next/static|_next/image|favicon.ico).*)'],
}</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Middleware runs on the Edge — no Node.js APIs',body:`<p>Middleware runs in the Edge Runtime, not the full Node.js runtime. This means no access to <code>fs</code>, database clients, or Node.js-specific packages. For database-backed auth, validate a JWT in middleware and put the real session check in the Server Component or Route Handler.</p>`},
        {type:'tip',title:'Always use the matcher config',body:`<p>Without the <code>config.matcher</code> export, middleware runs on every single request — including static files, Next.js internals, and fonts. This wastes resources. Always configure a matcher to limit middleware to the paths that actually need it.</p>`},
      ]
    },

    {
      id:'proxy-ts', group:'Phase 6 — Backend Features', icon:'globe', title:'proxy.ts — Replacing Middleware',
      sub:'middleware.ts is deprecated in Next.js 16 and renamed to proxy.ts — same logic, clearer name, Node.js runtime.',
      content:`
<div class="prose">
  <p>In Next.js 16, <code>middleware.ts</code> is <strong>deprecated</strong> and renamed to <code>proxy.ts</code>. This is primarily a rename — your existing auth checks, redirects, and header manipulation all move over unchanged. The reason for the rename: the word "middleware" caused confusion with Express.js-style middleware chains, whereas "proxy" better conveys that this file sits at the network boundary in front of your app.</p>
  <p><strong>Key runtime change:</strong> <code>proxy.ts</code> runs on the <strong>Node.js runtime</strong> (not Edge). If you specifically need Edge runtime execution, keep using <code>middleware.ts</code> — it still works but is deprecated and will be removed in a future version.</p>
</div>

<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-before">Before — middleware.ts (deprecated)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

export function middleware(request: NextRequest) {
  const token = request.cookies.get('auth-token')?.value
  if (request.nextUrl.pathname.startsWith('/dashboard') && !token) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
}

export const config = {
  matcher: ['/dashboard/:path*'],
}</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-after">After — proxy.ts (Next.js 16)</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">proxy.ts</span><span class="cb-lang">tsx</span></div><pre class="language-typescript"><code>import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'

// Renamed: middleware → proxy (same logic, same API)
export function proxy(request: NextRequest) {
  const token = request.cookies.get('auth-token')?.value
  if (request.nextUrl.pathname.startsWith('/dashboard') && !token) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
}

export const config = {
  matcher: ['/dashboard/:path*'],
}</code></pre></div>
  </div>
</div>

<div class="cb"><div class="cb-hdr"><span class="cb-fname">Run the codemod to migrate automatically</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># Next.js provides a codemod that handles the rename for you:
# - Renames middleware.ts → proxy.ts
# - Renames the exported function from middleware() → proxy()
# - Updates config flag names (e.g. skipMiddlewareUrlNormalize → skipProxyUrlNormalize)
npx @next/codemod@latest upgrade</code></pre></div>`,
      boxes:[
        {type:'warn',title:'proxy.ts runs on Node.js — not Edge',body:`<p>Unlike the old <code>middleware.ts</code> which defaulted to the Edge Runtime, <code>proxy.ts</code> runs on the <strong>Node.js runtime</strong> and cannot be changed. This means you now have full access to Node.js APIs (database clients, <code>fs</code>, etc.) in your proxy — but it no longer runs closer to the user on the Edge. If you need Edge execution for performance reasons (e.g., geo-based redirects at CDN level), keep <code>middleware.ts</code> for now, but note it is deprecated.</p>`},
        {type:'new',title:'Why the rename?',body:`<p>The word "middleware" was misleading — it implied Express-style request pipelines that could be stacked. In reality this file is a single network boundary in front of your app: it intercepts requests, can rewrite/redirect/add headers, and then passes them on. "Proxy" describes that behavior accurately. The logic inside is unchanged — it's genuinely just a rename backed by a one-line codemod.</p>`},
      ]
    },

    {
      id:'env-vars', group:'Phase 6 — Backend Features', icon:'lock', title:'Environment Variables',
      sub:'Handling .env.local, process.env, and public vs server-only variables.',
      content:`
<div class="prose">
  <p>Environment variables let you store secrets (API keys, database URLs) outside your code. Next.js has a layered system for managing them across different environments.</p>
</div>
<div class="filetree">
<span class="ft-other">.env                  </span><span class="ft-other">← Defaults for all environments (commit to git)</span>
<span class="ft-other">.env.local            </span><span class="ft-other">← Local overrides (NEVER commit — add to .gitignore)</span>
<span class="ft-other">.env.development      </span><span class="ft-other">← Development-only (commit ok)</span>
<span class="ft-other">.env.production       </span><span class="ft-other">← Production-only (commit ok)</span>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">.env.local</span><span class="cb-lang">bash</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-bash"><code># Server-only — NEVER sent to the browser
DATABASE_URL="postgresql://localhost:5432/mydb"
JWT_SECRET="your-super-secret-key-here"
STRIPE_SECRET_KEY="sk_test_..."

# Public — accessible in the browser (NEXT_PUBLIC_ prefix required)
NEXT_PUBLIC_APP_URL="http://localhost:3000"
NEXT_PUBLIC_STRIPE_PUBLIC_KEY="pk_test_..."</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">Usage in code</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>// Server Component — can access all env vars
const db = new Database(process.env.DATABASE_URL!) // ✅

// Client Component — can only access NEXT_PUBLIC_* vars
const apiUrl = process.env.NEXT_PUBLIC_APP_URL     // ✅
const secret = process.env.JWT_SECRET              // ⚠️ undefined in browser!

// Type-safe env validation with @t3-oss/env-nextjs (recommended)
import { env } from '@/env'
const dbUrl = env.DATABASE_URL  // TypeScript error if missing!</code></pre></div>`,
      boxes:[
        {type:'warn',title:'NEXT_PUBLIC_ variables are public',body:`<p>Any environment variable prefixed with <code>NEXT_PUBLIC_</code> is <strong>baked into the JavaScript bundle</strong> sent to every user. Never put secrets, passwords, or API keys with the <code>NEXT_PUBLIC_</code> prefix. Only use it for values that are safe to expose publicly.</p>`},
        {type:'tip',title:'Validate env at startup with @t3-oss/env-nextjs',body:`<p>The <code>@t3-oss/env-nextjs</code> package validates your environment variables at build time using Zod. If a required variable is missing, the build fails with a clear error instead of a mysterious runtime crash. Highly recommended for production apps.</p>`},
      ]
    },

    {
      id:'database', group:'Phase 6 — Backend Features', icon:'database', title:'Database Integration',
      sub:'Prisma setup, connection pooling, and performing queries in Server Components.',
      content:`
<div class="prose">
  <p>Next.js Server Components can query databases directly — no API layer needed. The most popular ORMs are <strong>Prisma</strong> (TypeScript-first, great DX) and <strong>Drizzle ORM</strong> (lightweight, SQL-like API). Here's a practical Prisma setup.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Install Prisma</div><div class="step-desc"><code>npm install prisma @prisma/client</code> then <code>npx prisma init --datasource-provider postgresql</code></div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Define your schema</div><div class="step-desc">Edit <code>prisma/schema.prisma</code> to define your data models.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Create a singleton client</div><div class="step-desc">Create <code>lib/db.ts</code> to export a single Prisma client instance (see below).</div></div></div>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">lib/db.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { PrismaClient } from '@prisma/client'

// Prevent multiple Prisma clients in development (hot reload)
const globalForPrisma = globalThis as unknown as { prisma: PrismaClient }

export const db = globalForPrisma.prisma ?? new PrismaClient({
  log: process.env.NODE_ENV === 'development' ? ['query'] : [],
})

if (process.env.NODE_ENV !== 'production') globalForPrisma.prisma = db</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/users/page.tsx</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { db } from '@/lib/db'

export default async function UsersPage() {
  // Direct DB query in a Server Component — clean and simple
  const users = await db.user.findMany({
    include: { posts: { take: 3 } },
    orderBy: { createdAt: 'desc' },
  })

  return (
    &lt;ul&gt;
      {users.map(user => (
        &lt;li key={user.id}&gt;
          {user.name} — {user.posts.length} posts
        &lt;/li&gt;
      ))}
    &lt;/ul&gt;
  )
}</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Connection Pooling in Serverless',body:`<p>Serverless deployments (Vercel) create many short-lived function instances, quickly exhausting your database's connection limit. Use a connection pooler like <strong>PgBouncer</strong>, <strong>Supabase Pooler</strong>, or <strong>Prisma Accelerate</strong> to proxy connections. Add <code>?pgbouncer=true</code> to your <code>DATABASE_URL</code> when using PgBouncer with Prisma.</p>`},

// PHASE 7 — AUTHENTICATION & SECURITY

    {
      id:'auth-patterns', group:'Phase 7 — Authentication & Security', icon:'lock', title:'Auth Patterns in Next.js',
      sub:'Session-based vs JWT authentication, comparing auth libraries and approaches.',
      content:`
<div class="prose">
  <p>Authentication in Next.js 16 spans the full stack — you need auth in Server Components (to check if users can see a page), in Server Actions (to validate mutations), in Route Handlers (to protect APIs), and in Middleware (to redirect unauthenticated users). Understanding the different approaches helps you choose the right tool.</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t">Session-Based (Recommended)</div><div class="card-b">After login, a session record is stored in the database. The client gets a session ID cookie. On each request, the session ID is looked up in the DB. <strong>Pros:</strong> Can revoke sessions instantly, simple mental model. <strong>Cons:</strong> DB lookup on every request (mitigated by caching).</div></div>
  <div class="card"><div class="card-t">JWT (Stateless)</div><div class="card-b">After login, a signed token is stored in a cookie. The token contains user info and is verified on each request without a DB lookup. <strong>Pros:</strong> Fast, no DB required for verification. <strong>Cons:</strong> Cannot revoke tokens until expiry — requires a denylist to force logout.</div></div>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr><th>Library</th><th>Approach</th><th>Best For</th></tr></thead>
    <tbody>
      <tr><td><strong>Auth.js v5</strong> (NextAuth)</td><td>Session or JWT</td><td>Social OAuth + email, built for Next.js</td></tr>
      <tr><td><strong>Lucia Auth</strong></td><td>Session-based</td><td>Custom auth with full control</td></tr>
      <tr><td><strong>Clerk</strong></td><td>Hosted service</td><td>Fastest setup, zero maintenance</td></tr>
      <tr><td><strong>Supabase Auth</strong></td><td>JWT (Supabase)</td><td>Already using Supabase</td></tr>
      <tr><td><strong>Better Auth</strong></td><td>Session-based</td><td>TypeScript-first, modern API</td></tr>
    </tbody>
  </table>
</div>`,
      boxes:[
        {type:'tip',title:'Recommendation for Beginners',body:`<p>If you just want auth to work with minimal effort: use <strong>Clerk</strong> (hosted) or <strong>Auth.js v5</strong> (self-hosted). Both have excellent Next.js 16 support. If you want to understand auth deeply and have full control: implement it yourself using <strong>Lucia Auth</strong> as a reference, or use <strong>Better Auth</strong>.</p>`},
      ]
    },

    {
      id:'nextauth', group:'Phase 7 — Authentication & Security', icon:'shield', title:'Auth.js Setup',
      sub:'Setup, configuring providers, using callbacks, and session strategies.',
      content:`
<div class="prose">
  <p>Auth.js (formerly NextAuth.js) is the most widely used authentication library for Next.js. Version 5 was rewritten to work natively with the App Router, Server Components, and Next.js Middleware.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">auth.ts (root of project)</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import NextAuth from 'next-auth'
import GitHub from 'next-auth/providers/github'
import Google from 'next-auth/providers/google'
import Credentials from 'next-auth/providers/credentials'
import { PrismaAdapter } from '@auth/prisma-adapter'
import { db } from '@/lib/db'
import bcrypt from 'bcrypt'

export const { handlers, auth, signIn, signOut } = NextAuth({
  adapter: PrismaAdapter(db),
  providers: [
    GitHub({ clientId: process.env.GITHUB_ID!, clientSecret: process.env.GITHUB_SECRET! }),
    Google({ clientId: process.env.GOOGLE_ID!, clientSecret: process.env.GOOGLE_SECRET! }),
    Credentials({
      async authorize(credentials) {
        const user = await db.user.findUnique({
          where: { email: credentials.email as string }
        })
        if (!user?.password) return null
        const valid = await bcrypt.compare(credentials.password as string, user.password)
        return valid ? user : null
      },
    }),
  ],
  session: { strategy: 'jwt' },  // or 'database' for session table
  callbacks: {
    jwt({ token, user }) {
      if (user) token.role = (user as any).role
      return token
    },
    session({ session, token }) {
      session.user.role = token.role as string
      return session
    },
  },
})</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/api/auth/[...nextauth]/route.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { handlers } from '@/auth'
export const { GET, POST } = handlers</code></pre></div>`,
      boxes:[
        {type:'nxt',title:'Using auth() in Server Components',body:`<p>Call <code>auth()</code> from <code>'@/auth'</code> in any Server Component to get the current session: <code>const session = await auth()</code>. If <code>session</code> is null, the user is not authenticated. This replaces the old <code>getServerSession()</code> pattern from NextAuth v4.</p>`},
      ]
    },

    {
      id:'protected-routes', group:'Phase 7 — Authentication & Security', icon:'lock', title:'Protected Routes',
      sub:'Middleware auth checks, route guards, and role-based access control.',
      content:`
<div class="prose">
  <p>Protection should happen at multiple levels. Middleware provides fast redirection before the page loads. Server Components provide the actual data-access guard. Never rely on the client to hide protected content.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">middleware.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { auth } from '@/auth'
import { NextResponse } from 'next/server'

// Auth.js v5 provides an auth() wrapper for middleware
export default auth((request) => {
  const isAuthenticated = !!request.auth
  const isAuthPage = request.nextUrl.pathname.startsWith('/login')
  const isProtected = request.nextUrl.pathname.startsWith('/dashboard')

  if (isProtected && !isAuthenticated) {
    return NextResponse.redirect(new URL('/login', request.url))
  }
  if (isAuthPage && isAuthenticated) {
    return NextResponse.redirect(new URL('/dashboard', request.url))
  }
})

export const config = { matcher: ['/dashboard/:path*', '/login', '/register'] }</code></pre></div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/dashboard/admin/page.tsx — RBAC</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>import { auth } from '@/auth'
import { notFound } from 'next/navigation'

export default async function AdminPage() {
  const session = await auth()

  // Double-check role even if middleware redirected
  // Never trust middleware alone for sensitive pages!
  if (!session || session.user.role !== 'admin') {
    notFound() // Return 404 rather than revealing page exists
  }

  return &lt;div&gt;Admin-only content&lt;/div&gt;
}</code></pre></div>`,
      boxes:[
        {type:'warn',title:'Defense in depth',body:`<p>Never protect routes with <strong>only</strong> middleware. Middleware validates JWTs but does not hit the database. A valid JWT from a deleted user would still pass middleware. Always add a secondary check in the Server Component or Server Action that verifies the user still exists and has the required permissions.</p>`},
      ]
    },

    {
      id:'secure-actions', group:'Phase 7 — Authentication & Security', icon:'shield', title:'Secure Server Actions',
      sub:'Adding auth validation in actions, input sanitization, and rate limiting.',
      content:`
<div class="prose">
  <p>Server Actions are automatically protected against CSRF attacks (they require a same-origin POST with a specific content type). But you are still responsible for authentication, authorization, and input validation.</p>
</div>
<div class="cb"><div class="cb-hdr"><span class="cb-fname">app/actions/deletePost.ts</span><span class="cb-lang">tsx</span><button class="cb-copy" onclick="copyCode(this)">Copy</button></div><pre class="language-typescript"><code>'use server'

import { auth } from '@/auth'
import { db } from '@/lib/db'
import { revalidatePath } from 'next/cache'
import { z } from 'zod'

const DeletePostSchema = z.object({
  postId: z.string().uuid('Invalid post ID'),
})

export async function deletePost(formData: FormData) {
  // 1. Always authenticate first
  const session = await auth()
  if (!session?.user) throw new Error('You must be logged in')

  // 2. Validate input (never trust user-provided data)
  const result = DeletePostSchema.safeParse({ postId: formData.get('postId') })
  if (!result.success) throw new Error('Invalid input')

  const { postId } = result.data

  // 3. Check ownership (authorization, not just authentication)
  const post = await db.post.findUnique({ where: { id: postId } })
  if (!post) throw new Error('Post not found')
  if (post.authorId !== session.user.id && session.user.role !== 'admin') {
    throw new Error('You do not have permission to delete this post')
  }

  // 4. Perform the operation
  await db.post.delete({ where: { id: postId } })
  revalidatePath('/posts')
}</code></pre></div>`,
      boxes:[
        {type:'tip',title:'next-safe-action — Type-safe Server Actions',body:`<p>The <code>next-safe-action</code> library wraps Server Actions with automatic Zod validation, authentication middleware, rate limiting, and consistent error handling. It's the recommended approach for production apps: <code>const action = authActionClient.schema(schema).action(handler)</code>.</p>`},
      ]
    },
