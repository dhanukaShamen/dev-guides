    {
      id:'utility-types', group:'Chapter 16 — Utility Types', icon:'ts', title:'Utility Types',
      sub:'TypeScript\'s built-in type transformers — powerful tools for working with existing types without rewriting them.',
      content:`
<div class="prose">
  <p><strong>Utility types</strong> are built into TypeScript. They take an existing type and transform it — making all fields optional, picking just some fields, removing fields, making everything read-only, and more. They prevent code duplication in your type definitions.</p>
  <p>You don't need to install anything. They are always available in any TypeScript project.</p>
</div>`,
      code:`// We'll use this interface throughout all examples:
interface User {
  id: number;
  name: string;
  email: string;
  age: number;
  role: "admin" | "editor" | "viewer";
}


// ── Partial<T> — make all fields optional ────────────────
// Useful for update payloads — you only send the fields that changed
type UserUpdate = Partial<User>;
// Equivalent to: { id?: number; name?: string; email?: string; ... }

function updateUser(id: number, changes: Partial<User>): void {
  // changes can have any combination of User's fields
}
updateUser(1, { name: "Alice" });        // ✅ only name
updateUser(1, { name: "Bob", age: 25 }); // ✅ name + age


// ── Required<T> — make all fields required ────────────────
// The opposite of Partial — removes all ? marks
interface Config {
  host?: string;
  port?: number;
  debug?: boolean;
}

type StrictConfig = Required<Config>;
// { host: string; port: number; debug: boolean } — all required


// ── Readonly<T> — prevent mutation ───────────────────────
type ReadonlyUser = Readonly<User>;
// All fields become readonly — good for data you should never mutate

const user: ReadonlyUser = { id: 1, name: "Alice", email: "a@b.com", age: 30, role: "viewer" };
user.name = "Bob";  // ❌ Error: Cannot assign to 'name' — it's read-only


// ── Pick<T, K> — select only some fields ─────────────────
// Create a type with only the fields you need:
type UserPreview = Pick<User, "id" | "name">;
// { id: number; name: string }  — just these two fields

type UserContact = Pick<User, "name" | "email">;
// { name: string; email: string }

// Great for API responses that don't return every field:
function getPreview(user: User): UserPreview {
  return { id: user.id, name: user.name };
}


// ── Omit<T, K> — remove specific fields ──────────────────
// The opposite of Pick — everything EXCEPT the listed fields:
type UserWithoutId = Omit<User, "id">;
// { name: string; email: string; age: number; role: "admin"|"editor"|"viewer" }

// Common use: a "create" type that excludes the auto-generated id
type CreateUserDto = Omit<User, "id">;

function createUser(data: CreateUserDto): User {
  return { ...data, id: Math.random() };
}

createUser({ name: "Alice", email: "a@b.com", age: 25, role: "editor" }); // ✅
createUser({ id: 1, name: "Alice", ... });  // ❌ Error: id should not be here


// ── Record<K, V> — typed key-value map ────────────────────
// Creates a type where keys are K and values are V:
type RolePermissions = Record<"admin" | "editor" | "viewer", string[]>;

const permissions: RolePermissions = {
  admin:  ["read", "write", "delete"],
  editor: ["read", "write"],
  viewer: ["read"],
};

// Another common use — map of id to object:
type UserMap = Record<number, User>;
const usersById: UserMap = {
  1: { id: 1, name: "Alice", email: "a@b.com", age: 30, role: "admin" },
  2: { id: 2, name: "Bob",   email: "b@b.com", age: 25, role: "viewer" },
};


// ── ReturnType<T> — extract a function's return type ──────
function getUser() {
  return { id: 1, name: "Alice", role: "admin" as const };
}

type FetchedUser = ReturnType<typeof getUser>;
// { id: number; name: string; role: "admin" }
// Useful when you can't import the type but can import the function


// ── NonNullable<T> — remove null and undefined ────────────
type MaybeString = string | null | undefined;
type DefinitelyString = NonNullable<MaybeString>;
// string — null and undefined removed


// ── Combining utility types ───────────────────────────────
// Real-world pattern: a "patch" payload that excludes id and role
type UserPatch = Partial<Omit<User, "id" | "role">>;
// { name?: string; email?: string; age?: number }

// Read-only version of a picked subset:
type ImmutablePreview = Readonly<Pick<User, "id" | "name">>;
// { readonly id: number; readonly name: string }`,
      codeFile:'utility-types.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'Partial vs Optional fields',body:`<p><code>Partial&lt;T&gt;</code> makes every field optional. It's different from defining optional fields with <code>?</code> — <code>Partial</code> is a transformation applied to an existing type, which means you don't have to rewrite the interface. Use <code>Partial&lt;User&gt;</code> for update/patch payloads where only some fields change.</p>`},
        {type:'tip',title:'💡 Pick vs Omit — which to use?',body:`<p>Use <code>Pick</code> when you want <strong>only a few fields</strong> from a large type (it's shorter to list what you want). Use <code>Omit</code> when you want <strong>almost everything</strong> except a couple of fields (it's shorter to list what you don't want). Both produce the same kind of result — just choose whichever needs fewer field names listed.</p>`},
        {type:'warn',title:'More utility types to explore',body:`<p>There are more built-in utility types beyond this page: <code>Exclude&lt;T, U&gt;</code> and <code>Extract&lt;T, U&gt;</code> work on union types (not object fields). <code>Parameters&lt;T&gt;</code> extracts a function's parameter types. <code>Awaited&lt;T&gt;</code> unwraps a Promise type. All are in the official TypeScript docs under "Utility Types."</p>`},
      ]
    },

  ]; // END SECTIONS

  // ═══════════════════════════════════════════════════════════════
  // RENDERING ENGINE  (matches React 19 guide architecture)
  // ═══════════════════════════════════════════════════════════════

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildBox(b) {
    const iconMap = { ts:'ts', tip:'check', warn:'warn', new:'star', ok:'check' };
    const titleMap = { ts:'TypeScript', tip:'Tip', warn:'Watch Out', new:'New in TS 6.0', ok:'Best Practice' };
    return `<div class="box box-${b.type}">
    <div class="box-hdr">${ICONS[iconMap[b.type]||'info']} ${b.title || titleMap[b.type] || ''}</div>
    <div class="box-body">${b.body}</div>
  </div>`;
  }

  function buildCode(code, file, lang, extraCodes) {
    const langMap = { typescript:'typescript', ts:'typescript', bash:'bash', json:'json', javascript:'javascript', js:'javascript' };
    const l = langMap[lang] || 'typescript';
    let html = `<div class="cb">
    <div class="cb-hdr">
      <div class="cb-fname">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        ${file||'code'} <span class="cb-lang">${lang||'typescript'}</span>
      </div>
      <button class="cb-copy" onclick="copyCode(this)">Copy</button>
    </div>
    <pre class="language-${l}"><code class="language-${l}">${escHtml(code)}</code></pre>
  </div>`;
    if (extraCodes) {
      extraCodes.forEach(ec => {
        const el = langMap[ec.lang] || 'typescript';
        html += `<div class="cb">
        <div class="cb-hdr">
          <div class="cb-fname">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            ${ec.file} <span class="cb-lang">${ec.lang}</span>
          </div>
          <button class="cb-copy" onclick="copyCode(this)">Copy</button>
        </div>
        <pre class="language-${el}"><code class="language-${el}">${escHtml(ec.code)}</code></pre>
      </div>`;
      });
    }
    return html;
  }

  function renderSection(s, idx, total) {
    const prev = idx > 0 ? SECTIONS[idx - 1] : null;
    const next = idx < total - 1 ? SECTIONS[idx + 1] : null;
    const num  = String(idx + 1).padStart(2, '0');

    let html = `<div id="sec-${s.id}" class="sec${idx === 0 ? ' vis' : ''}">
    <div class="sec-crumb">${s.group} <span>/ ${s.title}</span></div>
    <div class="sec-title">${s.title}</div>
    <p class="sec-sub">${s.sub}</p>`;

    if (s.content)    html += s.content;
    if (s.mockup)     html += s.mockup;
    if (s.boxes)      s.boxes.forEach(b => { html += buildBox(b); });
    if (s.code)       html += buildCode(s.code, s.codeFile||'', s.codeLang||'typescript', s.extraCodes);

    html += `<div class="nav-row">`;
    html += prev
            ? `<button class="nav-btn" onclick="navigate('${prev.id}')">${ICONS.prev} <span class="nav-label">${prev.title}</span></button>`
            : `<span></span>`;
    html += next
            ? `<button class="nav-btn next" onclick="navigate('${next.id}')"><span class="nav-label">${next.title}</span> ${ICONS.next}</button>`
            : `<button class="nav-btn next" onclick="navigate('${SECTIONS[0].id}')">${ICONS.rocket} Start Over</button>`;
    html += `</div></div>`;
    return html;
  }

  // ── Build sidebar (IDs, not indices) ──────────────────────────
  function buildSidebar() {
    const el = document.getElementById('sidebar');
    let html = '', currentGroup = '', num = 0;
    SECTIONS.forEach((s, i) => {
      if (s.group !== currentGroup) {
        currentGroup = s.group;
        html += `<div class="sg-label">${s.group}</div>`;
      }
      num++;
      html += `<div class="si${i === 0 ? ' active' : ''}" id="si-${s.id}" onclick="navigate('${s.id}')">
      ${ICONS[s.icon] || ICONS.ts}
      <span>${s.title}</span>
      <span class="sn">${String(num).padStart(2,'0')}</span>
    </div>`;
    });
    el.innerHTML = html;
  }

  // ── Build content (all sections upfront) ─────────────────────
  function buildContent() {
    document.getElementById('content').innerHTML =
            SECTIONS.map((s, i) => renderSection(s, i, SECTIONS.length)).join('');
  }

  // ── Navigate by string ID ─────────────────────────────────────
  let current = SECTIONS[0].id;
  const visited = new Set([SECTIONS[0].id]);

  function navigate(id) {
    // hide old
    document.getElementById('sec-' + current)?.classList.remove('vis');
    document.getElementById('si-'  + current)?.classList.remove('active');
    // show new
    current = id;
    const sec = document.getElementById('sec-' + id);
    const si  = document.getElementById('si-'  + id);
    if (sec) {
      sec.classList.add('vis');
      document.querySelector('.content').scrollTop = 0;
    }
    if (si) {
      si.classList.add('active');
      si.scrollIntoView({ block: 'nearest' });
    }
    updateProgress();
    if (window.Prism && sec) Prism.highlightAllUnder(sec);
  }

  // ── Progress ──────────────────────────────────────────────────
  function updateProgress() {
    visited.add(current);
    const pct = Math.round((visited.size / SECTIONS.length) * 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progTxt').textContent  = `${visited.size} / ${SECTIONS.length}`;
  }

  // ── Copy code ─────────────────────────────────────────────────
  function copyCode(btn) {
    const code = btn.closest('.cb').querySelector('code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1800);
    });
  }

  // ── Search (dropdown, matches React guide) ────────────────────
  const searchIndex = SECTIONS.map(s => ({
    id: s.id,
    title: s.title,
    group: s.group,
    text: (s.sub + ' ' + (s.content || '')).replace(/<[^>]+>/g, '').toLowerCase()
  }));

  let selIdx = -1; // keyboard-selected item in dropdown


  function positionDropdown(inputEl) {
    const drop = document.getElementById('searchResults');
    const rect = inputEl.getBoundingClientRect();
    const isMobile = window.innerWidth <= 900;
    if (isMobile) {
      drop.style.left = '0';
      drop.style.right = '0';
      drop.style.width = '100%';
      drop.style.top = (rect.bottom + 2) + 'px';
      drop.style.borderRadius = '0 0 var(--radius) var(--radius)';
    } else {
      const w = Math.max(rect.width, 320);
      const left = Math.min(rect.left, window.innerWidth - w - 8);
      drop.style.left = left + 'px';
      drop.style.right = '';
      drop.style.width = w + 'px';
      drop.style.top = (rect.bottom + 6) + 'px';
      drop.style.borderRadius = 'var(--radius)';
    }
  }

  function runSearch(q, inputEl) {
    const drop = document.getElementById('searchResults');
    selIdx = -1;
    if (!q) { drop.classList.remove('vis'); return; }
    positionDropdown(inputEl);
    const hits = searchIndex
            .filter(s => s.title.toLowerCase().includes(q) || s.text.includes(q))
            .slice(0, 8);
    if (!hits.length) {
      drop.innerHTML = `<div class="srch-empty">No results for "<strong>${q}</strong>"</div>`;
      drop.classList.add('vis');
      return;
    }
    drop.innerHTML = hits.map(h => `
    <div class="srch-item" data-id="${h.id}"
         onclick="pickSearch('${h.id}')">
      <div class="sg">${h.group}</div>
      ${h.title}
    </div>`).join('');
    drop.classList.add('vis');
  }

  document.getElementById('searchInput').addEventListener('input', function () {
    runSearch(this.value.trim().toLowerCase(), this);
  });
  document.getElementById('searchInputMobile')?.addEventListener('input', function() {
    runSearch(this.value.trim().toLowerCase(), this);
  });
  document.getElementById('searchInputMobile')?.addEventListener('keydown', function(e) {
    if (['ArrowDown','ArrowUp','Enter','Escape'].includes(e.key)) {
      document.getElementById('searchInput').dispatchEvent(new KeyboardEvent('keydown', e));
    }
  });

  function pickSearch(id) {
    navigate(id);
    document.getElementById('searchInput').value = '';
    const mobileInput = document.getElementById('searchInputMobile');
    if (mobileInput) mobileInput.value = '';
    document.getElementById('searchResults').classList.remove('vis');
    selIdx = -1;
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', e => {
    if (!e.target.closest('.hdr-search') && !e.target.closest('.srch-drop')) {
      document.getElementById('searchResults').classList.remove('vis');
      selIdx = -1;
    }
  });

  // ── Keyboard navigation ────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const drop = document.getElementById('searchResults');
    const isDropOpen = drop.classList.contains('vis');
    const inInput = document.activeElement === document.getElementById('searchInput') ||
            document.activeElement === document.getElementById('searchInputMobile');

    // ⌘K / Ctrl+K — focus search
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
      return;
    }

    // Escape — close dropdown / blur search
    if (e.key === 'Escape') {
      document.getElementById('searchResults').classList.remove('vis');
      document.getElementById('searchInput').blur();
      selIdx = -1;
      return;
    }

    // Arrow keys inside open dropdown — keyboard select items
    if (isDropOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
      e.preventDefault();
      const items = drop.querySelectorAll('.srch-item');
      if (!items.length) return;
      items[selIdx]?.classList.remove('sel');
      selIdx = e.key === 'ArrowDown'
              ? Math.min(selIdx + 1, items.length - 1)
              : Math.max(selIdx - 1, 0);
      items[selIdx]?.classList.add('sel');
      items[selIdx]?.scrollIntoView({ block: 'nearest' });
      return;
    }

    // Enter — confirm keyboard-selected dropdown item
    if (isDropOpen && e.key === 'Enter') {
      const items = drop.querySelectorAll('.srch-item');
      if (selIdx >= 0 && items[selIdx]) {
        pickSearch(items[selIdx].dataset.id);
      }
      return;
    }

    // ← / → — prev / next section (when not typing in search)
    if (!inInput) {
      if (e.key === 'ArrowRight') {
        const idx = SECTIONS.findIndex(s => s.id === current);
        if (idx < SECTIONS.length - 1) navigate(SECTIONS[idx + 1].id);
      }
      if (e.key === 'ArrowLeft') {
        const idx = SECTIONS.findIndex(s => s.id === current);
        if (idx > 0) navigate(SECTIONS[idx - 1].id);
      }
    }
  });

  // ── Mobile sidebar toggle ─────────────────────────────────────
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open')
    document.getElementById('sidebarOverlay').classList.add('vis')
    document.body.style.overflow = 'hidden'
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('vis')
    document.body.style.overflow = ''
  }
  document.getElementById('menuBtn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar()
  })
  document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar)

  // Wrap navigate to also close sidebar on mobile
  const _navigate = navigate
  navigate = function(id) { _navigate(id); closeSidebar() }

  // ── Init ──────────────────────────────────────────────────────
  buildSidebar();
  buildContent();
  updateProgress();
  Prism.highlightAll();
</script>

<script>
  (function(){
    var wrap=document.getElementById('fabWrap'),btn=document.getElementById('fabBtn'),menu=document.getElementById('fabMenu'),items=menu.querySelectorAll('.fab-item');
    var open=false,dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0;
    function startDrag(cx,cy){dragging=true;moved=false;var r=wrap.getBoundingClientRect();sx=r.left;sy=r.top;ox=cx;oy=cy;wrap.style.transition='none';}
    function moveDrag(cx,cy){if(!dragging)return;var dx=cx-ox,dy=cy-oy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;var W=window.innerWidth,H=window.innerHeight,w=wrap.offsetWidth,h=wrap.offsetHeight;wrap.style.right='auto';wrap.style.bottom='auto';wrap.style.left=Math.max(8,Math.min(W-w-8,sx+dx))+'px';wrap.style.top=Math.max(8,Math.min(H-h-8,sy+dy))+'px';}
    function endDrag(){if(!dragging)return;dragging=false;wrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';var W=window.innerWidth,w=wrap.offsetWidth,r=wrap.getBoundingClientRect(),onLeft=(r.left+w/2)<W/2;wrap.style.left=(onLeft?16:W-w-16)+'px';wrap.classList.toggle('fab-left',onLeft);}
    function closeMenu(){open=false;btn.classList.remove('open');btn.setAttribute('aria-expanded','false');items.forEach(function(it){it.classList.remove('vis');});setTimeout(function(){menu.style.pointerEvents='none';},220);}
    function openMenu(){open=true;btn.classList.add('open');btn.setAttribute('aria-expanded','true');menu.style.pointerEvents='auto';items.forEach(function(it,i){setTimeout(function(){it.classList.add('vis');},i*65);});}
    wrap.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);e.preventDefault();});
    document.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
    document.addEventListener('mouseup',function(){endDrag();});
    wrap.addEventListener('touchstart',function(e){startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    document.addEventListener('touchmove',function(e){if(dragging){moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    document.addEventListener('touchend',function(){endDrag();});
    btn.addEventListener('click',function(){if(moved)return;open?closeMenu():openMenu();});
    document.addEventListener('click',function(e){if(open&&!wrap.contains(e.target))closeMenu();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&open)closeMenu();});
  })();
</script>
