<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeScript 6.0 — Interactive Beginner's Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: #07090f;
      --surf: #0c1018;
      --surf2: #111620;
      --surf3: #17202e;
      --border: rgba(80,120,220,0.18);
      --border2: rgba(80,120,220,0.10);
      --text: #dce8ff;
      --text2: #7a9ac8;
      --text3: #3f5578;
      --accent: #4d7fff;
      --accent-dim: rgba(77,127,255,0.12);
      --ts: #5b8dee;
      --ts-bg: rgba(91,141,238,0.10);
      --ts-border: rgba(91,141,238,0.30);
      --tip: #34d399;
      --tip-bg: rgba(52,211,153,0.08);
      --tip-border: rgba(52,211,153,0.25);
      --warn: #f59e0b;
      --warn-bg: rgba(245,158,11,0.08);
      --warn-border: rgba(245,158,11,0.25);
      --new: #a78bfa;
      --new-bg: rgba(167,139,250,0.09);
      --new-border: rgba(167,139,250,0.28);
      --red: #f87171;
      --ok: #34d399;
      --ok-bg: rgba(52,211,153,0.08);
      --ok-border: rgba(52,211,153,0.25);
      --sidebar-w: 278px;
      --hdr: 58px;
      --radius: 10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow:hidden;height:100vh;}

    /* HEADER */
    .hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:rgba(7,9,15,0.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:200;}
    .hdr-left{display:flex;align-items:center;gap:10px;}
    .logo{font-size:15px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
    .logo span{color:var(--accent);}
    .pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
    .pill-ts{background:var(--ts-bg);color:var(--ts);border:1px solid var(--ts-border);}
    .pill-new{background:var(--new-bg);color:var(--new);border:1px solid var(--new-border);}
    .pill-react{background:rgba(34,211,238,0.08);color:#22d3ee;border:1px solid rgba(34,211,238,0.25);}
    .hdr-search{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:260px;}
    .hdr-search svg{flex-shrink:0;color:var(--text3);}
    .hdr-search input{background:none;border:none;color:var(--text);font-family:'Geist',sans-serif;font-size:13px;width:100%;outline:none;}
    .hdr-search input::placeholder{color:var(--text3);}
    .hdr-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text2);}
    .prog-bar{width:100px;height:3px;background:var(--surf3);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--new));border-radius:2px;transition:width .4s ease;}
    .home-link-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;color:#7a9ac8;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;}
    .home-link-btn:hover{background:rgba(255,255,255,0.08);color:#dce8ff;}
    .hdr-search-row{display:none;width:100%;padding:0 14px 10px;box-sizing:border-box;}

    /* LAYOUT */
    .layout{display:flex;margin-top:var(--hdr);height:calc(100vh - var(--hdr));}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;overflow-y:auto;background:var(--surf);border-right:1px solid var(--border);padding:12px 0 80px;}
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px;}
    .sg-label{padding:14px 18px 5px;font-size:9.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);}
    .si{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;font-size:12.5px;color:var(--text2);border-left:2px solid transparent;transition:all .12s ease;user-select:none;}
    .si:hover{background:var(--surf2);color:var(--text);}
    .si.active{background:rgba(77,127,255,0.07);color:var(--accent);border-left-color:var(--accent);}
    .si .sn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);}
    .si svg{flex-shrink:0;opacity:.7;}
    .si.active svg{opacity:1;}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;padding:44px 56px 80px;}
    .content::-webkit-scrollbar{width:5px;}
    .content::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px;}

    /* SECTION */
    .sec{display:none;animation:fadeUp .28s ease;}
    .sec.vis{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .sec-crumb{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
    .sec-crumb span{color:var(--text2);}
    .sec-title{font-size:30px;font-weight:800;letter-spacing:-0.8px;line-height:1.15;margin-bottom:14px;background:linear-gradient(130deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sec-sub{font-size:15px;color:var(--text2);line-height:1.7;max-width:660px;margin-bottom:28px;}
    .divider{border:none;border-top:1px solid var(--border2);margin:28px 0;}

    /* PROSE */
    .prose{font-size:14px;color:var(--text2);line-height:1.8;}
    .prose p{margin-bottom:14px;}
    .prose p:last-child{margin-bottom:0;}
    .prose strong{color:var(--text);font-weight:600;}
    .prose code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--surf3);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:var(--accent);}
    .prose ul{padding-left:0;list-style:none;}
    .prose ul li{padding:4px 0 4px 18px;position:relative;font-size:14px;color:var(--text2);}
    .prose ul li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700;}
    .prose h3{font-size:17px;font-weight:700;color:var(--text);margin:24px 0 10px;}
    .prose h4{font-size:14px;font-weight:700;color:var(--text);margin:18px 0 8px;}

    /* CODE BLOCK */
    .cb{background:#070a12;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:20px 0;}
    .cb-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--border);}
    .cb-fname{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:7px;}
    .cb-lang{font-size:10px;color:var(--text3);background:var(--surf3);padding:2px 7px;border-radius:4px;}
    .cb-copy{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);padding:2px 9px;border-radius:4px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s;}
    .cb-copy:hover{color:var(--text);border-color:var(--text3);}
    .cb pre[class*="language-"]{margin:0;padding:18px 20px;background:transparent !important;font-family:'JetBrains Mono',monospace !important;font-size:13px !important;line-height:1.72;overflow-x:auto;}

    /* INFO BOXES */
    .box{border-radius:var(--radius);padding:18px 22px;margin:18px 0;border-left:3px solid;}
    .box-hdr{display:flex;align-items:center;gap:9px;font-weight:700;font-size:12px;margin-bottom:10px;letter-spacing:0.3px;font-family:'Geist',sans-serif;}
    .box-hdr svg{flex-shrink:0;}
    .box-body{font-size:13.5px;line-height:1.72;color:var(--text2);}
    .box-body code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px;}
    .box-body p{margin-bottom:7px;} .box-body p:last-child{margin-bottom:0;}
    .box-body ul{list-style:none;padding:0;} .box-body ul li{padding:3px 0 3px 15px;position:relative;}
    .box-body ul li::before{content:'›';position:absolute;left:0;font-weight:700;}
    .box-ts{background:var(--ts-bg);border-color:var(--ts);} .box-ts .box-hdr{color:var(--ts);} .box-ts .box-body ul li::before{color:var(--ts);}
    .box-tip{background:var(--tip-bg);border-color:var(--tip);} .box-tip .box-hdr{color:var(--tip);} .box-tip .box-body ul li::before{color:var(--tip);}
    .box-warn{background:var(--warn-bg);border-color:var(--warn);} .box-warn .box-hdr{color:var(--warn);} .box-warn .box-body ul li::before{color:var(--warn);}
    .box-new{background:var(--new-bg);border-color:var(--new);} .box-new .box-hdr{color:var(--new);} .box-new .box-body ul li::before{color:var(--new);}
    .box-ok{background:var(--ok-bg);border-color:var(--ok);} .box-ok .box-hdr{color:var(--ok);} .box-ok .box-body ul li::before{color:var(--ok);}

    /* GRID */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:18px 0;}
    .card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .card-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .card-b{font-size:12.5px;color:var(--text2);line-height:1.6;}
    .card-b code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf3);padding:1px 5px;border-radius:3px;color:var(--accent);}
    .card-icon{font-size:22px;margin-bottom:8px;}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;margin:18px 0;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:var(--surf2);color:var(--text);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);}
    td{padding:10px 14px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:top;}
    td code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf2);padding:1px 5px;border-radius:3px;color:var(--accent);}
    tr:last-child td{border-bottom:none;}
    .badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;font-family:'JetBrains Mono',monospace;}
    .badge-ts{background:var(--ts-bg);color:var(--ts);}
    .badge-new{background:var(--new-bg);color:var(--new);}
    .badge-warn{background:var(--warn-bg);color:var(--warn);}

    /* NAV BTNS */
    .nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:44px;padding-top:28px;border-top:1px solid var(--border2);}
    .nav-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Geist',sans-serif;transition:all .18s;max-width:48%;overflow:hidden;}
    .nav-btn .nav-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .nav-btn:hover{background:var(--surf2);color:var(--text);border-color:var(--accent);}
    .nav-btn.next{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;margin-left:auto;}
    .nav-btn.next:hover{background:#6b93ff;}
    /* COMPARE */
    .cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
    .cmp-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border-radius:6px 6px 0 0;}
    .lbl-bad{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);border-bottom:none;}
    .lbl-good{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border);border-bottom:none;}

    /* REACT NEXT CARD */
    .react-next-card{background:linear-gradient(135deg,rgba(34,211,238,0.07),rgba(167,139,250,0.05));border:1px solid rgba(34,211,238,0.25);border-radius:14px;padding:28px 32px;margin:28px 0;display:flex;align-items:center;gap:24px;}
    .react-next-icon{font-size:44px;flex-shrink:0;}
    .react-next-text h3{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px;}
    .react-next-text p{font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
    .react-next-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:#22d3ee;color:#000;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Geist',sans-serif;transition:all .15s;text-decoration:none;}
    .react-next-btn:hover{background:#34e4ff;}

    /* STEP LIST */
    .steps{counter-reset:step;margin:18px 0;}
    .step{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start;}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(77,127,255,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0;margin-top:2px;}
    .step-content{flex:1;}
    .step-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
    .step-desc{font-size:13px;color:var(--text2);line-height:1.7;}
    .step-desc code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surf3);padding:1px 5px;border-radius:3px;color:var(--accent);}

    /* CONCEPT PILL */
    .concept-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
    .concept-pill{padding:4px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;}

    /* HIGHLIGHT ROW */
    .hl-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surf2);border-radius:8px;margin:6px 0;font-size:13px;color:var(--text2);}
    .hl-row strong{color:var(--text);}
    .hl-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

    /* FILETREE */
    .filetree{background:#070a12;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:2;margin:18px 0;}
    .ft-dir{color:var(--text2);}
    .ft-ts{color:var(--ts);}
    .ft-json{color:var(--warn);}
    .ft-other{color:var(--text3);}
    .ft-i{display:inline-block;width:18px;}

    /* SEARCH DROPDOWN */
    .srch-drop{position:fixed;width:320px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.65);z-index:300;display:none;overflow:hidden;}
    .srch-drop.vis{display:block;}
    .srch-item{padding:10px 15px;cursor:pointer;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border2);transition:background .1s;}
    .srch-item:last-child{border-bottom:none;}
    .srch-item:hover,.srch-item.sel{background:var(--surf2);color:var(--text);}
    .srch-item .sg{font-size:9.5px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px;letter-spacing:.5px;}
    .srch-empty{padding:18px 15px;font-size:12.5px;color:var(--text3);text-align:center;}

    /* PRISM TOKEN OVERRIDES */
    .token.keyword{color:#c792ea;}.token.string{color:#c3e88d;}.token.comment{color:#546e7a;font-style:italic;}
    .token.number{color:#f78c6c;}.token.boolean{color:#f78c6c;}.token.function{color:#82aaff;}
    .token.class-name{color:#ffcb6b;}.token.operator{color:#89ddff;}.token.punctuation{color:#89ddff;}

    /* ── HAMBURGER BUTTON (mobile only) ── */
    .menu-btn {
      display: none; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surf); cursor: pointer; color: var(--text2);
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    .menu-btn:hover { background: var(--surf2); color: var(--text); }
    .menu-btn svg { pointer-events: none; }

    /* ── SIDEBAR OVERLAY (mobile backdrop) ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
      backdrop-filter: blur(2px); z-index: 149;
    }
    .sidebar-overlay.vis { display: block; }

    @media(max-width:800px){
      :root { --hdr: 100px; }
      .hdr{flex-wrap:wrap;align-items:center;height:auto;min-height:58px;padding:0 14px 0;}

      /* hamburger visible */
      .menu-btn { display: flex; }

      /* hide extra pills, home link stays visible */
      .react-link-btn { display: none; }
      .nd-link-btn { display: none; }
      .react-link-mobile { display: none; }
      .hdr-search-wrap { display: none; }
      .hdr-search { display: none; }
      .hdr-search-row .hdr-search { display: flex; }
      /*#progTxt { display: none; }*/
      .pill-ts { display: none; }
      .pill-new { display: none; }
      .hdr-left { flex:1; min-width: 0; flex-shrink: 1; padding:10px 0; }
      .logo { white-space: nowrap; }
      .hdr-right { padding:10px 0; gap:8px; flex-shrink: 0; }
      .hdr-search-row { display: flex; }

      /* sidebar: off-screen left, slides in */
      .sidebar {
        position: fixed; top: var(--hdr); left: 0; bottom: 0;
        height: calc(100vh - var(--hdr));
        z-index: 150; transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
        overflow-y: auto;
        padding-bottom: 80px;
      }
      .sidebar.open { transform: translateX(0); }

      /* content takes full width */
      .content { padding: 28px 18px 80px; }

      /* collapse grids to 1 col */
      .g2, .g3, .cmp { grid-template-columns: 1fr; }

      /* nav buttons stack full-width */
      .nav-row { flex-direction: column; gap: 8px; }
      .nav-btn { max-width: 100%; width: 100%; justify-content: center; font-size: 12px; padding: 10px 14px; }
      .nav-btn.next { margin-left: 0; }
    }
    /* ── FLOATING NAV ─────────────────────────────────────────────────── */
    .fab-wrap{position:fixed;bottom:88px;right:16px;z-index:9999;touch-action:none;user-select:none;}
    .fab-btn{width:46px;height:46px;border-radius:50%;background:#1a2236;border:1.5px solid rgba(255,255,255,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06);transition:background .2s,transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;outline:none;padding:0;animation:fab-pulse 3.5s ease-in-out infinite;}
    @keyframes fab-pulse{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.5);}50%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0 6px rgba(255,255,255,.04);}}
    .fab-btn:hover{background:#243050;transform:scale(1.1);animation:none;}
    .fab-btn.open{background:#243050;transform:rotate(45deg) scale(1.08);animation:none;box-shadow:0 6px 28px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.06);}
    .fab-menu{position:absolute;bottom:54px;right:0;display:flex;flex-direction:column;gap:9px;align-items:flex-end;pointer-events:none;}
    .fab-item{display:flex;align-items:center;gap:9px;text-decoration:none;opacity:0;transform:translateY(16px) scale(0.78);transition:opacity .2s ease,transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;will-change:transform,opacity;}
    .fab-item.vis{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .fab-item-lbl{background:rgba(8,12,20,.9);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 12px;font-size:11.5px;font-weight:600;color:#c8d8f0;white-space:nowrap;letter-spacing:-.1px;transition:opacity .15s;}
    .fab-item-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;}
    .fab-item:hover .fab-item-ico{transform:scale(1.14);}
    .fab-item:hover .fab-item-lbl{color:#fff;}
    .fab-item.fab-current{pointer-events:none;}
    .fab-item.fab-current .fab-item-lbl{opacity:.38;}
    .fab-item.fab-current .fab-item-ico{opacity:.45;}

    {
      id:'intro', group:'Chapter 1 — Introduction', icon:'rocket', title:'What Is TypeScript?',
      sub:'TypeScript is JavaScript with superpowers — it adds a type system that catches bugs before you even run your code.',
      content:`
<div class="prose">
  <p><strong>JavaScript</strong> is the language of the web. Every browser understands it. But JavaScript has one major weakness — it doesn't check the types of your values. You can accidentally pass a number where you expected a string, and the code will only fail when it runs.</p>
  <p><strong>TypeScript</strong> fixes this. It is a <em>superset</em> of JavaScript, meaning every valid JavaScript program is also a valid TypeScript program. TypeScript adds <strong>optional type annotations</strong> on top of JavaScript. You tell TypeScript what type each variable should be, and it checks your work before you ever run the code.</p>
  <p>TypeScript was created by Microsoft and released in 2012. It compiles down to plain JavaScript that any browser or runtime can execute. Think of TypeScript as a smart spell-checker for your code — it doesn't change what you write at runtime, but it warns you about mistakes at write-time.</p>
</div>
<div class="g2" style="margin-top:22px;">
  <div class="card"><div class="card-icon">🟨</div><div class="card-t">JavaScript</div><div class="card-b">Dynamic, no types. Errors show up when code runs. Quick to write but harder to maintain at scale.</div></div>
  <div class="card"><div class="card-icon">🟦</div><div class="card-t">TypeScript</div><div class="card-b">Static types. Errors show up as you type in your editor. Safer, easier to read & refactor.</div></div>
</div>
<div class="cmp">
  <div>
    <div class="cmp-lbl lbl-bad">❌ JavaScript — Bug at Runtime</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">app.js</span><span class="cb-lang">js</span></div><pre class="language-typescript"><code>function greet(name) {
  return "Hello, " + name.toUpperCase();
}

// This crashes at runtime — no warning!
greet(42); // TypeError: name.toUpperCase is not a function</code></pre></div>
  </div>
  <div>
    <div class="cmp-lbl lbl-good">✅ TypeScript — Caught While Typing</div>
    <div class="cb"><div class="cb-hdr"><span class="cb-fname">app.ts</span><span class="cb-lang">typescript</span></div><pre class="language-typescript"><code>function greet(name: string) {
  return "Hello, " + name.toUpperCase();
}

// Error shown IMMEDIATELY in your editor:
// Argument of type 'number' is not assignable
// to parameter of type 'string'.
greet(42); // 🔴 Error!</code></pre></div>
  </div>
</div>`,
      boxes:[
        {type:'ts',title:'TypeScript 6.0 — Released March 2026',body:`<p>TypeScript 6.0 is the latest version, released March 23, 2026. It is a historic "bridge" release — the <strong>last version written in JavaScript</strong> before TypeScript 7.0 rewrites the compiler in Go for 10× faster builds. Key changes: <code>strict: true</code> is now the default, <code>target</code> defaults to <code>ES2025</code>, and legacy module systems like AMD are deprecated.</p>`},
        {type:'tip',title:'💡 Good News for Beginners',body:`<p>You don't need to know everything about TypeScript right away. You can write TypeScript just like JavaScript at first, and gradually add types where you need them. TypeScript will never stop you from running your code.</p>`},
      ]
    },

    {
      id:'why-ts', group:'Chapter 1 — Introduction', icon:'zap', title:'Why Learn TypeScript?',
      sub:'Real reasons why TypeScript has become the #1 language on GitHub and the standard for professional JavaScript development.',
      content:`
<div class="prose">
  <p>In 2024–2025, TypeScript became the <strong>most popular language on GitHub</strong>. Almost every major React, Node.js, or frontend job listing requires TypeScript. Here's exactly why it matters:</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Catch Bugs Before They Happen</div><div class="step-desc">TypeScript checks your code as you type. Typos, wrong arguments, missing properties — all caught instantly. Studies show TypeScript catches ~15% of bugs before runtime.</div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Incredible Editor Autocomplete</div><div class="step-desc">Because TypeScript knows the shape of every value, your editor can suggest exact properties and methods. Type <code>user.</code> and see every valid property. No more guessing.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Self-Documenting Code</div><div class="step-desc">Types act as documentation. When you see <code>function createUser(name: string, age: number): User</code>, you immediately know what the function expects and returns — no comments needed.</div></div></div>
  <div class="step"><div class="step-num">4</div><div class="step-content"><div class="step-title">Safe Refactoring</div><div class="step-desc">Rename a variable or change a function signature — TypeScript instantly highlights everywhere you need to update. Refactoring large codebases becomes safe and fast.</div></div></div>
  <div class="step"><div class="step-num">5</div><div class="step-content"><div class="step-title">Industry Standard</div><div class="step-desc">React, Angular, Vue, Next.js, NestJS, Deno — they all use TypeScript by default. Learn TypeScript once, and you're ready for any modern framework.</div></div></div>
</div>`,
      boxes:[
        {type:'new',title:'TypeScript is #1 on GitHub',body:`<p>TypeScript surpassed Python, JavaScript, and Java to become the most-used language on GitHub by repository count in 2025. It is used by Google, Microsoft, Meta, Airbnb, Slack, and virtually every major tech company.</p>`},
        {type:'warn',title:'⚠️ Common Misconception',body:`<p>TypeScript does <strong>not</strong> make your code slower at runtime. Types are completely erased during compilation — your users get clean, standard JavaScript. TypeScript only adds safety at development time.</p>`},
      ]
    },

    {
      id:'how-ts-works', group:'Chapter 1 — Introduction', icon:'settings', title:'How TypeScript Works',
      sub:'Understanding the TypeScript compilation pipeline — from .ts source to running JavaScript.',
      content:`
<div class="prose">
  <p>TypeScript is a <strong>compiled language</strong>. You write <code>.ts</code> files, and the TypeScript compiler (<code>tsc</code>) checks your types and outputs plain <code>.js</code> files that any JavaScript runtime can execute.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">You Write TypeScript (.ts)</div><div class="step-desc">You create files with the <code>.ts</code> extension and add type annotations to your JavaScript code.</div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">TypeScript Checks Types</div><div class="step-desc">The <code>tsc</code> compiler reads your code, checks all types, and reports errors if anything doesn't match. This happens at <strong>compile time</strong>, not runtime.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">TypeScript Outputs JavaScript (.js)</div><div class="step-desc">If there are no type errors (or even if there are!), TypeScript produces plain <code>.js</code> files with all type annotations removed. This is called <strong>type erasure</strong>.</div></div></div>
  <div class="step"><div class="step-num">4</div><div class="step-content"><div class="step-title">JavaScript Runs Normally</div><div class="step-desc">The output <code>.js</code> files run in Node.js, the browser, or any JavaScript environment — exactly as normal JavaScript.</div></div></div>
</div>`,
      code:`// hello.ts — TypeScript source
function greet(name: string): string {
  return "Hello, " + name + "!";
}

console.log(greet("TypeScript"));`,
      codeFile:'hello.ts', codeLang:'typescript',
      extraCodes:[{
        code:`// hello.js — compiled output (types removed automatically!)
function greet(name) {
  return "Hello, " + name + "!";
}

console.log(greet("TypeScript"));
// Output: Hello, TypeScript!`,
        file:'hello.js', lang:'javascript'
      }],
      boxes:[
        {type:'ts',title:'tsc vs ts-node',body:`<ul><li><code>tsc</code> — the official TypeScript compiler. Compiles <code>.ts</code> → <code>.js</code> files.</li><li><code>ts-node</code> — runs TypeScript directly without a separate compile step. Great for development.</li><li><code>Node.js 22.18+</code> — natively supports TypeScript via "type stripping" (no compiler needed in some cases).</li></ul>`},
      ]
    },

    {
      id:'prereqs', group:'Chapter 1 — Introduction', icon:'flag', title:'Prerequisites',
      sub:'What you need to know before diving into TypeScript.',
      content:`
<div class="prose">
  <p>TypeScript builds <em>on top of</em> JavaScript, so a basic understanding of JavaScript fundamentals is helpful. Here's exactly what you need:</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t">✅ You Should Know</div><div class="card-b"><ul style="list-style:none;padding:0;"><li style="padding:3px 0;color:var(--text2);">• Variables (<code>let</code>, <code>const</code>)</li><li style="padding:3px 0;color:var(--text2);">• Functions & arrow functions</li><li style="padding:3px 0;color:var(--text2);">• Arrays & objects</li><li style="padding:3px 0;color:var(--text2);">• If/else & loops</li><li style="padding:3px 0;color:var(--text2);">• Basic ES6+ syntax</li></ul></div></div>
  <div class="card"><div class="card-t">🚫 You Don't Need</div><div class="card-b"><ul style="list-style:none;padding:0;"><li style="padding:3px 0;color:var(--text2);">• Prior TypeScript experience</li><li style="padding:3px 0;color:var(--text2);">• Advanced JS knowledge</li><li style="padding:3px 0;color:var(--text2);">• Frameworks (React, etc.)</li><li style="padding:3px 0;color:var(--text2);">• Backend experience</li><li style="padding:3px 0;color:var(--text2);">• Math or CS degree</li></ul></div></div>
</div>`,
      boxes:[
        {type:'tip',title:'💡 Complete Beginner?',body:`<p>If you're brand new to programming, spend a few hours with basic JavaScript first. There are great free resources: <strong>freeCodeCamp</strong>, <strong>The Odin Project</strong>, or just the MDN JavaScript Guide. Then come back here — TypeScript will make much more sense.</p>`},
      ]
    },

    {
      id:'setup', group:'Chapter 2 — Setup', icon:'settings', title:'Setup',
      sub:'Installing everything you need: Node.js, TypeScript 6.0, and a great code editor.',
      content:`
<div class="prose">
  <p>To write TypeScript, you need three things on your computer: <strong>Node.js</strong> (JavaScript runtime), <strong>npm</strong> (package manager, comes with Node), and <strong>TypeScript</strong> itself. A good code editor makes everything much nicer.</p>
</div>
<div class="steps">
  <div class="step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Install Node.js</div><div class="step-desc">Download and install Node.js from <strong>nodejs.org</strong>. Choose the LTS (Long Term Support) version. This also installs <code>npm</code> automatically. Verify: open a terminal and run <code>node --version</code>.</div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><div class="step-title">Install TypeScript Globally</div><div class="step-desc">Run <code>npm install -g typescript</code> in your terminal. The <code>-g</code> flag means "global" — it makes the <code>tsc</code> command available everywhere. Verify: run <code>tsc --version</code>.</div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Install VS Code</div><div class="step-desc">Download <strong>Visual Studio Code</strong> from <strong>code.visualstudio.com</strong>. It has the best TypeScript support built in — instant error highlighting, autocomplete, and hover documentation.</div></div></div>
  <div class="step"><div class="step-num">4</div><div class="step-content"><div class="step-title">Install Helpful Extensions</div><div class="step-desc">In VS Code, install: <strong>Error Lens</strong> (shows errors inline), <strong>Prettier</strong> (code formatting), and <strong>GitLens</strong> (optional, for Git).</div></div></div>
</div>`,
      code:`# Step 1: Check Node.js and npm versions
node --version   # Should be v18+ or v20+
npm --version    # Should be 8+

# Step 2: Install TypeScript 6 globally
npm install -g typescript

# Step 3: Verify TypeScript installation
tsc --version
# Output: Version 6.0.x

# Step 4: Install ts-node for direct execution (optional but handy)
npm install -g ts-node`,
      codeFile:'terminal', codeLang:'bash',
      boxes:[
        {type:'ts',title:'TypeScript 6.0 Installation',body:`<p>Make sure you get TypeScript 6.0 specifically: <code>npm install -g typescript@6</code>. You can verify with <code>tsc --version</code>. Version 6 is the latest stable release as of March 2026.</p>`},
        {type:'tip',title:'💡 No Global Install Needed',body:`<p>For projects, you'll typically install TypeScript <em>locally</em> per project: <code>npm install -D typescript</code>. This ensures everyone on your team uses the exact same version. The global install is just for playing around.</p>`},
      ]
    },

    {
      id:'first-app', group:'Chapter 2 — Setup', icon:'rocket', title:'Create Your First Application',
      sub:'Write and understand your first TypeScript file from scratch.',
      content:`
<div class="prose">
  <p>Let's write your very first TypeScript program. Create a folder on your computer, open it in VS Code, and create a file called <code>hello.ts</code>.</p>
  <p>The <code>.ts</code> extension is what tells TypeScript (and your editor) that this is a TypeScript file. The code below is almost identical to JavaScript — the only addition is the <code>: string</code> type annotation.</p>
</div>`,
      code:`// hello.ts — Your first TypeScript file!

// Type annotation: name must be a string
function greet(name: string): string {
  return "Hello, " + name + "! Welcome to TypeScript 6!";
}

// This works — "World" is a string ✅
console.log(greet("World"));

// Try changing this to a number and watch VS Code highlight the error:
// greet(42); // 🔴 Argument of type 'number' is not assignable to type 'string'

// Variables with types
let message: string = "TypeScript is awesome!";
let year: number = 2026;
let isLearning: boolean = true;

console.log(message);
console.log(\`Year: \${year}, Still learning: \${isLearning}\`);`,
      codeFile:'hello.ts', codeLang:'typescript',
      boxes:[
        {type:'tip',title:'💡 The Colon Syntax',body:`<p>In TypeScript, <code>: string</code> after a variable or parameter name is a <strong>type annotation</strong>. It tells TypeScript "this value must be a string." You'll learn more about all available types in Chapter 3.</p>`},
        {type:'ts',title:'Your editor is your best friend',body:`<p>Open <code>hello.ts</code> in VS Code and hover your mouse over the function name or any variable. VS Code will show you the inferred types, documentation, and any errors — instantly. This is one of TypeScript's biggest benefits.</p>`},
      ]
    },

    {
      id:'running', group:'Chapter 2 — Setup', icon:'zap', title:'Running the Code',
      sub:'Three ways to run TypeScript code — compile then run, run directly, or use a project bundler.',
      content:`
<div class="prose">
  <p>TypeScript files (<code>.ts</code>) can't run directly in Node.js. You need to either compile them first, or use a tool that handles that for you. Here are your main options:</p>
</div>
<div class="g3">
  <div class="card"><div class="card-t">Method 1: tsc + node</div><div class="card-b">Compile with <code>tsc</code>, then run the output with <code>node</code>. Best for production.</div></div>
  <div class="card"><div class="card-t">Method 2: ts-node</div><div class="card-b">Run TypeScript directly without a separate compile step. Great for development & learning.</div></div>
  <div class="card"><div class="card-t">Method 3: tsx</div><div class="card-b">Modern, fast TypeScript runner. Works with ESM. Recommended for Node.js projects today.</div></div>
</div>`,
      code:`# METHOD 1: Compile then run (the traditional way)
tsc hello.ts          # Compiles → creates hello.js
node hello.js         # Runs the compiled JavaScript

# METHOD 2: ts-node (run TypeScript directly)
npm install -g ts-node
ts-node hello.ts      # Compiles and runs in one step

# METHOD 3: tsx (modern, fast, recommended)
npm install -g tsx
tsx hello.ts          # Same as ts-node but faster

# METHOD 4: Watch mode (auto-recompile on save)
tsc hello.ts --watch  # Recompiles whenever you save the file

# METHOD 5: Node.js 22.18+ native support (no tools needed!)
node --experimental-strip-types hello.ts`,
      codeFile:'terminal', codeLang:'bash',
      boxes:[
        {type:'new',title:'🆕 Node.js Native TypeScript Support',body:`<p>Node.js 22.18+ can run <code>.ts</code> files natively via "type stripping" — it simply removes the type annotations and runs the JavaScript. This works for simple scripts where you don't need type-checking. Use <code>node hello.ts</code> directly.</p>`},
        {type:'warn',title:'tsc vs runtime errors',body:`<p>TypeScript type errors do <strong>not</strong> stop your code from compiling by default. <code>tsc</code> will still produce the JavaScript file even if there are type errors. Use <code>tsc --noEmitOnError</code> to prevent output when errors exist.</p>`},
      ]
    },

    {
      id:'config', group:'Chapter 2 — Setup', icon:'settings', title:'Configuration (tsconfig.json)',
      sub:'tsconfig.json is the control center for your TypeScript project. Here\'s what every option means.',
      content:`
<div class="prose">
  <p>The <code>tsconfig.json</code> file tells TypeScript how to compile your project. You create it by running <code>tsc --init</code> in your project folder. TypeScript 6.0 changes several important defaults — let's understand them.</p>
</div>
<div class="filetree">
  <span class="ft-dir">my-project/</span><br>
  <span class="ft-i">├─</span> <span class="ft-ts">hello.ts</span><br>
  <span class="ft-i">├─</span> <span class="ft-json">tsconfig.json</span> <span class="ft-other" style="font-size:11px">← configuration file</span><br>
  <span class="ft-i">└─</span> <span class="ft-other">node_modules/</span>
</div>`,
      code:`{
  "compilerOptions": {
    // ── OUTPUT ──────────────────────────────────
    // Which JavaScript version to compile to
    // TypeScript 6.0 default: "ES2025" (changed from ES3!)
    "target": "ES2025",

    // Module system. TypeScript 6 default: "esnext"
    "module": "commonjs",

    // Where to put compiled .js files
    "outDir": "./dist",

    // Where your .ts source files are
    "rootDir": "./src",

    // ── TYPE CHECKING ────────────────────────────
    // TypeScript 6.0: strict is NOW true by default!
    // Enables: noImplicitAny, strictNullChecks, etc.
    "strict": true,

    // Don't emit .js files on type errors
    "noEmitOnError": true,

    // ── MODULE RESOLUTION ────────────────────────
    // How TypeScript finds imported files
    "moduleResolution": "bundler",

    // ── COMPATIBILITY ────────────────────────────
    // Allows default imports from CommonJS modules
    "esModuleInterop": true,

    // Skip type checking of declaration files
    "skipLibCheck": true,

    // ── TYPE PACKAGES ────────────────────────────
    // TypeScript 6: types defaults to [] (empty)
    // You must now explicitly list needed @types packages
    "types": ["node"]
  },
  "include": ["src/**/*"],
  "exclude": ["node_modules", "dist"]
}`,
      codeFile:'tsconfig.json', codeLang:'json',
      boxes:[
        {type:'new',title:'🆕 TypeScript 6.0 — Changed Defaults',body:`<ul><li><code>strict: true</code> is now the default (was false before)</li><li><code>target</code> now defaults to <code>ES2025</code> (was <code>ES3</code>!)</li><li><code>module</code> defaults to <code>esnext</code></li><li><code>types</code> now defaults to <code>[]</code> — you must explicitly list type packages</li><li><code>baseUrl</code> is deprecated — use <code>paths</code> directly instead</li><li>Legacy module systems (AMD, UMD, SystemJS) are deprecated</li></ul>`},
        {type:'warn',title:'Breaking Change for Existing Projects',body:`<p>If you're upgrading an existing project to TypeScript 6.0, you must update your <code>tsconfig.json</code>! The new defaults will likely break builds. Add <code>"types": ["node"]</code> to get Node.js globals back, and update <code>paths</code> if you used <code>baseUrl</code>.</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 3 — TYPES
// ═══════════════════════════════════════
    {
      id:'builtin-types', group:'Chapter 3 — Types', icon:'type', title:'Built-In TypeScript Types',
      sub:'TypeScript\'s primitive types — the fundamental building blocks of every program.',
      content:`
<div class="prose">
  <p>TypeScript has several <strong>primitive types</strong> that map directly to JavaScript's built-in values. These are the most basic types you'll use everywhere.</p>
</div>
<div class="tbl-wrap"><table>
  <tr><th>Type</th><th>Example Values</th><th>Description</th></tr>
  <tr><td><code>string</code></td><td><code>"hello"</code>, <code>'world'</code>, <code>\`template\`</code></td><td>Text data — names, messages, URLs</td></tr>
  <tr><td><code>number</code></td><td><code>42</code>, <code>3.14</code>, <code>-7</code>, <code>NaN</code></td><td>All numbers (integers and decimals)</td></tr>
  <tr><td><code>boolean</code></td><td><code>true</code>, <code>false</code></td><td>Logical true/false values</td></tr>
  <tr><td><code>null</code></td><td><code>null</code></td><td>Intentional absence of a value</td></tr>
  <tr><td><code>undefined</code></td><td><code>undefined</code></td><td>Variable declared but not assigned</td></tr>
  <tr><td><code>bigint</code></td><td><code>9007199254740991n</code></td><td>Very large integers (with <code>n</code> suffix)</td></tr>
  <tr><td><code>symbol</code></td><td><code>Symbol("id")</code></td><td>Unique identifiers (advanced use)</td></tr>
  <tr><td><code>object</code></td><td><code>{}</code>, <code>[]</code>, <code>new Date()</code></td><td>Any non-primitive value</td></tr>
</table></div>`,
      code:`// STRING — text data
let firstName: string = "Alice";
let greeting: string = \`Hello, \${firstName}!\`; // Template literals work too
let language: string = 'TypeScript';

// NUMBER — all numeric values (no separate integer type!)
let age: number = 25;
let price: number = 9.99;
let temperature: number = -4;
let big: number = 1_000_000; // Underscores for readability

// BOOLEAN — only true or false
let isLoggedIn: boolean = true;
let hasPermission: boolean = false;

// NULL — intentionally empty
let selectedItem: null = null;

// UNDEFINED — not yet assigned
let pendingValue: undefined = undefined;

// BIGINT — huge numbers (note the 'n' suffix)
let maxSafeInt: bigint = 9007199254740991n;

// SYMBOL — unique identifier
let id: symbol = Symbol("user-id");`,
      codeFile:'types.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'One number type — unlike other languages',body:`<p>JavaScript (and TypeScript) has only <strong>one number type</strong> for all numbers. There is no <code>int</code>, <code>float</code>, <code>double</code>, or <code>long</code>. Everything is just <code>number</code>. Use <code>bigint</code> only if you need integers larger than 2⁵³-1.</p>`},
      ]
    },

    {
      id:'annotations', group:'Chapter 3 — Types', icon:'type', title:'Type Annotations',
      sub:'How to explicitly tell TypeScript what type a variable, parameter, or return value should be.',
      content:`
<div class="prose">
  <p>A <strong>type annotation</strong> is when you explicitly write a type after a variable name using a colon. The syntax is: <code>variableName: type</code>. You can annotate variables, function parameters, and function return types.</p>
  <p>Think of it like labeling a box — you're telling TypeScript "this box can only hold strings" so it warns you if you try to put a number in.</p>
</div>`,
      code:`// ── VARIABLE ANNOTATIONS ─────────────────────────────────
let username: string = "alice";
let score: number = 100;
let isActive: boolean = true;

// Once annotated, TypeScript enforces the type:
username = "bob";    // ✅ OK
username = 42;       // 🔴 Error: Type 'number' is not assignable to type 'string'

// ── FUNCTION PARAMETER ANNOTATIONS ──────────────────────
// Parameters: annotate after the name with ': type'
// Return type: annotate after the closing parenthesis
function add(a: number, b: number): number {
  return a + b;
}

function formatName(first: string, last: string): string {
  return \`\${first} \${last}\`;
}

// Calling with wrong types = instant error:
add(1, "2");  // 🔴 Error: 'string' is not assignable to 'number'
add(1, 2);    // ✅ Returns: 3

// ── WHEN TO ANNOTATE ─────────────────────────────────────
// You DON'T always need to annotate — TypeScript can infer!
let count = 0;        // TypeScript knows: number
let name = "Alice";   // TypeScript knows: string
// More on inference in the next section...`,
      codeFile:'annotations.ts', codeLang:'typescript',
      boxes:[
        {type:'tip',title:'💡 You Don\'t Always Need Annotations',body:`<p>TypeScript can figure out most types automatically. Type annotations are most useful for <strong>function parameters</strong> and <strong>function return types</strong>, since TypeScript can't always guess what you intend. For local variables, TypeScript usually infers the type correctly.</p>`},
      ]
    },

    {
      id:'inference', group:'Chapter 3 — Types', icon:'type', title:'Dynamic Type Determination',
      sub:'TypeScript is smart — it can figure out types automatically without you writing them.',
      content:`
<div class="prose">
  <p><strong>Type inference</strong> is TypeScript's ability to automatically determine the type of a value without you explicitly writing it. When you assign a value to a variable, TypeScript looks at that value and <em>infers</em> what type it must be.</p>
  <p>This is one of TypeScript's best features — you get full type safety without having to annotate everything manually.</p>
</div>`,
      code:`// ── TYPE INFERENCE ───────────────────────────────────────
// TypeScript sees the value and infers the type automatically

let count = 42;         // TypeScript infers: number
let name = "Alice";     // TypeScript infers: string
let active = true;      // TypeScript infers: boolean
let items = [1, 2, 3];  // TypeScript infers: number[]

// After inference, the type is locked — same as if you annotated it:
count = 100;      // ✅ OK — still a number
count = "hello";  // 🔴 Error — can't change to string!

// ── INFERENCE IN FUNCTIONS ───────────────────────────────
function multiply(a: number, b: number) {
  return a * b;  // TypeScript infers return type: number
}

// Hover over 'result' in VS Code — it shows: number
const result = multiply(3, 4);

// ── INFERENCE IS CONTEXTUAL ──────────────────────────────
const colors = ["red", "green", "blue"]; // string[]

colors.forEach(color => {
  // TypeScript knows 'color' is a string — inferred from the array!
  console.log(color.toUpperCase()); // ✅ Works
  console.log(color.toFixed(2));    // 🔴 Error — strings don't have toFixed
});

// ── WHEN TO ANNOTATE vs INFER ────────────────────────────
// INFER: simple assignments where the value is clear
let message = "hello"; // Don't bother annotating this

// ANNOTATE: function parameters and return types
function greet(name: string): string {
  return "Hi " + name;
}

// ANNOTATE: when you want to declare before assigning
let username: string;
username = "Alice"; // assigned later`,
      codeFile:'inference.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'Best Practice',body:`<p>As a rule of thumb: <strong>let TypeScript infer</strong> types for local variables. <strong>Explicitly annotate</strong> function parameters and return types. This gives you the best balance of safety and brevity.</p>`},
      ]
    },

    {
      id:'any-type', group:'Chapter 3 — Types', icon:'warn', title:'The Any Type',
      sub:'The escape hatch from TypeScript\'s type system — powerful but dangerous.',
      content:`
<div class="prose">
  <p>The <code>any</code> type is TypeScript's escape hatch. When a value is typed as <code>any</code>, TypeScript completely disables type checking for that value. You can assign anything to it, and call any method on it without errors.</p>
  <p><strong>This defeats the entire purpose of TypeScript.</strong> Use <code>any</code> only when absolutely necessary — for example, when working with data from an external source where you genuinely don't know the type yet.</p>
</div>`,
      code:`// The 'any' type — use sparingly!

// ❌ BAD: Using 'any' turns off type checking
let value: any = "hello";
value = 42;          // No error (any can be anything)
value = true;        // No error
value = { name: "Alice" }; // No error
value.someMethod();  // No error — even if it doesn't exist!

// ── WHEN any IS CREATED ──────────────────────────────────
// 1. Explicit annotation
let data: any = fetchSomeData();

// 2. TypeScript 6.0 strict mode: JSON.parse still returns 'any'
const parsed = JSON.parse('{"name":"Alice"}'); // type: any
// Use 'unknown' instead for safer code (see below)

// ── BETTER ALTERNATIVE: unknown ──────────────────────────
// 'unknown' is like 'any' but SAFE — you must check the type
// before using the value.
let safeData: unknown = JSON.parse('{"name":"Alice"}');

// safeData.name  // 🔴 Error — must check type first!

if (typeof safeData === 'object' && safeData !== null) {
  console.log(safeData); // ✅ TypeScript now knows it's an object
}

// ── noImplicitAny (TypeScript 6 strict mode default) ─────
function processData(data) { // 🔴 Error in strict mode!
  return data;
}
// With strict: true, unannotated params become errors, not 'any'
// Fix it:
function processDataSafe(data: unknown) { // ✅
  return data;
}`,
      codeFile:'any-type.ts', codeLang:'typescript',
      boxes:[
        {type:'warn',title:'⚠️ The any Anti-Pattern',body:`<p>If you find yourself using <code>any</code> a lot, something is wrong. It means you're writing JavaScript inside TypeScript without the benefits. Instead of <code>any</code>, consider: <code>unknown</code> (safe any), union types, generics, or proper type annotations.</p>`},
        {type:'new',title:'🆕 TypeScript 6 — noImplicitAny is ON by default',body:`<p>In TypeScript 6.0, <code>strict: true</code> is the default, which includes <code>noImplicitAny</code>. This means TypeScript will error if it has to implicitly assign <code>any</code> to a parameter. You must now always annotate function parameters — which is good practice!</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 4 — OBJECTS
// ═══════════════════════════════════════
    {
      id:'objects', group:'Chapter 4 — Objects', icon:'box', title:'Type Annotations With Objects',
      sub:'How to describe the shape of JavaScript objects using TypeScript\'s object type syntax.',
      content:`
<div class="prose">
  <p>An <strong>object</strong> in JavaScript is a collection of key-value pairs. TypeScript lets you describe the <em>shape</em> of an object — what properties it has and what types those properties are.</p>
  <p>The syntax uses curly braces with property names and their types: <code>{ key: type; key: type }</code>. Semicolons separate properties (commas work too).</p>
</div>`,
      code:`// ── OBJECT TYPE ANNOTATIONS ──────────────────────────────
// Describe the shape inline using { }

let user: { name: string; age: number; isAdmin: boolean } = {
  name: "Alice",
  age: 30,
  isAdmin: false
};

// TypeScript now enforces the shape:
user.name = "Bob";   // ✅ OK
user.name = 42;      // 🔴 Error: 'number' is not assignable to 'string'
user.email = "...";  // 🔴 Error: Property 'email' does not exist

// ── OPTIONAL PROPERTIES (?) ───────────────────────────────
// Add ? to make a property optional (it can be missing)
let product: {
  name: string;
  price: number;
  description?: string; // Optional — may or may not exist
} = {
  name: "TypeScript 6 Guide",
  price: 0  // description is not required
};

// ── READONLY PROPERTIES ───────────────────────────────────
// Properties marked readonly cannot be changed after creation
let config: {
  readonly apiUrl: string;
  readonly version: number;
} = {
  apiUrl: "https://api.example.com",
  version: 6
};

config.apiUrl = "..."; // 🔴 Error: Cannot assign to 'apiUrl' (readonly)

// ── NESTED OBJECTS ────────────────────────────────────────
let employee: {
  name: string;
  address: {         // Nested object type
    street: string;
    city: string;
    country: string;
  };
} = {
  name: "Alice",
  address: {
    street: "123 Main St",
    city: "Techville",
    country: "US"
  }
};

console.log(employee.address.city); // "Techville"`,
      codeFile:'objects.ts', codeLang:'typescript',
      boxes:[
        {type:'tip',title:'💡 Inline vs Type Aliases',body:`<p>Typing objects inline works for simple cases. When an object type gets complex or is reused in multiple places, use a <strong>Type Alias</strong> or <strong>Interface</strong> to give it a name. You'll learn both in upcoming chapters.</p>`},
        {type:'ts',title:'Structural Typing',body:`<p>TypeScript uses <strong>structural typing</strong> — it checks if an object has the right <em>shape</em>, not if it was created from the right class. If an object has all the required properties with the right types, TypeScript accepts it, regardless of where it came from.</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 5 — FUNCTIONS
// ═══════════════════════════════════════
    {
      id:'fn-annotations', group:'Chapter 5 — Functions', icon:'fn', title:'Type Annotations With Functions',
      sub:'Typing function parameters and return values to make your functions safe and self-documenting.',
      content:`
<div class="prose">
  <p>Functions are the heart of any program. In TypeScript, you annotate <strong>parameters</strong> (what goes in) and the <strong>return type</strong> (what comes out). This makes functions act as contracts — callers know exactly what to pass and what they'll get back.</p>
</div>`,
      code:`// ── BASIC FUNCTION TYPING ─────────────────────────────────
// Syntax: function name(param: type, ...): returnType { }

function add(a: number, b: number): number {
  return a + b;
}

function sayHello(name: string): string {
  return \`Hello, \${name}!\`;
}

function printInfo(name: string, age: number): void {
  console.log(\`\${name} is \${age} years old\`);
  // void means "returns nothing"
}

// ── USING TYPED FUNCTIONS ─────────────────────────────────
const sum = add(5, 3);        // ✅ Returns: 8 (number)
const hi = sayHello("Alice"); // ✅ Returns: "Hello, Alice!" (string)

add("5", 3);    // 🔴 Error: 'string' not assignable to 'number'
add(5, 3, 1);   // 🔴 Error: Expected 2 arguments, got 3

// ── MULTIPLE PARAMETERS ────────────────────────────────────
function createEmail(
  to: string,
  subject: string,
  body: string,
  isHtml: boolean
): string {
  return \`To: \${to} | Subject: \${subject} | HTML: \${isHtml}\`;
}

// ── INFERRED RETURN TYPE ───────────────────────────────────
// TypeScript can infer the return type — you don't always have to write it
function multiply(a: number, b: number) {
  return a * b; // TypeScript infers: number
}

// But annotating return types is good practice — it catches mistakes:
function divide(a: number, b: number): number {
  if (b === 0) return "Cannot divide by zero"; // 🔴 Error caught!
  return a / b;
}`,
      codeFile:'functions.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'Always annotate parameters',body:`<p>Always add type annotations to function parameters. TypeScript 6's <code>noImplicitAny</code> (on by default) will error if you don't. Return types are optional if you're okay with TypeScript inferring them, but annotating them is a good habit that catches mistakes.</p>`},
      ]
    },

    {
      id:'optional-params', group:'Chapter 5 — Functions', icon:'fn', title:'Optional & Default Parameters',
      sub:'Making function parameters optional or giving them default values.',
      content:`
<div class="prose">
  <p>Not every function call needs every argument. TypeScript gives you two ways to handle this: <strong>optional parameters</strong> (callers can skip them) and <strong>default parameters</strong> (they get a value automatically if not provided).</p>
</div>`,
      code:`// ── OPTIONAL PARAMETERS (?) ──────────────────────────────
// Add ? after the name to make it optional
// Inside the function, TypeScript knows it might be undefined

function greet(name: string, title?: string): string {
  if (title) {
    return \`Hello, \${title} \${name}!\`;
  }
  return \`Hello, \${name}!\`;
}

greet("Alice");           // ✅ "Hello, Alice!"
greet("Alice", "Dr.");    // ✅ "Hello, Dr. Alice!"

// ── DEFAULT PARAMETERS ────────────────────────────────────
// Provide a default value — TypeScript infers the type from the default

function createUser(name: string, role: string = "user"): string {
  return \`\${name} has role: \${role}\`;
}

createUser("Alice");           // ✅ "Alice has role: user"
createUser("Bob", "admin");    // ✅ "Bob has role: admin"

// ── COMBINING OPTIONAL AND DEFAULT ────────────────────────
function sendEmail(
  to: string,
  subject: string = "No Subject",
  body?: string          // truly optional
): void {
  console.log(\`Sending to: \${to}\`);
  console.log(\`Subject: \${subject}\`);
  if (body) {
    console.log(\`Body: \${body}\`);
  }
}

sendEmail("alice@example.com");
sendEmail("bob@example.com", "Meeting Tomorrow");
sendEmail("carol@example.com", "Update", "See attached.");

// ── IMPORTANT: Optional after required ────────────────────
// Optional params MUST come AFTER required params!
// function bad(name?: string, age: number) {} // 🔴 Error!
function good(age: number, name?: string) {} // ✅ OK`,
      codeFile:'optional-params.ts', codeLang:'typescript',
    },

    {
      id:'rest-params', group:'Chapter 5 — Functions', icon:'fn', title:'Function Rest Parameters',
      sub:'Accepting any number of arguments with the spread (...) syntax.',
      content:`
<div class="prose">
  <p>A <strong>rest parameter</strong> lets a function accept any number of arguments. It collects all remaining arguments into an array. The syntax uses three dots (<code>...</code>) before the parameter name. TypeScript types it as an array.</p>
</div>`,
      code:`// ── REST PARAMETERS ──────────────────────────────────────
// The '...' collects remaining args into an array
// Type annotation: type[]

function addAll(...numbers: number[]): number {
  return numbers.reduce((sum, n) => sum + n, 0);
}

addAll(1);             // ✅ Returns: 1
addAll(1, 2, 3);       // ✅ Returns: 6
addAll(1, 2, 3, 4, 5); // ✅ Returns: 15

// ── MIXED: Required + Rest ────────────────────────────────
function logMessage(level: string, ...messages: string[]): void {
  messages.forEach(msg => {
    console.log(\`[\${level}] \${msg}\`);
  });
}

logMessage("INFO", "App started");
logMessage("ERROR", "Connection failed", "Retrying...", "Failed again");

// ── REST WITH DIFFERENT TYPES ─────────────────────────────
function joinStrings(separator: string, ...parts: string[]): string {
  return parts.join(separator);
}

joinStrings(", ", "Apple", "Banana", "Cherry");
// ✅ Returns: "Apple, Banana, Cherry"

// Rest must always be the LAST parameter:
// function bad(...items: string[], sep: string) {} // 🔴 Error!`,
      codeFile:'rest-params.ts', codeLang:'typescript',
    },

    {
      id:'arrow-fn', group:'Chapter 5 — Functions', icon:'fn', title:'Arrow Functions',
      sub:'Typing the modern arrow function syntax — shorter, cleaner, and lexically scoped.',
      content:`
<div class="prose">
  <p><strong>Arrow functions</strong> are a shorter way to write functions in JavaScript, introduced in ES6. TypeScript handles them exactly the same way as regular functions for typing. The key difference: they don't have their own <code>this</code> binding.</p>
</div>`,
      code:`// ── ARROW FUNCTION SYNTAX ─────────────────────────────────
// Traditional function:
function addTraditional(a: number, b: number): number {
  return a + b;
}

// Arrow function — same thing, shorter:
const addArrow = (a: number, b: number): number => {
  return a + b;
};

// Even shorter with implicit return (one-liners):
const addConcise = (a: number, b: number): number => a + b;

// ── TYPED ARROW FUNCTIONS ─────────────────────────────────
const multiply = (a: number, b: number): number => a * b;
const greet = (name: string): string => \`Hello, \${name}!\`;
const isEven = (n: number): boolean => n % 2 === 0;

// ── ARROW FUNCTIONS AS CALLBACKS ──────────────────────────
const numbers = [1, 2, 3, 4, 5];

// TypeScript infers 'n' is number from the array type
const doubled = numbers.map(n => n * 2);  // [2, 4, 6, 8, 10]
const evens = numbers.filter(n => n % 2 === 0); // [2, 4]
const sum = numbers.reduce((acc, n) => acc + n, 0); // 15

// ── VARIABLE-TYPED ARROW FUNCTIONS ────────────────────────
// You can also type the whole function as a variable:
const calculate: (a: number, b: number) => number = (a, b) => a + b;

// TypeScript will infer the parameter types from the variable type!
const greetUser: (name: string) => string = (name) => \`Hi, \${name}!\`;`,
      codeFile:'arrow-functions.ts', codeLang:'typescript',
    },

    {
      id:'anon-fn', group:'Chapter 5 — Functions', icon:'fn', title:'Anonymous Functions',
      sub:'Functions without names — used as callbacks, event handlers, and more.',
      content:`
<div class="prose">
  <p>An <strong>anonymous function</strong> is a function without a name. They're commonly used as callbacks or assigned to variables. TypeScript types them the same way, and is often smart enough to infer parameter types from context.</p>
</div>`,
      code:`// ── ANONYMOUS FUNCTIONS ───────────────────────────────────
// Assigned to a variable:
const greet = function(name: string): string {
  return \`Hello, \${name}!\`;
};

// ── CONTEXTUAL TYPING (inference from context) ────────────
// When passing an anonymous function as a callback, TypeScript
// infers types from the expected function signature

const numbers = [1, 2, 3];

numbers.forEach(function(num) {
  // TypeScript knows 'num' is number — inferred from the array!
  console.log(num.toFixed(2)); // ✅ Works
});

// With arrow function — same inference:
numbers.forEach(num => {
  console.log(num * 2); // ✅ num is inferred as number
});

// ── IMMEDIATELY INVOKED FUNCTION EXPRESSION (IIFE) ─────────
// A function that runs immediately after being defined:
const result = (function(a: number, b: number): number {
  return a + b;
})(5, 3);

console.log(result); // 8

// ── PASSING FUNCTIONS AS ARGUMENTS ────────────────────────
// TypeScript can type function parameters too
function applyOperation(
  a: number,
  b: number,
  operation: (x: number, y: number) => number  // function type!
): number {
  return operation(a, b);
}

applyOperation(5, 3, (x, y) => x + y); // 8
applyOperation(5, 3, (x, y) => x * y); // 15
applyOperation(5, 3, (x, y) => x - y); // 2`,
      codeFile:'anonymous-functions.ts', codeLang:'typescript',
    },

    {
      id:'void-never', group:'Chapter 5 — Functions', icon:'fn', title:'Void & Never',
      sub:'Two special return types for functions that don\'t return values or that never finish.',
      content:`
<div class="prose">
  <p>TypeScript has two special return types for functions: <code>void</code> and <code>never</code>. They seem similar but mean very different things.</p>
</div>
<div class="g2">
  <div class="card"><div class="card-t"><code>void</code></div><div class="card-b">The function <strong>returns nothing</strong> (or undefined). It <em>does</em> finish executing. Common for functions that just log or modify state.</div></div>
  <div class="card"><div class="card-t"><code>never</code></div><div class="card-b">The function <strong>never returns</strong>. It either throws an error, runs an infinite loop, or crashes the program. TypeScript uses this for exhaustive checks.</div></div>
</div>`,
      code:`// ── VOID: Function returns nothing ────────────────────────
function logMessage(message: string): void {
  console.log(message);
  // No return statement (or 'return;' with no value)
}

const result = logMessage("Hello");
// result is: void (you can't use it for anything useful)

// ── VOID in event handlers ────────────────────────────────
function handleClick(event: Event): void {
  event.preventDefault();
  console.log("Button clicked!");
}

// ── NEVER: Function never returns ─────────────────────────
// Scenario 1: Always throws an error
function throwError(message: string): never {
  throw new Error(message);
  // Code after this never executes — TypeScript knows this!
}

// Scenario 2: Infinite loop
function runForever(): never {
  while (true) {
    console.log("Running...");
  }
}

// ── NEVER for exhaustive checks (advanced, but useful!) ───
type Direction = "north" | "south" | "east" | "west";

function move(direction: Direction): string {
  switch (direction) {
    case "north": return "Moving north";
    case "south": return "Moving south";
    case "east": return "Moving east";
    case "west": return "Moving west";
    default:
      // If you add a new Direction but forget to handle it here,
      // TypeScript will error on this line! (direction would be 'never')
      const exhaustiveCheck: never = direction;
      return exhaustiveCheck;
  }
}`,
      codeFile:'void-never.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'void vs undefined',body:`<p><code>void</code> means "the function doesn't meaningfully return anything." <code>undefined</code> is the actual value returned. In practice, functions returning <code>void</code> do return <code>undefined</code> in JavaScript — but using <code>void</code> as the type signals intent more clearly.</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 6 — ADVANCED TYPES

    {
      id:'union-types', group:'Chapter 6 — Advanced Types', icon:'layers', title:'Union Types',
      sub:'A variable that can be one of several types — expressed with the | (pipe) operator.',
      content:`
<div class="prose">
  <p>A <strong>union type</strong> describes a value that can be one of several types. You write it by separating types with a vertical bar <code>|</code>. Think of it as "or" — this value is a string <em>or</em> a number.</p>
  <p>Union types are incredibly useful for real-world scenarios: a function argument that accepts strings or numbers, a value that could be null, an API response that varies, etc.</p>
</div>`,
      code:`// ── BASIC UNION TYPES ─────────────────────────────────────
// Use | between types
let id: string | number;
id = "user-123";  // ✅ string works
id = 42;          // ✅ number works
id = true;        // 🔴 Error: 'boolean' not in the union

// ── UNION IN FUNCTIONS ─────────────────────────────────────
function formatId(id: string | number): string {
  // Inside the function, id could be either type.
  // You need to check which one it is — called "narrowing":
  if (typeof id === "string") {
    return id.toUpperCase(); // TypeScript knows: string
  } else {
    return id.toString();    // TypeScript knows: number
  }
}

formatId("abc123"); // ✅ "ABC123"
formatId(456);      // ✅ "456"

// ── TYPE NARROWING ─────────────────────────────────────────
// TypeScript gets smarter inside conditional blocks
function processInput(input: string | number | boolean) {
  if (typeof input === "string") {
    console.log("String:", input.toUpperCase());
  } else if (typeof input === "number") {
    console.log("Number:", input.toFixed(2));
  } else {
    console.log("Boolean:", input ? "yes" : "no");
  }
}

// ── ARRAYS OF UNIONS ──────────────────────────────────────
let mixed: (string | number)[] = ["Alice", 25, "Bob", 30];

// ── NULL/UNDEFINED in unions (common pattern) ─────────────
let userName: string | null = null;  // No user yet
userName = "Alice";                   // User logged in
userName = null;                      // User logged out`,
      codeFile:'union-types.ts', codeLang:'typescript',
    },

    {
      id:'literal-types', group:'Chapter 6 — Advanced Types', icon:'layers', title:'Literal Types',
      sub:'Restricting a variable to specific exact values — not just any string or number.',
      content:`
<div class="prose">
  <p><strong>Literal types</strong> let you specify that a value must be an <em>exact</em> specific value, not just any string or number. Think of it as "not just any string, but specifically one of these strings."</p>
  <p>They're most powerful when combined with union types to create a set of allowed values — similar to an enum, but simpler.</p>
</div>`,
      code:`// ── STRING LITERAL TYPES ──────────────────────────────────
// This variable can ONLY be one of these exact strings:
let direction: "north" | "south" | "east" | "west";

direction = "north"; // ✅
direction = "east";  // ✅
direction = "up";    // 🔴 Error: not in the union!

// ── NUMBER LITERAL TYPES ──────────────────────────────────
let diceRoll: 1 | 2 | 3 | 4 | 5 | 6;
diceRoll = 3;  // ✅
diceRoll = 7;  // 🔴 Error: not a valid dice value

// ── LITERAL TYPES IN FUNCTIONS ─────────────────────────────
function setAlignment(align: "left" | "center" | "right"): void {
  console.log(\`Text aligned: \${align}\`);
}

setAlignment("left");     // ✅
setAlignment("center");   // ✅
setAlignment("justify");  // 🔴 Error!

// ── LITERAL TYPES IN OBJECTS ──────────────────────────────
type Status = "pending" | "active" | "cancelled" | "completed";

let order: { id: number; status: Status } = {
  id: 1,
  status: "pending"  // Must be one of the Status values
};

order.status = "active";     // ✅
order.status = "delivered";  // 🔴 Error: not in Status

// ── BOOLEAN LITERALS ──────────────────────────────────────
let alwaysTrue: true = true;   // Only 'true' is allowed
let isOff: false = false;      // Only 'false' is allowed`,
      codeFile:'literal-types.ts', codeLang:'typescript',
    },

    {
      id:'nullable', group:'Chapter 6 — Advanced Types', icon:'layers', title:'Nullable Types',
      sub:'Handling null and undefined safely with TypeScript\'s strict null checking.',
      content:`
<div class="prose">
  <p>In JavaScript, <code>null</code> and <code>undefined</code> are the most common sources of runtime errors (the dreaded "Cannot read property of null"). TypeScript 6's <code>strictNullChecks</code> (on by default) forces you to handle these cases explicitly.</p>
</div>`,
      code:`// ── strictNullChecks (ON by default in TS 6) ─────────────
// Without strictNullChecks, null/undefined can be assigned to anything.
// With strictNullChecks (default), you must handle them explicitly.

// ── NULLABLE with union types ─────────────────────────────
let username: string | null = null;  // Can be string OR null

// You must check before using it:
if (username !== null) {
  console.log(username.toUpperCase()); // ✅ Safe — we checked!
}

// ── OPTIONAL CHAINING (?.) ────────────────────────────────
// Safely access properties that might be null/undefined
type User = {
  name: string;
  address?: {    // address is optional
    city: string;
  };
};

const user: User = { name: "Alice" };

// Without optional chaining — crashes if address is undefined:
// console.log(user.address.city);  // 🔴 Runtime Error!

// With optional chaining — returns undefined instead of crashing:
console.log(user.address?.city);  // ✅ undefined (no crash)

// ── NULLISH COALESCING (??) ────────────────────────────────
// Returns the right side only if left is null or undefined
let displayName: string | null = null;
let name = displayName ?? "Anonymous";  // "Anonymous"

let score: number | undefined = undefined;
let finalScore = score ?? 0;  // 0

// ── NON-NULL ASSERTION (!) ────────────────────────────────
// Tell TypeScript "I know this isn't null — trust me!"
// Use sparingly — you're bypassing type safety!
function getElement(id: string): HTMLElement {
  return document.getElementById(id)!; // ! asserts not null
}`,
      codeFile:'nullable.ts', codeLang:'typescript',
      boxes:[
        {type:'warn',title:'⚠️ Avoid Non-Null Assertion overuse',body:`<p>The <code>!</code> non-null assertion operator disables TypeScript's null checking for that expression. If the value turns out to be null at runtime, you'll get the same crash TypeScript was trying to prevent. Use it only when you're 100% certain.</p>`},
      ]
    },

    {
      id:'type-alias', group:'Chapter 6 — Advanced Types', icon:'layers', title:'Type Aliases',
      sub:'Giving a name to any type — objects, unions, functions, and more.',
      content:`
<div class="prose">
  <p>A <strong>type alias</strong> creates a new name for any type. It makes complex types reusable and your code more readable. Use the <code>type</code> keyword followed by the name you want.</p>
  <p>Type aliases can name anything: object shapes, union types, function signatures, primitives, tuples — any TypeScript type.</p>
</div>`,
      code:`// ── BASIC TYPE ALIAS ──────────────────────────────────────
// Instead of repeating this everywhere:
// { name: string; age: number; email: string }
// Give it a name:
type User = {
  name: string;
  age: number;
  email: string;
};

// Now use 'User' as a type:
const alice: User = { name: "Alice", age: 30, email: "alice@example.com" };
const bob: User = { name: "Bob", age: 25, email: "bob@example.com" };

function greetUser(user: User): string {
  return \`Hello, \${user.name}!\`;
}

// ── TYPE ALIAS FOR UNIONS ──────────────────────────────────
type ID = string | number;
type Status = "pending" | "active" | "cancelled";
type Theme = "light" | "dark" | "system";

let userId: ID = "user-123";
userId = 42;  // ✅ Still valid

let theme: Theme = "dark";

// ── TYPE ALIAS FOR FUNCTIONS ──────────────────────────────
// Give a function signature a name:
type MathOperation = (a: number, b: number) => number;

const add: MathOperation = (a, b) => a + b;
const subtract: MathOperation = (a, b) => a - b;
const multiply: MathOperation = (a, b) => a * b;

// ── COMPLEX NESTED TYPES ──────────────────────────────────
type Address = {
  street: string;
  city: string;
  country: string;
};

type Employee = {
  id: ID;
  name: string;
  role: Status;
  address: Address;  // Reusing another type alias!
};

// ── TYPE ALIAS vs INTERFACE ───────────────────────────────
// Both can describe object shapes.
// Key difference: type aliases can describe ANY type (unions, primitives, functions).
// Interfaces are specifically for object shapes and can be extended/reopened.
// More on interfaces in Chapter 10!`,
      codeFile:'type-alias.ts', codeLang:'typescript',
    },

    {
      id:'intersection', group:'Chapter 6 — Advanced Types', icon:'layers', title:'Intersection Types',
      sub:'Combining multiple types into one using the & operator.',
      content:`
<div class="prose">
  <p>An <strong>intersection type</strong> combines multiple types into one. A value of an intersection type must satisfy <em>all</em> of the combined types simultaneously. Use the <code>&amp;</code> (ampersand) operator.</p>
  <p>Think of union (<code>|</code>) as "OR" and intersection (<code>&amp;</code>) as "AND".</p>
</div>`,
      code:`// ── INTERSECTION TYPES ────────────────────────────────────
type HasName = { name: string };
type HasAge = { age: number };
type HasEmail = { email: string };

// An intersection — must have ALL properties from ALL types
type Person = HasName & HasAge;

const person: Person = {
  name: "Alice",   // Required by HasName
  age: 30,         // Required by HasAge
  // email is NOT required — it's not in the intersection
};

// ── THREE-WAY INTERSECTION ────────────────────────────────
type FullProfile = HasName & HasAge & HasEmail;

const profile: FullProfile = {
  name: "Bob",
  age: 25,
  email: "bob@example.com"
  // Missing any one of these = TypeScript error!
};

// ── PRACTICAL USE: Mixins / Role Combinations ─────────────
type Timestamps = {
  createdAt: Date;
  updatedAt: Date;
};

type User = {
  id: number;
  username: string;
};

// A user record that also has timestamps (common DB pattern)
type UserRecord = User & Timestamps;

const userRecord: UserRecord = {
  id: 1,
  username: "alice",
  createdAt: new Date(),
  updatedAt: new Date()
};

// ── INTERSECTION with FUNCTION TYPES ──────────────────────
type Serializable = { serialize(): string };
type Loggable = { log(): void };

type LoggableEntity = Serializable & Loggable;

// Any LoggableEntity must have BOTH methods:
const entity: LoggableEntity = {
  serialize: () => JSON.stringify({ id: 1 }),
  log: () => console.log("Entity logged")
};`,
      codeFile:'intersection.ts', codeLang:'typescript',
    },

// ═══════════════════════════════════════
// CHAPTER 7 — ARRAYS
