    {
      id:'arrays', group:'Chapter 7 — Arrays', icon:'arr', title:'Type Annotations With Arrays',
      sub:'Typing arrays to ensure every element has the right type.',
      content:`
<div class="prose">
  <p>TypeScript arrays are typed so every element must be the same type. There are two syntaxes for array types: <code>type[]</code> and <code>Array&lt;type&gt;</code>. Both are equivalent — use whichever feels more readable.</p>
</div>`,
      code:`// ── ARRAY TYPE SYNTAX ─────────────────────────────────────
// Two equivalent ways to type arrays:
let numbers: number[] = [1, 2, 3, 4, 5];
let names: Array<string> = ["Alice", "Bob", "Carol"];

// Shorthand is more common:
let prices: number[] = [9.99, 14.99, 4.99];
let flags: boolean[] = [true, false, true];

// ── INFERENCE ─────────────────────────────────────────────
// TypeScript infers array types automatically:
const fruits = ["apple", "banana", "cherry"]; // inferred: string[]
const scores = [85, 90, 78, 95];              // inferred: number[]

// ── TYPE ENFORCEMENT ──────────────────────────────────────
let tags: string[] = ["typescript", "programming"];
tags.push("javascript");   // ✅ OK
tags.push(42);             // 🔴 Error: 'number' not assignable to 'string'

// ── ARRAY METHODS ARE TYPED ──────────────────────────────
const ages: number[] = [25, 30, 22, 28];

const sorted = ages.sort((a, b) => a - b);  // still number[]
const doubled = ages.map(age => age * 2);   // number[]
const adults = ages.filter(age => age >= 25); // number[]
const total = ages.reduce((sum, age) => sum + age, 0); // number

// ── UNION ARRAYS ──────────────────────────────────────────
let mixed: (string | number)[] = ["Alice", 25, "Bob", 30];
// Each element can be string OR number

// ── READONLY ARRAYS ───────────────────────────────────────
const colors: readonly string[] = ["red", "green", "blue"];
// colors.push("yellow"); // 🔴 Error: Cannot modify readonly array

// ── TYPED EMPTY ARRAY ─────────────────────────────────────
let items: string[] = [];   // Must annotate — empty can't be inferred
items.push("item1");        // ✅`,
      codeFile:'arrays.ts', codeLang:'typescript',
    },

    {
      id:'multidim-arrays', group:'Chapter 7 — Arrays', icon:'arr', title:'Multidimensional Arrays',
      sub:'Typing arrays of arrays — grids, matrices, and nested data structures.',
      content:`
<div class="prose">
  <p>A <strong>multidimensional array</strong> is an array where each element is also an array. TypeScript types these by adding more square brackets or nesting the <code>Array&lt;&gt;</code> syntax.</p>
</div>`,
      code:`// ── 2D ARRAYS (array of arrays) ───────────────────────────
// Type: number[][] means "array of arrays of numbers"
let matrix: number[][] = [
  [1, 2, 3],
  [4, 5, 6],
  [7, 8, 9]
];

// Access:
console.log(matrix[0][1]); // 2 — first row, second column
console.log(matrix[2][0]); // 7 — third row, first column

// ── STRING 2D ARRAY ───────────────────────────────────────
let grid: string[][] = [
  ["X", "O", "X"],
  ["O", "X", "O"],
  ["X", "X", "O"]
];

// ── 3D ARRAY ──────────────────────────────────────────────
// Three levels of nesting:
let cube: number[][][] = [
  [[1, 2], [3, 4]],
  [[5, 6], [7, 8]]
];

// ── ARRAY OF OBJECTS ──────────────────────────────────────
// This is extremely common in real apps:
type User = { name: string; age: number };

let users: User[] = [
  { name: "Alice", age: 30 },
  { name: "Bob", age: 25 },
  { name: "Carol", age: 35 }
];

// Type safety applies to every element:
users.push({ name: "Dave", age: 28 });  // ✅
// users.push({ name: "Eve" });          // 🔴 Missing 'age'

// Mapping over an array of objects:
const names: string[] = users.map(user => user.name);
// TypeScript knows: 'user' is User, 'name' is string`,
      codeFile:'multidim-arrays.ts', codeLang:'typescript',
    },

    {
      id:'tuple', group:'Chapter 8 — Tuples', icon:'list', title:'Tuples',
      sub:'Fixed-length arrays where each position has a specific type.',
      content:`
<div class="prose">
  <p>A <strong>tuple</strong> is a special kind of array where you know exactly how many elements there are and what type each position contains. Unlike a regular array where all elements are the same type, tuples can have different types at each index.</p>
  <p>Tuples are great for representing pairs, triples, or any small collection of related values where position matters.</p>
</div>`,
      code:`// ── TUPLE SYNTAX ──────────────────────────────────────────
// Declare a tuple type with [type, type, ...]
let point: [number, number] = [10, 20]; // x, y coordinates

// Access by index:
console.log(point[0]); // 10 (number)
console.log(point[1]); // 20 (number)

// ── MIXED-TYPE TUPLES ──────────────────────────────────────
// Each position has its own type!
let person: [string, number] = ["Alice", 30]; // name, age

// TypeScript knows what type each index is:
let name: string = person[0]; // "Alice" — string ✅
let age: number = person[1];  // 30 — number ✅

// ── WRONG TYPES = ERROR ───────────────────────────────────
let coordinate: [number, number] = [10, "20"]; // 🔴 Error!
let record: [string, number] = [42, "Alice"];  // 🔴 Error!

// ── OPTIONAL TUPLE ELEMENTS ───────────────────────────────
let optRecord: [string, number, boolean?] = ["Alice", 30];
// The boolean at index 2 is optional

// ── DESTRUCTURING TUPLES ──────────────────────────────────
const [x, y] = point;   // x = 10, y = 20
const [firstName, userAge] = person; // firstName = "Alice", userAge = 30

// ── REAL-WORLD EXAMPLES ───────────────────────────────────
// RGB color (red, green, blue):
let red: [number, number, number] = [255, 0, 0];

// useState in React returns a tuple! (simplified):
type UseState<T> = [T, (newValue: T) => void];
let counter: UseState<number> = [0, (n) => { console.log(n); }];

// Key-value pair:
let entry: [string, number] = ["score", 100];

// ── NAMED TUPLE ELEMENTS (TypeScript 4+) ──────────────────
// Add names for better readability:
let namedPoint: [x: number, y: number] = [10, 20];
let rgb: [red: number, green: number, blue: number] = [255, 128, 0];`,
      codeFile:'tuples.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'Tuple vs Array',body:`<p><strong>Array</strong>: variable length, all elements same type. <strong>Tuple</strong>: fixed length, each index can have a different type. Use tuples when the number of elements and their order has semantic meaning (like [lat, lng] for coordinates).</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 9 — ENUMS
// ═══════════════════════════════════════
    {
      id:'enums', group:'Chapter 9 — Enums', icon:'enum', title:'Enums',
      sub:'Named sets of related constants — make your code more readable and less error-prone.',
      content:`
<div class="prose">
  <p>An <strong>enum</strong> (short for enumeration) is a way to define a set of named constants. Instead of using magic strings or numbers, you give meaningful names to related values.</p>
  <p>Enums exist at runtime — unlike type aliases and interfaces, they generate actual JavaScript code. This is important to understand.</p>
</div>`,
      code:`// ── NUMERIC ENUM (default) ────────────────────────────────
// Values auto-assign starting at 0 unless specified
enum Direction {
  North,   // 0
  South,   // 1
  East,    // 2
  West     // 3
}

let myDirection: Direction = Direction.North;
console.log(myDirection);           // 0
console.log(Direction.South);       // 1
console.log(Direction[1]);          // "South" (reverse lookup!)

// ── CUSTOM NUMERIC ENUM ───────────────────────────────────
enum StatusCode {
  OK = 200,
  NotFound = 404,
  ServerError = 500,
  Redirect = 301
}

function handleResponse(code: StatusCode): string {
  if (code === StatusCode.OK) return "Success!";
  if (code === StatusCode.NotFound) return "Not found.";
  return "Unknown status.";
}

// ── STRING ENUM ───────────────────────────────────────────
// No reverse lookup, but more readable and debuggable:
enum UserRole {
  Admin = "ADMIN",
  Editor = "EDITOR",
  Viewer = "VIEWER"
}

let role: UserRole = UserRole.Admin;
console.log(role); // "ADMIN" — readable!

// ── USING ENUMS ───────────────────────────────────────────
enum Season { Spring, Summer, Autumn, Winter }

function getActivity(season: Season): string {
  switch (season) {
    case Season.Spring: return "Gardening";
    case Season.Summer: return "Swimming";
    case Season.Autumn: return "Hiking";
    case Season.Winter: return "Skiing";
  }
}

getActivity(Season.Summer); // "Swimming"
getActivity(2);             // ✅ Also works — Autumn is 2

// ── CONST ENUM (no runtime code!) ────────────────────────
// Faster — inlines values at compile time, no JS object generated
const enum Color { Red = "RED", Green = "GREEN", Blue = "BLUE" }
let paint: Color = Color.Red; // Compiled to: let paint = "RED";`,
      codeFile:'enums.ts', codeLang:'typescript',
      boxes:[
        {type:'warn',title:'⚠️ Enums generate JavaScript',body:`<p>Unlike types and interfaces (which are erased at compile time), enums produce real JavaScript code. For string literal unions like <code>"admin" | "editor" | "viewer"</code>, consider using a <strong>type alias</strong> instead — it has zero runtime cost and is often simpler.</p>`},
        {type:'ts',title:'String Enums in TypeScript 6',body:`<p>String enums are generally preferred over numeric enums because the values are meaningful at runtime. With TypeScript 6's strict mode, numeric enum assignments are also stricter — you can't assign a raw number to a numeric enum type without explicit casting.</p>`},
      ]
    },

// ═══════════════════════════════════════
// CHAPTER 10 — INTERFACES
// ═══════════════════════════════════════
    {
      id:'interface', group:'Chapter 10 — Interfaces', icon:'iface', title:'Interface',
      sub:'The primary TypeScript tool for describing the shape of an object.',
      content:`
<div class="prose">
  <p>An <strong>interface</strong> defines the shape (structure) of an object — what properties it has and what types they are. It's TypeScript's most commonly used tool for describing objects.</p>
  <p>Interfaces are similar to type aliases for objects, but have special features: they can be extended, merged, and used to describe class contracts.</p>
</div>`,
      code:`// ── BASIC INTERFACE ───────────────────────────────────────
interface User {
  id: number;
  name: string;
  email: string;
  isActive: boolean;
}

// Any object matching this shape is a valid User:
const user: User = {
  id: 1,
  name: "Alice",
  email: "alice@example.com",
  isActive: true
};

// ── OPTIONAL PROPERTIES ───────────────────────────────────
interface Product {
  id: number;
  name: string;
  price: number;
  description?: string;  // Optional
  tags?: string[];       // Optional array
}

const laptop: Product = {
  id: 101,
  name: "TypeScript Laptop",
  price: 999.99
  // description and tags are optional — OK to omit!
};

// ── READONLY PROPERTIES ───────────────────────────────────
interface Config {
  readonly apiUrl: string;
  readonly version: number;
  timeout: number;  // Can be changed
}

const config: Config = {
  apiUrl: "https://api.example.com",
  version: 6,
  timeout: 3000
};

config.timeout = 5000;     // ✅ OK
// config.apiUrl = "...";  // 🔴 Error: readonly!

// ── INTERFACE EXTENDING ANOTHER ───────────────────────────
interface Animal {
  name: string;
  age: number;
}

interface Pet extends Animal {  // Inherits name and age
  owner: string;
  breed: string;
}

const dog: Pet = {
  name: "Max",
  age: 3,
  owner: "Alice",
  breed: "Labrador"
};`,
      codeFile:'interface.ts', codeLang:'typescript',
    },

    {
      id:'interface-methods', group:'Chapter 10 — Interfaces', icon:'iface', title:'Interface Methods & Parameters',
      sub:'Describing methods (functions) that objects must implement.',
      content:`
<div class="prose">
  <p>Interfaces can also describe <strong>methods</strong> — functions that belong to an object. There are two syntaxes for method signatures in interfaces, and both work the same way.</p>
</div>`,
      code:`// ── INTERFACE WITH METHODS ────────────────────────────────
interface Calculator {
  // Method signature syntax 1: short method syntax
  add(a: number, b: number): number;
  subtract(a: number, b: number): number;

  // Method signature syntax 2: property with function type
  multiply: (a: number, b: number) => number;

  // Optional method:
  divide?: (a: number, b: number) => number;
}

// Implementing the interface:
const myCalc: Calculator = {
  add: (a, b) => a + b,
  subtract: (a, b) => a - b,
  multiply: (a, b) => a * b,
  // divide is optional — we can omit it
};

console.log(myCalc.add(5, 3));       // 8
console.log(myCalc.subtract(10, 4)); // 6
console.log(myCalc.multiply(3, 4));  // 12

// ── CALL SIGNATURES ───────────────────────────────────────
// Describe objects that are themselves callable (like functions):
interface Greeter {
  (name: string): string;  // Call signature
  language: string;        // Also has a property
}

// ── PRACTICAL EXAMPLE ─────────────────────────────────────
interface Repository<T> {
  findById(id: number): T | undefined;
  findAll(): T[];
  save(item: T): void;
  delete(id: number): boolean;
}

type User = { id: number; name: string };

// A class that matches the Repository interface for Users:
class UserRepository implements Repository<User> {
  private users: User[] = [];

  findById(id: number) {
    return this.users.find(u => u.id === id);
  }

  findAll() { return [...this.users]; }

  save(user: User) { this.users.push(user); }

  delete(id: number): boolean {
    const idx = this.users.findIndex(u => u.id === id);
    if (idx === -1) return false;
    this.users.splice(idx, 1);
    return true;
  }
}`,
      codeFile:'interface-methods.ts', codeLang:'typescript',
    },

    {
      id:'reopen-interface', group:'Chapter 10 — Interfaces', icon:'iface', title:'Reopening Interfaces',
      sub:'One of interface\'s unique powers — you can add to an existing interface after defining it.',
      content:`
<div class="prose">
  <p>TypeScript interfaces have a unique feature called <strong>declaration merging</strong> — you can define an interface with the same name multiple times, and TypeScript merges them into one. This is called "reopening" an interface.</p>
  <p>This is extremely useful for extending third-party library types or adding properties to built-in types.</p>
</div>`,
      code:`// ── INTERFACE MERGING ─────────────────────────────────────
// Define the same interface in two places — TypeScript merges them!
interface User {
  name: string;
  age: number;
}

// Reopen the same interface — this ADDS to the existing definition:
interface User {
  email: string;
  role: string;
}

// The result is a User with ALL four properties:
const user: User = {
  name: "Alice",
  age: 30,
  email: "alice@example.com",
  role: "admin"
  // Must provide all properties from both declarations
};

// ── USE CASE: Extending Library Types ─────────────────────
// Suppose a library defines:
interface Request {
  url: string;
  method: string;
}

// In YOUR code, you add custom properties:
interface Request {
  userId?: number;  // Added by your code
  timestamp?: Date;
}

// Now Request has: url, method, userId, timestamp

// ── USE CASE: Window Extensions ───────────────────────────
// Add custom properties to the global Window object:
interface Window {
  myAnalytics: {
    track(event: string): void;
  };
}

// Now window.myAnalytics.track("pageview") is typed!

// ── INTERFACE EXTENSION (extends) ─────────────────────────
// Alternative: create a new interface that extends another
interface BaseEntity {
  id: number;
  createdAt: Date;
}

interface UserEntity extends BaseEntity {
  name: string;
  email: string;
}

// UserEntity has: id, createdAt, name, email`,
      codeFile:'reopen-interface.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'Declaration Merging is interfaces-only',body:`<p>Only <code>interface</code> supports declaration merging. <code>type</code> aliases cannot be redeclared. This is one of the key reasons to use <code>interface</code> for object shapes — especially in libraries and shared code where others might want to extend your types.</p>`},
      ]
    },

    {
      id:'builtin-interface', group:'Chapter 10 — Interfaces', icon:'iface', title:'Built-in Interfaces',
      sub:'TypeScript ships with thousands of pre-defined interfaces for the browser DOM and JavaScript standard library.',
      content:`
<div class="prose">
  <p>TypeScript includes built-in type definitions for all JavaScript and browser APIs. These are defined as interfaces in TypeScript's <strong>lib</strong> files. You don't need to install anything — they're included automatically when you use the <code>dom</code> lib.</p>
</div>`,
      code:`// ── DOM INTERFACES ────────────────────────────────────────
// TypeScript knows the types of all DOM elements and events

const button = document.querySelector("button");
// button is: HTMLButtonElement | null

const input = document.getElementById("name") as HTMLInputElement;
// Typed as HTMLInputElement — has .value, .placeholder, etc.

// Event types are also fully typed:
button?.addEventListener("click", (event: MouseEvent) => {
  console.log(event.clientX, event.clientY); // coordinates
  event.preventDefault();
});

input.addEventListener("input", (event: Event) => {
  const target = event.target as HTMLInputElement;
  console.log(target.value); // typed as string
});

// ── HTMLImageElement EXAMPLE ───────────────────────────────
const img = document.createElement("img") as HTMLImageElement;
img.src = "photo.jpg";   // string ✅
img.alt = "A photo";     // string ✅
img.width = 800;         // number ✅
img.height = 600;        // number ✅

// Methods are typed too:
img.decode(); // Returns Promise<void>

// ── JAVASCRIPT STANDARD LIBRARY ───────────────────────────
// Array, Map, Set, Promise are all fully typed:
const map = new Map<string, number>(); // Map<string, number>
map.set("score", 100);    // ✅
map.set("name", "Alice"); // 🔴 Error: 'string' not assignable to 'number'

const set = new Set<string>(["a", "b", "c"]); // Set<string>
set.add("d"); // ✅

// Promise:
async function fetchUser(id: number): Promise<User> {
  const response = await fetch(\`/api/users/\${id}\`);
  return response.json();
}`,
      codeFile:'builtin-interfaces.ts', codeLang:'typescript',
    },

    {
      id:'interface-vs-type', group:'Chapter 10 — Interfaces', icon:'iface', title:'Interface vs Type Aliases',
      sub:'When to use interface and when to use type — a clear comparison.',
      content:`<div class="prose"><p>Both <code>interface</code> and <code>type</code> can describe object shapes. Knowing when to use each makes your code cleaner.</p></div>
<div class="tbl-wrap"><table>
  <tr><th>Feature</th><th>interface</th><th>type alias</th></tr>
  <tr><td>Describe objects</td><td>✅ Yes</td><td>✅ Yes</td></tr>
  <tr><td>Describe unions</td><td>❌ No</td><td>✅ Yes (<code>string | number</code>)</td></tr>
  <tr><td>Describe primitives</td><td>❌ No</td><td>✅ Yes (<code>type ID = string</code>)</td></tr>
  <tr><td>Describe tuples</td><td>⚠️ Technically yes</td><td>✅ Better fit</td></tr>
  <tr><td>Declaration merging</td><td>✅ Yes</td><td>❌ No</td></tr>
  <tr><td>Class implements</td><td>✅ Yes</td><td>✅ Yes</td></tr>
  <tr><td>extends / inheritance</td><td>✅ extends keyword</td><td>✅ & intersection</td></tr>
  <tr><td>Extending libraries</td><td>✅ Preferred</td><td>❌ Can't merge</td></tr>
</table></div>`,
      code:`// ── WHEN TO USE interface ─────────────────────────────────
// 1. For object shapes (especially public APIs / libraries)
interface Point { x: number; y: number; }

// 2. When you need declaration merging:
interface Config { timeout: number; }
interface Config { retries: number; } // Merged ✅

// 3. When using implements in classes:
interface Serializable { serialize(): string; }
class Data implements Serializable {
  serialize() { return JSON.stringify(this); }
}

// ── WHEN TO USE type ──────────────────────────────────────
// 1. Union types:
type ID = string | number;
type Status = "active" | "inactive" | "pending";

// 2. Intersection for combining:
type AdminUser = User & { permissions: string[] };

// 3. Utility types and complex compositions:
type ReadonlyUser = Readonly<User>;
type PartialConfig = Partial<Config>;
type UserKeys = keyof User;

// ── THE COMMUNITY CONVENTION ──────────────────────────────
// Most TypeScript style guides say:
// - Use 'interface' for object shapes by default
// - Use 'type' for anything else (unions, aliases, complex types)
// Both work. Be consistent within a codebase.`,
      codeFile:'interface-vs-type.ts', codeLang:'typescript',
    },

// ═══════════════════════════════════════
// CHAPTER 11 — CLASSES
// ═══════════════════════════════════════
    {
      id:'class-annotations', group:'Chapter 11 — Classes', icon:'cls', title:'Class Type Annotations',
      sub:'Using TypeScript with JavaScript classes — typing properties, constructors, and methods.',
      content:`
<div class="prose">
  <p>TypeScript extends JavaScript classes with type annotations. You can type class <strong>properties</strong>, <strong>constructor parameters</strong>, and <strong>method signatures</strong>. TypeScript also requires you to declare properties before using them.</p>
</div>`,
      code:`// ── BASIC TYPED CLASS ─────────────────────────────────────
class Person {
  // Property declarations (required in TypeScript!)
  name: string;
  age: number;

  // Constructor — parameters are typed just like functions
  constructor(name: string, age: number) {
    this.name = name;
    this.age = age;
  }

  // Methods with typed parameters and return types
  greet(): string {
    return \`Hello! I'm \${this.name}, \${this.age} years old.\`;
  }

  birthday(): void {
    this.age++;
    console.log(\`Happy birthday, \${this.name}! Now \${this.age}.\`);
  }
}

const alice = new Person("Alice", 30);
console.log(alice.greet()); // "Hello! I'm Alice, 30 years old."
alice.birthday();           // "Happy birthday, Alice! Now 31."

alice.name = "Alicia";      // ✅ Modifiable
alice.age = "thirty";       // 🔴 Error: string → number

// ── SHORTHAND PROPERTY DECLARATION ────────────────────────
// TypeScript shortcut: declare AND initialize in constructor params:
class Point {
  constructor(
    public x: number,   // Declares AND initializes this.x
    public y: number    // Declares AND initializes this.y
  ) {}
  // No need for this.x = x inside the body!

  toString(): string {
    return \`(\${this.x}, \${this.y})\`;
  }
}

const p = new Point(3, 4);
console.log(p.toString()); // "(3, 4)"
console.log(p.x);          // 3`,
      codeFile:'class-annotations.ts', codeLang:'typescript',
    },

    {
      id:'access-modifiers', group:'Chapter 11 — Classes', icon:'cls', title:'Class Access Modifiers',
      sub:'public, private, and protected — controlling who can access class members.',
      content:`
<div class="prose">
  <p>TypeScript adds <strong>access modifiers</strong> to class properties and methods. They control which code can read or modify each member.</p>
</div>
<div class="g3">
  <div class="card"><div class="card-t"><code>public</code></div><div class="card-b">Default. Accessible from anywhere — inside the class, subclasses, and external code.</div></div>
  <div class="card"><div class="card-t"><code>private</code></div><div class="card-b">Only accessible inside the class itself. Not from subclasses or external code.</div></div>
  <div class="card"><div class="card-t"><code>protected</code></div><div class="card-b">Accessible inside the class AND in subclasses, but not from external code.</div></div>
</div>`,
      code:`class BankAccount {
  public owner: string;          // Anyone can read/write
  private balance: number;       // Only this class can access
  protected accountType: string; // This class + subclasses

  constructor(owner: string, initialBalance: number) {
    this.owner = owner;
    this.balance = initialBalance;
    this.accountType = "checking";
  }

  // Public method — anyone can call this:
  public deposit(amount: number): void {
    if (amount <= 0) throw new Error("Amount must be positive");
    this.balance += amount; // ✅ Private accessed inside class
  }

  // Public method to read private data (controlled access):
  public getBalance(): number {
    return this.balance;
  }

  private formatBalance(): string {
    return \`$\${this.balance.toFixed(2)}\`;
  }
}

const account = new BankAccount("Alice", 1000);
account.owner = "Alice Updated"; // ✅ public
account.deposit(500);            // ✅ public method
account.getBalance();            // ✅ 1500
// account.balance = 9999;       // 🔴 Error: private!
// account.formatBalance();      // 🔴 Error: private!

// ── PRIVATE IN CONSTRUCTOR SHORTHAND ─────────────────────
class User {
  constructor(
    public name: string,
    private password: string,  // private shorthand
    protected id: number
  ) {}

  authenticate(input: string): boolean {
    return input === this.password; // ✅ accessed inside class
  }
}

const user = new User("Alice", "secret123", 1);
user.name;        // ✅ "Alice"
// user.password; // 🔴 Error: private`,
      codeFile:'access-modifiers.ts', codeLang:'typescript',
    },

    {
      id:'accessors', group:'Chapter 11 — Classes', icon:'cls', title:'Class Accessors (get/set)',
      sub:'Getters and setters — computed properties with custom logic.',
      content:`
<div class="prose">
  <p><strong>Accessors</strong> are special methods that look like properties when used. A <strong>getter</strong> (<code>get</code>) runs code when you read a property. A <strong>setter</strong> (<code>set</code>) runs code when you write to a property. They let you add validation and computed values while keeping a clean syntax.</p>
</div>`,
      code:`class Temperature {
  private _celsius: number;

  constructor(celsius: number) {
    this._celsius = celsius;
  }

  // GETTER — called when you READ .celsius
  get celsius(): number {
    return this._celsius;
  }

  // SETTER — called when you WRITE to .celsius
  set celsius(value: number) {
    if (value < -273.15) {
      throw new Error("Temperature below absolute zero!");
    }
    this._celsius = value;
  }

  // Computed getter (no setter — read only!)
  get fahrenheit(): number {
    return this._celsius * 9/5 + 32;
  }

  get kelvin(): number {
    return this._celsius + 273.15;
  }
}

const temp = new Temperature(100);

// Using getters — looks like a property!
console.log(temp.celsius);     // 100
console.log(temp.fahrenheit);  // 212
console.log(temp.kelvin);      // 373.15

// Using setters — looks like property assignment!
temp.celsius = 0;
console.log(temp.fahrenheit); // 32

// Validation in setter:
temp.celsius = -300; // 🔴 Throws: "Temperature below absolute zero!"

// ── PRACTICAL: Validated Name ─────────────────────────────
class Person {
  private _name: string = "";

  get name(): string { return this._name; }

  set name(value: string) {
    if (value.trim().length === 0) throw new Error("Name cannot be empty");
    this._name = value.trim();
  }
}`,
      codeFile:'accessors.ts', codeLang:'typescript',
    },

    {
      id:'static', group:'Chapter 11 — Classes', icon:'cls', title:'Class Static Members',
      sub:'Properties and methods that belong to the class itself, not to instances.',
      content:`
<div class="prose">
  <p><strong>Static members</strong> belong to the class itself, not to individual instances. You access them via the class name, not through an object. They're perfect for utility methods, factory methods, or shared state across all instances.</p>
</div>`,
      code:`class MathUtils {
  // Static properties — shared, not per-instance
  static readonly PI: number = 3.14159265358979;

  // Static method — no 'this.someInstanceProp' here
  static square(n: number): number { return n * n; }
  static cube(n: number): number { return n * n * n; }
  static clamp(value: number, min: number, max: number): number {
    return Math.max(min, Math.min(max, value));
  }
}

// Access via class name — NO instance needed!
console.log(MathUtils.PI);         // 3.14159...
console.log(MathUtils.square(4));  // 16
console.log(MathUtils.cube(3));    // 27
console.log(MathUtils.clamp(15, 0, 10)); // 10

// ── STATIC COUNTER PATTERN ────────────────────────────────
class User {
  static count: number = 0; // Tracks total users created

  id: number;
  name: string;

  constructor(name: string) {
    User.count++;       // Increment the shared counter
    this.id = User.count;
    this.name = name;
  }

  static getCount(): number {
    return User.count;
  }
}

const u1 = new User("Alice");
const u2 = new User("Bob");
const u3 = new User("Carol");

console.log(User.getCount()); // 3 — class-level, not instance!
console.log(u1.id); // 1
console.log(u2.id); // 2`,
      codeFile:'static.ts', codeLang:'typescript',
    },

    {
      id:'implements', group:'Chapter 11 — Classes', icon:'cls', title:'Class Implementing Interface',
      sub:'Enforcing a contract — classes must provide everything an interface demands.',
      content:`
<div class="prose">
  <p>A class can <strong>implement</strong> an interface using the <code>implements</code> keyword. This is a promise: "I guarantee this class will have all the properties and methods the interface requires." TypeScript enforces this at compile time.</p>
</div>`,
      code:`// ── INTERFACE AS A CONTRACT ───────────────────────────────
interface Printable {
  print(): void;
}

interface Serializable {
  serialize(): string;
  deserialize(data: string): void;
}

// Class MUST provide everything the interface requires
class Document implements Printable, Serializable {
  content: string;

  constructor(content: string) {
    this.content = content;
  }

  print(): void {
    console.log("Printing:", this.content);
  }

  serialize(): string {
    return JSON.stringify({ content: this.content });
  }

  deserialize(data: string): void {
    const parsed = JSON.parse(data);
    this.content = parsed.content;
  }
}

const doc = new Document("Hello, TypeScript!");
doc.print();
// "Printing: Hello, TypeScript!"

const json = doc.serialize();
// '{"content":"Hello, TypeScript!"}'

// ── INTERFACE + CLASS HIERARCHY ──────────────────────────
interface Shape {
  area(): number;
  perimeter(): number;
  color: string;
}

class Circle implements Shape {
  color: string;
  constructor(private radius: number, color: string) {
    this.color = color;
  }
  area(): number { return Math.PI * this.radius ** 2; }
  perimeter(): number { return 2 * Math.PI * this.radius; }
}

class Rectangle implements Shape {
  color: string;
  constructor(private w: number, private h: number, color: string) {
    this.color = color;
  }
  area(): number { return this.w * this.h; }
  perimeter(): number { return 2 * (this.w + this.h); }
}`,
      codeFile:'implements.ts', codeLang:'typescript',
    },

    {
      id:'abstract', group:'Chapter 11 — Classes', icon:'cls', title:'Abstract Classes',
      sub:'Base classes with methods that must be implemented by subclasses.',
      content:`
<div class="prose">
  <p>An <strong>abstract class</strong> is a class that cannot be instantiated directly — you can only create instances of its subclasses. It can contain <strong>abstract methods</strong> that have no implementation and must be provided by each subclass, as well as regular methods that are shared by all subclasses.</p>
  <p>Use abstract classes when you want to share code between related classes while also enforcing that each subclass implements specific methods.</p>
</div>`,
      code:`// ── ABSTRACT CLASS ────────────────────────────────────────
abstract class Shape {
  // Regular property — shared by all subclasses
  color: string;

  constructor(color: string) {
    this.color = color;
  }

  // Regular method — shared implementation
  describe(): string {
    return \`A \${this.color} shape with area \${this.area().toFixed(2)}\`;
  }

  // Abstract method — no implementation here!
  // Every subclass MUST implement this:
  abstract area(): number;
  abstract perimeter(): number;
}

// new Shape("red"); // 🔴 Error: Cannot create instance of abstract class

// Concrete subclasses MUST implement abstract methods:
class Circle extends Shape {
  constructor(private radius: number, color: string) {
    super(color); // Call parent constructor
  }

  // MUST implement area:
  area(): number { return Math.PI * this.radius ** 2; }
  perimeter(): number { return 2 * Math.PI * this.radius; }
}

class Rectangle extends Shape {
  constructor(private w: number, private h: number, color: string) {
    super(color);
  }

  area(): number { return this.w * this.h; }
  perimeter(): number { return 2 * (this.w + this.h); }
}

const c = new Circle(5, "blue");
console.log(c.describe()); // "A blue shape with area 78.54"

const r = new Rectangle(4, 6, "red");
console.log(r.describe()); // "A red shape with area 24.00"`,
      codeFile:'abstract.ts', codeLang:'typescript',
    },

    {
      id:'polymorphism', group:'Chapter 11 — Classes', icon:'cls', title:'Polymorphism & Method Override',
      sub:'Subclasses can provide their own implementation of a parent class method.',
      content:`
<div class="prose">
  <p><strong>Polymorphism</strong> means "many forms." In TypeScript (and OOP generally), it means that objects of different types can be treated as the same type through a shared interface. A method can behave differently depending on the actual type of the object.</p>
  <p><strong>Method overriding</strong> is how polymorphism works in classes — a subclass provides its own version of a method defined in the parent class.</p>
</div>`,
      code:`// ── POLYMORPHISM EXAMPLE ──────────────────────────────────
class Animal {
  name: string;
  constructor(name: string) { this.name = name; }

  // Base implementation:
  speak(): string {
    return \`\${this.name} makes a sound.\`;
  }
}

class Dog extends Animal {
  // Override the speak method:
  override speak(): string {  // 'override' keyword (TypeScript 4.3+)
    return \`\${this.name} says: Woof!
\`;
  }

  fetch(): void {
    console.log(\`\${this.name} fetches the ball!\`);
  }
}

class Cat extends Animal {
  override speak(): string {
    return \`\${this.name} says: Meow!
\`;
  }
}

class Duck extends Animal {
  override speak(): string {
    return \`\${this.name} says: Quack!
\`;
  }
}

// ── POLYMORPHIC USAGE ──────────────────────────────────────
// All are treated as Animal — different behavior!
const animals: Animal[] = [
  new Dog("Rex"),
  new Cat("Whiskers"),
  new Duck("Donald"),
  new Animal("Generic")
];

animals.forEach(animal => {
  console.log(animal.speak()); // Each responds differently!
});
// Rex says: Woof!
// Whiskers says: Meow!
// Donald says: Quack!
// Generic makes a sound.`,
      codeFile:'polymorphism.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'The override keyword',body:`<p>TypeScript 4.3+ adds the <code>override</code> keyword. Use it when you override a parent class method. It makes your intent explicit and TypeScript will error if the parent class doesn't actually have that method (preventing typos like <code>spek()</code> instead of <code>speak()</code>).</p>`},
      ]
    },

    {
      id:'class-vs-interface', group:'Chapter 11 — Classes', icon:'cls', title:'Class vs Interface',
      sub:'Understanding when to use a class vs an interface for your data structures.',
      content:`<div class="prose"><p>Classes and interfaces can both describe the shape of objects. But they have very different purposes.</p></div>
<div class="tbl-wrap"><table>
  <tr><th>Feature</th><th>Interface</th><th>Class</th></tr>
  <tr><td>Generates JavaScript</td><td>❌ Erased at compile time</td><td>✅ Creates real JS code</td></tr>
  <tr><td>Can instantiate</td><td>❌ No (no constructor)</td><td>✅ new MyClass()</td></tr>
  <tr><td>Can have methods with logic</td><td>❌ Just signatures</td><td>✅ Full implementations</td></tr>
  <tr><td>Access modifiers</td><td>❌ No</td><td>✅ public/private/protected</td></tr>
  <tr><td>Inheritance</td><td>extends other interfaces</td><td>extends one class</td></tr>
  <tr><td>Can implement</td><td>—</td><td>implements interfaces</td></tr>
  <tr><td>Declaration merging</td><td>✅ Yes</td><td>❌ No</td></tr>
</table></div>`,
      code:`// ── USE INTERFACE when: ───────────────────────────────────
// 1. Describing data shapes (pure structure, no behavior)
interface Address {
  street: string;
  city: string;
  country: string;
}

// 2. Defining contracts for other things to implement
interface Logger {
  log(message: string): void;
  warn(message: string): void;
  error(message: string): void;
}

// 3. Extending third-party types

// ── USE CLASS when: ───────────────────────────────────────
// 1. You need actual instances (with new)
class EmailService implements Logger {
  private logs: string[] = [];

  log(message: string): void { this.logs.push(\`[LOG] \${message}\`); }
  warn(message: string): void { this.logs.push(\`[WARN] \${message}\`); }
  error(message: string): void { this.logs.push(\`[ERROR] \${message}\`); }

  getLogs(): string[] { return this.logs; }
}

const logger = new EmailService();
logger.log("App started");
logger.warn("Low memory");

// 2. When you need private state + methods
class Counter {
  private count = 0;
  increment(): void { this.count++; }
  getCount(): number { return this.count; }
}

// 3. When you need inheritance and shared behavior
class AdminLogger extends EmailService {
  sendAlert(message: string): void {
    this.error(\`ADMIN ALERT: \${message}\`);
    // Could also email someone, etc.
  }
}`,
      codeFile:'class-vs-interface.ts', codeLang:'typescript',
    },

// ═══════════════════════════════════════
// CHAPTER 12 — GENERICS
// ═══════════════════════════════════════
    {
      id:'generics', group:'Chapter 12 — Generics', icon:'gen', title:'Generics',
      sub:'Write code once that works with many types — the most powerful TypeScript feature.',
      content:`
<div class="prose">
  <p><strong>Generics</strong> are TypeScript's way of writing flexible, reusable code that works with multiple types while still being type-safe. Instead of writing the same function for strings, then again for numbers, you write it once with a <strong>type parameter</strong>.</p>
  <p>The syntax uses angle brackets <code>&lt;T&gt;</code>. Think of <code>T</code> as a placeholder that gets replaced with an actual type when the function or class is used.</p>
</div>`,
      code:`// ── THE PROBLEM without generics ──────────────────────────
// We'd need separate functions for each type:
function getFirstNumber(arr: number[]): number { return arr[0]; }
function getFirstString(arr: string[]): string { return arr[0]; }
// This gets tedious fast...

// ── GENERIC SOLUTION ──────────────────────────────────────
// <T> is the type parameter — a placeholder for any type
function getFirst<T>(arr: T[]): T {
  return arr[0];
}

// TypeScript infers T from the argument:
const num = getFirst([1, 2, 3]);         // T = number, returns number
const str = getFirst(["a", "b", "c"]);  // T = string, returns string
const bool = getFirst([true, false]);   // T = boolean, returns boolean

// You can also explicitly pass the type:
const explicit = getFirst<string>(["hello", "world"]);

// ── GENERIC FUNCTIONS ─────────────────────────────────────
// Swap two values — works for any type!
function swap<T>(a: T, b: T): [T, T] {
  return [b, a];
}

const [b, a] = swap(1, 2);           // [2, 1] — numbers
const [y, x] = swap("cat", "dog");   // ["dog", "cat"] — strings

// Wrap any value in an object:
function wrap<T>(value: T): { value: T } {
  return { value };
}

wrap(42);      // { value: 42 }  — type: { value: number }
wrap("hello"); // { value: "hello" } — type: { value: string }

// ── GENERIC CONSTRAINTS ───────────────────────────────────
// Use 'extends' to require T has certain properties:
function getLength<T extends { length: number }>(item: T): number {
  return item.length; // ✅ Safe — we know T has .length
}

getLength("hello");      // 5 — strings have .length
getLength([1, 2, 3]);    // 3 — arrays have .length
getLength(42);           // 🔴 Error — numbers don't have .length`,
      codeFile:'generics.ts', codeLang:'typescript',
    },

    {
      id:'generics-multiple', group:'Chapter 12 — Generics', icon:'gen', title:'Multiple Type Parameters',
      sub:'Using two or more type placeholders in a single generic function.',
      content:`
<div class="prose">
  <p>A generic can have multiple type parameters — just separate them with commas inside the angle brackets: <code>&lt;T, U&gt;</code>. Each letter acts as an independent placeholder for a different type.</p>
</div>`,
      code:`// ── TWO TYPE PARAMETERS ───────────────────────────────────
// T and U are independent type parameters
function pair<T, U>(first: T, second: U): [T, U] {
  return [first, second];
}

pair(1, "hello");      // [1, "hello"] — [number, string]
pair("name", true);    // ["name", true] — [string, boolean]
pair(42, { x: 1 });   // [42, { x: 1 }] — [number, { x: number }]

// ── MAPPING / TRANSFORMING ────────────────────────────────
// Map from one type to another:
function mapValue<T, U>(
  value: T,
  transform: (val: T) => U
): U {
  return transform(value);
}

mapValue(42, n => n.toString());  // "42" — string
mapValue("hello", s => s.length); // 5 — number
mapValue({ x: 1 }, obj => obj.x); // 1 — number

// ── KEY-VALUE PAIR ────────────────────────────────────────
function createEntry<K, V>(key: K, value: V): { key: K; value: V } {
  return { key, value };
}

createEntry("name", "Alice");  // { key: string, value: string }
createEntry(1, { score: 100 }); // { key: number, value: { score: number } }

// ── MERGE OBJECTS ─────────────────────────────────────────
function merge<T extends object, U extends object>(a: T, b: U): T & U {
  return { ...a, ...b };
}

const merged = merge(
  { name: "Alice", age: 30 },
  { email: "alice@example.com", role: "admin" }
);

// merged has: name, age, email, role — all correctly typed!
console.log(merged.name);  // "Alice"
console.log(merged.email); // "alice@example.com"`,
      codeFile:'generics-multiple.ts', codeLang:'typescript',
    },

    {
      id:'generic-classes', group:'Chapter 12 — Generics', icon:'gen', title:'Generic Classes',
      sub:'Classes that work with any type — like a typed storage container.',
      content:`
<div class="prose">
  <p>Classes can also be generic. A generic class is like a template — when you instantiate it, you specify what type it works with, and TypeScript enforces that type throughout all the class's methods.</p>
</div>`,
      code:`// ── GENERIC CLASS ─────────────────────────────────────────
// A box that holds any type of value
class Box<T> {
  private value: T;

  constructor(initialValue: T) {
    this.value = initialValue;
  }

  getValue(): T { return this.value; }
  setValue(newValue: T): void { this.value = newValue; }
  isEmpty(): boolean { return this.value === null || this.value === undefined; }
}

// Create typed boxes:
const numberBox = new Box<number>(42);
numberBox.getValue();        // 42 — typed as number
numberBox.setValue(100);     // ✅
numberBox.setValue("hello"); // 🔴 Error: string → number

const stringBox = new Box<string>("Hello");
stringBox.getValue();         // "Hello" — typed as string

// TypeScript can infer the type:
const boolBox = new Box(true); // Box<boolean>

// ── GENERIC STACK ──────────────────────────────────────────
class Stack<T> {
  private items: T[] = [];

  push(item: T): void {
    this.items.push(item);
  }

  pop(): T | undefined {
    return this.items.pop();
  }

  peek(): T | undefined {
    return this.items[this.items.length - 1];
  }

  get size(): number {
    return this.items.length;
  }
}

const numStack = new Stack<number>();
numStack.push(1);
numStack.push(2);
numStack.push(3);
numStack.pop();   // 3 — typed as number
numStack.peek();  // 2 — typed as number

const strStack = new Stack<string>();
strStack.push("TypeScript");
strStack.push("is");
strStack.push("awesome");
// strStack.push(42); // 🔴 Error: number → string`,
      codeFile:'generic-classes.ts', codeLang:'typescript',
    },

    {
      id:'generic-interfaces', group:'Chapter 12 — Generics', icon:'gen', title:'Generics & Interfaces',
      sub:'Combining generics with interfaces to create flexible, reusable contracts.',
      content:`<div class="prose"><p>Interfaces can also be generic. This is extremely common for defining flexible API contracts, repository patterns, response types, and more.</p></div>`,
      code:`// ── GENERIC INTERFACE ─────────────────────────────────────
interface ApiResponse<T> {
  data: T;
  success: boolean;
  message: string;
  timestamp: Date;
}

// Type the data differently for each endpoint:
type User = { id: number; name: string; email: string };
type Product = { id: number; name: string; price: number };

const userResponse: ApiResponse<User> = {
  data: { id: 1, name: "Alice", email: "alice@example.com" },
  success: true,
  message: "User fetched successfully",
  timestamp: new Date()
};

const productResponse: ApiResponse<Product[]> = {
  data: [
    { id: 101, name: "Laptop", price: 999 },
    { id: 102, name: "Mouse", price: 29 }
  ],
  success: true,
  message: "Products fetched",
  timestamp: new Date()
};

// ── GENERIC REPOSITORY INTERFACE ──────────────────────────
interface Repository<T, ID> {
  findById(id: ID): T | undefined;
  findAll(): T[];
  save(entity: T): T;
  delete(id: ID): boolean;
  count(): number;
}

// Implement for a specific type:
class InMemoryUserRepo implements Repository<User, number> {
  private db: Map<number, User> = new Map();

  findById(id: number) { return this.db.get(id); }
  findAll() { return Array.from(this.db.values()); }
  save(user: User) { this.db.set(user.id, user); return user; }
  delete(id: number) { return this.db.delete(id); }
  count() { return this.db.size; }
}`,
      codeFile:'generic-interfaces.ts', codeLang:'typescript',
    },

    {
      id:'type-assertions', group:'Chapter 12 — Generics', icon:'gen', title:'Type Assertions vs. Type Casting',
      sub:'Telling TypeScript "I know better than you" about a type — and why that is different from runtime casting.',
      content:`
<div class="prose">
  <p>Sometimes TypeScript infers a type that's too broad, and you know the exact type a value is. <strong>Type assertions</strong> let you override TypeScript's inferred type. There are two syntaxes: the <code>as</code> keyword (preferred) and angle-bracket syntax.</p>
  <p>Assertions don't change the value at runtime — they only tell TypeScript which type to use for type checking purposes. This is the critical distinction between an assertion and a <strong>cast</strong>.</p>
</div>`,
      boxes: [
        { type:'ts', title:'Assertion vs. Cast — The Core Difference', body:`<p><strong>Type assertion</strong> (<code>as</code>) is a compile-time instruction to TypeScript only. It produces <strong>zero runtime code</strong> — the JavaScript output is identical. You are telling the type checker "trust me, I know this is an <code>HTMLInputElement</code>," but nothing in the browser changes.<br><br><strong>Type casting</strong> (common in languages like Java or C#) <em>converts</em> a value from one type to another at runtime — e.g., converting an integer to a float. TypeScript has no equivalent of this. <code>as number</code> does not call <code>Number()</code> or <code>parseInt()</code>. If you need to actually convert a value, you must do it explicitly: <code>Number(str)</code>, <code>Boolean(value)</code>, <code>String(n)</code>.</p>` },
        { type:'warn', title:'Watch Out — Assertions Can Lie', body:`<p>Because assertions are erased at runtime, TypeScript cannot verify that your assertion is correct. <code>const n = "hello" as unknown as number</code> compiles fine but <code>n</code> is still the string <code>"hello"</code> at runtime. The double-assertion (<code>as unknown as T</code>) is the most dangerous form — it bypasses all type safety checks. Use it only as a last resort and add a comment explaining why it is safe.</p>` },
        { type:'ts', title:'Safer Alternatives to Assertions', body:`<p>Before reaching for <code>as</code>, consider these safer patterns:<br><code>instanceof</code> check: <code>if (el instanceof HTMLInputElement) el.value</code> — TypeScript <em>narrows</em> the type inside the block based on a real runtime check.<br><code>typeof</code> guard: <code>if (typeof x === 'string') x.toUpperCase()</code> — same idea for primitives.<br><strong>Type predicates</strong>: write a <code>function isPost(x: unknown): x is Post</code> that validates the shape of incoming JSON before asserting its type. This keeps you safe even when the API is untrustworthy.</p>` },
      ],
      code:`// ── TYPE ASSERTION with 'as' ─────────────────────────────
// querySelector returns Element | null — we know it's specifically an input:
const input = document.querySelector("#username") as HTMLInputElement;
input.value = "Alice"; // ✅ HTMLInputElement has .value

// JSON.parse returns 'any' — we know the shape:
type Config = { debug: boolean; version: number };
const config = JSON.parse('{"debug": true, "version": 6}') as Config;
console.log(config.debug);   // ✅ boolean
console.log(config.version); // ✅ number

// ── ANGLE-BRACKET SYNTAX (doesn't work in .tsx files) ─────
const canvas = <HTMLCanvasElement>document.getElementById("myCanvas");
// Use 'as' syntax instead in React/TSX files!

// ── DOUBLE ASSERTION (escape hatch — use carefully!) ──────
// Sometimes TypeScript won't let you assert directly.
// Asserting to 'unknown' first unlocks any further assertion:
const str = "hello" as unknown as number; // ⚠️ Forced!
// This bypasses ALL type safety — use only as a last resort.

// ── CONST ASSERTION ───────────────────────────────────────
// 'as const' makes values deeply readonly and literal:
const colors = ["red", "green", "blue"] as const;
// colors is now: readonly ["red", "green", "blue"]
// NOT string[] — the exact literal values!

const config2 = {
  host: "localhost",
  port: 3000,
  debug: true
} as const;
// config2.port is 3000 (literal), not number
// config2 is completely readonly

// ── WHEN TO USE TYPE ASSERTIONS ───────────────────────────
// ✅ When accessing DOM elements (you know the exact element type)
// ✅ When working with JSON data (you know the structure)
// ✅ When TypeScript's type is too broad but you're certain
// ❌ Don't use to bypass real type errors — fix them instead!`,
      codeFile:'type-assertions.ts', codeLang:'typescript',
    },

    {
      id:'debugging', group:'Chapter 13 — Debugging', icon:'bug', title:'Debugging TypeScript',
      sub:'Source maps, VS Code debugger, and practical strategies for finding and fixing TypeScript bugs.',
      content:`
<div class="prose">
  <p>Debugging TypeScript has two parts: fixing <strong>type errors</strong> (caught by the compiler before running) and debugging <strong>runtime bugs</strong> (in the running code). TypeScript makes both easier.</p>
</div>`,
      code:`// tsconfig.json — Enable source maps for proper debugging:
{
  "compilerOptions": {
    "sourceMap": true,     // Generate .map files (link JS to TS)
    "inlineSources": true, // Embed source in map (better in some setups)
    "outDir": "./dist"
  }
}`,
      codeFile:'tsconfig.json', codeLang:'json',
      extraCodes:[{
        code:`// launch.json — VS Code debugger configuration:
{
  "version": "0.2.0",
  "configurations": [
    {
      "type": "node",
      "request": "launch",
      "name": "Debug TypeScript",
      "runtimeExecutable": "node",
      "runtimeArgs": ["--require", "ts-node/register"],
      "args": ["\${workspaceFolder}/src/index.ts"],

    }
  ]
}`,
        file:'.vscode/launch.json', lang:'json'
      },{
        code:`// ── PRACTICAL DEBUGGING TIPS ─────────────────────────────

// 1. UNDERSTAND TypeScript errors — they tell you EXACTLY what's wrong
//    Error: "Argument of type 'string' is not assignable to
//            parameter of type 'number'"
//    = You passed a string where a number was expected. Fix the call site!

// 2. HOVER in VS Code — see inferred types without annotations
function getData() {
  return { name: "Alice", age: 30 }; // Hover: { name: string; age: number }
}

// 3. console.log with type information:
function debugValue<T>(label: string, value: T): T {
  console.log(\`[DEBUG] \${label}:\`, value, \`(type: \${typeof value})\`);
  return value;
}

const result = debugValue("user count", 42);
// [DEBUG] user count: 42 (type: number)

// 4. TYPE NARROWING for safe runtime checks:
function processInput(input: string | number | null) {
  if (input === null) {
    console.log("No input provided");
    return;
  }
  if (typeof input === "string") {
    console.log("String input:", input.toUpperCase());
  } else {
    console.log("Number input:", input.toFixed(2));
  }
}

// 5. ASSERT function — validate assumptions at runtime:
function assert(condition: boolean, message: string): asserts condition {
  if (!condition) {
    throw new Error(\`Assertion failed: \${message}\`);
  }
}

const user = { name: "Alice", age: 30 };
assert(user.age > 0, "Age must be positive");
console.log(user.name); // TypeScript knows user is defined here`,
        file:'debugging-tips.ts', lang:'typescript'
      }],
      boxes:[
        {type:'tip',title:'💡 Read TypeScript Errors Carefully',body:`<p>TypeScript errors look intimidating at first, but they always tell you exactly what went wrong. The pattern is: <code>"Type 'X' is not assignable to type 'Y'"</code>. Read it as: "You gave me X but I expected Y." Look at the underlined code and fix the type mismatch.</p>`},
        {type:'ts',title:'TypeScript 6 — Better Error Messages',body:`<p>TypeScript 6.0 continues improving error messages to be more human-readable and actionable. Error messages now include more context about <em>why</em> a type doesn't match, not just <em>what</em> doesn't match.</p>`},
      ]
    },

// CHAPTER 14 — ASYNC TYPESCRIPT

    {
      id:'async-typescript', group:'Chapter 14 — Async TypeScript', icon:'code', title:'Async TypeScript',
      sub:'Typing Promises, async functions, and the patterns you need for data fetching and async workflows.',
      content:`
<div class="prose">
  <p>TypeScript adds type safety on top of JavaScript's asynchronous patterns. The key type is <strong>Promise&lt;T&gt;</strong> — a Promise that will resolve to a value of type <code>T</code>. When you <code>await</code> a <code>Promise&lt;T&gt;</code>, TypeScript automatically unwraps it and gives you a <code>T</code>.</p>
  <p>Understanding how to type async functions is essential for working with APIs, file systems, databases, and any operation that takes time.</p>
</div>`,
      code:`// ── PROMISE<T> — the core async type ──────────────────────
// A function that returns a Promise resolving to a number:
function delay(ms: number): Promise<number> {
  return new Promise(resolve => setTimeout(() => resolve(ms), ms));
}

const result: number = await delay(1000);
// TypeScript knows result is a number — Promise<number> is unwrapped


// ── async FUNCTIONS always return Promise<T> ───────────────
// Even if you return a plain value, it's wrapped in a Promise:
async function getUsername(): Promise<string> {
  return "Alice";  // TypeScript wraps this as Promise<string>
}

// Return type is inferred — you can omit it:
async function getUserAge() {  // inferred: Promise<number>
  return 30;
}


// ── TYPING API RESPONSES ──────────────────────────────────
interface User {
  id: number;
  name: string;
  email: string;
}

// The fetch + json() pattern with proper types:
async function fetchUser(id: number): Promise<User> {
  const response = await fetch(\`/api/users/\${id}\`);

  if (!response.ok) {
    throw new Error(\`HTTP error: \${response.status}\`);
  }

  // response.json() returns Promise<any> — cast it to your type:
  const user: User = await response.json();
  return user;
}

// Usage — TypeScript knows user is a User:
const user = await fetchUser(1);
console.log(user.name);   // ✅ TypeScript knows .name is a string
console.log(user.age);    // ❌ Error: 'age' does not exist on type 'User'


// ── Promise<T | null> — for "might not find it" ───────────
async function findUser(id: number): Promise<User | null> {
  try {
    return await fetchUser(id);
  } catch {
    return null;  // caller must handle null
  }
}

const maybeUser = await findUser(99);
if (maybeUser) {
  console.log(maybeUser.name);  // TypeScript narrows to User inside the if
}


// ── MULTIPLE CONCURRENT REQUESTS — Promise.all ────────────
// Fetch multiple things at the same time:
async function fetchDashboard(userId: number) {
  // TypeScript infers the tuple type automatically:
  const [user, posts, notifications] = await Promise.all([
    fetchUser(userId),                          // Promise<User>
    fetch(\`/api/posts?userId=\${userId}\`).then(r => r.json() as Promise<Post[]>),
    fetch(\`/api/notifications\`).then(r => r.json() as Promise<number>),
  ]);
  // user: User, posts: Post[], notifications: number — all correctly typed
  return { user, posts, notifications };
}


// ── async/await vs .then() — same thing, different syntax ─
// These two are equivalent:

// With .then() — chaining style:
fetch('/api/users')
  .then(res => res.json())
  .then((users: User[]) => console.log(users))
  .catch(err => console.error(err));

// With async/await — cleaner for complex logic:
async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    const users: User[] = await res.json();
    console.log(users);
  } catch (err) {
    console.error(err);
  }
}


// ── TYPING setTimeout / setInterval ──────────────────────
// In a browser environment, these return number:
const timerId: number = setTimeout(() => {}, 1000);
clearTimeout(timerId);

// In Node.js, they return NodeJS.Timeout — use ReturnType<> to be safe:
const nodeTimer: ReturnType<typeof setTimeout> = setTimeout(() => {}, 1000);`,
      codeFile:'async-typescript.ts', codeLang:'typescript',
      boxes:[
        {type:'warn',title:'⚠️ response.json() returns Promise<any>',body:`<p><code>response.json()</code> has the return type <code>Promise&lt;any&gt;</code> — TypeScript won't complain about anything you do with it. Always annotate the result: <code>const data: User = await response.json()</code> or cast it: <code>response.json() as Promise&lt;User&gt;</code>. Without this, you lose all type safety on your API response.</p>`},
        {type:'ts',title:'async functions and void',body:`<p>Event handlers that are async return <code>Promise&lt;void&gt;</code>. This is fine for most cases, but be careful — if you pass an async function somewhere that expects <code>() => void</code>, TypeScript may accept it but the caller won't know to await it. Always handle errors inside async event handlers with try/catch, since the caller won't catch rejected Promises.</p>`},
        {type:'tip',title:'💡 Top-level await',body:`<p>In modern TypeScript (with <code>"module": "ESNext"</code> and <code>"moduleDetection": "force"</code> in your tsconfig), you can use <code>await</code> at the top level of a module file — no wrapping <code>async</code> function needed. This is great for scripts and module initialisation code.</p>`},
      ]
    },

    {
      id:'error-handling-ts', group:'Chapter 15 — Error Handling', icon:'bug', title:'Error Handling in TypeScript',
      sub:'try/catch/finally, the unknown catch type, and patterns for writing safe, robust code.',
      content:`
<div class="prose">
  <p>TypeScript 4.0 changed the type of caught errors from <code>any</code> to <code>unknown</code>. This is stricter and safer — it forces you to check what the error actually is before using it. Understanding this is essential for writing robust TypeScript.</p>
  <p>Good error handling in TypeScript means: always narrowing the caught error, creating meaningful error messages, and knowing when to re-throw vs. recover.</p>
</div>`,
      code:`// ── THE BASICS — try / catch / finally ────────────────────
try {
  // Code that might throw:
  const data = JSON.parse(invalidJson);

} catch (err) {
  // TypeScript 4.0+: err is 'unknown', NOT 'Error'
  // You must narrow it before using it:

  if (err instanceof Error) {
    console.log(err.message);   // ✅ safe — we know it's an Error
    console.log(err.stack);     // ✅ also available on Error
  } else {
    console.log(String(err));   // fallback for non-Error throws
  }

} finally {
  // Always runs — success OR failure
  // Use for cleanup: close a file, hide a spinner, release a lock
  console.log("Done");
}


// ── THE 'unknown' CATCH TYPE — why it matters ─────────────
// In JavaScript, ANYTHING can be thrown — not just Error objects:
throw "oops";           // string thrown
throw 42;               // number thrown
throw { code: 500 };    // plain object thrown

// TypeScript's 'unknown' type forces you to check before using:
try {
  riskyOperation();
} catch (err) {
  // ❌ This fails — cannot use 'unknown' directly:
  console.log(err.message);   // Error: 'err' is of type 'unknown'

  // ✅ Narrow first:
  if (err instanceof Error) {
    console.log(err.message);  // Now TypeScript knows it's an Error
  }
}


// ── REUSABLE ERROR MESSAGE HELPER ────────────────────────
// Put this in a utils.ts file and import it everywhere:
function getErrorMessage(error: unknown): string {
  if (error instanceof Error) return error.message;
  if (typeof error === "string") return error;
  return "An unexpected error occurred";
}

// Usage — always gives you a safe string:
try {
  await fetchData();
} catch (err) {
  const message = getErrorMessage(err);
  showToast(message);  // user-friendly, never crashes
}


// ── CUSTOM ERROR CLASSES ──────────────────────────────────
// Extend Error to create domain-specific error types:
class ApiError extends Error {
  constructor(
    public readonly status: number,
    message: string
  ) {
    super(message);
    this.name = "ApiError";
  }
}

class ValidationError extends Error {
  constructor(
    public readonly field: string,
    message: string
  ) {
    super(message);
    this.name = "ValidationError";
  }
}

// Throw your custom errors:
async function fetchUser(id: number) {
  const res = await fetch(\`/api/users/\${id}\`);
  if (res.status === 404) throw new ApiError(404, "User not found");
  if (!res.ok) throw new ApiError(res.status, "Request failed");
  return res.json();
}

// Catch and distinguish between error types:
try {
  const user = await fetchUser(99);
} catch (err) {
  if (err instanceof ApiError) {
    console.log(\`API error \${err.status}: \${err.message}\`);
    // err.status is typed as number — full type safety
  } else if (err instanceof ValidationError) {
    console.log(\`Validation failed on field: \${err.field}\`);
  } else {
    console.log("Unknown error:", getErrorMessage(err));
  }
}


// ── WHEN TO RE-THROW vs. RECOVER ─────────────────────────
async function loadConfig(): Promise<Config> {
  try {
    const res = await fetch('/api/config');
    return await res.json();

  } catch (err) {
    if (err instanceof ApiError && err.status === 404) {
      // We can recover — return a default config:
      return defaultConfig;
    }
    // Can't recover from other errors — re-throw so the caller handles it:
    throw err;
  }
}


// ── RESULT PATTERN — avoid try/catch at call sites ────────
// An alternative style: return { data, error } instead of throwing
type Result<T> =
  | { success: true;  data: T }
  | { success: false; error: string }

async function safeParseJson(text: string): Promise<Result<unknown>> {
  try {
    return { success: true, data: JSON.parse(text) };
  } catch (err) {
    return { success: false, error: getErrorMessage(err) };
  }
}

// Caller doesn't need try/catch — just checks result.success:
const result = await safeParseJson(rawText);
if (result.success) {
  console.log(result.data);
} else {
  console.log("Parse failed:", result.error);
}`,
      codeFile:'error-handling.ts', codeLang:'typescript',
      boxes:[
        {type:'ts',title:'useUnknownInCatchVariables',body:`<p>In TypeScript 6 with <code>strict: true</code>, caught variables are typed as <code>unknown</code> by default. This is controlled by the <code>useUnknownInCatchVariables</code> option (enabled automatically under strict). In older code you may see <code>catch (err: any)</code> — that's the old workaround. Prefer proper narrowing with <code>instanceof</code> instead.</p>`},
        {type:'warn',title:'⚠️ Never use catch (err: Error)',body:`<p>You cannot annotate a catch binding with a type other than <code>any</code> or <code>unknown</code> — TypeScript will error if you write <code>catch (err: Error)</code>. Use <code>instanceof</code> narrowing inside the catch block instead: <code>if (err instanceof Error) { ... }</code>.</p>`},
        {type:'tip',title:'💡 Log errors, show messages',body:`<p>A good rule of thumb: <strong>log</strong> the full technical error (with stack trace) to the console or monitoring service, but <strong>display</strong> only a clean, human-readable message to the user. <code>console.error(err)</code> for developers, <code>getErrorMessage(err)</code> for users.</p>`},
      ]
    },
