<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React 19 + TypeScript 6 — Interactive Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: #080c14;
      --surf: #0d1525;
      --surf2: #131d30;
      --surf3: #1a2840;
      --border: rgba(45,80,150,0.22);
      --border2: rgba(45,80,150,0.12);
      --text: #dce8ff;
      --text2: #7a9ac8;
      --text3: #3f5578;
      --accent: #3b9eff;
      --accent-dim: rgba(59,158,255,0.12);
      --ts: #5b8dee;
      --ts-bg: rgba(91,141,238,0.09);
      --ts-border: rgba(91,141,238,0.28);
      --rx: #22d3ee;
      --rx-bg: rgba(34,211,238,0.08);
      --rx-border: rgba(34,211,238,0.25);
      --r19: #a78bfa;
      --r19-bg: rgba(167,139,250,0.08);
      --r19-border: rgba(167,139,250,0.25);
      --warn: #f59e0b;
      --warn-bg: rgba(245,158,11,0.08);
      --warn-border: rgba(245,158,11,0.25);
      --ok: #34d399;
      --ok-bg: rgba(52,211,153,0.08);
      --ok-border: rgba(52,211,153,0.25);
      --red: #f87171;
      --sidebar-w: 272px;
      --hdr: 58px;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; overflow: hidden; height: 100vh; }

    /* ── HEADER ── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; height: var(--hdr);
      background: rgba(8,12,20,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); display: flex;
      align-items: center; justify-content: space-between; padding: 0 20px; z-index: 200;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .logo span { color: var(--accent); }
    .pill {
      display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 5px;
      font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
    }
    .pill-r { background: var(--rx-bg); color: var(--rx); border: 1px solid var(--rx-border); }
    .pill-t { background: var(--ts-bg); color: var(--ts); border: 1px solid var(--ts-border); }
    .pill-v { background: var(--r19-bg); color: var(--r19); border: 1px solid var(--r19-border); }
    .hdr-search { display: flex; align-items: center; gap: 8px; background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; width: 260px; }
    .hdr-search svg { flex-shrink: 0; color: var(--text3); }
    .hdr-search input { background: none; border: none; color: var(--text); font-family: 'Geist', sans-serif; font-size: 13px; width: 100%; outline: none; }
    .hdr-search input::placeholder { color: var(--text3); }
    .hdr-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text2); }
    .prog-bar { width: 100px; height: 3px; background: var(--surf3); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--r19)); border-radius: 2px; transition: width .4s ease; }

    /* ── LAYOUT ── */
    .layout { display: flex; margin-top: var(--hdr); height: calc(100vh - var(--hdr)); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      height: 100%; overflow-y: auto;
      background: var(--surf); border-right: 1px solid var(--border);
      padding: 12px 0 80px;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }
    .sg-label {
      padding: 14px 18px 5px; font-size: 9.5px; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase; color: var(--text3);
    }
    .si {
      display: flex; align-items: center; gap: 9px; padding: 7px 18px;
      cursor: pointer; font-size: 12.5px; color: var(--text2);
      border-left: 2px solid transparent; transition: all .12s ease;
      user-select: none;
    }
    .si:hover { background: var(--surf2); color: var(--text); }
    .si.active { background: rgba(59,158,255,0.07); color: var(--accent); border-left-color: var(--accent); }
    .si .sn { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); }
    .si svg { flex-shrink: 0; opacity: .7; }
    .si.active svg { opacity: 1; }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 44px 56px 80px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 3px; }

    /* ── SECTION ── */
    .sec { display: none; animation: fadeUp .28s ease; }
    .sec.vis { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .sec-crumb { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
    .sec-crumb span { color: var(--text2); }
    .sec-title {
      font-size: 30px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.15;
      margin-bottom: 14px;
      background: linear-gradient(130deg, var(--text) 40%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sec-sub { font-size: 15px; color: var(--text2); line-height: 1.7; max-width: 660px; margin-bottom: 28px; }
    .divider { border: none; border-top: 1px solid var(--border2); margin: 28px 0; }

    /* ── PROSE ── */
    .prose { font-size: 14px; color: var(--text2); line-height: 1.8; }
    .prose p { margin-bottom: 14px; }
    .prose p:last-child { margin-bottom: 0; }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose code { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; background: var(--surf3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--accent); }
    .prose ul { padding-left: 0; list-style: none; }
    .prose ul li { padding: 4px 0 4px 18px; position: relative; font-size: 14px; color: var(--text2); }
    .prose ul li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

    /* ── CODE BLOCK ── */
    .cb { background: #0a0f1a; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 20px 0; }
    .cb-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: var(--surf2); border-bottom: 1px solid var(--border); }
    .cb-fname { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text2); display: flex; align-items: center; gap: 7px; }
    .cb-lang { font-size: 10px; color: var(--text3); background: var(--surf3); padding: 2px 7px; border-radius: 4px; }
    .cb-copy { font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border); padding: 2px 9px; border-radius: 4px; cursor: pointer; font-family: 'Geist', sans-serif; transition: all .15s; }
    .cb-copy:hover { color: var(--text); border-color: var(--text3); }
    .cb pre[class*="language-"] { margin: 0; padding: 18px 20px; background: transparent !important; font-family: 'JetBrains Mono', monospace !important; font-size: 13px !important; line-height: 1.72; overflow-x: auto; }

    /* ── INFO BOXES ── */
    .box { border-radius: var(--radius); padding: 18px 22px; margin: 18px 0; border-left: 3px solid; }
    .box-hdr { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 12px; margin-bottom: 10px; letter-spacing: 0.3px; font-family: 'Geist', sans-serif; }
    .box-hdr svg { flex-shrink: 0; }
    .box-body { font-size: 13.5px; line-height: 1.72; color: var(--text2); }
    .box-body code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 3px; }
    .box-body p { margin-bottom: 7px; } .box-body p:last-child { margin-bottom: 0; }
    .box-body ul { list-style: none; padding: 0; } .box-body ul li { padding: 3px 0 3px 15px; position: relative; }
    .box-body ul li::before { content: '›'; position: absolute; left: 0; font-weight: 700; }
    .box-ts { background: var(--ts-bg); border-color: var(--ts); } .box-ts .box-hdr { color: var(--ts); } .box-ts .box-body ul li::before { color: var(--ts); }
    .box-rx { background: var(--rx-bg); border-color: var(--rx); } .box-rx .box-hdr { color: var(--rx); } .box-rx .box-body ul li::before { color: var(--rx); }
    .box-r19 { background: var(--r19-bg); border-color: var(--r19); } .box-r19 .box-hdr { color: var(--r19); } .box-r19 .box-body ul li::before { color: var(--r19); }
    .box-warn { background: var(--warn-bg); border-color: var(--warn); } .box-warn .box-hdr { color: var(--warn); } .box-warn .box-body ul li::before { color: var(--warn); }
    .box-ok { background: var(--ok-bg); border-color: var(--ok); } .box-ok .box-hdr { color: var(--ok); } .box-ok .box-body ul li::before { color: var(--ok); }

    /* ── GRID ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin: 18px 0; }
    .card { background: var(--surf); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .card-t { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .card-b { font-size: 12.5px; color: var(--text2); line-height: 1.6; }
    .card-b code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; background: var(--surf3); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; margin: 18px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surf2); color: var(--text); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--border); }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border2); color: var(--text2); vertical-align: top; }
    td code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; background: var(--surf2); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
    tr:last-child td { border-bottom: none; }

    /* ── NAV BTNS ── */
    .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 44px; padding-top: 28px; border-top: 1px solid var(--border2); }
    .nav-btn { display: flex; align-items: center; gap: 7px; padding: 9px 18px; background: var(--surf); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; font-size: 13px; font-family: 'Geist', sans-serif; transition: all .18s; max-width: 48%; overflow: hidden; }
    .nav-btn .nav-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-btn:hover { background: var(--surf2); color: var(--text); border-color: var(--accent); }
    .nav-btn.next { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; margin-left: auto; }
    .nav-btn.next:hover { background: #5aadff; }

    /* ── FILE TREE ── */
    .filetree { background: #0a0f1a; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.9; margin: 18px 0; }
    .ft-dir { color: var(--text2); } .ft-file-ts { color: var(--ts); } .ft-file-tsx { color: var(--rx); }
    .ft-file-json { color: var(--warn); } .ft-file-css { color: var(--r19); } .ft-file-other { color: var(--text3); }
    .ft-indent { display: inline-block; width: 18px; }

    /* ── COMPARE ── */
    .cmp { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0; }
    .cmp-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 7px 10px; border-radius: 6px 6px 0 0; }
    .lbl-bad { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); border-bottom: none; }
    .lbl-good { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-border); border-bottom: none; }
    .lbl-before { background: var(--surf2); color: var(--text2); }
    .lbl-after { background: var(--accent-dim); color: var(--accent); }

    /* ── MOCKUP BROWSER ── */
    .mock { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 18px 0; }
    .mock-bar { background: var(--surf2); padding: 9px 14px; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid var(--border); }
    .mock-dot { width: 9px; height: 9px; border-radius: 50%; }
    .mock-dot:nth-child(1) { background: #ff5f57; } .mock-dot:nth-child(2) { background: #febc2e; } .mock-dot:nth-child(3) { background: #28c840; }
    .mock-url { margin-left: 10px; font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    .mock-body { padding: 20px; }

    /* ── SEARCH OVERLAY ── */
    .srch-drop { position: fixed; width: 320px; background: var(--surf); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,.6); z-index: 300; display: none; overflow: hidden; }
    .srch-drop.vis { display: block; }
    .srch-item { padding: 9px 15px; cursor: pointer; font-size: 12.5px; color: var(--text2); border-bottom: 1px solid var(--border2); transition: background .12s; }
    .srch-item:last-child { border-bottom: none; }
    .srch-item:hover { background: var(--surf2); color: var(--text); }
    .srch-item.sel  { background: var(--surf2); color: var(--text); }
    .srch-empty { padding: 14px 15px; font-size: 12.5px; color: var(--text3); text-align: center; }
    .home-link-btn { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .15s; white-space: nowrap; }
    .home-link-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    /* Mobile search row */
    .hdr-search-row { display: none; width: 100%; padding: 0 14px 10px; box-sizing: border-box; }
    .hdr-search-row .hdr-search { width: 100%; }
    .srch-item .sg { font-size: 9.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }

    /* ── WELCOME ── */
    .welcome { max-width: 700px; padding: 30px 0; }
    .wl-title { font-size: 36px; font-weight: 900; letter-spacing: -1px; line-height: 1.1; margin-bottom: 16px; }
    .wl-title .a { color: var(--text); } .wl-title .b { background: linear-gradient(130deg, var(--accent), var(--r19)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .wl-sub { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; max-width: 580px; }
    .wl-pills { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .wl-pill { padding: 7px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600; }

    /* ── PROPS FLOW DIAGRAM ── */
    .flow-diagram { margin: 18px 0; }
    .flow-node { background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); display: inline-block; }
    .flow-arrow { color: var(--text3); font-size: 18px; line-height: 1; display: block; text-align: center; margin: 3px 0; }
    .flow-row { display: flex; gap: 12px; align-items: center; margin: 4px 0; }

    /* ── TAG ── */
    .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; vertical-align: middle; margin-left: 6px; }
    .tag-new { background: var(--r19-bg); color: var(--r19); border: 1px solid var(--r19-border); }
    .tag-dep { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
    .tag-ts6 { background: var(--ts-bg); color: var(--ts); border: 1px solid var(--ts-border); }

    /* ── PRISM OVERRIDES ── */
    code[class*="language-"], pre[class*="language-"] { font-family: 'JetBrains Mono', monospace !important; }
    .token.keyword { color: #c792ea; } .token.string { color: #c3e88d; } .token.comment { color: #546e7a; font-style: italic; }
    .token.number { color: #f78c6c; } .token.boolean { color: #f78c6c; } .token.function { color: #82aaff; }
    .token.class-name { color: #ffcb6b; } .token.operator { color: #89ddff; } .token.punctuation { color: #89ddff; }
    .token.tag { color: #f07178; } .token.attr-name { color: #c3e88d; } .token.attr-value { color: #c3e88d; }
    .token.builtin { color: #ffcb6b; } .token.type-annotations { color: #ffcb6b; }

    /* ── STEPS ── */
    .steps { margin: 18px 0; }
    .step { display: flex; gap: 14px; margin-bottom: 20px; }
    .step-n { width: 26px; height: 26px; min-width: 26px; background: var(--surf2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); margin-top: 1px; font-family: 'Geist', sans-serif; }
    .step-c { flex: 1; }
    .step-t { font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .step-b { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .step-b code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; background: var(--surf3); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

    /* ── HAMBURGER BUTTON (mobile only) ── */
    .menu-btn {
      display: none; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surf); cursor: pointer; color: var(--text2);
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    .menu-btn:hover { background: var(--surf2); color: var(--text); }
    .menu-btn svg { pointer-events: none; }

    /* ── SIDEBAR OVERLAY (mobile backdrop) ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
      backdrop-filter: blur(2px); z-index: 149;
    }
    .sidebar-overlay.vis { display: block; }

    @media (max-width: 800px) {
      /* taller header to accommodate 2-row layout */
      :root { --hdr: 100px; }
      .hdr { flex-wrap: wrap; align-items: center; height: auto; min-height: 58px; padding: 0 14px 0; }

      /* hamburger visible */
      .menu-btn { display: flex; }

      /* header row 1: pills hidden, home link stays visible */
      .pill-v { display: none; }
      .pill-r { display: none; }
      .pill-t { display: none; }
      .hdr-search-wrap { display: none; }
      .hdr-left { flex: 1; min-width: 0; flex-shrink: 1; padding: 10px 0; }
      .logo { white-space: nowrap; }
      .hdr-right { padding: 10px 0; gap: 8px; flex-shrink: 0; }

      /* header row 2: full-width search bar */
      .hdr-search { display: none; }
      .hdr-search-row .hdr-search { display: flex; }
      /*#progTxt { display: none; }*/
      .hdr-search-row { display: flex; }

      /* sidebar: off-screen left, slides in */
      .sidebar {
        position: fixed; top: var(--hdr); left: 0; bottom: 0;
        height: calc(100vh - var(--hdr));
        z-index: 150; transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
        overflow-y: auto;
        padding-bottom: 80px;
      }
      .sidebar.open { transform: translateX(0); }

      /* content takes full width */
      .content { padding: 28px 18px 80px; }

      /* collapse grids to 1 col */
      .g2, .g3, .cmp { grid-template-columns: 1fr; }

      /* nav buttons stack full-width */
      .nav-row { flex-direction: column; gap: 8px; }
      .nav-btn { max-width: 100%; width: 100%; justify-content: center; font-size: 12px; padding: 10px 14px; }
      .nav-btn.next { margin-left: 0; }
    }
    /* ── FLOATING NAV (AssistiveTouch style) ─────────────────────────── */
    .fab-wrap{position:fixed;bottom:88px;right:16px;z-index:9999;touch-action:none;user-select:none;}
    .fab-btn{width:46px;height:46px;border-radius:50%;background:#1a2236;border:1.5px solid rgba(255,255,255,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06);transition:background .2s,transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;outline:none;padding:0;animation:fab-pulse 3.5s ease-in-out infinite;}

      content: `<div class="prose">
    <p>Beginners often struggle not with React itself, but with the modern JavaScript (ES6+) written inside it. Before touching React APIs, you need to recognize these seven patterns cold. Each has its own page below with focused examples.</p>
    <ul style="margin-top:12px;display:grid;gap:6px;padding-left:20px">
      <li><strong>1. Destructuring — Arrays</strong> — how <code>useState</code> returns values</li>
      <li><strong>2. Destructuring — Objects</strong> — how props are received in components</li>
      <li><strong>3. Spread Operator</strong> — how immutable state updates are written</li>
      <li><strong>4. Arrow Functions</strong> — the syntax used in every event handler</li>
      <li><strong>5. Template Literals</strong> — dynamic strings and className building</li>
      <li><strong>6. Short-circuit &amp;&amp; and Ternary</strong> — conditional rendering in JSX</li>
      <li><strong>7. Optional Chaining &amp; Nullish Coalescing</strong> — safe access to nested data</li>
    </ul>
  </div>`,
      boxes: [
        { type:'rx', title:'React Concept — Why These Patterns Are Unavoidable', body:`<p>React's core APIs are built around these patterns. <code>useState</code> returns an array you destructure. Props are objects you destructure in the function signature. Immutable state updates use spread. JSX conditionals use <code>&&</code> and ternaries. Optional chaining handles API data that may be <code>undefined</code>. Knowing these removes the "magic" from React code.</p>` },
        { type:'ts', title:'TypeScript Concept — Types Flow Automatically Through Destructuring', body:`<p>When you destructure a typed object or array, TypeScript infers the type of each variable automatically. <code>const { name, age } = user</code> gives <code>name: string</code> and <code>age: number</code> — no extra annotations needed. The types come from the interface declared on <code>user</code>.</p>` },
        { type:'ok', title:'Best Practice — Learn Syntax Separately from React Concepts', body:`<p>When something in React code looks unfamiliar, pause and ask: "Is this a React concept or a JavaScript pattern?" Most confusion comes from encountering ES6 syntax for the first time inside a React tutorial. Isolate the two. This section handles the JS side.</p>` },

// 6. Conditional rendering — && and ternary
{isLoggedIn && <Dashboard />}
{count > 0 ? <p>{count} items</p> : <p>Empty</p>}

      content: `<div class="prose">
    <p><strong>Array destructuring</strong> lets you extract values from an array and assign them to named variables in a single line. The variable names are yours to choose — position is what matters, not the name.</p>
    <p>This is not a React concept. It is standard JavaScript. React's <code>useState</code> hook returns a two-element array and relies on you destructuring it.</p>
  </div>`,
      boxes: [

      content: `<div class="prose">

    {
      id: 'es6-async-await', group: 'Getting Started', icon: 'code', title: 'ES6 — Promises & async/await',
      sub: 'How JavaScript handles operations that take time — the foundation for data fetching in React.',
      content: `<div class="prose">
    <p><strong>Asynchronous code</strong> is code that takes time to complete — loading data from an API, reading a file, waiting for a timer. JavaScript is single-threaded, so instead of blocking everything while waiting, it uses <strong>Promises</strong> to represent "a value that will be ready later."</p>
    <p><strong>async/await</strong> is modern syntax that makes Promises look and read like normal synchronous code. You will use this pattern constantly in React — especially inside <code>useEffect</code> and event handlers that fetch data.</p>
  </div>`,
      boxes: [
        { type:'rx', title:'React Concept — Where You Use async/await', body:`<p>In React you use async/await in two main places: (1) inside <code>useEffect</code> to load data when a component mounts, and (2) inside event handlers (like form submissions) that call an API. You cannot make the <code>useEffect</code> callback itself <code>async</code> — instead, define an <code>async</code> function inside it and call it immediately.</p>` },
        { type:'ts', title:'TypeScript Concept — Typing Async Functions', body:`<p>An <code>async</code> function always returns a <code>Promise&lt;T&gt;</code> — where <code>T</code> is whatever the function returns. If you write <code>async function getUser(): Promise&lt;User&gt;</code>, TypeScript knows the resolved value will be a <code>User</code>. When you <code>await</code> that function, TypeScript automatically unwraps the Promise and gives you a <code>User</code>.</p>` },
        { type:'warn', title:'Watch Out — await Only Works Inside async Functions', body:`<p>You can only use <code>await</code> inside a function marked <code>async</code>. Trying to use it at the top level (outside a function) or in a regular (non-async) function causes a syntax error. The pattern in <code>useEffect</code> — defining an inner async function then calling it — exists precisely because of this rule.</p>` },
        { type:'ok', title:'Best Practice — Always Handle Errors with try/catch', body:`<p>Network requests can fail — bad connection, server error, wrong URL. Always wrap <code>await</code> calls in a <code>try/catch</code> block so errors don't crash the app silently. The <code>finally</code> block (optional) runs whether the request succeeded or failed — useful for clearing a loading spinner.</p>` },
      ],
      code: `// ── WHAT IS A PROMISE? ───────────────────────────────────────
// A Promise is an object representing a value that isn't ready yet.
// It has three possible states:
//   - pending   → the operation is in progress
//   - fulfilled → the operation succeeded (has a value)
//   - rejected  → the operation failed (has an error)

// The fetch() function returns a Promise:
const promise = fetch('https://api.example.com/users')
// promise is PENDING immediately — the data isn't here yet


// ── async/await — CLEAN PROMISE SYNTAX ──────────────────────
// 'async' marks a function as asynchronous — it always returns a Promise
// 'await' pauses execution inside the function until the Promise resolves

async function getUser(id: number) {
  const response = await fetch(\`https://api.example.com/users/\${id}\`)
  //               ^^^^^ pauses here until fetch completes
  const data = await response.json()
  //           ^^^^^ pauses here until JSON parsing completes
  return data   // returned value is automatically wrapped in a Promise
}

// Calling an async function — you must await it or use .then():
const user = await getUser(1)   // works inside another async function


// ── ALWAYS USE try/catch ──────────────────────────────────────
async function fetchUserSafely(id: number): Promise<User | null> {
  try {
    const response = await fetch(\`/api/users/\${id}\`)

    if (!response.ok) {
      // HTTP errors (404, 500, etc.) do NOT automatically throw!
      // You must check response.ok yourself
      throw new Error(\`HTTP error: \${response.status}\`)
    }

    const user: User = await response.json()
    return user

  } catch (error) {
    // Catches: network failure, JSON parse error, or our thrown error
    console.error('Failed to fetch user:', error)
    return null

  } finally {
    // Runs whether fetch succeeded or failed — good for cleanup
    console.log('Fetch attempt complete')
  }
}


// ── IN REACT — useEffect Pattern ─────────────────────────────
import { useState, useEffect } from 'react'

interface User { id: number; name: string; email: string }

function UserProfile({ userId }: { userId: number }) {
  const [user, setUser] = useState<User | null>(null)
  const [loading, setLoading] = useState(true)
  const [error, setError] = useState<string | null>(null)

  useEffect(() => {
    // ❌ Cannot do: useEffect(async () => { ... }) — don't make the callback async
    // ✅ Correct: define an async function inside, then call it

    async function loadUser() {
      setLoading(true)
      setError(null)

      try {
        const response = await fetch(\`/api/users/\${userId}\`)
        if (!response.ok) throw new Error('User not found')
        const data: User = await response.json()
        setUser(data)
      } catch (err) {
        setError(err instanceof Error ? err.message : 'Something went wrong')
      } finally {
        setLoading(false)
      }
    }

    loadUser()   // ← call the async function immediately
  }, [userId])   // ← re-run when userId changes

  if (loading) return <p>Loading...</p>
  if (error)   return <p>Error: {error}</p>
  if (!user)   return null

  return (
    <div>
      <h2>{user.name}</h2>
      <p>{user.email}</p>
    </div>
  )
}


// ── ASYNC EVENT HANDLER ───────────────────────────────────────
function SaveButton({ data }: { data: object }) {
  const [saving, setSaving] = useState(false)

  const handleSave = async () => {
    setSaving(true)
    try {
      const response = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      })
      if (!response.ok) throw new Error('Save failed')
      alert('Saved!')
    } catch (err) {
      alert('Could not save. Please try again.')
    } finally {
      setSaving(false)
    }
  }

  return (
    <button onClick={handleSave} disabled={saving}>
      {saving ? 'Saving...' : 'Save'}
    </button>
  )
}`, codeFile:'src/es6-async-await.tsx', codeLang:'tsx'

      content: `<div class="prose"><p>The <code>key</code> prop is how React tracks items across renders. When the list updates (items added, removed, reordered), React uses keys to determine the minimal set of DOM changes needed. Without keys, React must re-render the entire list — or worse, mix up component state.</p><p>Keys must be <strong>stable</strong>, <strong>unique among siblings</strong>, and <strong>not change between renders</strong>. Database IDs are ideal.</p></div>`,

      sub: 'useActionState and useFormStatus eliminate loading/error boilerplate from form handling.',
      content: `<div class="prose"><p>Before React 19, every form required the same tedious boilerplate: <code>e.preventDefault()</code>, a <code>useState</code> for loading, another for errors, and a manual <code>fetch</code> call. React 19's <strong>Actions</strong> system replaces all of that with two hooks: <code>useActionState</code> and <code>useFormStatus</code>.</p><p>The mental model: instead of attaching an <code>onSubmit</code> handler, you pass an <strong>async function</strong> directly to the <code>&lt;form action&gt;</code> prop. React manages the pending state, error state, and re-renders automatically.</p></div>`,

        { type:'r19', title:'React 19 — useActionState', body:`<p><code>useActionState(actionFn, initialState)</code> returns <code>[state, submitAction, isPending]</code>. The <code>actionFn</code> receives the previous state as its first argument and <code>FormData</code> as its second. Whatever you return from the action becomes the new <code>state</code>. <code>isPending</code> is <code>true</code> while the async function is running.</p>` },

      code: `import { useActionState } from 'react'

  message: string
  errors: { name?: string; email?: string }

// ── THE ACTION — async function, runs on submit ───────────────
// Receives (previousState, formData) — returns the next state.
// React 19 calls this automatically when the form submits.
async function signupAction(
  _prev: FormState,
  formData: FormData
): Promise<FormState> {
  const name  = formData.get('name')  as string
  const email = formData.get('email') as string

  // Client-side validation
  const errors: FormState['errors'] = {}
  if (!name.trim())         errors.name  = 'Name is required'
  if (!email.includes('@')) errors.email = 'Enter a valid email'
  if (Object.keys(errors).length) return { success: false, message: '', errors }

  // Simulate a network call (replace with real fetch)
  await new Promise(resolve => setTimeout(resolve, 1200))

  if (email === 'taken@example.com') {

  }
  return { success: true, message: \`Welcome, \${name}!\`, errors: {} }

  const [state, action, pending] = useActionState(signupAction, initialState)

      sub: 'Two fundamental rules that govern how React hooks must be called.',
      content: `<div class="prose"><p>React hooks have two hard rules that exist because React relies on call order to associate hooks with component instances. Violating them causes subtle, hard-to-debug bugs or immediate errors.</p></div>`,
      boxes: [
        { type:'rx', title:'Why These Rules Exist', body:`<p>React doesn't use magic naming or metadata. It tracks hooks by their <strong>call order</strong> — first hook call = slot 1, second = slot 2, etc. If a hook is conditionally called, the order changes between renders, and React loses track of which state belongs to which hook. The rules preserve call order consistency.</p>` },
        { type:'ok', title:'ESLint Plugin', body:`<p>Install <code>eslint-plugin-react-hooks</code> — it catches rules-of-hooks violations at development time, before you even run the code. Run: <code>npm install -D eslint-plugin-react-hooks</code>. Vite's React template usually includes this.</p>` },
      ],
      code: `// RULE 1: Only call hooks at the TOP LEVEL of a component/hook
// Never inside conditions, loops, or nested functions

// ❌ VIOLATION — conditional hook
function BadComponent({ showA }: { showA: boolean }) {
  if (showA) {
    const [a, setA] = useState(0)  // ❌ breaks hook order
  }
  const [b, setB] = useState('')   // this was hook #1 last render!
}

// ❌ VIOLATION — hook inside loop
function BadList({ count }: { count: number }) {
  for (let i = 0; i < count; i++) {
    const [item, setItem] = useState(null)  // ❌ different count = different hooks
  }
}

// ❌ VIOLATION — hook inside nested function
function BadNested() {
  function inner() {
    const [x, setX] = useState(0)  // ❌ not top-level of component
  }
}

// ✅ CORRECT — all hooks at top level, always called
function GoodComponent({ showA }: { showA: boolean }) {
  const [a, setA] = useState(0)    // ✅ hook #1, always
  const [b, setB] = useState('')   // ✅ hook #2, always

  // Use the condition INSIDE the render, not around the hook
  const displayA = showA ? a : null
  return <div>{displayA}</div>
}

// RULE 2: Only call hooks from React function components OR custom hooks
// ❌ Regular function
function regularHelper() {
  const [x] = useState(0)   // ❌ Not a component or hook
}

// ✅ React component
function MyComponent() {
  const [x, setX] = useState(0)  // ✅
  return <div>{x}</div>
}

// ✅ Custom hook (name starts with "use")

  const increment = () => setCount(prev => prev + 1)   // ✅

  const addItem = (text: string) => {

      content: `<div class="prose"><p>React detects state changes by reference equality. If you mutate an object and pass the same reference to the setter, React sees no change and skips the re-render. Always spread the old object and override the changed fields.</p></div>`,
      boxes: [
        { type:'warn', title:'Gotcha — Mutation Does Not Trigger Re-render', body:`<p><code>user.name = 'Bob'; setUser(user)</code> passes the <em>same object reference</em> to the setter. React compares <code>prevUser === user</code> → <code>true</code> → no re-render. Always use spread: <code>setUser({ ...user, name: 'Bob' })</code>.</p>` },
        { type:'ts', title:'TypeScript Concept — Partial<T>', body:`<p><code>Partial&lt;User&gt;</code> makes all fields of <code>User</code> optional. It's useful for update functions: <code>function updateUser(changes: Partial&lt;User&gt;)</code> accepts any subset of user fields. Combine with spread to merge changes.</p>` },
      ],
      code: `import { useState } from 'react'

interface Address { street: string; city: string; zip: string }
interface UserProfile {
  name: string
  email: string
  age: number
  address: Address
}

function UserForm() {
  const [user, setUser] = useState<UserProfile>({
    name: 'Alice',
    email: 'alice@example.com',
    age: 28,
    address: { street: '123 Main St', city: 'Singapore', zip: '018956' }
  })

  // ✅ Spread to create NEW object
  const updateName = (name: string) =>
    setUser(prev => ({ ...prev, name }))

  // ✅ Generic updater for any field
  const updateField = (field: keyof UserProfile, value: unknown) =>
    setUser(prev => ({ ...prev, [field]: value }))

  // ✅ Nested objects — spread at EVERY level!
  const updateCity = (city: string) =>
    setUser(prev => ({
      ...prev,
      address: { ...prev.address, city }  // ← spread address too!
    }))

  // ❌ WRONG — mutates in place, no re-render
  // const badUpdate = () => {
  //   user.name = 'Bob'   // mutates!
  //   setUser(user)       // same reference — React ignores it
  // }

  // ✅ Reset to initial (create fresh object, not a mutation)
  const resetUser = () =>
    setUser({ name: '', email: '', age: 0, address: { street: '', city: '', zip: '' } })

  return (
    <form>
      <input value={user.name} onChange={e => updateName(e.target.value)} />
      <input value={user.email} onChange={e => updateField('email', e.target.value)} />
      <input type="number" value={user.age} onChange={e => updateField('age', +e.target.value)} />
      <input value={user.address.city} onChange={e => updateCity(e.target.value)} />
      <button type="button" onClick={resetUser}>Reset</button>
      <pre>{JSON.stringify(user, null, 2)}</pre>
    </form>
  )
}`, codeFile:'src/UserForm.tsx', codeLang:'tsx'

      sub: 'Arrays in state must be replaced, not mutated. Use non-mutating array methods.',
      content: `<div class="prose"><p>Like objects, arrays in React state must be treated as immutable. Avoid array mutation methods like <code>.push()</code>, <code>.pop()</code>, <code>.splice()</code>, <code>.sort()</code>, and <code>.reverse()</code>. Use their immutable equivalents instead.</p></div>`,

      ],
      code: `import { useState } from 'react'

interface Task {
  id: string
  text: string
  done: boolean
  priority: 'low' | 'mid' | 'high'
}

function TaskManager() {
  const [tasks, setTasks] = useState<Task[]>([])

  // ── ADD ───────────────────────────────────────────────────
  const addTask = (text: string) =>
    setTasks(prev => [
      ...prev,
      { id: crypto.randomUUID(), text, done: false, priority: 'mid' }
    ])

  // ── REMOVE ───────────────────────────────────────────────
  const removeTask = (id: string) =>
    setTasks(prev => prev.filter(t => t.id !== id))

  // ── UPDATE a field ────────────────────────────────────────
  const toggleTask = (id: string) =>
    setTasks(prev =>
      prev.map(t => t.id === id ? { ...t, done: !t.done } : t)
    )

  const setPriority = (id: string, priority: Task['priority']) =>
    setTasks(prev =>
      prev.map(t => t.id === id ? { ...t, priority } : t)
    )

  // ── SORT (non-mutating) ────────────────────────────────────
  const sortByPriority = () =>
    setTasks(prev => {
      const order = { high: 0, mid: 1, low: 2 }
      return [...prev].sort((a, b) => order[a.priority] - order[b.priority])
    })
  // ✅ [...prev] creates a copy BEFORE sorting — sort() mutates!

  // ── INSERT at specific position ───────────────────────────
  const insertAt = (index: number, task: Task) =>
    setTasks(prev => [
      ...prev.slice(0, index),
      task,
      ...prev.slice(index)
    ])

  // ── MOVE (reorder) ────────────────────────────────────────
  const moveUp = (index: number) => {
    if (index === 0) return
    setTasks(prev => {
      const next = [...prev]
      ;[next[index - 1], next[index]] = [next[index], next[index - 1]]
      return next
    })
  }

  return (
    <div>
      <button onClick={() => addTask('New task')}>Add Task</button>
      <button onClick={sortByPriority}>Sort by Priority</button>
      <ul>
        {tasks.map((task, i) => (
          <li key={task.id} style={{ textDecoration: task.done ? 'line-through' : 'none' }}>
            <input type="checkbox" checked={task.done} onChange={() => toggleTask(task.id)} />
            {task.text}
            <button onClick={() => moveUp(i)}>↑</button>
            <button onClick={() => removeTask(task.id)}>×</button>
          </li>
        ))}
      </ul>
    </div>
  )
}`, codeFile:'src/TaskManager.tsx', codeLang:'tsx'

      id: 'component-lifecycle', group: 'State', icon: 'state', title: 'Component Lifecycle',
      sub: 'Every component is born, lives, and dies — understanding this mental model unlocks everything else.',
      content: `<div class="prose"><p>Even though React no longer uses class-based lifecycle methods, the underlying concept is identical: every component goes through three phases. Understanding these phases is the key to knowing <em>when</em> your code runs — which becomes critical once you start fetching data and using <code>useEffect</code>.</p><p>You don't need to memorise old APIs like <code>componentDidMount</code> or <code>componentWillUnmount</code>. The concepts map directly to how modern React hooks behave.</p></div>`,
      boxes: [
        { type:'rx', title:'Phase 1 — Mounting (Entering the Screen)', body:`<p>A component <strong>mounts</strong> the first time React adds it to the DOM. This happens when it appears in JSX for the first time — e.g., when a user navigates to a page, or when a condition flips from <code>false</code> to <code>true</code>. On mount: the component function runs for the first time, all <code>useState</code> values are initialised, the DOM nodes are created, and any <code>useEffect</code> callbacks with <code>[]</code> dependency arrays fire once.</p>` },
        { type:'rx', title:'Phase 2 — Updating (Changing on Screen)', body:`<p>A component <strong>updates</strong> every time its state or props change. React calls the component function again with the new values and compares the output to the previous render (this is called <strong>reconciliation</strong>). Only the actual DOM nodes that changed get updated — not the whole page. <code>useEffect</code> callbacks with dependencies in their array re-run whenever those dependencies change.</p>` },
        { type:'rx', title:'Phase 3 — Unmounting (Leaving the Screen)', body:`<p>A component <strong>unmounts</strong> when React removes it from the DOM — for example, when a condition flips to <code>false</code>, or when the user navigates away. On unmount: all state is destroyed (it does not persist), and any cleanup function returned from <code>useEffect</code> is called. This is where you cancel timers, close connections, and remove event listeners.</p>` },
        { type:'warn', title:'Watch Out — State Does Not Survive Unmounting', body:`<p>When a component unmounts, its state is completely discarded. If the same component mounts again later, it starts fresh with its initial state values. If you need state to survive unmounting, you must "lift it up" to an ancestor that stays mounted, or use a global state solution.</p>` },
        { type:'ts', title:'TypeScript Concept — The Strict Return Type of Cleanup', body:`<p>A <code>useEffect</code> callback must return either <code>void</code> or a cleanup function (<code>() => void</code>). TypeScript will error if you accidentally return a Promise (by marking the callback <code>async</code>). Instead, define an async function <em>inside</em> the effect and call it: <code>useEffect(() => { async function load() {...} load() }, [])</code>.</p>` },
      ],
      code: `import { useState, useEffect } from 'react'

// ── VISUAL LIFECYCLE DEMO ──────────────────────────────────────
// This component logs to the console at every lifecycle phase.
// Open DevTools and watch as you mount / update / unmount it.

function LifecycleDemo({ label }: { label: string }) {
  const [count, setCount] = useState(0)

  // ── MOUNT & UNMOUNT ────────────────────────────────────────
  useEffect(() => {
    console.log(\`[MOUNT] \${label} entered the screen\`)

    return () => {
      // This cleanup function runs when the component UNMOUNTS
      console.log(\`[UNMOUNT] \${label} left the screen\`)
    }
  }, [])   // empty [] = "run once after mount, cleanup on unmount"

  // ── UPDATE ────────────────────────────────────────────────
  useEffect(() => {
    // This runs after EVERY render where 'count' changed
    console.log(\`[UPDATE] count changed to \${count}\`)
  }, [count])   // [count] = "re-run when count changes"

  return (
    <div>
      <p>Count: {count}</p>
      <button onClick={() => setCount(c => c + 1)}>Increment</button>
    </div>
  )
}

// ── PARENT — controls mounting and unmounting ─────────────────
function App() {
  const [show, setShow] = useState(true)

  return (
    <div>
      <button onClick={() => setShow(s => !s)}>
        {show ? 'Unmount' : 'Mount'} LifecycleDemo
      </button>

      {/* When show flips to false, LifecycleDemo UNMOUNTS (state lost).
          When show flips to true,  LifecycleDemo MOUNTS (fresh state). */}
      {show && <LifecycleDemo label="Demo" />}
    </div>
  )
}

// ── LIFECYCLE SUMMARY ─────────────────────────────────────────
//
//  MOUNT          →  Component function runs (useState initialised)
//                    useEffect(() => {...}, []) fires once
//
//  UPDATE         →  Component function runs again with new values
//                    useEffect(() => {...}, [dep]) fires if dep changed
//
//  UNMOUNT        →  All state is destroyed
//                    Cleanup functions from useEffect are called
//
// The hooks that correspond to each phase:
//
//  useEffect(() => { ... },  [])      ← fires on MOUNT only
//  useEffect(() => { ... },  [dep])   ← fires on MOUNT + when dep changes
//  useEffect(() => { ... })           ← fires on MOUNT + EVERY update
//  useEffect(() => { return () => cleanup() }, [])  ← UNMOUNT only`, codeFile:'src/LifecycleDemo.tsx', codeLang:'tsx'

      sub: 'Lift state to the closest common ancestor — then pass it down as props.',
      content: `<div class="prose"><p>When two components need to share state, move the state up to their closest common ancestor. The ancestor owns the state and passes it down via props, along with setter callbacks. This pattern is called <strong>lifting state up</strong>.</p></div>`,

        { type:'rx', title:'React Concept — Controlled vs Uncontrolled', body:`<p>A <strong>controlled component</strong> gets its value from props (parent owns the state). An <strong>uncontrolled component</strong> manages its own state internally (uses a <code>ref</code> or <code>defaultValue</code>). For shared state, always use controlled components — the parent drives the UI.</p>` },
        { type:'ts', title:'TypeScript Concept — Discriminated Unions for Unit Conversion', body:`<p>The <code>'C' | 'F'</code> union type ensures only valid temperature units can be passed as props. TypeScript catches <code>&lt;Input unit="K" /&gt;</code> at compile time.</p>` },

      code: `import { useState } from 'react'

// ── Shared Input Component (controlled) ───────────────────────
interface TempInputProps {
  unit: 'C' | 'F'
  value: number
  onChange: (celsius: number) => void  // always emits Celsius to parent
}

function TempInput({ unit, value, onChange }: TempInputProps) {
  return (
    <label style={{ display: 'block', marginBottom: 12 }}>
      Temperature (°{unit}):
      <input
        type="number"
        value={Math.round(value * 10) / 10}
        onChange={e => {
          const input = parseFloat(e.target.value)
          // Convert to Celsius before emitting
          const celsius = unit === 'F' ? (input - 32) * 5/9 : input
          onChange(celsius)
        }}
        style={{ marginLeft: 8 }}
      />
    </label>
  )
}

// ── Parent — owns the single source of truth ──────────────────
function TemperatureConverter() {
  const [celsius, setCelsius] = useState(20)

  // Derived values (no extra state!)
  const fahrenheit = celsius * 9/5 + 32
  const kelvin = celsius + 273.15
  const description = celsius < 0 ? 'Freezing' : celsius < 20 ? 'Cold' : celsius < 30 ? 'Comfortable' : 'Hot'

  return (
    <div>
      <h2>Temperature Converter</h2>

      <TempInput unit="C" value={celsius} onChange={setCelsius} />
      <TempInput unit="F" value={fahrenheit} onChange={setCelsius} />

      <div>
        <p>Celsius: {celsius.toFixed(1)}°C</p>
        <p>Fahrenheit: {fahrenheit.toFixed(1)}°F</p>
        <p>Kelvin: {kelvin.toFixed(1)}K</p>
        <p>Feels: {description}</p>
      </div>
    </div>
  )
}`, codeFile:'src/TemperatureConverter.tsx', codeLang:'tsx'

      id: 'useeffect', group: 'State', icon: 'state', title: 'Side Effects & useEffect',
      sub: 'Fetch data, set up subscriptions, and synchronise with the outside world.',
      content: `<div class="prose"><p>A <strong>side effect</strong> is anything a component does that reaches outside of itself — fetching data from an API, setting a page title, starting a timer, or subscribing to a WebSocket. React's render function should be pure (same input → same output), so side effects live in <code>useEffect</code>.</p><p>Think of <code>useEffect</code> as saying: <em>"After React has updated the DOM, run this code."</em> The <strong>dependency array</strong> is how you control when it re-runs.</p></div>`,
      boxes: [
        { type:'rx', title:'React Concept — The Dependency Array', body:`<p>The second argument to <code>useEffect</code> controls how often the effect runs:<br><code>useEffect(fn)</code> — runs after <em>every</em> render (usually a mistake).<br><code>useEffect(fn, [])</code> — runs once, after the first render (mount).<br><code>useEffect(fn, [id])</code> — runs on mount <em>and</em> whenever <code>id</code> changes.<br>The rule: put every reactive value the effect uses inside the array. If you omit a dependency, the effect will use a stale value and produce bugs.</p>` },
        { type:'rx', title:'React Concept — Cleanup Functions', body:`<p>If your effect starts something ongoing (a timer, a subscription, an event listener), you must stop it when the component unmounts — otherwise it leaks memory. Return a function from the effect to do this. React calls it before running the effect again and when the component unmounts: <code>useEffect(() => { const id = setInterval(...); return () => clearInterval(id) }, [])</code>.</p>` },
        { type:'warn', title:'Watch Out — Never Make the Callback async Directly', body:`<p><code>useEffect(async () => {...})</code> is an error. An async function always returns a Promise, but <code>useEffect</code> expects either <code>void</code> or a cleanup function — not a Promise. The fix: define an async function <em>inside</em> the callback and call it immediately: <code>useEffect(() => { async function load() { ... } load() }, [])</code>.</p>` },
        { type:'warn', title:'Watch Out — Race Conditions in Data Fetching', body:`<p>If a user changes a filter quickly, multiple fetches can be in flight simultaneously and arrive out of order. Fix this with an <strong>ignore flag</strong> in the cleanup: if the component re-runs the effect before the previous fetch finishes, the cleanup sets <code>ignore = true</code> so the old response is discarded.</p>` },
        { type:'ts', title:'TypeScript Concept — Typing Fetched Data', body:`<p>Define an interface for the data shape and initialise state as <code>useState&lt;Post | null&gt;(null)</code>. TypeScript will then enforce that you handle the <code>null</code> case before accessing properties — preventing the classic "cannot read property of null" runtime crash.</p>` },
      ],
      code: `import { useState, useEffect } from 'react'

// ── TYPES ─────────────────────────────────────────────────────
interface Post {
  id: number
  title: string
  body: string
}


// ── EXAMPLE 1: Fetch once on mount ───────────────────────────
function PostList() {
  const [posts,   setPosts]   = useState<Post[]>([])
  const [loading, setLoading] = useState(true)
  const [error,   setError]   = useState<string | null>(null)

  useEffect(() => {
    // ✅ Correct pattern: async function defined inside the effect
    async function fetchPosts() {
      try {
        const res  = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=5')
        if (!res.ok) throw new Error('Network response was not ok')
        const data = await res.json() as Post[]
        setPosts(data)
      } catch (err) {
        setError(err instanceof Error ? err.message : 'Unknown error')
      } finally {
        setLoading(false)
      }
    }

    fetchPosts()
  }, [])  // ← [] means "run once after mount"

  if (loading) return <p>Loading…</p>
  if (error)   return <p>Error: {error}</p>
  return <ul>{posts.map(p => <li key={p.id}>{p.title}</li>)}</ul>
}


// ── EXAMPLE 2: Re-fetch when an id prop changes ───────────────
function PostDetail({ postId }: { postId: number }) {
  const [post,    setPost]    = useState<Post | null>(null)
  const [loading, setLoading] = useState(true)

  useEffect(() => {
    let ignore = false  // ← ignore flag prevents race conditions

    async function fetchPost() {
      setLoading(true)
      const res  = await fetch(\`https://jsonplaceholder.typicode.com/posts/\${postId}\`)
      const data = await res.json() as Post

      if (!ignore) {       // ← only update state if this fetch is still current
        setPost(data)
        setLoading(false)
      }
    }

    fetchPost()

    // Cleanup: if postId changes before fetch finishes, ignore the old result
    return () => { ignore = true }
  }, [postId])  // ← re-run whenever postId changes

  if (loading || !post) return <p>Loading post {postId}…</p>
  return <article><h2>{post.title}</h2><p>{post.body}</p></article>
}


// ── EXAMPLE 3: Timer with cleanup ─────────────────────────────
function Stopwatch() {
  const [seconds, setSeconds] = useState(0)
  const [running, setRunning] = useState(false)

  useEffect(() => {
    if (!running) return   // don't start a timer if paused

    const id = setInterval(() => {
      setSeconds(s => s + 1)
    }, 1000)

    // Cleanup: clear the interval when running→false or on unmount
    return () => clearInterval(id)
  }, [running])  // re-run when running changes

  return (
    <div>
      <p>{seconds}s</p>
      <button onClick={() => setRunning(r => !r)}>
        {running ? 'Pause' : 'Start'}
      </button>
      <button onClick={() => { setRunning(false); setSeconds(0) }}>Reset</button>
    </div>
  )
}


// ── EXAMPLE 4: Sync with an external system (page title) ──────
function PageWithTitle({ title }: { title: string }) {
  useEffect(() => {
    const previous = document.title
    document.title = title
    return () => { document.title = previous }  // restore on unmount
  }, [title])

  return <h1>{title}</h1>
}`, codeFile:'src/useEffect-examples.tsx', codeLang:'tsx'

    {
      id: 'data-fetching', group: 'State', icon: 'state', title: 'Data Fetching',
      sub: 'How to load real data from an API — the most common task in any React application.',
      content: `<div class="prose">
    <p>Most React apps need to load data from a server. The standard approach uses the browser's built-in <code>fetch()</code> function inside <code>useEffect</code>, combined with <code>useState</code> to track the data, loading state, and errors.</p>
    <p>This <strong>"three-state pattern"</strong> (loading / data / error) is the foundation of data fetching in React. It appears in virtually every real-world component that communicates with an API.</p>
  </div>`,
      boxes: [
        { type:'rx', title:'React Concept — The Three Loading States', body:`<p>Every data-fetching component needs three pieces of state: <code>data</code> (the result once loaded), <code>loading</code> (a boolean to show a spinner), and <code>error</code> (a message if something went wrong). Render different UI for each state — never assume the data is already there.</p>` },
        { type:'ts', title:'TypeScript Concept — Typing API Responses', body:`<p>Define an <code>interface</code> matching the shape of the JSON your API returns, then use it as the type: <code>const data: Post[] = await response.json()</code>. This gives you full autocomplete on the response. If the API shape ever changes, TypeScript flags every affected line.</p>` },
        { type:'warn', title:'Watch Out — HTTP Errors Do NOT Throw', body:`<p><code>fetch()</code> only rejects its Promise on a network failure (no internet, DNS error). A 404 or 500 response still <em>resolves</em> — <code>response.ok</code> is just <code>false</code>. Always check <code>if (!response.ok) throw new Error(...)</code> so HTTP errors are caught by your catch block.</p>` },
        { type:'r19', title:'React 19 — use() for Data Fetching', body:`<p>React 19 introduces the <code>use()</code> hook, which can unwrap Promises directly in the render function: <code>const data = use(fetchPromise)</code>. It works with Suspense boundaries to show a fallback while loading. The <code>useEffect</code> pattern remains the standard for imperative or event-triggered fetches.</p>` },
      ],
      code: `import { useState, useEffect } from 'react'

// ── STEP 1: Define the shape of your API response ─────────────
interface Post {
  id: number
  title: string
  body: string
  userId: number
}

// ── STEP 2: The three-state data fetching pattern ─────────────
function PostList() {
  const [posts, setPosts]     = useState<Post[]>([])
  const [loading, setLoading] = useState(true)
  const [error, setError]     = useState<string | null>(null)

  useEffect(() => {
    async function fetchPosts() {
      try {
        const response = await fetch('https://jsonplaceholder.typicode.com/posts')

        if (!response.ok) {
          throw new Error(\`Server error: \${response.status}\`)
        }

        const data: Post[] = await response.json()
        setPosts(data)

      } catch (err) {
        setError(err instanceof Error ? err.message : 'Failed to load posts')
      } finally {
        setLoading(false)
      }
    }

    fetchPosts()
  }, [])  // empty array = run once on mount only

  if (loading) return <p>Loading posts...</p>
  if (error)   return <p className="error">Error: {error}</p>

  return (
    <ul>
      {posts.map(post => (
        <li key={post.id}>
          <strong>{post.title}</strong>
          <p>{post.body}</p>
        </li>
      ))}
    </ul>
  )
}

// ── STEP 3: Re-fetch when a prop changes ──────────────────────
function UserProfile({ userId }: { userId: number }) {
  const [user, setUser]       = useState<{ name: string; email: string } | null>(null)
  const [loading, setLoading] = useState(true)
  const [error, setError]     = useState<string | null>(null)

  useEffect(() => {
    setLoading(true)
    setUser(null)
    setError(null)

    async function fetchUser() {
      try {
        const res = await fetch(\`https://jsonplaceholder.typicode.com/users/\${userId}\`)
        if (!res.ok) throw new Error('User not found')
        setUser(await res.json())
      } catch (err) {
        setError(err instanceof Error ? err.message : 'Failed to load')
      } finally {
        setLoading(false)
      }
    }

    fetchUser()
  }, [userId])  // re-runs every time userId prop changes

  if (loading) return <p>Loading user {userId}...</p>
  if (error)   return <p>Error: {error}</p>
  if (!user)   return null

  return <div><h2>{user.name}</h2><p>{user.email}</p></div>
}

// ── STEP 4: POST request — sending data to an API ─────────────
interface NewPost { title: string; body: string; userId: number }

async function createPost(post: NewPost): Promise<Post> {
  const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(post),
  })
  if (!response.ok) throw new Error(\`Failed to create: \${response.status}\`)

      code: `import { useState, Component, ReactNode } from 'react'

// ── try/catch/finally PATTERN ─────────────────────────────────

async function loadData(): Promise<string> {
  try {
    const res = await fetch('/api/data')
    if (!res.ok) throw new Error(\`HTTP \${res.status}\`)
    const data = await res.json()
    return data.value

  } catch (err) {
    // TypeScript: err is 'unknown' — narrow before using
    const message = err instanceof Error ? err.message : String(err)
    console.error('Load failed:', message)
    throw err  // re-throw so the caller can handle it

  } finally {
    // Always runs whether try succeeded or catch ran
    // Use to hide spinners, release locks, clean up resources
    console.log('Load attempt complete')
  }
}

// ── REUSABLE ERROR MESSAGE HELPER ─────────────────────────────
// Put this in a utils file and import everywhere
function getErrorMessage(error: unknown): string {
  if (error instanceof Error) return error.message
  if (typeof error === 'string') return error
  return 'An unexpected error occurred'
}

// ── IN A REACT COMPONENT ──────────────────────────────────────
function DataWidget() {
  const [data, setData]       = useState<string | null>(null)
  const [loading, setLoading] = useState(false)
  const [error, setError]     = useState<string | null>(null)

  const load = async () => {
    setLoading(true)
    setError(null)
    try {
      const result = await loadData()
      setData(result)
    } catch (err) {
      setError(getErrorMessage(err))
    } finally {
      setLoading(false)
    }
  }

  return (
    <div>
      <button onClick={load} disabled={loading}>
        {loading ? 'Loading...' : 'Load Data'}
      </button>
      {error && (
        <div className="error-box">
          <p>⚠️ {error}</p>
          <button onClick={load}>Try again</button>
        </div>
      )}
      {data && <p>Result: {data}</p>}
    </div>
  )
}

// ── ERROR BOUNDARY — catches render crashes ───────────────────
interface ErrorBoundaryProps {
  children: ReactNode
  fallback?: ReactNode
}
interface ErrorBoundaryState { hasError: boolean; message: string }

class ErrorBoundary extends Component<ErrorBoundaryProps, ErrorBoundaryState> {
  state: ErrorBoundaryState = { hasError: false, message: '' }

  static getDerivedStateFromError(error: Error): ErrorBoundaryState {
    return { hasError: true, message: error.message }
  }

  componentDidCatch(error: Error, info: React.ErrorInfo) {
    console.error('Render error caught:', error, info.componentStack)
    // Send to error monitoring service (Sentry, Datadog, etc.)
  }

  render() {
    if (this.state.hasError) {
      return this.props.fallback ?? (
        <div className="error-boundary">
          <h2>Something went wrong.</h2>
          <p>{this.state.message}</p>
          <button onClick={() => this.setState({ hasError: false, message: '' })}>
            Try again
          </button>
        </div>
      )
    }
    return this.props.children
  }
}

        <UserDashboard />
      </ErrorBoundary>

        <Sidebar />
      </ErrorBoundary>
    </div>
  )
}`, codeFile:'src/error-handling.tsx', codeLang:'tsx'

// 1. Define State type
interface CounterState {
  count: number
  step: number
  history: number[]
}

// 2. Define Action types (discriminated union)
type CounterAction =
  | { type: 'increment' }
  | { type: 'decrement' }
  | { type: 'reset' }
  | { type: 'setStep'; payload: number }

// 3. Write the pure reducer function
function counterReducer(state: CounterState, action: CounterAction): CounterState {
  switch (action.type) {
    case 'increment':
      return {
        ...state,
        count: state.count + state.step,
        history: [...state.history, state.count + state.step],

    case 'decrement':
      return {
        ...state,
        count: state.count - state.step,
        history: [...state.history, state.count - state.step],

    case 'reset':
      return { count: 0, step: state.step, history: [] }
    case 'setStep':

    default:

  }

      code: `import { useReducer } from 'react'

type State = { count: number; total: number }

// Exhaustive action union
type Action =
  | { type: 'increment'; amount: number }
  | { type: 'decrement'; amount: number }
  | { type: 'reset' }

function reducer(state: State, action: Action): State {
  switch (action.type) {
    case 'increment':
      return { count: state.count + action.amount, total: state.total + 1 }
    case 'decrement':
      return { count: state.count - action.amount, total: state.total + 1 }
    case 'reset':
      return { count: 0, total: state.total }  // keep total, reset count
    default: {
      // ✅ Exhaustive check — TypeScript will warn if a case is missed
      const _exhaustive: never = action
      return state
    }
  }
}

interface Todo { id: string; text: string; done: boolean; priority: 1 | 2 | 3 }
type Filter = 'all' | 'active' | 'done'

interface TodoState {
  todos: Todo[]
  filter: Filter
  editingId: string | null
}

type TodoAction =
  | { type: 'ADD'; text: string }
  | { type: 'TOGGLE'; id: string }
  | { type: 'DELETE'; id: string }
  | { type: 'EDIT_START'; id: string }
  | { type: 'EDIT_SAVE'; id: string; text: string }
  | { type: 'SET_PRIORITY'; id: string; priority: Todo['priority'] }
  | { type: 'SET_FILTER'; filter: Filter }
  | { type: 'CLEAR_DONE' }

function todoReducer(state: TodoState, action: TodoAction): TodoState {
  switch (action.type) {
    case 'ADD':
      return {
        ...state,
        todos: [...state.todos, {
          id: crypto.randomUUID(), text: action.text, done: false, priority: 2
        }]
      }
    case 'TOGGLE':
      return {
        ...state,
        todos: state.todos.map(t => t.id === action.id ? { ...t, done: !t.done } : t)
      }
    case 'DELETE':
      return { ...state, todos: state.todos.filter(t => t.id !== action.id) }
    case 'EDIT_START':
      return { ...state, editingId: action.id }
    case 'EDIT_SAVE':
      return {
        ...state,
        editingId: null,
        todos: state.todos.map(t => t.id === action.id ? { ...t, text: action.text } : t)
      }
    case 'SET_PRIORITY':
      return {
        ...state,
        todos: state.todos.map(t => t.id === action.id ? { ...t, priority: action.priority } : t)
      }
    case 'SET_FILTER': return { ...state, filter: action.filter }
    case 'CLEAR_DONE': return { ...state, todos: state.todos.filter(t => !t.done) }
    default: return state
  }
}

const initialState: TodoState = { todos: [], filter: 'all', editingId: null }

function TodoApp() {
  const [state, dispatch] = useReducer(todoReducer, initialState)
  const [inputText, setInputText] = useState('')

  const filtered = state.todos.filter(t => {
    if (state.filter === 'active') return !t.done
    if (state.filter === 'done') return t.done

        <button onClick={handleAdd}>Add</button>

            style={{ fontWeight: state.filter === f ? 700 : 400 }}>{f}</button>
        ))}
        <button onClick={() => dispatch({ type: 'CLEAR_DONE' })}>Clear done</button>
      </div>
      <ul>

              onChange={() => dispatch({ type: 'TOGGLE', id: todo.id })} />
            <span style={{ textDecoration: todo.done ? 'line-through' : 'none' }}>

            </select>

          </li>
        ))}
      </ul>
    </div>
  )
}`, codeFile:'src/TodoApp.tsx', codeLang:'tsx'

      code: `import { useReducer } from 'react'

interface FormState {
  name: string
  email: string
  submitCount: number
}

type FormAction =
  | { type: 'UPDATE'; field: keyof Pick<FormState, 'name' | 'email'>; value: string }
  | { type: 'SUBMIT' }
  | { type: 'RESET'; initialName: string }

function formReducer(state: FormState, action: FormAction): FormState {
  switch (action.type) {
    case 'UPDATE':
      return { ...state, [action.field]: action.value }
    case 'SUBMIT':
      return { ...state, submitCount: state.submitCount + 1 }
    case 'RESET':

  }

      code: `import { useReducer, useCallback, Dispatch } from 'react'

// Build useState from useReducer
function useStateFromReducer<T>(
  initialValue: T | (() => T)
): [T, Dispatch<T | ((prev: T) => T)>] {
  // Reducer that handles both direct values and updater functions
  const reducer = (prev: T, action: T | ((prev: T) => T)): T => {
    return typeof action === 'function'
      ? (action as (prev: T) => T)(prev)
      : action
  }

  // Support lazy initialization (function as initialValue)
  const [state, dispatch] = useReducer(
    reducer,
    initialValue,
    typeof initialValue === 'function'
      ? initialValue as () => T
      : undefined
  )

  return [state, dispatch]
}

// ── Usage: drop-in replacement for useState ───────────────────
function Counter() {
  const [count, setCount] = useStateFromReducer(0)

  return (
    <div>
      <p>Count: {count}</p>
      {/* Direct value */}
      <button onClick={() => setCount(0)}>Reset to 0</button>
      {/* Updater function */}
      <button onClick={() => setCount(prev => prev + 1)}>+1</button>
      <button onClick={() => setCount(prev => prev * 2)}>×2</button>
    </div>
  )
}

      code: `// ── useState — best for simple scalars ───────────────────────

// ── useReducer — best for complex state machines ──────────────
type AuthState =
  | { status: 'idle' }
  | { status: 'loading' }
  | { status: 'success'; user: User }
  | { status: 'error'; message: string }

  | { type: 'LOGIN_SUCCESS'; user: User }
  | { type: 'LOGIN_ERROR'; message: string }
  | { type: 'LOGOUT' }

    case 'LOGIN_SUCCESS': return { status: 'success', user: action.user }
    case 'LOGIN_ERROR':   return { status: 'error', message: action.message }
    case 'LOGOUT':        return { status: 'idle' }

// ── Types ──────────────────────────────────────────────────────
interface User { id: string; name: string; email: string; role: 'admin' | 'user' }

type AuthState =
  | { status: 'unauthenticated' }
  | { status: 'loading' }
  | { status: 'authenticated'; user: User }

type AuthAction =
  | { type: 'LOGIN_START' }
  | { type: 'LOGIN_SUCCESS'; user: User }
  | { type: 'LOGOUT' }

// ── Reducer ────────────────────────────────────────────────────
function authReducer(state: AuthState, action: AuthAction): AuthState {
  switch (action.type) {
    case 'LOGIN_START':   return { status: 'loading' }
    case 'LOGIN_SUCCESS': return { status: 'authenticated', user: action.user }
    case 'LOGOUT':        return { status: 'unauthenticated' }
    default: return state
  }
}

// ── Two contexts: state (changes) + dispatch (never changes) ──
const AuthStateContext   = createContext<AuthState | null>(null)
const AuthDispatchContext = createContext<Dispatch<AuthAction> | null>(null)

// ── Provider ───────────────────────────────────────────────────
export function AuthProvider({ children }: { children: React.ReactNode }) {
  const [state, dispatch] = useReducer(authReducer, { status: 'unauthenticated' })

  return (
    // React 19 syntax: Context used directly as Provider
    <AuthStateContext value={state}>
      <AuthDispatchContext value={dispatch}>
        {children}
      </AuthDispatchContext>
    </AuthStateContext>
  )
}

  const ctx = useContext(AuthStateContext)
  if (!ctx) throw new Error('useAuthState must be inside AuthProvider')

}

export function useAuthDispatch(): Dispatch<AuthAction> {
  const ctx = useContext(AuthDispatchContext)
  if (!ctx) throw new Error('useAuthDispatch must be inside AuthProvider')
  return ctx
}

      code: `import { useRef, useState } from 'react'

// ── Use Case 1: Mutable value that should NOT cause re-renders ──
function StopWatch() {
  const [displayTime, setDisplayTime] = useState(0)
  const intervalRef = useRef<ReturnType<typeof setInterval> | null>(null)
  const startTimeRef = useRef<number>(0)

  const start = () => {
    if (intervalRef.current) return   // already running
    startTimeRef.current = Date.now() - displayTime
    intervalRef.current = setInterval(() => {
      setDisplayTime(Date.now() - startTimeRef.current)
    }, 10)
  }

  const stop = () => {
    if (intervalRef.current) {
      clearInterval(intervalRef.current)
      intervalRef.current = null
    }
  }

  const reset = () => {
    stop()
    setDisplayTime(0)
  }

  return (
    <div>
      <p>{(displayTime / 1000).toFixed(2)}s</p>
      <button onClick={start}>Start</button>
      <button onClick={stop}>Stop</button>
      <button onClick={reset}>Reset</button>
    </div>
  )
}


// ── Use Case 2: Track previous state value ─────────────────────
function usePrevious<T>(value: T): T | undefined {
  const prevRef = useRef<T | undefined>(undefined)

  // After each render, store current value for next render
  useEffect(() => {
    prevRef.current = value
  })

  return prevRef.current   // returns value from PREVIOUS render
}

function Counter() {
  const [count, setCount] = useState(0)
  const prevCount = usePrevious(count)

  return (
    <div>
      <p>Now: {count} | Before: {prevCount ?? 'none'}</p>
      <button onClick={() => setCount(c => c + 1)}>+1</button>
    </div>
  )
}

    }

// ── Measure DOM element dimensions ────────────────────────────
function MeasureBox() {
  const boxRef = useRef<HTMLDivElement>(null)
  const [size, setSize] = useState({ width: 0, height: 0 })

  useEffect(() => {
    if (!boxRef.current) return

    const observer = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect
      setSize({ width: Math.round(width), height: Math.round(height) })
    })

    observer.observe(boxRef.current)
    return () => observer.disconnect()   // cleanup on unmount
  }, [])

  return (
