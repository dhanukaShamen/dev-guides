    <pre class="language-${lang === 'tsx' ? 'tsx' : lang === 'bash' ? 'bash' : lang === 'json' ? 'json' : 'typescript'}"><code class="language-${lang === 'tsx' ? 'tsx' : lang === 'bash' ? 'bash' : lang === 'json' ? 'json' : 'typescript'}">${escHtml(code)}</code></pre>
  </div>`
    if (extraCodes) {
      extraCodes.forEach(ec => {
        html += `<div class="cb">
        <div class="cb-hdr">
          <div class="cb-fname">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            ${ec.file} <span class="cb-lang">${ec.lang}</span>
          </div>
          <button class="cb-copy" onclick="copyCode(this)">Copy</button>
        </div>
        <pre class="language-tsx"><code class="language-tsx">${escHtml(ec.code)}</code></pre>
      </div>`
      })
    }
    return html
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function boxIcon(type) {
    if (type === 'ts')   return ICONS.ts
    if (type === 'rx')   return ICONS.r19ico
    if (type === 'r19')  return ICONS.r19ico
    if (type === 'warn') return ICONS.warn
    if (type === 'ok')   return ICONS.check
    return ICONS.check
  }

  function boxLabel(type) {
    if (type === 'ts')   return 'TypeScript'
    if (type === 'rx')   return 'React Concept'
    if (type === 'r19')  return 'React 19'
    if (type === 'warn') return 'Watch Out'
    if (type === 'ok')   return 'Best Practice'
    return ''
  }

  function renderBox(b) {
    return `<div class="box box-${b.type}">
    <div class="box-hdr">${boxIcon(b.type)} ${b.title || boxLabel(b.type)}</div>
    <div class="box-body">${b.body}</div>
  </div>`
  }

  function renderSection(s, idx, total) {
    const prevSec = idx > 0 ? SECTIONS[idx - 1] : null
    const nextSec = idx < total - 1 ? SECTIONS[idx + 1] : null
    const num = String(idx + 1).padStart(2, '0')

    let html = `<div id="sec-${s.id}" class="sec${idx === 0 ? ' vis' : ''}">
    <div class="sec-crumb">${s.group} <span>/ ${s.title}</span></div>
    <div class="sec-title">${s.title}</div>
    <p class="sec-sub">${s.sub}</p>`

    if (s.content) html += s.content
    if (s.mockup)  html += s.mockup
    if (s.boxes)   s.boxes.forEach(b => { html += renderBox(b) })
    if (s.code)    html += codeBlock(s.code, s.codeFile || '', s.codeLang || 'tsx', s.extraCodes)

    html += `<div class="nav-row">`
    if (prevSec) {
      html += `<button class="nav-btn" onclick="navigate('${prevSec.id}')">${ICONS.prev} <span class="nav-label">${prevSec.title}</span></button>`
    } else {
      html += `<span></span>`
    }
    if (nextSec) {
      html += `<button class="nav-btn next" onclick="navigate('${nextSec.id}')"><span class="nav-label">${nextSec.title}</span> ${ICONS.next}</button>`
    }
    html += `</div></div>`
    return html
  }

  // Build sidebar
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar')
    let html = ''
    let currentGroup = ''
    let num = 0
    SECTIONS.forEach((s, i) => {
      if (s.group !== currentGroup) {
        currentGroup = s.group
        html += `<div class="sg-label">${s.group}</div>`
      }
      num++
      html += `<div class="si${i === 0 ? ' active' : ''}" id="si-${s.id}" onclick="navigate('${s.id}')">
      ${ICONS[s.icon] || ICONS.cube}
      <span>${s.title}</span>
      <span class="sn">${String(num).padStart(2,'0')}</span>
    </div>`
    })
    sidebar.innerHTML = html
  }

  // Build content
  function buildContent() {
    const content = document.getElementById('content')
    content.innerHTML = SECTIONS.map((s, i) => renderSection(s, i, SECTIONS.length)).join('')
  }

  // Navigate
  let current = SECTIONS[0].id
  function navigate(id) {
    document.getElementById('sec-' + current)?.classList.remove('vis')
    document.getElementById('si-' + current)?.classList.remove('active')
    current = id
    const sec = document.getElementById('sec-' + id)
    const si = document.getElementById('si-' + id)
    if (sec) {
      sec.classList.add('vis')
      document.querySelector('.content').scrollTop = 0
    }
    if (si) {
      si.classList.add('active')
      si.scrollIntoView({ block: 'nearest' })
    }
    updateProgress()
    Prism.highlightAllUnder(sec)
    closeSidebar()  // auto-close drawer on mobile after picking a section
  }

  // Progress
  const visited = new Set([SECTIONS[0].id])
  function updateProgress() {
    visited.add(current)
    const pct = Math.round((visited.size / SECTIONS.length) * 100)
    document.getElementById('progFill').style.width = pct + '%'
    document.getElementById('progTxt').textContent = `${visited.size} / ${SECTIONS.length}`
  }

  // Copy code
  function copyCode(btn) {
    const pre = btn.closest('.cb').querySelector('code')
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = 'Copied!'
      setTimeout(() => { btn.textContent = 'Copy' }, 1800)
    })
  }

  // Search
  function buildSearchIndex() {
    return SECTIONS.map(s => ({
      id: s.id,
      title: s.title,
      group: s.group,
      text: (s.sub + ' ' + (s.content || '')).replace(/<[^>]+>/g, '').toLowerCase()
    }))
  }

  const searchIndex = buildSearchIndex()
  let selIdx = -1  // keyboard-highlighted item index in dropdown


  function positionDropdown(inputEl) {
    const drop = document.getElementById('searchResults')
    const rect = inputEl.getBoundingClientRect()
    const isMobile = window.innerWidth <= 900
    if (isMobile) {
      drop.style.left = '0'
      drop.style.right = '0'
      drop.style.width = '100%'
      drop.style.top = (rect.bottom + 2) + 'px'
      drop.style.borderRadius = '0 0 var(--radius) var(--radius)'
    } else {
      const w = Math.max(rect.width, 320)
      const left = Math.min(rect.left, window.innerWidth - w - 8)
      drop.style.left = left + 'px'
      drop.style.right = ''
      drop.style.width = w + 'px'
      drop.style.top = (rect.bottom + 6) + 'px'
      drop.style.borderRadius = 'var(--radius)'
    }
  }

  function runSearch(q, inputEl) {
    const drop = document.getElementById('searchResults')
    selIdx = -1
    if (!q) { drop.classList.remove('vis'); return }
    positionDropdown(inputEl)
    const hits = searchIndex.filter(s => s.title.toLowerCase().includes(q) || s.text.includes(q)).slice(0, 8)
    if (!hits.length) {
      drop.innerHTML = `<div class="srch-empty">No results for "<strong>${q}</strong>"</div>`
      drop.classList.add('vis')
      return
    }
    drop.innerHTML = hits.map(h => `
    <div class="srch-item" data-id="${h.id}" onclick="pickSearch('${h.id}')">
      <div class="sg">${h.group}</div>
      ${h.title}
    </div>`).join('')
    drop.classList.add('vis')
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    runSearch(this.value.trim().toLowerCase(), this)
  })
  document.getElementById('searchInputMobile')?.addEventListener('input', function() {
    runSearch(this.value.trim().toLowerCase(), this)
  })
  document.getElementById('searchInputMobile')?.addEventListener('keydown', function(e) {
    if (['ArrowDown','ArrowUp','Enter','Escape'].includes(e.key)) {
      document.getElementById('searchInput').dispatchEvent(new KeyboardEvent('keydown', e))
    }
  })

  function pickSearch(id) {
    navigate(id)
    document.getElementById('searchInput').value = ''
    const mobileInput = document.getElementById('searchInputMobile')
    if (mobileInput) mobileInput.value = ''
    document.getElementById('searchResults').classList.remove('vis')
    selIdx = -1
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', e => {
    if (!e.target.closest('.hdr-search') && !e.target.closest('.srch-drop')) {
      document.getElementById('searchResults').classList.remove('vis')
      selIdx = -1
    }
  })

  // Keyboard nav
  document.addEventListener('keydown', e => {
    const drop = document.getElementById('searchResults')
    const isDropOpen = drop.classList.contains('vis')
    const inInput = document.activeElement === document.getElementById('searchInput') ||
            document.activeElement === document.getElementById('searchInputMobile')

    // ⌘K / Ctrl+K — focus search
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault()
      document.getElementById('searchInput').focus()
      return
    }

    // Escape — close dropdown and blur search
    if (e.key === 'Escape') {
      drop.classList.remove('vis')
      document.getElementById('searchInput').blur()
      selIdx = -1
      return
    }

    // ↑ ↓ — move through dropdown items
    if (isDropOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
      e.preventDefault()
      const items = drop.querySelectorAll('.srch-item')
      if (!items.length) return
      items[selIdx]?.classList.remove('sel')
      selIdx = e.key === 'ArrowDown'
              ? Math.min(selIdx + 1, items.length - 1)
              : Math.max(selIdx - 1, 0)
      items[selIdx]?.classList.add('sel')
      items[selIdx]?.scrollIntoView({ block: 'nearest' })
      return
    }

    // Enter — confirm highlighted dropdown item
    if (isDropOpen && e.key === 'Enter') {
      const items = drop.querySelectorAll('.srch-item')
      if (selIdx >= 0 && items[selIdx]) { pickSearch(items[selIdx].dataset.id) }
      return
    }

    // ← → — section navigation (blocked while search input is focused)
    if (!inInput) {
      if (e.key === 'ArrowRight') {
        const idx = SECTIONS.findIndex(s => s.id === current)
        if (idx < SECTIONS.length - 1) navigate(SECTIONS[idx + 1].id)
      }
      if (e.key === 'ArrowLeft') {
        const idx = SECTIONS.findIndex(s => s.id === current)
        if (idx > 0) navigate(SECTIONS[idx - 1].id)
      }
    }
  })

  // Mobile sidebar toggle
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open')
    document.getElementById('sidebarOverlay').classList.add('vis')
    document.body.style.overflow = 'hidden'
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('vis')
    document.body.style.overflow = ''
  }
  document.getElementById('menuBtn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar()
  })
  document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar)

  // Wrap navigate to also close sidebar on mobile
  const _navigate = navigate
  navigate = function(id) { _navigate(id); closeSidebar() }

  // Init
  buildSidebar()
  buildContent()
  updateProgress()
  Prism.highlightAll()

</script>

<script>
  (function(){
    var wrap=document.getElementById('fabWrap'),btn=document.getElementById('fabBtn'),menu=document.getElementById('fabMenu'),items=menu.querySelectorAll('.fab-item');
    var open=false,dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0;
    function startDrag(cx,cy){dragging=true;moved=false;var r=wrap.getBoundingClientRect();sx=r.left;sy=r.top;ox=cx;oy=cy;wrap.style.transition='none';}
    function moveDrag(cx,cy){if(!dragging)return;var dx=cx-ox,dy=cy-oy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;var W=window.innerWidth,H=window.innerHeight,w=wrap.offsetWidth,h=wrap.offsetHeight;wrap.style.right='auto';wrap.style.bottom='auto';wrap.style.left=Math.max(8,Math.min(W-w-8,sx+dx))+'px';wrap.style.top=Math.max(8,Math.min(H-h-8,sy+dy))+'px';}
    function endDrag(){if(!dragging)return;dragging=false;wrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';var W=window.innerWidth,w=wrap.offsetWidth,r=wrap.getBoundingClientRect(),onLeft=(r.left+w/2)<W/2;wrap.style.left=(onLeft?16:W-w-16)+'px';wrap.classList.toggle('fab-left',onLeft);}
    function closeMenu(){open=false;btn.classList.remove('open');btn.setAttribute('aria-expanded','false');items.forEach(function(it){it.classList.remove('vis');});setTimeout(function(){menu.style.pointerEvents='none';},220);}
    function openMenu(){open=true;btn.classList.add('open');btn.setAttribute('aria-expanded','true');menu.style.pointerEvents='auto';items.forEach(function(it,i){setTimeout(function(){it.classList.add('vis');},i*65);});}
    wrap.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);e.preventDefault();});
    document.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
    document.addEventListener('mouseup',function(){endDrag();});
    wrap.addEventListener('touchstart',function(e){startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    document.addEventListener('touchmove',function(e){if(dragging){moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    document.addEventListener('touchend',function(e){endDrag();});
    btn.addEventListener('click',function(){if(moved)return;open?closeMenu():openMenu();});
    document.addEventListener('click',function(e){if(open&&!wrap.contains(e.target))closeMenu();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&open)closeMenu();});
  })();
</script>
